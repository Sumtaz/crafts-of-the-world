        { name: "Yemeni Silver Jewelry", image: "images/yemeni-silver-jewelry.jpg", state: "Yemen", region: "Middle East", lat: 15.348, lng: 44.206, type: "Jewelry", materials: ["silver", "gold", "beads"], description: "The magnificent silver jewelry tradition of Sana'a, historically crafted by Yemen's Jewish silversmiths.", era: "Pre-Islamic era", steps: ["Silver coins or ingots are melted and cast into workable bars or drawn into fine wire.", "The silver is hammered into shape and decorated with applied granulation, tiny silver balls soldered onto the surface.", "Filigree wirework, engraving, and applied gold wash (tila) are added as decorative elements."], funFact: "Yemen's Jewish community made virtually all the country's silver pieces." },
        { name: "Yemeni Takhrim Window Lattice", image: "images/yemeni-takhrim-window-lattice.jpg", state: "Yemen", region: "Middle East", lat: 15.354, lng: 44.208, type: "Home Decor", materials: ["stone", "glass"], description: "The ornate stained glass and plaster window screens of traditional Sana'a tower houses.", era: "10th century", steps: ["A thick slab of wet gypsum plaster is prepared and set into a wooden frame the size of the window opening.", "The intricate geometric design is carved through the plaster using sharp knives and chisels while still slightly damp.", "Pieces of colored glass in red, blue, green, and amber are cut to fit each opening in the lattice pattern."], funFact: "Fan-shaped windows above doors light Sana'a's tower houses at sunset." },
        { name: "Yemeni Dallah Coffee Pot", image: "images/yemeni-dallah-coffee-pot.jpg", state: "Yemen", region: "Middle East", lat: 15.34, lng: 44.2, type: "Kitchenware", materials: ["brass", "copper"], description: "The traditional long-spouted coffee pot of Yemen, hand-forged from brass or copper.", era: "15th century", steps: ["A sheet of brass or copper is cut and hammered over a stake into the pot's distinctive pear-shaped body.", "The long, curved spout is formed separately by shaping a cone of metal and attaching it to the body with brazing.", "The hinged lid, handle, and finial are forged and assembled, with the handle often wrapped in leather or cord for heat protection."], funFact: "Yemen is where coffee was first cultivated as a crop, not Ethiopia." },
        { name: "Omani Silver Jewelry", image: "images/omani-silver-jewelry.jpg", state: "Oman", region: "Middle East", lat: 22.934, lng: 57.53, type: "Jewelry", materials: ["silver", "gold"], description: "The heavy, ornate silver jewelry of Nizwa and the Omani interior, including massive bridal necklaces, anklets.", era: "Pre-Islamic era", steps: ["Maria Theresa silver thalers are melted down and cast into ingots for working.", "The silver is hammered into thick sheets and shaped into the desired form: bangles, pendants, or amulet cases.", "Surface decoration is applied through chasing, repoussé, applied granulation, and filigree wirework."], funFact: "A bridal set could weigh several kilograms and represent the bride's wealth." },
        { name: "Omani Dhow Boat Building", image: "images/omani-dhow-boat-building.jpg", state: "Oman", region: "Middle East", lat: 23.616, lng: 58.592, type: "Other", materials: ["wood", "plant fiber", "cotton"], description: "The ancient craft of building wooden sailing vessels in Oman's coastal shipyards.", era: "3rd millennium BCE", steps: ["The keel timber of teak or other hardwood is laid down, and the stem and stern posts are erected and shaped.", "The hull planks are hewn from imported Indian teak and fitted edge-to-edge, traditionally stitched together with coir rope through drilled holes.", "The internal ribs and frames are fitted after the hull shell is complete, a technique opposite to European shipbuilding."], funFact: "Planks were sewn together with coconut fiber; no iron nails were used." },
        { name: "Omani Halwa Pot Making", image: "images/omani-halwa-pot-making.jpg", state: "Oman", region: "Middle East", lat: 23.588, lng: 58.382, type: "Kitchenware", materials: ["copper", "brass"], description: "The craft of making large copper cooking vessels specifically designed for preparing Omani halwa.", era: "Pre-modern era", steps: ["A thick sheet of copper is cut and hammered over a large stake to form the wide, shallow cooking vessel shape.", "The copper body is reinforced with a rolled rim and heavy base to withstand prolonged heating.", "Brass or copper handles are riveted to the sides for lifting the heavy pot when full."], funFact: "Omani halwa requires two hours of continuous stirring over a fire." },
        { name: "Jordanian Sand Bottle Art", image: "images/jordanian-sand-bottle-art.jpg", state: "Jordan", region: "Middle East", lat: 30.328, lng: 35.442, type: "Home Decor", materials: ["glass", "stone"], description: "The folk art of creating layered colored sand pictures inside glass bottles, practiced in Petra and Aqaba.", era: "20th century", steps: ["Natural sandstones of different colors are gathered from the desert landscape around Petra and ground into fine sand.", "The colored sands are sorted by hue and placed in small containers for easy access during the filling process.", "The sand is poured into the glass bottle layer by layer, with the artist using thin metal tools to push and shape the sand into pictorial designs."], funFact: "Multicolored sands come from naturally layered rock in Petra's canyons." },
        { name: "Jordanian Bedouin Weaving", image: "images/jordanian-bedouin-weaving.jpg", state: "Jordan", region: "Middle East", lat: 30.834, lng: 36.345, type: "Home Decor", materials: ["wool", "cotton", "natural dye"], description: "The ground-loom weaving tradition of Jordan's Bedouin women, producing rugs, tent dividers.", era: "Pre-Islamic era", steps: ["Wool is shorn from sheep and goats, washed, and hand-spun into yarn on a drop spindle.", "The yarn is dyed using desert plants: pomegranate for yellow, madder root for red, and indigo for blue.", "A ground loom is staked out on the earth, and the warp threads are stretched between two beams."], funFact: "Black goat-hair tent panels are called \"beit sha'ar\" or \"house of hair.\"" },
        { name: "Egyptian Copper Tray", image: "images/egyptian-copper-tray.jpg", state: "Egypt", region: "Middle East", lat: 30.048, lng: 31.262, type: "Kitchenware", materials: ["copper", "silver"], description: "The hand-hammered and engraved copper trays of Cairo's Khan el-Khalili bazaar.", era: "14th century", steps: ["A flat sheet of copper is cut into a large circle and hammered into a shallow tray form with a raised rim.", "The surface is marked out with geometric guidelines using a compass and straight edge.", "The intricate arabesque and calligraphic patterns are engraved into the copper using steel chisels and a small hammer."], funFact: "Khan el-Khalili coppersmiths have hammered trays since the 14th century." },
        { name: "Egyptian Mashrabiya Woodwork", image: "images/egyptian-mashrabiya-woodwork.jpg", state: "Egypt", region: "Middle East", lat: 30.045, lng: 31.258, type: "Home Decor", materials: ["wood"], description: "The iconic carved wooden lattice screens of Cairo's Islamic architecture.", era: "12th century", steps: ["Small cylinders of hard wood are individually turned on a lathe into spindles with bulbous, spherical, and cylindrical sections.", "The turned spindles are assembled by inserting them into precisely drilled holes in horizontal rails, creating geometric patterns.", "Additional decorative elements such as flat carved panels and arabesque inserts are fitted between the turned sections."], funFact: "Lattice screens cool incoming air by up to 15 degrees in summer." },
        { name: "Egyptian Muski Glass", image: "images/egyptian-muski-glass.jpg", state: "Egypt", region: "Middle East", lat: 30.047, lng: 31.264, type: "Home Decor", materials: ["glass"], description: "The hand-blown recycled glass art of Cairo's Muski quarter, where artisans transform discarded bottles into colorful.", era: "Medieval era", steps: ["Discarded glass bottles are sorted by color, cleaned, and broken into chunks for melting.", "The glass chunks are melted in a small clay furnace fueled by gas or wood.", "The glassblower gathers the molten glass on a blowpipe and shapes it through blowing and manipulation with hand tools."], funFact: "Cobalt makes blue, manganese makes purple; no two swirled pieces match." },
        { name: "Persian Gabbeh Rug", image: "images/persian-gabbeh-rug.png", state: "Iran", region: "Middle East", lat: 30.668, lng: 51.68, type: "Home Decor", materials: ["wool", "natural dye"], description: "The thick, shaggy pile rugs woven by Qashqai nomadic women in the Zagros Mountains of southern Iran, featuring bold.", era: "Pre-Islamic era", steps: ["Wool from the nomads' own sheep is washed in mountain streams and hand-spun into thick, soft yarn.", "The yarn is dyed using natural materials found along the migration route: madder, walnut, pomegranate, and indigo.", "The weaver sets up a horizontal ground loom at the camp and ties Turkish knots in a coarse, loose weave."], funFact: "Once considered too coarse to sell; now they fetch premium gallery prices." },
        { name: "Persian Kilim", image: "images/persian-kilim.jpg", state: "Iran", region: "Middle East", lat: 32.654, lng: 51.677, type: "Home Decor", materials: ["wool", "cotton", "natural dye"], description: "The flat-woven tapestry rugs produced across Iran's tribal and village communities.", era: "Pre-Islamic era", steps: ["Wool is hand-spun and dyed with natural pigments, with each tribal region having its own characteristic color palette.", "The cotton warp is strung on a ground loom or vertical frame loom staked into the earth.", "The weaver interlocks colored weft threads around the warp to build the geometric design, using a slit-weave or dovetail technique."], funFact: "Each tribal motif functions as a word in a visual language." },
        { name: "Iranian Turquoise Setting", image: "images/iranian-turquoise-setting.jpg", state: "Iran", region: "Middle East", lat: 36.31, lng: 59.6, type: "Jewelry", materials: ["silver", "copper", "stone"], description: "The craft of setting Iranian turquoise stones into copper and silver objects, known as Firuzeh Kubi.", era: "Pre-Islamic era", steps: ["A copper or silver vessel is prepared with a textured surface to help the stones adhere.", "Small, irregularly shaped pieces of Nishapur turquoise are sorted by color and size.", "The turquoise fragments are set one by one into a bed of black adhesive paste covering the metal surface."], funFact: "Nishapur mines have produced turquoise continuously for 3,000 years." },
        { name: "Turkish Calligraphy Tools", image: "images/turkish-felt-making.jpg", state: "Turkey", region: "Middle East", lat: 41.008, lng: 28.978, type: "Kitchenware", materials: ["bamboo", "leather", "metal"], description: "The specialized craft of making Islamic calligraphy instruments in Istanbul.", era: "15th century", steps: ["A dried reed is selected for straightness and hardness, and the tip is shaped with an oblique cut using a special knife.", "The nib is split precisely down the center and trimmed to the desired width for the calligraphic script style.", "The paper is prepared by coating with a starch and egg mixture, then burnished with a smooth agate stone to create a glassy surface."], funFact: "Calligraphers considered their reed pen so sacred they were buried with their favorite pen." },
        { name: "Turkish Coppersmith", image: "images/turkish-coppersmith.jpg", state: "Turkey", region: "Middle East", lat: 37.059, lng: 37.383, type: "Kitchenware", materials: ["copper", "silver"], description: "The traditional coppersmithing of Gaziantep in southeastern Turkey.", era: "Pre-Ottoman era", steps: ["A sheet of copper is cut to size and hammered over an anvil into the desired vessel shape through repeated heating and beating.", "The vessel is planished with a flat-faced hammer to smooth the surface and achieve a uniform thickness.", "Decorative patterns of arabesques, tulips, and calligraphy are engraved or chased into the surface."], funFact: "Gaziantep's copper bazaar has operated continuously for over 500 years." },
        { name: "Turkish Felt Making", image: "images/turkish-felt-making.jpg", state: "Turkey", region: "Middle East", lat: 38.735, lng: 32.493, type: "Clothing", materials: ["wool"], description: "The ancient Central Asian tradition of felt making preserved in Turkey, particularly in Konya.", era: "Pre-Islamic era", steps: ["Raw sheep's wool is washed, teased apart, and laid out in even layers on a reed mat in the desired thickness.", "Hot soapy water is sprinkled over the wool layers, and the mat is rolled up tightly around a pole.", "The rolled bundle is kicked, beaten, and rolled back and forth for several hours to entangle the wool fibers."], funFact: "Whirling dervishes of Konya wear tall conical felt hats called sikke." },
        { name: "Turkish Karagöz Shadow Puppet", image: "images/turkish-karag-z-shadow-puppet.jpg", state: "Turkey", region: "Middle East", lat: 40.184, lng: 29.061, type: "Toys", materials: ["leather", "natural dye"], description: "The traditional shadow puppets of Turkish Karagöz theater, crafted from translucent camel or cattle hide and brightly.", era: "16th century", steps: ["Cattle or camel hide is scraped, stretched, and treated until it becomes translucent and parchment-like.", "The puppet figure is drawn on the hide and cut out with sharp knives, with joints articulated at the shoulders, elbows, and knees.", "The translucent hide pieces are painted with vibrant, transparent dyes that project color when backlit."], funFact: "Based on two real construction workers executed for joking on the job." },
        { name: "Al-Sadu Weaving", state: "Saudi Arabia", region: "Najd", lat: 24.7136, lng: 46.6753, type: "Clothing", materials: ["Wool", "Natural Dye", "Cotton"], description: "Traditional Bedouin flat-weave textile art practiced by women of the Arabian Peninsula, producing tent dividers.", era: "Ancient", steps: ["Sheep or camel wool is sheared, cleaned, and hand-spun into strong yarn", "The yarn is dyed using natural pigments — pomegranate for red, indigo for black", "Threads are stretched on a ground-level loom staked into desert sand"], funFact: "Woven on ground-level looms staked directly into the desert sand." },
        { name: "Al-Qatt Al-Asiri Painting", image: "images/al-qatt-al-asiri-painting.jpg", state: "Saudi Arabia", region: "Asir, Abha", lat: 18.2164, lng: 42.5053, type: "Home Decor", materials: ["Natural Dye", "Clay", "Plant Fiber"], description: "Vibrant interior wall painting tradition of Asir province, where women decorate homes with bold geometric and floral.", era: "Ancient", steps: ["Interior mud-plastered walls are smoothed and prepared as a canvas", "Natural pigments from plants, stones, and minerals are ground and mixed", "Bold geometric bands, zigzags, and floral motifs are painted freehand by women"], funFact: "Exclusively a women's art form; men are traditionally forbidden to paint." },
        { name: "Saudi Dallah Coffee Pot", image: "images/saudi-dallah-coffee-pot.jpg", state: "Saudi Arabia", region: "Hail", lat: 27.5114, lng: 41.7208, type: "Kitchenware", materials: ["Brass", "Copper"], description: "The iconic long-spouted Arabic coffee pot handcrafted from brass or copper.", era: "Pre-Islamic", steps: ["Brass or copper sheet is cut and hammered into the distinctive pot body shape", "The long curved spout is formed separately and brazed onto the body", "Decorative bands and geometric engravings are chiseled around the belly"], funFact: "So central to Saudi identity that it appears on the one-riyal coin." },
        { name: "Saudi Silver Jewelry (Bedouin)", image: "images/saudi-silver-jewelry-bedouin.jpg", state: "Saudi Arabia", region: "Najran", lat: 17.4933, lng: 44.1277, type: "Jewelry", materials: ["Silver", "Stone", "Coral"], description: "Traditional Bedouin silver jewelry of the Arabian Peninsula including heavy necklaces, amulet cases, and head ornaments.", era: "Ancient", steps: ["Silver coins or ingots are melted and cast into rough forms", "The silversmith hammers and shapes pieces into pendants, bangles, and chains", "Granulation, filigree, and stone settings are added as decoration"], funFact: "Brides traditionally received their own body weight in silver." },
        { name: "Jeddah Coral Stone Building", image: "images/jeddah-coral-stone-building.jpg", state: "Saudi Arabia", region: "Jeddah", lat: 21.4858, lng: 39.1925, type: "Furniture", materials: ["Coral", "Stone", "Wood"], description: "The traditional architectural craft of old Jeddah using coral stone blocks harvested from the Red Sea.", era: "7th Century", steps: ["Coral limestone blocks are quarried from the Red Sea reef and left to dry and harden", "Blocks are cut to size and stacked using mud mortar to form thick insulating walls", "Intricately carved wooden Rawasheen lattice screens are fitted over windows and balconies"], funFact: "Porous coral walls naturally cool rooms without any air conditioning." },
        { name: "Saudi Bisht Cloak Weaving", image: "images/saudi-bisht-cloak-weaving.jpg", state: "Saudi Arabia", region: "Al-Ahsa", lat: 25.3548, lng: 49.5855, type: "Clothing", materials: ["Wool", "Gold Thread", "Silk"], description: "The weaving of the bisht, a flowing ceremonial cloak worn by Saudi men on formal occasions.", era: "Pre-Islamic", steps: ["Fine camel or sheep wool is hand-spun and dyed in black, brown, or cream", "The fabric is woven on a traditional horizontal loom in a plain weave", "Gold or silver metallic thread is hand-embroidered along the edges and collar"], funFact: "Gold-thread edging alone costs more than the cloak's fabric." },
        { name: "Ural Stone Cutting", image: "images/ural-stone-cutting.jpg", state: "Russia", region: "Ural Mountains", lat: 56.8389, lng: 60.6057, type: "Sculpture", materials: ["Stone", "Metal"], description: "The Ural Mountains have been renowned since the 18th century for their deposits of malachite, jasper.", era: "18th century", steps: ["Raw semiprecious stone was extracted from Ural mountain deposits and sorted by color and quality", "The stone was rough-cut into slabs or blanks using hand-powered saws with abrasive sand", "Detailed shaping was performed with chisels and grinding wheels to achieve the desired form"], funFact: "Saint Isaac's Cathedral has malachite columns cut from Ural slabs." },
        { name: "Tula Samovar Making", image: "images/tula-samovar-making.jpg", state: "Russia", region: "Central Russia", lat: 54.1961, lng: 37.6182, type: "Kitchenware", materials: ["Copper", "Brass", "Metal"], description: "The city of Tula became the center of samovar production in the late 18th century.", era: "18th century", steps: ["Sheets of copper or brass were cut and hammered over wooden forms to shape the body of the samovar", "The internal fire tube and grate assembly were forged separately and fitted into the body", "Handles, spigots, and decorative elements were cast in molds and soldered into place"], funFact: "Tula was Russia's arms capital before pivoting to decorative samovars." },
        { name: "Mongolian Deel Embroidery", image: "images/mongolian-deel-embroidery.jpg", state: "Mongolia", region: "Central Mongolia", lat: 47.9185, lng: 106.9177, type: "Clothing", materials: ["Silk", "Thread", "Cotton", "Gold Thread"], description: "The deel is the traditional Mongolian robe worn across the steppe for centuries.", era: "13th century", steps: ["Silk or cotton fabric was cut into the wide-sleeved, wrap-front pattern traditional to the wearer's ethnic group", "Embroidery patterns were traced onto collar bands and cuffs using charcoal or chalk guidelines", "Silk and gold threads were stitched in layered satin and couching techniques to build up ornamental motifs"], funFact: "A deel's color and stitching reveal age, rank, and marital status." },
        { name: "Mongolian Ger (Yurt) Felt Making", image: "images/mongolian-ger-yurt-felt-making.jpg", state: "Mongolia", region: "Central Mongolia", lat: 47.2, lng: 104, type: "Home Decor", materials: ["Wool", "Grass", "Plant Fiber"], description: "The Mongolian ger, or yurt, relies on thick layers of handmade felt for insulation against the extreme temperatures.", era: "3rd century BCE", steps: ["Freshly shorn sheep wool was washed, beaten, and spread evenly across a reed mat in thick layers", "The wool was moistened with water and the mat was tightly rolled around a pole, then dragged behind horses across the steppe", "The rolling and compression process was repeated multiple times until the fibers matted into a dense, uniform sheet"], funFact: "An entire community gathers to roll felt by pulling it behind horses." },
        { name: "Morin Khuur (Horse-Head Fiddle) Making", image: "images/morin-khuur-horse-head-fiddle-making.jpg", state: "Mongolia", region: "Central Mongolia", lat: 48.005, lng: 106.9, type: "Music", materials: ["Wood", "Leather", "Bone"], description: "The morin khuur, or horse-head fiddle, is Mongolia's most iconic musical instrument.", era: "13th century", steps: ["A single block of seasoned birch or cedar was carved into the trapezoidal sound box and long neck of the instrument", "The scroll was meticulously carved into the form of a horse head, with details varying by regional tradition", "Goat or snake skin was stretched over the front of the sound box and secured with hide glue to form the resonating membrane"], funFact: "Legend says the first one was carved from a beloved horse's remains." },
        { name: "Mongolian Silver Jewelry", image: "images/mongolian-silver-jewelry.jpg", state: "Mongolia", region: "Western Mongolia", lat: 48.0042, lng: 91.637, type: "Jewelry", materials: ["Silver", "Stone", "Coral"], description: "Mongolian nomadic communities, particularly the Kazakh and Torguud peoples of western Mongolia.", era: "15th century", steps: ["Silver was melted in clay crucibles and cast into ingots or rough blanks for further working", "The silver was hammered and shaped into the desired form, whether a ring, pendant, or large headdress ornament", "Decorative patterns were engraved or stamped using fine punches, and bezels were soldered to hold gemstones"], funFact: "A Kazakh bride's silver headdress can weigh several kilograms." },
        { name: "Gorodets Painting", image: "images/gorodets-painting.jpg", state: "Russia", region: "Volga Region", lat: 56.648, lng: 43.471, type: "Home Decor", materials: ["Wood", "Natural Dye"], description: "Gorodets painting originated in villages along the Volga River in the mid-19th century.", era: "19th century", steps: ["Seasoned linden wood panels were planed smooth and primed with a thin layer of chalk-based ground", "Large color spots were laid down in broad brushstrokes to establish the composition of flowers, horses, or figures", "Detailed line work in white and dark paint was applied over the base colors to define petals, manes, and facial features"], funFact: "Originally painted only on spinning-wheel distaff boards, not wood panels." },
        { name: "Dymkovo Toy", image: "images/dymkovo-toy.jpg", state: "Russia", region: "Kirov Oblast", lat: 58.6036, lng: 49.668, type: "Toys", materials: ["Clay", "Natural Dye"], description: "Dymkovo toys are brightly painted clay figurines originating from the Dymkovo settlement near Kirov.", era: "15th century", steps: ["Local red clay was mixed with fine river sand and kneaded into a smooth, workable consistency", "Figures were shaped entirely by hand without molds, with details like ruffles and hats added as small clay pieces", "The dried figures were fired in a kiln, then coated in a white chalk-and-milk wash to create a bright base"], funFact: "Made exclusively for the annual Vyatka spring festival, then smashed." },
        { name: "Siberian Birch Bark Craft", image: "images/siberian-birch-bark-craft.jpg", state: "Russia", region: "Yakutia (Sakha Republic)", lat: 62.0355, lng: 129.6755, type: "Kitchenware", materials: ["Wood", "Plant Fiber"], description: "The indigenous Yakut and other Siberian peoples have worked birch bark for thousands of years, creating containers.", era: "Ancient", steps: ["Birch bark was carefully peeled from living trees in early summer when the sap was flowing and the bark separated most easily", "The bark sheets were softened in warm water or over a fire, then cut and folded into the desired vessel shape", "Seams were stitched with thin strips of root or sinew and sealed with pine resin to make the vessel watertight"], funFact: "Bark vessels were so waterproof they replaced pottery for nomadic peoples." },
        { name: "Tatar Leather Craft", image: 'images/tatar-leather-craft.jpg', state: "Russia", region: "Tatarstan", lat: 55.7887, lng: 49.1221, type: "Footwear", materials: ["Leather", "Natural Dye", "Thread"], description: "Kazan Tatars developed a highly distinctive tradition of ornamental leather work.", era: "10th century", steps: ["Goatskin and calfskin were tanned and dyed in vivid colors using plant-based dyes, particularly saffron yellow, madder red, and indigo blue", "The dyed leather was cut into intricate floral and geometric shapes with sharp knives following traditional pattern templates", "The multicolored leather pieces were assembled into mosaic compositions and stitched together with fine silk thread using a distinctive couched seam"], funFact: "Mosaic leather boots were so prized they were exported across all of Russia." },
        { name: "Sudanese Leather Craft", image: "images/sudanese-leather-craft.jpg", state: "Sudan", region: "Central Sudan", lat: 15.5007, lng: 32.5599, type: "Home Decor", materials: ["Leather", "Natural Dye", "Thread"], description: "Sudanese leather workers have produced finely tooled and dyed leather goods for centuries.", era: "Medieval", steps: ["Goat or camel hides were tanned using acacia bark and other local plant extracts in earthen pits", "The tanned leather was dyed in rich reds and browns using henna, pomegranate, and other botanical pigments", "Geometric and arabesque patterns were tooled into the leather surface using heated metal stamps and pointed awls"], funFact: "Sudanese leather was a luxury trade good across all of North Africa." },
        { name: "Nubian Gold Jewelry", image: "images/nubian-gold-jewelry.jpg", state: "Sudan", region: "Northern Sudan", lat: 18.5, lng: 31.8333, type: "Jewelry", materials: ["Gold", "Stone", "Beads"], description: "The Nubian kingdoms of Kush and Meroe were among the ancient world's great gold-producing civilizations.", era: "8th century BCE", steps: ["Alluvial gold was collected from Nile tributaries and smelted in clay crucibles over charcoal fires", "The refined gold was hammered into thin sheets or drawn into wire using stone and bronze tools", "Intricate designs featuring rams, cobras, and lotus motifs were achieved through repoussé, granulation, and filigree techniques"], funFact: "Nubian queens were buried with more gold than Egyptian pharaohs." },
        { name: "Chadian Leather Tooling", image: "images/chadian-leather-tooling.jpg", state: "Chad", region: "Central Chad", lat: 12.1348, lng: 15.0557, type: "Home Decor", materials: ["Leather", "Natural Dye"], description: "The leather workers of Chad, particularly among the Kanuri and Arab communities around N'Djamena and the Lake Chad basin.", era: "Medieval", steps: ["Cattle or goat hides were soaked and dehaired, then tanned using leaves and bark from local acacia and balanites trees", "The leather was stretched, dried, and dyed using indigo, henna, and mineral pigments to achieve rich blues and reds", "Geometric and interlacing patterns were impressed into the leather using carved wooden stamps and metal punches"], funFact: "Artisans belonged to hereditary guilds that guarded techniques for life." },
        { name: "Eritrean Basket Weaving", image: "images/eritrean-basket-weaving.jpg", state: "Eritrea", region: "Central Eritrea", lat: 15.3229, lng: 38.9251, type: "Home Decor", materials: ["Grass", "Plant Fiber", "Natural Dye"], description: "Eritrean women, particularly among the Tigrinya and Kunama communities.", era: "Ancient", steps: ["Grasses and palm fibers were harvested, dried, and split into fine, uniform strands for weaving", "Selected strands were dyed in vivid colors using plant-based pigments and modern dyes to create the desired palette", "Coiled basket construction began at the center, with each row of grass wrapped and stitched to the previous one using a binding fiber"], funFact: "The mesob basket is large enough to serve as a table for a full family meal." },
        { name: "Eritrean Gold Jewelry", image: 'images/eritrean-gold-jewelry.jpg', state: "Eritrea", region: "Western Eritrea", lat: 15.339, lng: 38.931, type: "Jewelry", materials: ["Gold", "Silver", "Beads"], description: "Eritrean gold jewelry traditions, particularly among the Tigrinya and Tigre peoples.", era: "1st century CE", steps: ["Gold was melted in small clay crucibles and refined to remove impurities before being prepared for working", "The molten gold was cast into simple forms or hammered into thin sheets and wire for further shaping", "Filigree and granulation techniques were employed to create the delicate lacework patterns characteristic of Eritrean bridal jewelry"], funFact: "A bride receives a full set of gold jewelry before the wedding can proceed." },
        { name: "Central African Butterfly Wing Art", image: 'images/central-african-butterfly-wing-art.jpg', state: "Central African Republic", region: "Central African Republic", lat: 4.3947, lng: 18.5582, type: "Home Decor", materials: ["Glass", "Plant Fiber"], description: "Artisans in the Central African Republic developed a unique craft of arranging the iridescent wings of tropical.", era: "20th century", steps: ["Wings of naturally deceased butterflies were carefully collected from the forest floor and sorted by color and iridescence", "The wings were dried and pressed flat, then trimmed with fine scissors into shapes needed for the composition", "Wing fragments were arranged on a backing board according to the artist's design, layering colors to create depth and form"], funFact: "The brilliant blues come from real morpho butterfly wings, not paint." },
        { name: "South Sudanese Gourd Craft", image: "images/south-sudanese-gourd-craft.jpg", state: "South Sudan", region: "South Sudan", lat: 4.85, lng: 31.5825, type: "Kitchenware", materials: ["Plant Fiber", "Natural Dye", "Leather"], description: "The Dinka, Nuer, and other South Sudanese peoples have transformed dried gourds into essential household vessels.", era: "Ancient", steps: ["Mature gourds were harvested and their interiors scraped clean, then left to dry and harden in the sun", "The dried gourd was shaped by cutting the opening and smoothing the rim with a rough stone or knife", "Decorative patterns were burned into the surface using heated iron points, creating geometric designs specific to the maker's community"], funFact: "A decorated gourd from a young man to a woman is a marriage proposal." },
        { name: "Chadian Woven Mat", image: 'images/chadian-woven-mat.jpg', state: "Chad", region: "Southern Chad", lat: 9.145, lng: 18.3904, type: "Home Decor", materials: ["Grass", "Plant Fiber", "Natural Dye"], description: "Women of the Sara, Massa, and other southern Chadian communities weave large decorative mats from locally harvested doum.", era: "Ancient", steps: ["Doum palm leaves and savanna grasses were harvested, split into thin strips, and dried in the sun", "Selected strips were dyed using local plants including indigo and sorghum husk to create contrasting colors", "The weaver interlaced dyed and natural strips on a ground frame, building up geometric patterns from memory"], funFact: "Mat patterns encode a family's lineage and social standing." },
        { name: "Libyan Carpet Weaving", image: "images/libyan-carpet-weaving.jpg", state: "Libya", region: "Tripolitania", lat: 32.3754, lng: 15.0925, type: "Home Decor", materials: ["Wool", "Natural Dye", "Cotton"], description: "The city of Misrata and the surrounding Tripolitanian region have been centers of carpet and kilim weaving for centuries.", era: "17th century", steps: ["Sheep wool was hand-spun into yarn and dyed using madder root, indigo, pomegranate, and other local plant sources", "An upright wooden loom was warped with strong cotton or wool threads to form the foundation of the carpet", "The weaver knotted or interlaced colored wool yarns row by row, following geometric patterns memorized from her mother or grandmother"], funFact: "Berber diamond patterns represent the female body and fertility." },
        { name: "Sudanese Pottery", image: "images/sudanese-pottery.jpg", state: "Sudan", region: "Eastern Sudan", lat: 15.45, lng: 36.4, type: "Pottery", materials: ["Clay", "Natural Dye"], description: "The pottery traditions of the Kassala region in eastern Sudan continue techniques that have been practiced along.", era: "Ancient", steps: ["Local clay was collected from riverbanks, cleaned of debris, and mixed with crushed potsherds or sand to prevent cracking during firing", "Vessels were built up from coils of clay, smoothed and shaped by hand and with a curved paddle against a stone anvil", "Geometric patterns were incised into the leather-hard surface using sharpened sticks, combs, or braided cord impressions"], funFact: "Kassala potters use techniques nearly identical to 3,000-year-old methods." },
        { name: "Somali Weaving", image: "images/somali-weaving.jpg", state: "Somalia", region: "Southern Somalia", lat: 2.0469, lng: 45.3182, type: "Clothing", materials: ["Cotton", "Natural Dye", "Thread"], description: "Somali weavers have produced distinctive hand-woven textiles for centuries.", era: "Medieval", steps: ["Locally grown cotton was hand-ginned, carded, and spun into thread using a drop spindle", "The cotton thread was dyed using indigo and other natural dyes obtained through coastal trade networks", "The weaver set up a narrow horizontal loom and warped it with the prepared cotton threads"], funFact: "Somali textiles were traded along Indian Ocean routes to India and China." },
        { name: "Shona Stone Sculpture", image: 'images/shona-stone-sculpture.jpg', state: "Zimbabwe", region: "Mashonaland", lat: -17.8292, lng: 31.0522, type: "Sculpture", materials: ["Stone"], description: "The Shona people of Zimbabwe have a centuries-old tradition of carving serpentine, springstone.", era: "11th century", steps: ["A suitable piece of serpentine or springstone was selected from local quarries, chosen for its color, hardness, and natural form", "The rough shape was blocked out using hand chisels and hammers, following the natural contours of the stone", "Finer detail was carved using smaller chisels and rasps, with the sculptor working to reveal the form they perceived within the stone"], funFact: "Sculptors believe a spirit already lives inside the stone before carving." },
        { name: "Tonga Basket Weaving", image: "images/tonga-basket-weaving.jpg", state: "Zambia", region: "Southern Zambia", lat: -16.5, lng: 27, type: "Home Decor", materials: ["Grass", "Plant Fiber", "Natural Dye"], description: "The Tonga people of Zambia's Southern Province are celebrated for their finely woven baskets.", era: "Ancient", steps: ["Ilala palm leaves were harvested, stripped into thin uniform strands, and dried before weaving", "Selected strands were dyed dark brown or reddish-black by soaking in bark and root solutions from local trees", "The weaver began coiling from the center base, wrapping and stitching each grass coil tightly to the one below"], funFact: "Baskets were woven so tightly they could carry beer without leaking." },
        { name: "Chokwe Mask Carving", image: 'images/chokwe-mask-carving.jpg', state: "Angola", region: "Eastern Angola", lat: -10.6866, lng: 22.2286, type: "Ritual", materials: ["Wood", "Plant Fiber", "Natural Dye"], description: "The Chokwe people of eastern Angola are renowned for their elaborate wooden masks used in initiation ceremonies.", era: "17th century", steps: ["A suitable piece of lightweight wood such as mulombwa was selected and rough-hewn with an adze into the basic mask shape", "Facial features were carefully carved with knives and chisels, following the idealized proportions prescribed by Chokwe artistic tradition", "The surface was smoothed and decorated with incised geometric scarification patterns, then darkened with plant dyes or soot"], funFact: "Portuguese colonizers tried to ban Chokwe masks, fearing their power." },
        { name: "Himba Jewelry", image: "images/himba-jewelry.jpg", state: "Namibia", region: "Kunene Region", lat: -18.25, lng: 13.5, type: "Jewelry", materials: ["Iron", "Shell", "Leather", "Beads"], description: "The Himba people of northwestern Namibia create distinctive iron and shell jewelry that communicates age, gender.", era: "16th century", steps: ["Iron was smelted from local ore and forged into heavy anklets, bracelets, and other ornamental forms by community blacksmiths", "Conus shells, obtained through long-distance trade networks, were carefully cut and polished to create the distinctive ohumba headpiece worn by married women", "Leather straps were cut and beaded to create belts, necklaces, and other body ornaments in patterns indicating the wearer's life stage"], funFact: "Iron anklets can weigh several kilograms and are never removed." },
        { name: "Bayei Basket Weaving", image: 'images/bayei-basket-weaving.jpg', state: "Botswana", region: "Okavango Delta", lat: -19.85, lng: 22.55, type: "Home Decor", materials: ["Plant Fiber", "Natural Dye", "Grass"], description: "The Bayei and San women of Botswana's Okavango Delta region weave exceptionally fine coiled baskets from mokola palm.", era: "Ancient", steps: ["Young mokola palm leaves were harvested, stripped into thin fibers, and dried in bundles for later use", "Root fibers from specific local plants were prepared to create brown and reddish-purple dye strands for the pattern work", "The weaver coiled a grass core from the center outward, stitching each row with palm fiber and introducing colored strands to form the pattern"], funFact: "Originally woven tight enough to carry water across the Okavango Delta." },
        { name: "Malawian Wood Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/3/35/Lilongwe_%28Malawi%29_-_crafts_market.JPG', state: "Malawi", region: "Southern Malawi", lat: -15.7667, lng: 35.0168, type: "Sculpture", materials: ["Wood"], description: "Wood carvers in Malawi, particularly among the Yao and Chewa peoples of the southern region.", era: "17th century", steps: ["A suitable hardwood log, often from the mphingo or msese tree, was selected and seasoned before carving began", "The basic form was roughed out with an adze, then refined with knives and chisels to develop the figure or mask", "Surface details such as facial features, scarification marks, and textural elements were carved with fine-pointed tools"], funFact: "The Chewa Gule Wamkulu masked dance is a UNESCO Masterpiece." },
        { name: "Basotho Hat (Mokorotlo) Weaving", image: "images/basotho-hat-mokorotlo-weaving.jpg", state: "Lesotho", region: "Lesotho", lat: -29.31, lng: 27.4833, type: "Clothing", materials: ["Grass", "Plant Fiber"], description: "The mokorotlo is the iconic conical straw hat of Lesotho, woven from locally gathered grass and recognized.", era: "19th century", steps: ["Mosea grass was harvested from mountain slopes during the dry season and carefully dried and sorted by thickness", "The weaver began at the apex of the cone, coiling and stitching the grass in tight spirals using thin grass strips as binding", "The cone shape was gradually widened with each successive coil, maintaining the characteristic pointed silhouette inspired by Mount Qiloane"], funFact: "The shape represents Mount Qiloane, sacred to the Basotho people." },
        { name: "Zimbabwean Mbira Making", image: "images/zimbabwean-mbira-making.jpg", state: "Zimbabwe", region: "Mashonaland", lat: -17.85, lng: 31.03, type: "Music", materials: ["Wood", "Iron", "Shell"], description: "The mbira dzavadzimu is a sacred instrument of the Shona people of Zimbabwe.", era: "12th century", steps: ["Iron was smelted from local ore and hammered into thin, tapered keys of varying lengths to produce the desired pitches", "A hardwood soundboard was carved from a single block of mubvamaropa or other dense wood, with a slot cut for the key bridge", "The iron keys were carefully arranged on the bridge and secured with a metal pressure bar, then individually tuned by filing or hammering"], funFact: "Colonial rulers banned the mbira because it summoned ancestral spirits." },
        { name: "Zambian Copper Craft", image: "images/zambian-copper-craft.jpg", state: "Zambia", region: "Copperbelt Province", lat: -12.8, lng: 28.25, type: "Jewelry", materials: ["Copper", "Metal"], description: "Zambia's Copperbelt region sits atop some of the world's richest copper deposits.", era: "4th century CE", steps: ["Native copper was collected from surface deposits or shallow diggings and smelted in small clay furnaces using charcoal fuel", "The refined copper was hammered into sheets, rods, or wire using stone anvils and iron hammers", "Bracelets and anklets were shaped by bending and hammering the copper around wooden or stone forms"], funFact: "Kansanshi mine evidence shows copper smelting here 2,000 years ago." },
        { name: "Kongo Textile Weaving", image: "images/kongo-textile-weaving.jpg", state: "Angola", region: "Northern Angola", lat: -7.6, lng: 15, type: "Clothing", materials: ["Plant Fiber", "Natural Dye"], description: "The Kongo people of northern Angola and the broader Congo Basin developed a sophisticated tradition of weaving raffia.", era: "15th century", steps: ["Young raffia palm leaves were harvested and the fibers stripped, separated, and dried to prepare them for weaving", "The prepared fibers were set up on a small single-heddle loom and woven into a plain-weave base cloth", "Short raffia strands were inserted under the weft threads and cut to create a raised pile surface in selected areas"], funFact: "Portuguese traders mistook Kongo raffia cloth for European-quality velvet." },
        { name: "Herero Doll Making", image: "images/herero-doll-making.jpg", state: "Namibia", region: "Central Namibia", lat: -22.5609, lng: 17.0658, type: "Toys", materials: ["Leather", "Beads", "Cotton", "Thread"], description: "Herero women of Namibia craft distinctive dolls dressed in the voluminous Victorian-era gowns and horned headdresses.", era: "19th century", steps: ["A core figure was constructed from stuffed leather or cloth, shaped to form the basic body and head of the doll", "The characteristic wide-skirted dress was sewn from colorful cotton fabric with multiple layers of gathered skirts and puffed sleeves", "The distinctive otjikaiva headdress, shaped like cattle horns, was fashioned from rolled cloth and secured to the doll's head"], funFact: "The Victorian dress style was adopted from German missionary wives." },
        { name: "Baloch Embroidery", image: "images/baloch-embroidery.jpg", state: "Iran", region: "Sistan-Baluchestan", lat: 29.4963, lng: 60.8629, type: "Clothing", materials: ["Cotton", "Silk", "Thread", "Natural Dye"], description: "The Baloch women of Iran's Sistan-Baluchestan province create densely embroidered garments featuring geometric.", era: "16th century", steps: ["Cotton fabric was prepared and the front panel area marked for the dense embroidery that would cover the bodice", "Geometric and floral patterns were counted out on the fabric's weave, with designs passed down through family tradition or created by the embroiderer", "Silk threads in vivid reds, greens, golds, and blues were stitched in dense satin, chain, and counted-thread techniques to fill the design areas"], funFact: "Patterns function as a visual language readable across Baloch communities." },
        { name: "Afghan Turkmen Carpet Weaving", image: "images/afghan-turkmen-carpet-weaving.jpg", state: "Afghanistan", region: "Northern Afghanistan", lat: 36.7069, lng: 67.1147, type: "Home Decor", materials: ["Wool", "Natural Dye", "Cotton"], description: "The Turkmen communities of northern Afghanistan produce distinctive hand-knotted carpets featuring the gul motif.", era: "16th century", steps: ["Sheep wool was hand-spun and dyed using madder root for the characteristic deep red, along with indigo, walnut husks, and other natural dye sources", "A horizontal ground loom was warped with cotton or wool foundation threads in the weaver's home or tent", "The weaver knotted colored wool yarns row by row using the asymmetric Turkish knot, following the tribal gul pattern from memory"], funFact: "Each tribal group's gul motif is like a family crest woven into wool." },
        { name: "Hazara Pottery", image: "images/hazara-pottery.jpg", state: "Afghanistan", region: "Bamyan Province", lat: 34.821, lng: 67.827, type: "Pottery", materials: ["Clay", "Natural Dye"], description: "The Hazara people of central Afghanistan's Bamyan Province maintain ancient pottery traditions in a region famous.", era: "Ancient", steps: ["Local clay was dug from deposits in the Bamyan valley, cleaned of stones, and mixed with water to achieve the proper consistency", "Vessels were thrown on a simple kick wheel, with the potter shaping water jars, bowls, and storage vessels by hand", "The leather-hard pots were decorated with incised lines, stamped patterns, or painted slip in geometric designs"], funFact: "Shards found near the Bamyan Buddhas prove 1,500 years of continuous use." },
        { name: "Sistan Pottery", image: "images/sistan-pottery.jpg", state: "Iran", region: "Sistan-Baluchestan", lat: 30.89, lng: 61.68, type: "Pottery", materials: ["Clay", "Natural Dye"], description: "The Sistan region of southeastern Iran, home to one of the world's oldest continuously inhabited areas at Shahr-i Sokhta.", era: "3rd millennium BCE", steps: ["Fine clay from the Helmand River basin was collected, cleaned, and wedged to remove air pockets and achieve smooth consistency", "The potter shaped vessels on a hand-spun wheel, creating the characteristic elegant forms of Sistani water jars and bowls", "Geometric patterns were painted onto the dried surface using mineral-based pigments and fine brushes, following traditional motifs"], funFact: "A fragment at Shahr-i Sokhta shows the world's oldest known animation." },
        { name: "Kerman Carpet Weaving", image: 'images/kerman-carpet-weaving.jpg', state: "Iran", region: "Kerman Province", lat: 30.2839, lng: 57.0834, type: "Home Decor", materials: ["Wool", "Silk", "Natural Dye", "Cotton"], description: "Kerman in southeastern Iran has been one of the great centers of Persian carpet weaving since at least the Safavid.", era: "15th century", steps: ["High-quality local wool was hand-spun and dyed using madder, indigo, saffron, and other plant and mineral pigments in the city's dye workshops", "A vertical loom was warped with cotton foundation threads, and the detailed cartoon pattern was placed behind the loom for the weaver to follow", "Weavers tied asymmetric Persian knots in colored wool or silk at extremely high density, building up the elaborate floral and medallion designs"], funFact: "So popular in the 1890s that American tycoons filled mansions with Kerman carpets." },
        { name: "Herat Miniature Painting", image: 'images/herat-miniature-painting.jpg', state: "Afghanistan", region: "Herat Province", lat: 34.3529, lng: 62.204, type: "Home Decor", materials: ["Paper", "Natural Dye", "Gold"], description: "The city of Herat was one of the greatest centers of Persian miniature painting during the Timurid period.", era: "15th century", steps: ["Fine paper was prepared with a burnished surface coating of starch and alum to create a smooth, luminous ground for painting", "The composition was sketched in light ink, with figures, architecture, and landscape elements carefully arranged within the page format", "Mineral and plant pigments including lapis lazuli, vermilion, and gold were ground and mixed with gum arabic binder, then applied in thin layers with the finest brushes"], funFact: "Master Behzad was so revered that two empires fought a war over him." },
        { name: "Tibetan Thangka Painting (Lhasa)", image: "images/tibetan-thangka-painting-lhasa.jpg", state: "China", region: "Tibet Autonomous Region", lat: 29.65, lng: 91.1, type: "Ritual", materials: ["Cotton", "Natural Dye", "Gold"], description: "Thangka paintings are sacred Buddhist scroll paintings that have been produced in Lhasa and across the Tibetan plateau.", era: "7th century CE", steps: ["A cotton canvas was stretched on a wooden frame, then treated with a mixture of animal glue and chalk to create a smooth, white painting surface", "The composition was drawn according to strict iconographic proportions using a grid system, with deities and symbols placed in their prescribed positions", "Mineral pigments including lapis lazuli, malachite, cinnabar, and powdered gold were mixed with hide glue and applied in careful layers with fine brushes"], funFact: "Apprentices spend years just learning to grind mineral pigments by hand." },
        { name: "Tibetan Carpet Weaving", image: "images/tibetan-carpet-weaving.jpg", state: "China", region: "Shigatse, Tibet", lat: 29.267, lng: 88.88, type: "Home Decor", materials: ["Wool", "Natural Dye", "Cotton"], description: "Shigatse, Tibet's second largest city and seat of the Panchen Lama.", era: "7th century CE", steps: ["Highland Tibetan sheep wool was washed, carded, and hand-spun into sturdy yarn, then dyed with walnut husks, rhubarb root, indigo, and other local plant sources", "A vertical wooden loom was warped with cotton or wool foundation threads to establish the carpet dimensions", "The weaver used the distinctive Tibetan loop-and-cut technique, wrapping yarn around a metal gauge rod and cutting the loops to form an even pile"], funFact: "Originally woven as sleeping mats and saddle blankets, not decoration." },
        { name: "Derge Metalwork", image: "images/derge-metalwork.jpg", state: "China", region: "Kham, Eastern Tibet", lat: 31.8, lng: 98.58, type: "Ritual", materials: ["Copper", "Silver", "Gold", "Bronze"], description: "The kingdom of Derge in the Kham region of eastern Tibet was renowned for its master metalworkers.", era: "15th century", steps: ["Copper, silver, or bronze was smelted and hammered into sheets of the required thickness for the intended object", "The metal sheet was shaped over wooden or stone forms using repoussé technique, hammering from the reverse to raise the design", "Fine details of deities, lotus patterns, and sacred symbols were chased from the front using specialized punches"], funFact: "Derge operated Tibet's largest printing house and finest metal workshops." },
        { name: "Uyghur Atlas Silk Weaving", image: "images/uyghur-atlas-silk-weaving.jpg", state: "China", region: "Hotan, Xinjiang", lat: 37.112, lng: 79.9253, type: "Clothing", materials: ["Silk", "Natural Dye"], description: "Atlas silk, known for its shimmering ikat-dyed patterns in bold colors.", era: "1st century BCE", steps: ["Raw silk was reeled from locally cultivated silkworm cocoons in the mulberry orchards surrounding Hotan", "Groups of warp threads were tightly bound at intervals with resist material according to the intended pattern before being immersed in natural dye baths", "The bound-and-dyed warp threads were set up on a narrow loom, with the resist-created pattern visible in the arrangement of colored sections"], funFact: "Hotan was so vital to the Silk Road that its king smuggled silkworms out." },
        { name: "Yengisar Knife Making", image: "https://upload.wikimedia.org/wikipedia/commons/1/12/Sign_advertising_Yengisar_knives.jpg", state: "China", region: "Yengisar, Xinjiang", lat: 38.42, lng: 76.17, type: "Other", materials: ["Iron", "Bone", "Copper", "Brass"], description: "The small town of Yengisar in Xinjiang has been the center of Uyghur knife making for centuries.", era: "16th century", steps: ["Carbon steel was heated in a charcoal forge and hammered into blade blanks, then carefully tempered by quenching to achieve the desired hardness", "The blade was ground and polished to a fine edge using progressively smoother whetstones", "Handle scales of horn, bone, or wood were shaped and inlaid with patterns of brass wire, colored resin, and decorative studs"], funFact: "So essential to Uyghur culture that boys receive their first at age seven." },
        { name: "Tibetan Incense Making", image: 'images/tibetan-incense-making.jpg', state: "China", region: "Tibet Autonomous Region", lat: 29.64, lng: 91.05, type: "Ritual", materials: ["Plant Fiber", "Wood"], description: "Tibetan incense has been handmade in monasteries and workshops across the plateau for over a thousand years.", era: "7th century CE", steps: ["Medicinal herbs, aromatic woods such as juniper and sandalwood, and mineral ingredients were gathered according to recipes from Tibetan medical texts", "The dried ingredients were ground to a fine powder using stone mortars, with each component measured according to the traditional formula", "The blended powder was mixed with water to form a dough, which was extruded through a metal die or rolled by hand into thick sticks"], funFact: "Recipes can contain over 30 different herbs, minerals, and woods." },
        { name: "Rebkong Thangka Painting", image: "images/rebkong-thangka-painting.jpg", state: "China", region: "Qinghai Province", lat: 35.519, lng: 102.019, type: "Ritual", materials: ["Cotton", "Natural Dye", "Gold"], description: "The Rebkong region of Qinghai Province, at the crossroads of Tibetan, Chinese, and Mongolian cultural influences.", era: "14th century", steps: ["A cotton canvas was prepared with multiple layers of gesso made from chalk and hide glue, then polished to a smooth surface with a stone burnisher", "The iconographic design was sketched using charcoal guidelines based on traditional proportion systems, with Rebkong artists incorporating their distinctive regional stylistic elements", "Mineral pigments were applied in successive layers, with Rebkong painters known for their particularly rich greens and blues and extensive gold work"], funFact: "An unusually high percentage of villagers are professional artists." },
        { name: "Derge Woodblock Printing", image: "images/derge-woodblock-printing.jpg", state: "China", region: "Kham, Eastern Tibet", lat: 31.806, lng: 98.585, type: "Home Decor", materials: ["Wood", "Paper", "Natural Dye"], description: "The Derge Parkhang, or Derge Printing House, has been producing woodblock-printed Buddhist texts and images since 1729.", era: "18th century", steps: ["Seasoned birch wood planks were planed to a uniform thickness and their surfaces treated to prevent warping and cracking", "Skilled carvers incised the Tibetan text and illustrations in mirror image using fine chisels, working from manuscript guides with extreme precision", "Ink was prepared from soot, hide glue, and other traditional ingredients, then applied evenly to the carved block surface with a roller"], funFact: "Houses a complete set of the Tibetan Buddhist canon: 320,000 blocks." },
        { name: "Dagestan Carpet Weaving", image: 'images/dagestan-carpet-weaving.jpg', state: "Russia", region: "Dagestan, North Caucasus", lat: 42.06, lng: 48.29, type: "Home Decor", materials: ["Wool", "Natural Dye", "Cotton", "Thread"], description: "The ancient city of Derbent and surrounding Dagestani villages have produced hand-knotted pile carpets.", era: "Pre-10th Century", steps: ["Wool was hand-sheared from local mountain sheep and sorted by quality and color", "Raw fleece was washed in cold mountain streams and carded into smooth roving", "Yarn was spun on drop spindles and dyed using madder root, walnut husks, and indigo"], funFact: "Experts could identify the exact village from just one carpet's pattern." },
        { name: "Kubachi Silverwork", image: "images/kubachi-silverwork.jpg", state: "Russia", region: "Dagestan, North Caucasus", lat: 42.08, lng: 47.57, type: "Jewelry", materials: ["Silver", "Gold", "Copper", "Stone"], description: "The remote mountain village of Kubachi in Dagestan has been renowned for its master silversmiths since the early.", era: "Pre-10th Century", steps: ["Silver ingots were smelted from raw ore in small stone furnaces fueled by mountain charcoal", "The molten metal was hammered into sheets or drawn into wire on hand-forged anvils", "Forms were raised and shaped using specialized hammers passed down within family workshops"], funFact: "Medieval Arab geographers called the village \"City of Goldsmiths.\"" },
        { name: "Circassian Gold Embroidery", image: 'images/circassian-gold-embroidery.jpg', state: "Russia", region: "Kabardino-Balkaria, North Caucasus", lat: 43.49, lng: 43.62, type: "Clothing", materials: ["Gold Thread", "Silk", "Thread", "Cotton"], description: "Circassian women developed a highly refined tradition of gold thread embroidery used to adorn ceremonial garments.", era: "15th Century", steps: ["Fine gold and silver wire was drawn and wrapped around a silk core to produce metallic thread", "Base fabric of silk or velvet was stretched taut on a wooden embroidery frame", "The design was sketched onto the fabric using chalk or transferred from carved wooden stamps"], funFact: "A single bridal dress could require over six months of gold stitching." },
        { name: "Chechen Felt Craft", image: "https://russia.ru/storage/news/resized/9ef906d32930f2cb3a3abf4e74d58dbf.webp", state: "Russia", region: "Chechnya, North Caucasus", lat: 43.31, lng: 45.69, type: "Home Decor", materials: ["Wool", "Natural Dye", "Cotton"], description: "Chechen artisans produced elaborately patterned felt rugs and cloaks known as isting using an ancient wet-felting.", era: "Pre-10th Century", steps: ["Wool was sheared from Caucasian fat-tailed sheep and separated into batches by natural color", "The fleece was beaten with willow switches on a clean stone surface to open the fibers", "Colored wool was arranged in traditional patterns on a reed mat moistened with hot soapy water"], funFact: "The felt burka cloak repels rain, wind, and even deflects saber blows." },
        { name: "Yakut Bone Carving", image: "images/yakut-bone-carving.jpg", state: "Russia", region: "Sakha Republic (Yakutia), Eastern Siberia", lat: 62.03, lng: 129.73, type: "Sculpture", materials: ["Bone", "Ivory", "Wood"], description: "Yakut carvers in the coldest inhabited region on Earth developed an extraordinary tradition of carving mammoth ivory.", era: "17th Century", steps: ["Mammoth tusks were recovered from permafrost riverbanks during the brief summer thaw", "The raw ivory was cleaned, dried slowly in shade to prevent cracking, and inspected for usable sections", "The carver roughed out the form using small iron saws and chisels forged by local blacksmiths"], funFact: "Carvers access an estimated ten million frozen mammoth tusks in Siberia." },
        { name: "Buryat Thangka Painting", image: "images/buryat-thangka-painting.jpg", state: "Russia", region: "Buryatia, Lake Baikal", lat: 51.83, lng: 107.59, type: "Ritual", materials: ["Cotton", "Natural Dye", "Gold", "Stone"], description: "Buryat Buddhist monks and trained artists near Lake Baikal produced sacred scroll paintings called thangkas depicting.", era: "18th Century", steps: ["A cotton canvas was stretched on a wooden frame and prepared with a ground of chalk and animal glue", "The surface was burnished smooth with a polished stone until it achieved a subtle sheen", "The deity's proportions were laid out using a grid system prescribed by Buddhist canonical texts"], funFact: "The Ivolginsky Datsan is Russia's center of Buddhist thangka art." },
        { name: "Tuvan Musical Instrument Craft", image: "images/tuvan-musical-instrument-craft.jpg", state: "Russia", region: "Tuva Republic, Southern Siberia", lat: 51.72, lng: 94.45, type: "Music", materials: ["Wood", "Leather", "Bone", "Metal"], description: "Tuvan craftsmen built the igil, a two-stringed horsehead fiddle central to the practice of khoomei throat singing.", era: "Pre-10th Century", steps: ["A straight-grained section of Siberian larch was selected, split, and rough-hewn with an adze", "The resonating body was hollowed out from the front and covered with stretched goat or horse hide", "The long neck was shaped and a carved horse head was fashioned at the scroll end"], funFact: "The igil's horse-head carving honors a legendary horse that died." },
        { name: "Altai Felt Craft", image: "images/altai-felt-craft.jpg", state: "Russia", region: "Altai Republic, Southern Siberia", lat: 51.96, lng: 85.97, type: "Home Decor", materials: ["Wool", "Natural Dye", "Grass", "Thread"], description: "The semi-nomadic peoples of the Altai Mountains produced richly decorated felt textiles for yurt furnishings.", era: "Pre-10th Century", steps: ["Wool was shorn from Altai mountain sheep and sorted into white, brown, and black batches", "Loose wool was laid out in layers on a wetted reed mat, with dyed wool arranged for colored patterns", "The mat was rolled around a pole, bound with leather thongs, and dragged behind a horse across the steppe"], funFact: "Pazyryk tombs preserved felt artifacts frozen for 2,500 years intact." },
        { name: "Chukchi Walrus Ivory Carving", image: "images/chukchi-walrus-ivory-carving.jpg", state: "Russia", region: "Chukotka, Russian Far East", lat: 64.73, lng: 177.51, type: "Sculpture", materials: ["Ivory", "Bone", "Natural Dye"], description: "The Chukchi and Yupik peoples of Russia's extreme northeastern coast carved walrus tusks into miniature sculptures.", era: "Pre-10th Century", steps: ["Walrus tusks were harvested during seasonal hunts and cleaned of soft tissue with stone scrapers", "The dense ivory was left to dry slowly in underground caches to prevent splitting in the extreme cold", "Rough forms were shaped using bow drills and small adzes made from traded iron or ground stone"], funFact: "Engravings show entire seasonal cycles in continuous panoramic scenes." },
        { name: "Khanty Birch Bark Craft", image: "images/khanty-birch-bark-craft.jpg", state: "Russia", region: "Khanty-Mansi, Western Siberia", lat: 61, lng: 69, type: "Kitchenware", materials: ["Wood", "Plant Fiber", "Natural Dye"], description: "The Khanty people of the Ob River basin fashioned birch bark into an extraordinary range of vessels, containers.", era: "Pre-10th Century", steps: ["Large sheets of birch bark were carefully peeled from living trees during the brief summer sap season", "The bark was flattened under weighted boards and stored in cool shade to maintain its flexibility", "Patterns were scored and embossed into the inner surface using carved bone or antler stamps"], funFact: "Bark containers were so waterproof they replaced pottery for nomads." },
        { name: "Evenki Reindeer Hide Craft", image: 'images/evenki-reindeer-hide-craft.png', state: "Russia", region: "Krasnoyarsk Krai, Central Siberia", lat: 56.01, lng: 92.87, type: "Clothing", materials: ["Leather", "Bone", "Thread", "Natural Dye"], description: "The Evenki, one of Siberia's largest indigenous groups, developed sophisticated techniques for transforming reindeer.", era: "Pre-10th Century", steps: ["Reindeer hides were scraped clean of fat and tissue using a curved bone blade immediately after slaughter", "The scraped hides were soaked in a solution of rotted fish brains and liver to soften the fibers", "Softened hides were stretched on wooden frames and worked repeatedly by hand until supple"], funFact: "Parkas kept wearers warm at minus-60C without any modern insulation." },
        { name: "Nivkh Fish Skin Craft", image: "images/nivkh-fish-skin-craft.jpg", state: "Russia", region: "Sakhalin Island, Russian Far East", lat: 46.96, lng: 142.73, type: "Clothing", materials: ["Leather", "Thread", "Natural Dye", "Plant Fiber"], description: "The Nivkh people of Sakhalin Island and the Amur River estuary developed the rare craft of transforming salmon skin.", era: "Pre-10th Century", steps: ["Large salmon skins were carefully removed in whole pieces during the autumn spawning runs", "The skins were scraped free of fat and residual flesh using clamshell or stone tools", "Cleaned skins were worked by hand — crumpled, stretched, and rubbed repeatedly — to achieve a leather-like softness"], funFact: "Salmon-skin robes were so durable that Russian explorers traded furs to acquire them." },
        { name: "Itelmen Bone and Wood Carving", image: "images/itelmen-bone-and-wood-carving.jpg", state: "Russia", region: "Kamchatka Peninsula, Russian Far East", lat: 53, lng: 158.6, type: "Sculpture", materials: ["Bone", "Wood", "Stone", "Leather"], description: "The Itelmen, the oldest indigenous inhabitants of the Kamchatka Peninsula, carved whale bone, driftwood.", era: "Pre-10th Century", steps: ["Whale bones were collected from beach-cast carcasses and driftwood was gathered from volcanic shorelines", "Raw materials were dried in semi-subterranean earth lodges heated by geothermal vents", "Rough forms were shaped with adzes made from ground volcanic basalt and obsidian flakes"], funFact: "Kamchatka has more active volcanoes than almost anywhere on Earth." },
        { name: "Primorye Maritime Woodcraft", image: "images/primorye-maritime-woodcraft.jpg", state: "Russia", region: "Primorsky Krai, Russian Far East", lat: 43.12, lng: 131.87, type: "Kitchenware", materials: ["Wood", "Leather", "Plant Fiber", "Bone"], description: "The Udege and Nanai peoples of the Primorsky coastal forests near present-day Vladivostok crafted elaborately carved.", era: "Pre-10th Century", steps: ["Manchurian walnut, ash, or birch logs were selected and split along the grain with bone wedges", "Bowl and vessel forms were roughed out using small adzes and curved gouges", "Surfaces were carved with interlocking spiral patterns and stylized tiger and fish motifs using fine iron blades"], funFact: "Amur River spiral motifs matched 5,000-year-old Jomon pottery in Japan." },
        { name: "Uruguayan Mate Gourd Craft", image: "images/uruguayan-mate-gourd-craft.jpg", state: "Uruguay", region: "Montevideo", lat: -34.9011, lng: -56.1645, type: "Kitchenware", materials: ["Plant Fiber", "Silver", "Natural Dye", "Leather"], description: "Decorated calabash gourds crafted for the ritual of drinking mate, Uruguay's national beverage.", era: "Colonial Era", steps: ["A mature calabash gourd was harvested and its soft interior flesh was carefully scraped out using a metal spoon or carved stick.", "The hollowed gourd was cured by packing it with used mate leaves and hot water for several days, a process that hardened the walls and sealed the porous surface.", "The exterior surface was smoothed and decorative patterns were burned into the shell using heated metal tools in a technique known as pyrography."], funFact: "Offering mate from your personal gourd is a deep gesture of friendship." },
        { name: "Uruguayan Gaucho Silverwork", image: "images/uruguayan-gaucho-silverwork.jpg", state: "Uruguay", region: "Tacuarembó", lat: -31.7333, lng: -55.9833, type: "Jewelry", materials: ["Silver", "Leather", "Iron", "Gold"], description: "The silversmiths of Tacuarembó forged ornate belt buckles, knife handles.", era: "18th Century", steps: ["Silver ingots were melted in a crucible over a charcoal forge and cast into flat sheets or rough blanks using stone or iron molds.", "The cooled silver was hammered and shaped on an anvil, with the artisan planishing the surface to achieve an even thickness for buckles or handle plates.", "Intricate patterns of scrollwork, flowers, or gaucho symbols were chased and engraved into the silver surface using fine steel chisels and punches."], funFact: "Tacuarembo hosts one of the largest gaucho festivals in South America." },
        { name: "Wai-Wai Basket Weaving", image: "images/wai-wai-basket-weaving.jpg", state: "Guyana", region: "Rupununi", lat: 2, lng: -59, type: "Home Decor", materials: ["Plant Fiber", "Natural Dye", "Cotton"], description: "The Wai-Wai people of Guyana's deep interior rainforest weave remarkably intricate baskets from ite palm fibers.", era: "Pre-Columbian", steps: ["Young shoots of the ite palm were harvested from the rainforest and split into thin, flexible strips that were left to dry in the sun for several days.", "Selected strips were dyed using natural pigments extracted from plants such as kaladuri root for red and charcoal for black, creating the contrasting fibers needed for geometric patterns.", "The weaver began at the base of the basket, interlocking dyed and undyed strips in a tight twill weave, carefully counting each strand to maintain the symmetry of the geometric design."], funFact: "Made in one of the most remote inhabited regions of South America." },
        { name: "Guyanese Hammock Weaving", image: "images/guyanese-hammock-weaving.jpg", state: "Guyana", region: "Berbice", lat: 6.25, lng: -57.5, type: "Furniture", materials: ["Cotton", "Plant Fiber", "Natural Dye"], description: "Cotton hammocks woven in Guyana's Berbice region reflect an Amerindian tradition that predates European contact.", era: "Pre-Columbian", steps: ["Raw cotton was harvested from local cotton plants, cleaned of seeds by hand, and spun into strong yarn using a drop spindle weighted with a clay whorl.", "A simple rectangular frame loom was constructed from wooden poles, and the cotton warp threads were strung tautly across its length to establish the hammock's dimensions.", "The weaver passed the weft yarn back and forth through the warp using a flat wooden shuttle, beating each row tightly with a carved beater to create a dense, supportive fabric."], funFact: "Columbus saw hammocks here and brought the idea back to Europe." },
        { name: "Maroon Wood Carving", image: "images/maroon-wood-carving.jpg", state: "Suriname", region: "Saramacca", lat: 5.7833, lng: -55.5833, type: "Sculpture", materials: ["Wood", "Natural Dye", "Wax"], description: "The Maroon communities of Suriname's interior rivers developed a distinctive wood carving tradition blending West.", era: "18th Century", steps: ["A suitable hardwood log, often from the purple heart or cedar tree, was selected and rough-hewn into the basic form of a stool, comb, or tray using a machete and adze.", "The carver refined the shape with smaller knives, sculpting the flowing curves and interlocking forms characteristic of tembé art, a visual language with roots in West African decorative traditions.", "Surface patterns were incised with fine chisels and gouges, creating geometric and organic motifs that were traditionally understood to convey specific messages between the carver and the recipient."], funFact: "Tembe carvings are a visual language encoding messages between lovers." },
        { name: "Surinamese Calabash Carving", image: "images/surinamese-calabash-carving.jpg", state: "Suriname", region: "Paramaribo", lat: 5.852, lng: -55.2038, type: "Kitchenware", materials: ["Plant Fiber", "Natural Dye", "Wax"], description: "Artisans in Suriname transform the hard shells of calabash gourds into decorated bowls, cups.", era: "Pre-Columbian", steps: ["A mature calabash fruit was harvested from the tree and cut in half or opened at the top, after which the soft pulp and seeds were scooped out and the shell was left to dry and harden in the sun.", "The outer skin of the dried gourd was scraped away to reveal the smooth, pale surface beneath, which provided a clean canvas for decoration.", "Designs were carved into the shell using a sharp knife or heated metal point, with patterns ranging from geometric Amerindian motifs to the curvilinear tembé style favored by Maroon artisans."], funFact: "The calabash tree uniquely grows fruit directly from its trunk." },
        { name: "Lenca Pottery", image: "images/lenca-pottery.jpg", state: "Honduras", region: "Gracias, Lempira", lat: 14.5883, lng: -88.5833, type: "Pottery", materials: ["Clay", "Natural Dye", "Stone"], description: "The Lenca people of western Honduras maintain a pottery tradition stretching back to pre-Columbian times.", era: "Pre-Columbian", steps: ["Local clay was gathered from riverbanks near Gracias and prepared by kneading it with fine sand or crusite temper to prevent cracking during firing.", "Vessels were shaped entirely by hand using the coil method, in which long ropes of clay were spiraled upward and smoothed together, as the potter's wheel was unknown in pre-Columbian Mesoamerica.", "After partial drying, a red iron-oxide slip was applied to the surface and burnished to a shine with a smooth river stone, creating the characteristic red background."], funFact: "The Lenca are the largest indigenous group in Honduras." },
        { name: "Honduran Junco Mat Weaving", image: "https://upload.wikimedia.org/wikipedia/commons/1/10/Petate.gif", state: "Honduras", region: "Santa Bárbara", lat: 14.9167, lng: -88.2333, type: "Home Decor", materials: ["Plant Fiber", "Natural Dye", "Grass"], description: "In the highlands of Santa Bárbara, artisans weave petates—flat sleeping mats and floor coverings—from the fibers.", era: "Pre-Columbian", steps: ["Junco palm leaves were harvested from the highland forests and split into long, uniform strips, which were then laid out in the sun to bleach and dry for several days.", "Selected strips were soaked in water infused with natural dyes from local plants, producing colors of green, purple, and gold that would form patterns in the finished mat.", "The weaver laid out parallel strips as a foundation and interwove perpendicular strips in an over-under pattern, carefully alternating dyed and natural fibers to create geometric designs."], funFact: "Santa Barbara department is called the cradle of Honduran weaving." },
        { name: "San Juan de Oriente Pottery", image: 'images/san-juan-de-oriente-pottery.jpg', state: "Nicaragua", region: "Masaya", lat: 11.9083, lng: -86.075, type: "Pottery", materials: ["Clay", "Natural Dye", "Stone"], description: "The village of San Juan de Oriente near Masaya has been a center of ceramic arts since before the Spanish conquest.", era: "Pre-Columbian", steps: ["Clay was dug from deposits near the village and aged for weeks, then kneaded and wedged by hand to remove air bubbles and achieve a uniform, workable consistency.", "The potter formed the vessel on a simple hand-turned platform, building the walls using a combination of coiling and paddling techniques inherited from the Chorotega civilization.", "Once leather-hard, the surface was coated with colored slips made from local mineral earths and burnished to a smooth sheen using a polished seed or river stone."], funFact: "Nearly every household in this tiny Nicaraguan village makes ceramics." },
        { name: "Nicaraguan Hammock Weaving", image: "images/nicaraguan-hammock-weaving.jpg", state: "Nicaragua", region: "Masaya", lat: 11.9744, lng: -86.0942, type: "Furniture", materials: ["Cotton", "Natural Dye", "Thread"], description: "The city of Masaya, known as the cradle of Nicaraguan folklore, is celebrated for its brightly colored cotton hammocks.", era: "Colonial Era", steps: ["Cotton yarn was dyed in vivid colors using both natural and later synthetic dyes, then wound onto bobbins and prepared for warping on the tall wooden loom.", "The warp threads were strung vertically on a standing frame loom, with their arrangement determining the width and color pattern of the finished hammock.", "A weaver passed the shuttle carrying the weft thread back and forth through the warp, building up the dense, flexible body of the hammock row by row."], funFact: "Masaya has an entire market devoted exclusively to hammock sales." },
        { name: "Ilobasco Miniature Clay Figures", image: "images/ilobasco-miniature-clay-figures.jpg", state: "El Salvador", region: "Cabañas", lat: 13.8417, lng: -88.85, type: "Sculpture", materials: ["Clay", "Natural Dye", "Wax"], description: "The town of Ilobasco in Cabañas department is famous for its sorpresas—tiny.", era: "Colonial Era", steps: ["Fine local clay was cleaned, sieved, and mixed with water to form a smooth, highly plastic paste capable of holding the minute details required for miniature work.", "Using only fingertips and simple pointed tools such as thorns and wire, the artisan sculpted tiny figures sometimes no larger than a fingernail, forming detailed human faces, animals, and domestic scenes.", "The miniatures were air-dried slowly in the shade to prevent cracking, then fired at low temperatures in small kilns to harden them while preserving the delicate features."], funFact: "Tiny figurines hidden inside clay eggs gave rise to the name \"surprises.\"" },
        { name: "Salvadoran Indigo Dyeing", image: "images/salvadoran-indigo-dyeing.jpg", state: "El Salvador", region: "Suchitoto", lat: 13.9381, lng: -89.0281, type: "Clothing", materials: ["Cotton", "Natural Dye", "Plant Fiber"], description: "El Salvador was once the world's leading producer of añil, the indigo dye extracted from the jiquilite plant.", era: "Pre-Columbian", steps: ["The leaves and stems of the jiquilite plant were harvested at peak maturity and submerged in large stone or clay vats filled with water, where they were left to ferment and release their blue pigment over the course of several days.", "The fermented liquid was beaten vigorously with wooden paddles to oxygenate it, a process that caused the dissolved indigo to precipitate into solid blue particles that settled to the bottom of the vat.", "The settled indigo sediment was collected, strained through cloth, and formed into cakes or blocks that were dried in the sun and could be stored or traded."], funFact: "Colonial-era Salvadoran indigo was once more valuable than gold by weight." },
        { name: "Dominican Faceless Dolls", image: "images/dominican-faceless-dolls.jpg", state: "Dominican Republic", region: "Higüey", lat: 18.6151, lng: -68.7079, type: "Sculpture", materials: ["Clay", "Natural Dye", "Beads"], description: "The muñecas sin rostro, or faceless dolls, of the Dominican Republic are ceramic figurines deliberately crafted without facial features to represent the nation's multiethnic identity.", era: "19th Century", steps: ["Local clay was gathered, cleaned of impurities, and kneaded into a smooth, workable consistency suitable for sculpting the flowing forms of the female figures.", "The artisan hand-modeled the figure, shaping the characteristic wide skirt, arms carrying baskets or flowers, and a smooth, featureless oval head that deliberately omitted eyes, nose, and mouth.", "The shaped figure was left to dry slowly, then fired in a small kiln at moderate temperatures to achieve a strong but porous ceramic body."], funFact: "The missing faces represent the island's blend of all ethnic backgrounds." },
