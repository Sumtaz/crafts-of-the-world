        { name: "Persian Miniature Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Yusef_Zuleykha.jpg/960px-Yusef_Zuleykha.jpg', state: "Iran", region: "Tabriz", lat: 38.08, lng: 46.2919, type: "Home Decor", materials: ["Paper","Gold","Natural Dye"], description: "Exquisitely detailed paintings executed with brushes of just a few hairs, illustrating scenes from Persian poetry and history with jewel-like precision.", era: "13th Century", steps: ["Paper is burnished to a smooth, non-absorbent surface","The composition is sketched in light ink","Pigments ground from minerals and bound with gum arabic are applied","Gold leaf details and fine outlines are added with a single-hair brush"], funFact: "Tabriz\'s school of miniature painting influenced artistic traditions from Ottoman Turkey to Mughal India."},
        { name: "Minakari", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/0_Reliquaire_grandmontain_-_MR_2648_-_Louvre_%281%29.JPG/960px-0_Reliquaire_grandmontain_-_MR_2648_-_Louvre_%281%29.JPG', state: "Iran", region: "Isfahan", lat: 32.6546, lng: 51.668, type: "Home Decor", materials: ["Copper","Gold","Natural Dye"], description: "Vitreous enamel painting on metal, where Isfahan artisans fire delicate floral designs in vivid turquoise, cobalt, and white onto copper or gold surfaces.", era: "Ancient", steps: ["A copper or gold base is shaped and cleaned","Enamel paste is hand-painted in intricate floral patterns","The piece is fired in a kiln to fuse the enamel to the metal","Additional layers of color are painted and re-fired for depth"], funFact: "Isfahan\'s Naqsh-e Jahan Square is surrounded by shops filled with minakari, making the entire plaza shimmer with blue and turquoise."},
        { name: "Khatam", image: 'https://upload.wikimedia.org/wikipedia/en/b/bb/Khatam-bandi.jpg', state: "Iran", region: "Shiraz", lat: 29.5918, lng: 52.5837, type: "Home Decor", materials: ["Wood","Brass","Bone","Shell"], description: "Geometric marquetry inlay where tiny triangular rods of wood, metal, and bone are bundled and sliced to create hypnotic star and hexagonal patterns.", era: "Ancient", steps: ["Thin rods of wood, brass, and camel bone are cut to identical lengths","Rods are glued together in geometric cross-section bundles","Bundles are sliced into thin veneers revealing the star pattern","Veneer slices are glued onto wooden surfaces and polished"], funFact: "A single khatam panel may contain tens of thousands of individual pieces, each smaller than a grain of rice."},
        { name: "Suzani Embroidery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Kermina_Suzani.jpg/960px-Kermina_Suzani.jpg', state: "Uzbekistan", region: "Bukhara", lat: 39.7747, lng: 64.4286, type: "Home Decor", materials: ["Cotton","Silk","Natural Dye"], description: "Large embroidered textiles covered in exuberant floral medallions, traditionally stitched by brides and their families as part of a wedding dowry.", era: "15th Century", steps: ["A cotton ground cloth is cut into panels for multiple embroiderers","Floral designs are sketched onto the fabric","Silk threads are chain-stitched or couched following the design","The panels are joined into a single large textile"], funFact: "A suzani was traditionally started when a girl was born and completed in time for her wedding day."},
        { name: "Bukhara Rug", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Afghancarpet1.jpg/960px-Afghancarpet1.jpg', state: "Uzbekistan", region: "Bukhara", lat: 39.7747, lng: 64.4286, type: "Home Decor", materials: ["Wool","Cotton","Natural Dye"], description: "Dense, hand-knotted rugs featuring rows of repeated gul medallions in deep crimson, originally woven by Turkmen tribes of Central Asia.", era: "16th Century", steps: ["Wool is hand-spun and dyed with madder root for deep reds","Cotton warp threads are strung on a horizontal ground loom","The asymmetric knot technique creates dense, velvety pile","After cutting from the loom, the rug is washed and sun-dried"], funFact: "Bukhara rugs are named for the city where they were traded, not where they were woven, as nomadic Turkmen made them across the steppe."},
        { name: "Afghan War Rug", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/War_Rug.jpg/960px-War_Rug.jpg', state: "Afghanistan", region: "Kabul", lat: 34.5553, lng: 69.2075, type: "Home Decor", materials: ["Wool","Cotton","Natural Dye"], description: "A striking modern evolution of ancient Afghan carpet-weaving traditions, depicting weapons, maps, and military imagery alongside traditional geometric motifs.", era: "Ancient", steps: ["Wool is hand-spun and dyed using traditional methods","Warp threads are prepared on a horizontal loom","Knots are tied in traditional Afghan technique with modern imagery","The finished rug is sheared and washed"], funFact: "Afghan rug-weaving traditions date back thousands of years, with techniques passed from mother to daughter across generations."},
        { name: "Afghan Lapis Lazuli Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Lapis-lazuli_hg.jpg/960px-Lapis-lazuli_hg.jpg', state: "Afghanistan", region: "Badakhshan", lat: 36.7347, lng: 70.8119, type: "Jewelry", materials: ["Stone","Gold"], description: "Carvings and jewelry fashioned from the deep blue lapis lazuli mined in the mountains of Badakhshan for over six thousand years.", era: "Ancient", steps: ["Lapis lazuli is mined from high-altitude deposits","Raw stone is cut and sorted by color intensity","Pieces are carved or shaped into beads and ornaments","The surface is polished to reveal the deep ultramarine color"], funFact: "Badakhshan\'s lapis mines are the oldest in the world, supplying the blue stone for Tutankhamun\'s death mask and Vermeer\'s pigments."},
        { name: "Zellige", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/%D9%86%D8%B8%D8%B1%D8%A9_%D9%85%D9%82%D8%B1%D8%A8%D8%A9_%D9%84%D9%84%D8%B2%D9%84%D9%8A%D8%AC_%D9%81%D9%8A_%D9%85%D8%AF%D8%B1%D8%B3%D8%A9_%D8%A7%D8%A8%D9%86_%D9%8A%D9%88%D8%B3%D9%81.jpeg/960px-%D9%86%D8%B8%D8%B1%D8%A9_%D9%85%D9%82%D8%B1%D8%A8%D8%A9_%D9%84%D9%84%D8%B2%D9%84%D9%8A%D8%AC_%D9%81%D9%8A_%D9%85%D8%AF%D8%B1%D8%B3%D8%A9_%D8%A7%D8%A8%D9%86_%D9%8A%D9%88%D8%B3%D9%81.jpeg', state: "Morocco", region: "Fez", lat: 34.0331, lng: -5.0003, type: "Home Decor", materials: ["Clay","Natural Dye"], description: "Hand-cut mosaic tilework where small glazed terracotta chips are individually chiseled and assembled face-down into breathtaking geometric patterns.", era: "10th Century", steps: ["Clay tiles are shaped, glazed in vivid colors, and fired","Each tile is hand-cut into precise geometric shapes using a hammer","Cut pieces are arranged face-down in a plaster mold following the pattern","Concrete is poured over the back, and the finished panel is flipped and installed"], funFact: "A master zellige craftsman in Fez can identify and cut over 350 distinct geometric shapes by memory alone."},
        { name: "Moroccan Leather Tanning", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Chouara_Tannery_-_154_-_Marokko_Handybilder_2018_-_Fes_%2827347707917%29.jpg/960px-Chouara_Tannery_-_154_-_Marokko_Handybilder_2018_-_Fes_%2827347707917%29.jpg', state: "Morocco", region: "Fez", lat: 34.0639, lng: -4.9736, type: "Clothing", materials: ["Leather","Natural Dye"], description: "The ancient Chouara tannery\'s open-air vats where hides are soaked, dyed, and transformed using methods unchanged since medieval times.", era: "11th Century", steps: ["Raw hides are soaked in lime to remove hair","Skins are softened by treading them in vats of pigeon guano","Hides are dyed in stone vats filled with natural pigments","The leather is dried on rooftops and cut for goods"], funFact: "Fez\'s Chouara tannery has operated continuously since the 11th century, making it one of the oldest industrial sites in the world."},
        { name: "Moroccan Thuya Woodwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Egyptian_Museum_%28337%29.jpg/960px-Egyptian_Museum_%28337%29.jpg', state: "Morocco", region: "Essaouira", lat: 31.5085, lng: -9.7595, type: "Furniture", materials: ["Wood"], description: "Carved and turned objects made from the aromatic burl of the thuya tree, prized for its warm honey tones and swirling grain patterns.", era: "Ancient", steps: ["Thuya burl wood is harvested from the roots of the tree","The wood is seasoned and rough-shaped on a lathe","Intricate inlay patterns of citrus wood and mother-of-pearl are added","The piece is sanded and polished to a high sheen"], funFact: "Thuya wood grows only in a small coastal strip of Morocco, making Essaouira the sole center of this distinctive craft."},
        { name: "Kente Cloth", image: 'https://upload.wikimedia.org/wikipedia/commons/5/5b/Kent_wove.jpg', state: "Ghana", region: "Bonwire, Ashanti", lat: 6.7797, lng: -1.5202, type: "Clothing", materials: ["Silk","Cotton","Natural Dye"], description: "Brilliantly colored strip-woven cloth of the Ashanti people, where narrow bands are sewn together into garments rich with symbolic meaning.", era: "17th Century", steps: ["Cotton or silk thread is dyed in vivid colors","Narrow strips are woven on a portable treadle loom","Finished strips are carefully aligned and sewn together edge to edge","The completed cloth is draped as a toga-like garment"], funFact: "Each kente pattern has a specific name and proverb, and wearing certain designs was once reserved for Ashanti royalty."},
        { name: "Adinkra Cloth", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Gyaman_Adinkra_Symbols.jpg/960px-Gyaman_Adinkra_Symbols.jpg', state: "Ghana", region: "Ntonso, Ashanti", lat: 6.8697, lng: -1.62, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Stamped cloth bearing Adinkra symbols, each representing a proverb or concept, originally worn at funerals and sacred ceremonies.", era: "17th Century", steps: ["Cotton fabric is washed and divided into sections with grid lines","Stamps are carved from calabash gourd into Adinkra symbols","A vegetable-based black dye is applied to the stamps","Each symbol is pressed onto the fabric in a repeating grid pattern"], funFact: "The word Adinkra means \'goodbye\' in Akan, as the cloth was originally created for mourning and farewell ceremonies."},
        { name: "Benin Bronze Casting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Benin_brass_plaque_03_%28cropped%29.jpg/960px-Benin_brass_plaque_03_%28cropped%29.jpg', state: "Nigeria", region: "Benin City, Edo", lat: 6.335, lng: 5.6037, type: "Sculpture", materials: ["Bronze","Brass"], description: "Masterful lost-wax cast plaques and heads from the Kingdom of Benin, depicting court life, warriors, and royalty with remarkable naturalism.", era: "13th Century", steps: ["A clay core is shaped and coated with a wax model","Fine details are sculpted in the wax layer","The wax model is encased in clay and heated to melt the wax out","Molten bronze is poured into the mold and cooled before the clay is broken away"], funFact: "When Europeans first saw the Benin Bronzes, they refused to believe that Africans could produce such sophisticated metalwork."},
        { name: "Aso Oke Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/4/4d/Aso_oke.jpg', state: "Nigeria", region: "Iseyin, Oyo", lat: 7.9714, lng: 3.5958, type: "Clothing", materials: ["Cotton","Silk","Natural Dye"], description: "Prestigious hand-woven cloth of the Yoruba people, produced in narrow strips on horizontal looms and worn at celebrations as a mark of status.", era: "15th Century", steps: ["Cotton or silk thread is hand-spun and dyed","Narrow strips are woven on a horizontal double-heddle loom","Strips are sewn together to create wide garment panels","The cloth is starched and folded into a crisp ceremonial garment"], funFact: "Iseyin is known as the \'home of aso oke\' and virtually every household in the town historically owned a loom."},
        { name: "Ethiopian Cross", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/ET_Axum_asv2018-01_img03_Abba_Pentalewon.jpg/960px-ET_Axum_asv2018-01_img03_Abba_Pentalewon.jpg', state: "Ethiopia", region: "Lalibela", lat: 12.0319, lng: 39.0475, type: "Jewelry", materials: ["Silver","Brass","Bronze"], description: "Ornate processional and pendant crosses unique to the Ethiopian Orthodox tradition, each regional variation bearing its own distinctive lattice design.", era: "4th Century", steps: ["A wax model of the cross design is sculpted by hand","The wax is encased in clay to create a mold","Molten silver or brass is poured into the mold","The cooled cross is filed, polished, and sometimes engraved"], funFact: "Every major Ethiopian town has developed its own cross design, making it possible to identify a cross\'s origin at a glance."},
        { name: "Ethiopian Coffee Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/f/fe/Jebena_Ethiopian_coffee_pot.jpg', state: "Ethiopia", region: "Addis Ababa", lat: 9.025, lng: 38.7469, type: "Kitchenware", materials: ["Clay"], description: "The jebena, a round-bellied clay coffee pot with a narrow spout, central to Ethiopia\'s ancient and elaborate coffee ceremony.", era: "Ancient", steps: ["Local clay is hand-shaped into the distinctive round-bellied form","A narrow spout and handle are attached","The pot is burnished smooth and dried in the sun","It is fired in an open pit or simple kiln"], funFact: "Ethiopia is the birthplace of coffee, and the jebena ceremony has been a daily social ritual for over five centuries."},
        { name: "Egyptian Faience", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Faience_Vessel_with_Procession_of_Four_Bulls%2C_ca._775-653_B.C.E._%28cropped%29.jpg/960px-Faience_Vessel_with_Procession_of_Four_Bulls%2C_ca._775-653_B.C.E._%28cropped%29.jpg', state: "Egypt", region: "Cairo", lat: 30.0444, lng: 31.2357, type: "Pottery", materials: ["Clay","Natural Dye","Copper"], description: "The world\'s first glazed ceramic material, a quartz-based paste that self-glazes during firing into a luminous turquoise-blue surface.", era: "Ancient", steps: ["Crushed quartz, lime, and alkali are mixed into a paste","The paste is molded or hand-shaped into beads or figurines","A copper-rich glaze mixture is applied or develops through efflorescence","The piece is fired in a kiln, fusing the surface into glass-like turquoise"], funFact: "Ancient Egyptians called faience \'tjehenet,\' meaning \'dazzling,\' and used it to make everything from jewelry to hippo figurines."},
        { name: "Zulu Beadwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Zulu_Culture%2C_KwaZulu-Natal%2C_South_Africa_%2820325329170%29.jpg/960px-Zulu_Culture%2C_KwaZulu-Natal%2C_South_Africa_%2820325329170%29.jpg', state: "South Africa", region: "KwaZulu-Natal", lat: -28.6732, lng: 30.4878, type: "Jewelry", materials: ["Glass","Plant Fiber"], description: "Vibrant beaded ornaments and love letters where specific color combinations and patterns convey messages between young Zulu men and women.", era: "19th Century", steps: ["Glass seed beads are sorted by color according to symbolic meaning","A thread of sinew or plant fiber is strung with beads","Beads are woven into geometric patterns using needle and thread","Finished pieces are assembled into necklaces, headbands, or love letters"], funFact: "A Zulu \'love letter\' beadwork uses a coded color system where each color has multiple meanings depending on context."},
        { name: "Tuareg Silver Jewelry", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Les_21_croix_du_Niger.jpg/960px-Les_21_croix_du_Niger.jpg', state: "Niger", region: "Agadez", lat: 16.9735, lng: 7.9911, type: "Jewelry", materials: ["Silver"], description: "Bold geometric silver ornaments crafted by the Tuareg nomads of the Sahara, including the iconic Cross of Agadez pendant.", era: "Ancient", steps: ["Silver is melted and cast or hammered into sheet","Geometric designs are engraved and chased into the metal","Separate elements are soldered together","The piece is burnished and polished to a bright finish"], funFact: "The Cross of Agadez was traditionally given by a father to his son with the words: \'I give you the four corners of the world.\'"},
        { name: "Bogolan (Mud Cloth)", image: 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Traditional_mud_cloth.jpg', state: "Mali", region: "Bamako", lat: 12.6392, lng: -8.0029, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Hand-woven cotton cloth painted with fermented mud, producing bold geometric designs in earthy tones that hold symbolic meaning for the Bamana people.", era: "Ancient", steps: ["Handwoven cotton strips are sewn together into a panel","The cloth is soaked in a solution of boiled tree leaves","Fermented river mud is painted onto the fabric in geometric patterns","The unpainted areas are bleached, leaving dark mud designs on a light ground"], funFact: "Bogolan cloth was traditionally worn by hunters as camouflage and spiritual protection during expeditions."},
        { name: "Maasai Beadwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Maasai_tribe.jpg/960px-Maasai_tribe.jpg', state: "Kenya", region: "Kajiado County", lat: -1.8519, lng: 36.7767, type: "Jewelry", materials: ["Glass","Leather","Plant Fiber"], description: "Elaborate beaded collars, earrings, and headpieces that communicate age, marital status, and social position within Maasai communities.", era: "19th Century", steps: ["Glass seed beads in symbolic colors are selected","Beads are strung on wire or sinew in prescribed patterns","Flat disk-like collars are built up row by row","Leather backing is added to stiffen the finished piece"], funFact: "The wide, flat beaded collar called an enkiama can be so large it rests on a bride\'s shoulders like a colorful shield."},
        { name: "Murano Glass", image: 'https://upload.wikimedia.org/wikipedia/commons/6/65/DaleChihulyatPilchuck.jpg', state: "Italy", region: "Murano, Venice", lat: 45.4585, lng: 12.3527, type: "Home Decor", materials: ["Glass","Gold","Natural Dye"], description: "Exquisite blown glass from the island of Murano, where Venetian glassmakers have guarded their secrets since being confined there in 1291.", era: "13th Century", steps: ["Silica sand and minerals are melted in a furnace at extreme heat","The molten glass is gathered on a blowpipe and inflated","The bubble is shaped using jacks, paddles, and tweezers","Decorative elements like millefiori or gold leaf are applied while hot"], funFact: "Glassmakers on Murano were forbidden to leave the island under penalty of death, to protect Venice\'s trade secrets."},
        { name: "Florentine Leather Gilding", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Relieur_JPG01.jpg/960px-Relieur_JPG01.jpg', state: "Italy", region: "Florence, Tuscany", lat: 43.7696, lng: 11.2558, type: "Home Decor", materials: ["Leather","Gold"], description: "Tooled and gilded leather bookbinding and desk accessories featuring intricate floral patterns pressed with heated brass stamps and highlighted with gold leaf.", era: "15th Century", steps: ["Vegetable-tanned leather is cut and dampened","Heated brass tools impress decorative patterns into the surface","Gold leaf is carefully applied to the tooled impressions","The leather is finished with wax or lacquer for durability"], funFact: "Florence\'s leather gilding tradition was born in the Renaissance workshops that bound manuscripts for the Medici family."},
        { name: "Deruta Maiolica", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Assiette_Castel_Durante_Lille_130108.jpg/960px-Assiette_Castel_Durante_Lille_130108.jpg', state: "Italy", region: "Deruta, Umbria", lat: 42.9822, lng: 12.4197, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Tin-glazed earthenware painted with Renaissance-inspired designs in rich yellows, blues, and greens, a tradition alive in Deruta for over five centuries.", era: "15th Century", steps: ["Earthenware clay is shaped on a wheel and bisque-fired","A white tin-oxide glaze is applied as a painting ground","Designs are hand-painted in metallic oxide pigments","The piece is fired again to fuse the decoration to the glaze"], funFact: "Deruta\'s main street is still lined with ceramic workshops, and the town produces more maiolica today than it did during the Renaissance."},
        { name: "Limoges Enamel", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/French_-_Eucharistic_Dove_-_Walters_443_-_Profile.jpg/960px-French_-_Eucharistic_Dove_-_Walters_443_-_Profile.jpg', state: "France", region: "Limoges", lat: 45.8336, lng: 1.2611, type: "Home Decor", materials: ["Copper","Glass","Gold"], description: "Painted enamel on copper perfected during the Renaissance, where layers of vitreous color are fired to create luminous, jewel-toned images.", era: "12th Century", steps: ["A copper plaque is shaped and cleaned","Ground glass enamel in various colors is applied with a brush","The piece is fired in a kiln to fuse each color layer","Multiple firings build up depth and detail in the image"], funFact: "Limoges enamels were so prized that they were used to decorate reliquaries holding the bones of saints across medieval Europe."},
        { name: "Gobelins Tapestry", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Manufacture_des_Gobelins.jpg/960px-Manufacture_des_Gobelins.jpg', state: "France", region: "Paris", lat: 48.8352, lng: 2.3522, type: "Home Decor", materials: ["Wool","Silk","Gold","Natural Dye"], description: "Monumental woven tapestries produced at the Gobelins manufactory, where weavers work from the reverse side of a cartoon to build images thread by thread.", era: "15th Century", steps: ["A full-scale painted cartoon is created as a guide","Warp threads are strung on a high-warp loom","Weavers work from behind, building the image in dyed wool and silk","The finished tapestry is cut from the loom and its backing is finished"], funFact: "Gobelins weavers work so slowly that a single square meter of tapestry can take an entire year to complete."},
        { name: "Sèvres Porcelain", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/S%C3%A8vres_Clodion_vase.jpg/960px-S%C3%A8vres_Clodion_vase.jpg', state: "France", region: "Sèvres", lat: 48.8254, lng: 2.2267, type: "Pottery", materials: ["Clay","Gold","Natural Dye"], description: "Sumptuously decorated soft-paste porcelain patronized by French monarchs, famous for its rich ground colors and exquisite hand-painted scenes.", era: "18th Century", steps: ["Soft-paste porcelain is shaped and bisque-fired","Colored ground is applied in signature hues like bleu céleste or rose Pompadour","Miniature scenes are hand-painted in reserved white panels","Gilding is applied and burnished to complete the decoration"], funFact: "Madame de Pompadour was Sèvres\' greatest patron, and the signature pink ground color was named \'rose Pompadour\' in her honor."},
        { name: "Bayeux Tapestry Style Embroidery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Odo_bayeux_tapestry.png/960px-Odo_bayeux_tapestry.png', state: "France", region: "Bayeux, Normandy", lat: 49.2764, lng: -0.7024, type: "Home Decor", materials: ["Wool","Cotton"], description: "Narrative embroidery in the tradition of the famous Bayeux Tapestry, using laid and couched stitches to depict historical scenes on linen ground.", era: "11th Century", steps: ["A linen ground fabric is stretched on a frame","Scenes are outlined in stem stitch using wool thread","Areas are filled using laid and couched work technique","Borders are decorated with figures and ornamental motifs"], funFact: "The Bayeux Tapestry is technically an embroidery, not a tapestry, as its images are stitched onto cloth rather than woven."},
        { name: "Talavera Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Talavera_de_la_reina_o_puente_del_arzobispo%2C_piatto%2C_1580-1650_ca..JPG/960px-Talavera_de_la_reina_o_puente_del_arzobispo%2C_piatto%2C_1580-1650_ca..JPG', state: "Spain", region: "Talavera de la Reina, Toledo", lat: 39.9635, lng: -4.8307, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Tin-glazed earthenware painted in cobalt blue, yellow, and green, a Moorish-influenced tradition that later crossed the Atlantic to Mexico.", era: "16th Century", steps: ["Local clay is shaped on a wheel and bisque-fired","A white tin-oxide glaze is dipped or poured over the piece","Designs are painted freehand in metallic oxide pigments","A final glaze firing fuses the decoration to the surface"], funFact: "Spanish Talavera potters emigrated to Puebla, Mexico, where they founded a parallel tradition that thrives independently today."},
        { name: "Toledo Damascene", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Tourist_items%2C_Toledo.JPG/960px-Tourist_items%2C_Toledo.JPG', state: "Spain", region: "Toledo", lat: 39.8628, lng: -4.0273, type: "Jewelry", materials: ["Iron","Gold","Silver"], description: "The art of inlaying gold and silver wire into darkened steel, practiced in Toledo since the Moors brought the technique from Damascus.", era: "6th Century", steps: ["A steel surface is scored with fine crosshatch grooves","Gold or silver wire is hammered into the grooves","The piece is heated to blacken the steel background","The surface is burnished to make the gold inlay gleam against the dark steel"], funFact: "Toledo\'s sword-making fame made it the ideal city for damascene work, as the same metalworking skills apply to both crafts."},
        { name: "Delftware", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Vase%2C_c._1680%2C_Delft%2C_Netherlands%2C_tin-glazed_earthenware_-_Art_Institute_of_Chicago_-_DSC09979.JPG/960px-Vase%2C_c._1680%2C_Delft%2C_Netherlands%2C_tin-glazed_earthenware_-_Art_Institute_of_Chicago_-_DSC09979.JPG', state: "Netherlands", region: "Delft, South Holland", lat: 52.0116, lng: 4.3571, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Blue-and-white tin-glazed earthenware inspired by Chinese porcelain, featuring windmills, tulips, and maritime scenes iconic to Dutch culture.", era: "17th Century", steps: ["Clay is shaped on a wheel or pressed into molds","After bisque firing, a white tin-oxide glaze is applied","Cobalt blue designs are hand-painted onto the glazed surface","A transparent overglaze is applied and the piece is fired again"], funFact: "Delftware was born from a crisis: when the Dutch East India Company\'s Chinese porcelain supply was disrupted, local potters filled the gap."},
        { name: "Wedgwood Jasperware", image: 'https://upload.wikimedia.org/wikipedia/commons/d/db/Jasperware.jpg', state: "United Kingdom", region: "Stoke-on-Trent, Staffordshire", lat: 53.0027, lng: -2.1794, type: "Pottery", materials: ["Clay"], description: "Unglazed stoneware in matte pastel colors with white neoclassical reliefs, developed by Josiah Wedgwood and still a symbol of British ceramic artistry.", era: "18th Century", steps: ["A tinted stoneware body is pressed into molds","White relief figures are cast separately in sprig molds","The reliefs are applied to the colored body with slip","The piece is fired to a smooth, unglazed matte finish"], funFact: "Wedgwood\'s Portland Vase copy took four years of trial and error, and its success made jasperware a household name across Europe."},
        { name: "Harris Tweed", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Harristweed4.jpg/960px-Harristweed4.jpg', state: "United Kingdom", region: "Isle of Harris, Scotland", lat: 57.8986, lng: -6.8128, type: "Clothing", materials: ["Wool","Natural Dye"], description: "Handwoven wool cloth from Scotland\'s Outer Hebrides, the only fabric in the world protected by its own Act of Parliament.", era: "18th Century", steps: ["Local sheep wool is sorted, scoured, and dyed","Fibers are carded and spun into yarn at a local mill","The yarn is hand-woven on a treadle loom in the weaver's home","The finished tweed is inspected and stamped with the Harris Tweed orb mark"], funFact: "By law, Harris Tweed must be woven at the homes of islanders in the Outer Hebrides to carry its protected name."},
        { name: "Waterford Crystal", image: 'https://upload.wikimedia.org/wikipedia/commons/b/bd/Waterford_Crystal_Vase_%28geograph_3748920%29.jpg', state: "Ireland", region: "Waterford", lat: 52.2593, lng: -7.1101, type: "Home Decor", materials: ["Glass","Lead"], description: "Brilliant hand-cut lead crystal known for its deep prismatic cuts and extraordinary clarity, a hallmark of Irish craftsmanship since the 18th century.", era: "18th Century", steps: ["Silica, potash, and lead oxide are melted in a furnace","Molten crystal is gathered and blown into shape","Deep geometric patterns are cut into the cooled crystal using a wheel","Each piece is polished to maximize light refraction"], funFact: "The Times Square New Year\'s Eve Ball in New York City is covered in Waterford Crystal panels."},
        { name: "Fabergé Egg Style Enamelwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Faberg%C3%A9_egg_Rome_05.JPG/960px-Faberg%C3%A9_egg_Rome_05.JPG', state: "Russia", region: "Saint Petersburg", lat: 59.9343, lng: 30.3351, type: "Jewelry", materials: ["Gold","Silver","Glass","Stone"], description: "Lavish guilloché enamel and gem-set metalwork in the tradition of Russian imperial jewelers, where engine-turned metal gleams beneath translucent enamel.", era: "19th Century", steps: ["Gold or silver is engine-turned on a rose lathe to create guilloché patterns","Translucent enamel is painted over the textured surface","The piece is fired multiple times to build up depth of color","Gemstones and miniature hinges are set into the finished enamel"], funFact: "Fabergé\'s workshop produced just fifty imperial Easter eggs, and each one contained a unique surprise inside."},
        { name: "Gzhel Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/b/ba/%D0%90%D0%B7%D0%B0%D1%80%D0%BE%D0%B2%D0%B01.jpg', state: "Russia", region: "Gzhel, Moscow Oblast", lat: 55.4922, lng: 38.4389, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Distinctive blue-and-white ceramics from a cluster of villages southeast of Moscow, painted with flowing floral designs in cobalt blue on white.", era: "17th Century", steps: ["White-firing clay is shaped on a wheel or pressed in molds","The bisque-fired piece is hand-painted in cobalt blue with broad brushstrokes","A transparent glaze is applied over the painting","The piece is fired at high temperature to fuse the decoration"], funFact: "The Gzhel region has been a ceramics center since the 14th century because of its exceptionally pure white clay deposits."},
        { name: "Khokhloma", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Khohloma_set_1996.JPG/960px-Khohloma_set_1996.JPG', state: "Russia", region: "Semyonov, Nizhny Novgorod Oblast", lat: 56.7948, lng: 44.4861, type: "Kitchenware", materials: ["Wood","Gold","Lac","Natural Dye"], description: "Vibrant painted wooden tableware featuring swirling red, black, and gold berry-and-leaf motifs, finished with a lacquer that gives wood a metallic sheen.", era: "17th Century", steps: ["Wooden blanks are turned on a lathe and primed","A coating of aluminum powder gives the surface a silver appearance","Red and black berry-and-leaf motifs are painted over the silver ground","Multiple coats of lacquer are applied and heat-cured to turn the silver to gold"], funFact: "The secret of Khokhloma\'s golden glow is that heat-cured lacquer turns a silver aluminum undercoat into a warm gold color."},
        { name: "Matryoshka Doll", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Russian-Matroshka.jpg/960px-Russian-Matroshka.jpg', state: "Russia", region: "Sergiyev Posad, Moscow Oblast", lat: 56.31, lng: 38.1326, type: "Toys", materials: ["Wood","Natural Dye","Lac"], description: "Nesting wooden dolls that open to reveal progressively smaller figures inside, each hand-turned and painted with rosy-cheeked peasant faces.", era: "19th Century", steps: ["A single block of linden wood is turned on a lathe","The innermost doll is carved first, then each larger shell is fitted to it","Each doll is sanded, primed, and hand-painted","A protective lacquer coating is applied to the finished set"], funFact: "The first matryoshka set was inspired by a Japanese Daruma nesting doll brought to Russia by a monk."},
        { name: "Palekh Miniature", image: 'https://upload.wikimedia.org/wikipedia/commons/8/8b/GreatRussianGifts.com_Russian_lacquer_box.jpg', state: "Russia", region: "Palekh, Ivanovo Oblast", lat: 56.8022, lng: 41.8553, type: "Home Decor", materials: ["Paper","Lac","Gold","Natural Dye"], description: "Luminous miniature paintings on papier-mâché lacquer boxes, depicting fairy tales and folk legends in a style descended from Russian icon painting.", era: "17th Century", steps: ["Papier-mâché is pressed and shaped into a box form","Multiple coats of black lacquer are applied and polished","Miniature scenes are painted in tempera with egg emulsion","Gold leaf details are added and the box is coated in clear lacquer"], funFact: "Palekh miniaturists were originally icon painters who reinvented their art for secular subjects after the Russian Revolution."},
        { name: "Rostov Enamel", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/0_Reliquaire_grandmontain_-_MR_2648_-_Louvre_%281%29.JPG/960px-0_Reliquaire_grandmontain_-_MR_2648_-_Louvre_%281%29.JPG', state: "Russia", region: "Rostov, Yaroslavl Oblast", lat: 57.1856, lng: 39.4142, type: "Jewelry", materials: ["Copper","Glass","Silver"], description: "Delicate painted enamel miniatures on copper, a surviving tradition of the ancient Rostov Finift craft depicting religious and secular scenes.", era: "18th Century", steps: ["A copper plate is shaped, cleaned, and primed with white enamel","A miniature scene is painted using enamel pigments","The piece is fired in a kiln to fuse each layer of color","The finished enamel is set into a silver or metal frame"], funFact: "Rostov enamel was originally used to decorate Orthodox church vestments and icon covers before becoming a secular art form."},
        { name: "Vologda Lace", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Lepoglava1_Foto_Thaler_Tamas_ism.jpg/960px-Lepoglava1_Foto_Thaler_Tamas_ism.jpg', state: "Russia", region: "Vologda", lat: 59.2181, lng: 39.8886, type: "Clothing", materials: ["Cotton","Silk"], description: "Intricate bobbin lace worked on a cylindrical pillow, featuring flowing floral tape patterns outlined by a continuous thread against an open mesh ground.", era: "17th Century", steps: ["A pattern is pinned onto a cylindrical lace pillow","Dozens of bobbins wound with linen thread are manipulated simultaneously","Threads are twisted and crossed around pins following the pattern","The finished lace is carefully removed from the pillow and starched"], funFact: "Vologda lace is distinguished by its continuous braid pattern, which snakes through the design like a river through a landscape."},
        { name: "Bohemian Crystal", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/BLW_Bohemian_Jug.jpg/960px-BLW_Bohemian_Jug.jpg', state: "Czech Republic", region: "Karlovy Vary", lat: 50.2329, lng: 12.8714, type: "Home Decor", materials: ["Glass","Natural Dye"], description: "Hand-cut and engraved crystal glass from Bohemia, celebrated for its extraordinary clarity, deep cutting patterns, and brilliant light refraction.", era: "13th Century", steps: ["Potash glass is melted in a furnace and blown or pressed into shape","The cooled glass is marked for cutting patterns","Deep geometric cuts are ground using stone or copper wheels","The cut surfaces are polished to maximize brilliance"], funFact: "Bohemian glassmakers discovered that adding chalk to the glass formula produced a clarity that rivaled rock crystal."},
        { name: "Meissen Porcelain", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/MeissenGroup-JohannKaendler-BMA.jpg/960px-MeissenGroup-JohannKaendler-BMA.jpg', state: "Germany", region: "Meissen, Saxony", lat: 51.1625, lng: 13.474, type: "Pottery", materials: ["Clay","Gold","Natural Dye"], description: "Europe\'s first true hard-paste porcelain, whose discovery in 1708 ended the Chinese monopoly and launched a continent-wide porcelain revolution.", era: "18th Century", steps: ["Kaolin, feldspar, and quartz are blended into porcelain paste","Pieces are shaped by throwing, pressing, or casting","After bisque firing, decoration is painted by hand","A glaze firing at extreme temperature produces the characteristic translucency"], funFact: "The inventor of Meissen porcelain, Johann Friedrich Böttger, was an alchemist imprisoned by the King of Saxony to produce gold."},
        { name: "Swedish Dala Horse", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Dalah%C3%A4st_i_avesta.jpg/960px-Dalah%C3%A4st_i_avesta.jpg', state: "Sweden", region: "Nusnäs, Dalarna", lat: 60.9539, lng: 14.8922, type: "Toys", materials: ["Wood","Natural Dye"], description: "Cheerfully painted wooden horses carved from pine, originally whittled by Dalarna lumberjacks during long winter evenings and now a Swedish national symbol.", era: "17th Century", steps: ["A block of pine is rough-carved into a horse shape with a knife","The form is refined and sanded smooth","A base coat of the traditional Falun red paint is applied","Kurbits floral designs are hand-painted in a single flowing stroke technique"], funFact: "The traditional red color of Dala horses comes from the same copper mine pigment that coats most farmhouses in Sweden."},
        { name: "Rosemaling", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Hol%2C_on_the_other_side_of_Holsfjorden.jpg/960px-Hol%2C_on_the_other_side_of_Holsfjorden.jpg', state: "Norway", region: "Telemark", lat: 59.3856, lng: 8.0068, type: "Home Decor", materials: ["Wood","Natural Dye"], description: "Scrolling floral painting on wooden objects in a folk Baroque style, with flowing C and S curves, tendrils, and flowers in earthy yet vivid colors.", era: "18th Century", steps: ["A wooden surface is sanded, sealed, and base-coated","A central flower composition is sketched with chalk","Flowing strokes in multiple colors are applied with round brushes","Fine details and scrollwork are added with liner brushes"], funFact: "Norwegian immigrants brought rosemaling to the American Midwest, where it thrived in Wisconsin and Minnesota farm communities."},
        { name: "Danish Silver", image: 'https://upload.wikimedia.org/wikipedia/commons/2/2c/Georg_Jensen_by_Knudstrup-Andresen.jpg', state: "Denmark", region: "Copenhagen", lat: 55.6761, lng: 12.5683, type: "Jewelry", materials: ["Silver"], description: "Sleek Scandinavian silverwork in the tradition of Georg Jensen, combining organic Art Nouveau forms with the simplicity of Nordic design.", era: "18th Century", steps: ["Sterling silver is melted and cast or hammered into sheet","Forms are raised by hammering silver over a stake","Decorative elements are chased, engraved, or soldered on","The surface is oxidized and selectively polished for contrast"], funFact: "Copenhagen\'s silver tradition predates Georg Jensen by centuries, with the city\'s guild of silversmiths dating to the Middle Ages."},
        { name: "Greek Pottery (Black-figure)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Herakles_Geryon_Staatliche_Antikensammlungen_1379.jpg/960px-Herakles_Geryon_Staatliche_Antikensammlungen_1379.jpg', state: "Greece", region: "Athens", lat: 37.9838, lng: 23.7275, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Ancient Attic pottery featuring silhouetted figures painted in iron-rich slip on a red clay ground, depicting myths, daily life, and athletic contests.", era: "Ancient", steps: ["Fine Attic clay is shaped into vessel forms on a potter's wheel","Figures are painted using a refined iron-rich clay slip","Details are incised through the slip with a sharp tool","A three-phase firing process turns the painted areas black while the ground stays red"], funFact: "The secret of the ancient Greek firing technique was lost for millennia and only rediscovered through modern scientific analysis."},
        { name: "Romanian Egg Decorating", image: 'https://upload.wikimedia.org/wikipedia/commons/c/c3/Ukrainskie_pisanki.jpeg', state: "Romania", region: "Bukovina", lat: 47.7511, lng: 25.6827, type: "Home Decor", materials: ["Wax","Natural Dye"], description: "Wax-resist decorated Easter eggs featuring intricate geometric and floral patterns in multiple colors, each region maintaining its own distinctive style.", era: "Ancient", steps: ["A hollowed egg is cleaned and dried","Melted beeswax is applied with a kistka writing tool to block areas","The egg is dipped in progressively darker dye baths","The wax is melted off to reveal the multicolored design beneath"], funFact: "In Bukovina tradition, the very first decorated egg of the season must be given away, never kept for oneself."},
        { name: "Polish Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/PL_ceramika_boles%C5%82awiecka001.JPG/960px-PL_ceramika_boles%C5%82awiecka001.JPG', state: "Poland", region: "Bolesławiec, Lower Silesia", lat: 51.2626, lng: 15.5694, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Hand-stamped stoneware decorated with distinctive dot-and-circle patterns in cobalt blue, produced in the ceramics capital of Silesia.", era: "14th Century", steps: ["White stoneware clay is molded or thrown into functional forms","Small sponge stamps are used to apply repetitive dot-and-circle patterns","A cobalt blue underglaze is applied by stamping and brushwork","Pieces are fired at high temperature for durability"], funFact: "Bolesławiec pottery is so durable it can go directly from freezer to oven without cracking."},
        { name: "Hungarian Embroidery", image: '', state: "Hungary", region: "Kalocsa", lat: 46.5269, lng: 18.9842, type: "Clothing", materials: ["Cotton","Silk","Natural Dye"], description: "Exuberant floral embroidery from the Kalocsa region, featuring concentric rings of peppers, flowers, and leaves in vivid red, blue, and green.", era: "18th Century", steps: ["A white cotton fabric is stretched on an embroidery hoop","A freehand floral design is sketched or transferred","Satin and chain stitches fill the flowers and leaves in vibrant colors","The finished piece is pressed and sometimes starched"], funFact: "Kalocsa embroidery was originally done entirely in white, with the explosion of color only appearing in the early 19th century."},
        { name: "Swiss Watchmaking", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Victorinox_Swiss_Army_Knife_-_Tinker_%2814934336443%29.jpg/960px-Victorinox_Swiss_Army_Knife_-_Tinker_%2814934336443%29.jpg', state: "Switzerland", region: "La Chaux-de-Fonds", lat: 47.0986, lng: 6.8261, type: "Jewelry", materials: ["Gold","Silver","Iron","Glass"], description: "The apex of mechanical precision craft, where hundreds of tiny hand-finished components are assembled into movements that measure time to fractions of a second.", era: "16th Century", steps: ["Tiny components are machined from metal blanks","Each part is hand-finished with beveling, polishing, and engraving","The movement is assembled under magnification by a master watchmaker","The watch is cased, tested, and adjusted for accuracy over weeks"], funFact: "The entire city of La Chaux-de-Fonds was rebuilt on a grid plan after a fire, specifically to maximize sunlight for watchmakers\' workbenches."},
        { name: "Olinala Lacquerware", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/%D0%9C%D1%83%D0%B7%D0%B5%D0%B9_%D0%B0%D0%B7%D1%96%D0%B9%D1%81%D1%8C%D0%BA%D0%BE%D0%B3%D0%BE_%D0%BC%D0%B8%D1%81%D1%82%D0%B5%D1%86%D1%82%D0%B2%D0%B09.jpg/960px-%D0%9C%D1%83%D0%B7%D0%B5%D0%B9_%D0%B0%D0%B7%D1%96%D0%B9%D1%81%D1%8C%D0%BA%D0%BE%D0%B3%D0%BE_%D0%BC%D0%B8%D1%81%D1%82%D0%B5%D1%86%D1%82%D0%B2%D0%B09.jpg', state: "Mexico", region: "Olinalá, Guerrero", lat: 17.7666, lng: -98.7309, type: "Home Decor", materials: ["Wood","Lac","Natural Dye"], description: "Fragrant lacquered boxes and chests from Guerrero, decorated by scratching through layers of colored lacquer to reveal contrasting hues beneath.", era: "Ancient", steps: ["A wooden box is carved from the aromatic linaloe tree","Layers of colored lacquer made from chia oil and local minerals are applied","Designs are scratched through the top layer with a thorn or needle","The contrasting underlayer is revealed in the scratched pattern"], funFact: "Olinalá boxes are made from linaloe wood, which retains its sweet fragrance for decades after carving."},
        { name: "Talavera Poblana", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Catedral_de_Puebla%2C_M%C3%A9xico%2C_2013-10-11%2C_DD_13.JPG/960px-Catedral_de_Puebla%2C_M%C3%A9xico%2C_2013-10-11%2C_DD_13.JPG', state: "Mexico", region: "Puebla", lat: 19.0414, lng: -98.2063, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Richly decorated tin-glazed earthenware descended from Spanish Talavera traditions, featuring bold blue designs on a milky white ground.", era: "16th Century", steps: ["Two types of local clay are blended and shaped by hand or wheel","The piece is bisque-fired and coated with a tin-oxide glaze","Designs are painted freehand in cobalt blue and other traditional colors","A final firing fuses the decoration permanently to the surface"], funFact: "Authentic Talavera Poblana can only be produced in Puebla and four nearby communities, much like champagne in France."},
        { name: "Oaxacan Alebrije", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Alebrijes_in_Oaxaca%2C_Mexico_2009.jpg/960px-Alebrijes_in_Oaxaca%2C_Mexico_2009.jpg', state: "Mexico", region: "San Martín Tilcajete, Oaxaca", lat: 16.8167, lng: -96.6333, type: "Sculpture", materials: ["Wood","Natural Dye"], description: "Fantastical hand-carved creatures painted in psychedelic colors, each one a unique fusion of real and imaginary animal forms.", era: "Ancient", steps: ["Copal wood is harvested and rough-carved with a machete","The creature form is refined with knives and chisels","The carving is dried slowly to prevent cracking","Intricate patterns are painted in vivid acrylic or natural pigments"], funFact: "The word \'alebrije\' was coined by Mexican artist Pedro Linares after a feverish dream filled with fantastical creatures."},
        { name: "Mexican Silver Jewelry", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/TaxcoaMontage.jpg/960px-TaxcoaMontage.jpg', state: "Mexico", region: "Taxco, Guerrero", lat: 18.5564, lng: -99.605, type: "Jewelry", materials: ["Silver"], description: "Bold silver jewelry from the mountain town of Taxco, where pre-Columbian metalworking traditions merged with Spanish colonial silver craftsmanship.", era: "Ancient", steps: ["Sterling silver is melted and cast or hammered into sheet","Designs are cut, shaped, and soldered together","Oxidation is applied to darken recessed areas for contrast","The piece is polished to a brilliant mirror finish"], funFact: "Taxco sits atop one of the richest silver deposits in the Americas and has been a silver town since Aztec times."},
        { name: "Huipil Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Huipil%2C_skirt%2C_belt_%28c.1950%29%2C_shawl%2C_Ixil_Maya%2C_Nebaj%2C_mid_to_late_20th_century%2C_cotton_-_Textile_Museum_of_Canada_-_DSC01351.JPG/960px-Huipil%2C_skirt%2C_belt_%28c.1950%29%2C_shawl%2C_Ixil_Maya%2C_Nebaj%2C_mid_to_late_20th_century%2C_cotton_-_Textile_Museum_of_Canada_-_DSC01351.JPG', state: "Guatemala", region: "Chichicastenango", lat: 14.9431, lng: -91.1117, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Brilliantly woven blouses of the Maya, where each community\'s distinctive patterns encode identity, cosmology, and social standing in thread.", era: "Ancient", steps: ["Cotton thread is hand-spun and dyed in traditional colors","A backstrap loom is set up with the warp threads","Complex brocade patterns are picked up by hand during weaving","Woven panels are joined with decorative stitching called randa"], funFact: "A Maya woman\'s huipil identifies her home village as precisely as a postal code, through its unique pattern and color combination."},
        { name: "Mola Textile", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/KunaWomanSellingMolas.jpg/960px-KunaWomanSellingMolas.jpg', state: "Panama", region: "San Blas Islands", lat: 9.5657, lng: -78.9883, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Vibrant reverse-appliqué panels made by the Guna people, where layers of colored cloth are cut away to reveal bold geometric and animal designs.", era: "Ancient", steps: ["Multiple layers of different colored cotton fabric are stacked","The top layers are carefully cut away to reveal colors beneath","Cut edges are turned under and stitched with tiny invisible stitches","Additional embroidered details are added to complete the design"], funFact: "Molas were originally painted as body art; when missionaries discouraged body painting, the Guna transferred their designs to cloth."},
        { name: "Peruvian Backstrap Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/5/5e/Warp_and_weft_2.jpg', state: "Peru", region: "Chinchero, Cusco", lat: -13.3875, lng: -72.05, type: "Clothing", materials: ["Wool","Natural Dye"], description: "Ancient Andean textile art where alpaca and llama fibers are woven on a portable backstrap loom, producing complex patterns with roots in Inca tradition.", era: "Ancient", steps: ["Alpaca or llama fiber is hand-spun and dyed with natural dyes","A backstrap loom is warped with the pattern threads","The weaver controls tension by leaning back against the loom strap","Complex supplementary warp patterns are picked up by hand"], funFact: "Andean backstrap weaving is one of the world\'s oldest continuous textile traditions, with examples over 4,000 years old found in Peru."},
        { name: "Peruvian Retablo", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Mexican_oil_paint_on_tin_retablo_of_%27Our_Lady_of_Guadalupe%27%2C_19th_century%2C_El_Paso_Museum_of_Art.JPG/960px-Mexican_oil_paint_on_tin_retablo_of_%27Our_Lady_of_Guadalupe%27%2C_19th_century%2C_El_Paso_Museum_of_Art.JPG', state: "Peru", region: "Ayacucho", lat: -13.1588, lng: -74.2232, type: "Sculpture", materials: ["Wood","Clay","Natural Dye"], description: "Portable altar boxes containing miniature painted figurines depicting religious scenes, festivals, and daily Andean life in vivid polychrome.", era: "16th Century", steps: ["A wooden box frame is constructed with doors","Small figurines are modeled from a potato and plaster paste","The figures are arranged in layered scenes inside the box","Everything is painted in bright colors and the doors are decorated"], funFact: "Retablos were originally used by traveling Spanish priests to convert Andean peoples, who then made the art form entirely their own."},
        { name: "Colombian Mochila Bag", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/04162012Bailes032.JPG/960px-04162012Bailes032.JPG', state: "Colombia", region: "Sierra Nevada de Santa Marta", lat: 10.8231, lng: -73.755, type: "Clothing", materials: ["Cotton","Wool","Plant Fiber"], description: "Colorful crocheted shoulder bags made by the Wayuu and Arhuaco peoples, whose geometric patterns map the weaver\'s thoughts and dreams.", era: "Ancient", steps: ["Cotton, wool, or maguey fiber is hand-spun and dyed","A single crochet hook is used to work in continuous spirals","Geometric patterns are built up by changing thread colors","A woven strap is attached to complete the bag"], funFact: "Each Wayuu mochila pattern is unique to its maker and is said to represent her personal dreams and life experiences."},
        { name: "Navajo Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/1/14/Navajo_rug.jpg', state: "United States", region: "Navajo Nation, Arizona", lat: 36.0672, lng: -109.188, type: "Home Decor", materials: ["Wool","Natural Dye"], description: "Bold geometric textiles woven by Diné (Navajo) women on upright looms, with designs that evolved from simple stripes to elaborate diamond and storm patterns.", era: "17th Century", steps: ["Churro sheep wool is hand-spun and dyed with natural pigments","A vertical loom is set up with cotton warp threads","The weaver builds the design from bottom to top using a batten and comb","A deliberate 'spirit line' imperfection is often included in the border"], funFact: "Navajo weavers traditionally include a \'spirit line\' flaw in each textile so their creative spirit can escape and not be trapped in the work."},
        { name: "Pueblo Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Mimbres_fish_pot%2C_MRM.jpg/960px-Mimbres_fish_pot%2C_MRM.jpg', state: "United States", region: "Santa Fe, New Mexico", lat: 35.687, lng: -105.9378, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Hand-coiled pottery from the Pueblo peoples of the American Southwest, shaped without a wheel and painted with mineral and plant-based pigments.", era: "Ancient", steps: ["Local clay is gathered, cleaned, and tempered with ground sherds","Coils of clay are built up and smoothed into vessel shapes by hand","The surface is polished with a smooth stone before painting","Designs are painted with yucca-leaf brushes and the pot is pit-fired"], funFact: "The famous black-on-black pottery of San Ildefonso Pueblo was revived by Maria Martinez, who became one of the most celebrated potters in history."},
        { name: "Northwest Coast Totem Pole", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Totem_RMBC_1.jpg/960px-Totem_RMBC_1.jpg', state: "Canada", region: "Haida Gwaii, British Columbia", lat: 53.2527, lng: -132.0738, type: "Furniture", materials: ["Wood","Natural Dye"], description: "Monumental carved red cedar poles depicting clan crests, ancestral stories, and supernatural beings, raised by the Indigenous peoples of the Pacific Northwest.", era: "Ancient", steps: ["A large red cedar log is selected and the bark is removed","Figures are roughed out with adzes and refined with knives","Details of eyes, feathers, and fins are carved and painted","The completed pole is raised in a community ceremony"], funFact: "Totem poles were never worshipped as idols; they serve as heraldic crests, memorial markers, and visual storytelling devices."},
        { name: "Inuit Soapstone Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/PaQi_2.jpg/960px-PaQi_2.jpg', state: "Canada", region: "Cape Dorset, Nunavut", lat: 64.23, lng: -76.5267, type: "Sculpture", materials: ["Stone"], description: "Fluid, expressive carvings of Arctic wildlife and Inuit life sculpted from soft soapstone, each piece reflecting the carver\'s intimate knowledge of the land.", era: "Ancient", steps: ["Soapstone is quarried from local deposits","The stone is rough-shaped with a hatchet or saw","Details are carved with files, rasps, and knives","The finished piece is sanded and polished to a smooth sheen"], funFact: "Inuit carvers traditionally say they do not create the form but rather release the figure already waiting inside the stone."},
        { name: "Quilting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Quilter_and_quilting_in_the_Bazaar_of_Nishapur_11.JPG/960px-Quilter_and_quilting_in_the_Bazaar_of_Nishapur_11.JPG', state: "United States", region: "Lancaster, Pennsylvania", lat: 40.0379, lng: -76.3055, type: "Home Decor", materials: ["Cotton","Wool"], description: "Layered textile art where pieced or appliquéd fabric tops are stitched to batting and backing, a tradition deeply rooted in American folk art.", era: "18th Century", steps: ["Fabric is cut into geometric shapes and pieced into a pattern","The pieced top is layered over batting and a backing fabric","The three layers are quilted together with fine running stitches","Binding is sewn around the edges to finish the quilt"], funFact: "Amish quilts from Lancaster County are prized for their bold, minimalist designs that influenced modern abstract artists."},
        { name: "Brazilian Pottery (Marajoara)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Burian_urn%2C_AD_1000-1250%2C_Marajoara_culture_-_AMNH_-_DSC06177_b.jpg/960px-Burian_urn%2C_AD_1000-1250%2C_Marajoara_culture_-_AMNH_-_DSC06177_b.jpg', state: "Brazil", region: "Marajó Island, Pará", lat: -0.9927, lng: -49.5153, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Ancient Amazonian ceramics from Marajó Island featuring elaborate geometric and zoomorphic designs, among the most sophisticated pre-Columbian pottery in the Americas.", era: "Ancient", steps: ["Clay from the island's floodplain is gathered and prepared","Vessels and urns are hand-built using coiling techniques","Intricate geometric designs are carved, painted, or stamped into the surface","The pottery is fired in open pits to a warm terracotta color"], funFact: "Marajoara pottery was produced on a single island at the mouth of the Amazon yet reached levels of complexity rivaling any ancient civilization."},
        { name: "Mapuche Silver Jewelry", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Ancient_mapuche_flag.svg/960px-Ancient_mapuche_flag.svg.png', state: "Chile", region: "Temuco, Araucanía", lat: -38.7359, lng: -72.5904, type: "Jewelry", materials: ["Silver"], description: "Bold silver ornaments of the Mapuche people, including wide pectoral plates and heavy earrings that jingle and flash as spiritual protection.", era: "18th Century", steps: ["Silver coins or ingots are melted in a crucible","The molten silver is hammered into flat sheets","Decorative shapes are cut, embossed, and assembled","Chains and dangles are attached to create movement and sound"], funFact: "Mapuche silversmiths originally learned their craft from Spanish colonizers, then developed a completely distinctive style to express their own identity."},
        { name: "Multani Blue Pottery", image: '', state: "Pakistan", region: "Multan, Punjab", lat: 30.1575, lng: 71.5249, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Brilliant blue-and-white glazed ceramics from the ancient city of Multan, featuring Persian-influenced floral motifs on a turquoise ground.", era: "13th Century", steps: ["A fritware paste of quartz and clay is shaped on a wheel","The piece is bisque-fired and a turquoise glaze is applied","Cobalt blue and white designs are painted over the glaze","A final firing fuses the decoration to the surface"], funFact: "Multan is known as the \'City of Saints\' and its blue pottery tradition came via Sufi saints who traveled from Central Asia."},
        { name: "Sindhi Ajrak", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Ajrak.jpg/960px-Ajrak.jpg', state: "Pakistan", region: "Sindh", lat: 25.8943, lng: 68.5247, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Block-printed shawls in deep crimson and indigo featuring intricate geometric star patterns, considered the defining textile of Sindhi identity.", era: "Ancient", steps: ["Cotton cloth is washed and mordanted with natural compounds","Carved wooden blocks are dipped in natural dyes and stamped","The cloth is resist-dyed in indigo and madder baths","Multiple rounds of printing and dyeing build up the complex pattern"], funFact: "Fragments of ajrak-like cloth have been found at the Indus Valley site of Mohenjo-daro, suggesting a 5,000-year-old origin."},
        { name: "Swat Valley Woodcarving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Mahodand_l.jpg/960px-Mahodand_l.jpg', state: "Pakistan", region: "Swat Valley, Khyber Pakhtunkhwa", lat: 35.222, lng: 72.3528, type: "Furniture", materials: ["Wood"], description: "Intricate geometric and floral woodcarving adorning doors, window screens, and furniture, reflecting Gandharan and Islamic artistic traditions.", era: "Ancient", steps: ["Walnut or cedar wood is selected and seasoned","Geometric patterns are laid out and rough-carved","Fine details are cut with specialized chisels and gouges","The surface is sanded and oiled to a warm finish"], funFact: "Swat Valley\'s woodcarving tradition blends Buddhist Gandharan motifs with Islamic geometric patterns, reflecting the region\'s layered history."},
        { name: "Hunza Gemstone Cutting", image: 'https://upload.wikimedia.org/wikipedia/commons/1/17/Corundum-215330.jpg', state: "Pakistan", region: "Hunza Valley, Gilgit-Baltistan", lat: 36.3167, lng: 74.65, type: "Jewelry", materials: ["Stone","Silver"], description: "Gemstone cutting and jewelry-making using rubies, emeralds, and aquamarines sourced from the high-altitude mines of the Karakoram mountains.", era: "Ancient", steps: ["Raw gemstones are mined from high mountain deposits","Stones are sorted by color, clarity, and size","Gems are cut and polished on simple grinding wheels","Finished stones are set into traditional silver jewelry"], funFact: "The Hunza Valley sits on one of the richest gem-bearing geological zones in the world, where rubies and emeralds grow side by side."},
        { name: "Jamdani Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/%E0%A6%9C%E0%A6%BE%E0%A6%AE%E0%A6%A6%E0%A6%BE%E0%A6%A8%E0%A7%80_%E0%A6%B6%E0%A6%BE%E0%A6%A1%E0%A6%BC%E0%A7%80.jpg/960px-%E0%A6%9C%E0%A6%BE%E0%A6%AE%E0%A6%A6%E0%A6%BE%E0%A6%A8%E0%A7%80_%E0%A6%B6%E0%A6%BE%E0%A6%A1%E0%A6%BC%E0%A7%80.jpg', state: "Bangladesh", region: "Dhaka", lat: 23.8103, lng: 90.4125, type: "Clothing", materials: ["Cotton","Gold"], description: "Gossamer-fine muslin with supplementary weft motifs woven directly on the loom, creating translucent fabric dotted with floating floral designs.", era: "Ancient", steps: ["Ultra-fine cotton thread is hand-spun in humid conditions","The sheer muslin ground is set up on a pit loom","Two weavers sit side by side inserting supplementary weft motifs by hand","Each small design element is woven individually across the width"], funFact: "Dhaka muslin was once so fine that entire saris could be passed through a finger ring, earning the name \'woven air.\'"},
        { name: "Nakshi Kantha", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Nakshi_Kantha_craftswoman.jpg/960px-Nakshi_Kantha_craftswoman.jpg', state: "Bangladesh", region: "Rajshahi", lat: 24.3636, lng: 88.6241, type: "Home Decor", materials: ["Cotton","Silk"], description: "Embroidered quilts stitched from layers of recycled old saris, covered with narrative scenes and geometric patterns using a simple running stitch.", era: "Ancient", steps: ["Worn-out saris are layered to form a quilted base","A design of flowers, animals, or narrative scenes is sketched","The entire surface is covered with fine running stitches in colored thread","Border patterns are added to frame the central composition"], funFact: "Nakshi kantha is one of the world\'s oldest recycling traditions, transforming worn-out garments into treasured family heirlooms."},
        { name: "Shital Pati Mat Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Sheetal_Pati_Sunamganj.jpg/960px-Sheetal_Pati_Sunamganj.jpg', state: "Bangladesh", region: "Sylhet", lat: 24.8949, lng: 91.8687, type: "Home Decor", materials: ["Plant Fiber"], description: "Cool woven mats made from cane strips, intricately patterned and used as sitting and sleeping mats in the humid Bengal climate.", era: "Ancient", steps: ["Mutra cane is harvested, split, and scraped into thin strips","Strips are dyed in contrasting colors","The strips are interwoven in geometric patterns on a flat surface","Edges are bound to finish the mat"], funFact: "Shital pati means \'cool mat\' in Bengali, as the cane surface stays naturally cool even in sweltering summer heat."},
        { name: "Sri Lankan Mask Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/f/f8/Karava_Main_Flag.jpg', state: "Sri Lanka", region: "Ambalangoda", lat: 6.2353, lng: 80.054, type: "Sculpture", materials: ["Wood","Natural Dye"], description: "Elaborately carved and painted wooden masks used in traditional kolam performances and healing rituals, depicting demons, kings, and comic characters.", era: "Ancient", steps: ["Kaduru wood is selected for its light weight and soft grain","The mask form is rough-carved with chisels","Fine facial details, fangs, and bulging eyes are carefully sculpted","The mask is painted in vivid polychrome and lacquered"], funFact: "The town of Ambalangoda is called the \'mask capital\' of Sri Lanka and has a museum devoted entirely to traditional masks."},
        { name: "Sri Lankan Beeralu Lace", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Weligama_Beach_in_Sri_Lanka.jpg/960px-Weligama_Beach_in_Sri_Lanka.jpg', state: "Sri Lanka", region: "Galle", lat: 6.0535, lng: 80.221, type: "Clothing", materials: ["Cotton"], description: "Delicate bobbin lace introduced by Portuguese colonizers and refined over four centuries into a distinctly Sri Lankan tradition of household and garment trims.", era: "16th Century", steps: ["A pattern is pinned to a cylindrical pillow","Multiple bobbins wound with fine cotton thread are prepared","Threads are twisted, crossed, and braided around pins","The finished lace is removed and starched"], funFact: "Beeralu lace was introduced by the Portuguese in the 16th century and is now practiced almost exclusively by women in the Galle area."},
        { name: "Sri Lankan Dumbara Mat Weaving", image: '', state: "Sri Lanka", region: "Dumbara Valley", lat: 7.35, lng: 80.6833, type: "Home Decor", materials: ["Plant Fiber"], description: "Finely woven reed mats featuring geometric patterns, once used to decorate the royal court and now a protected intangible heritage of Sri Lanka.", era: "Ancient", steps: ["Reeds are harvested, dried, and split into fine strips","Natural dyes from bark and roots color the reed strips","Strips are woven on a ground loom in intricate patterns","The mat edges are neatly finished and trimmed"], funFact: "Dumbara mats were so prized that they were historically presented as tribute to Sri Lankan kings."},
        { name: "Nepalese Thanka Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Buddha_Vairocana_-_Google_Art_Project.jpg/960px-Buddha_Vairocana_-_Google_Art_Project.jpg', state: "Nepal", region: "Kathmandu Valley", lat: 27.7172, lng: 85.324, type: "Home Decor", materials: ["Cotton","Gold","Natural Dye"], description: "Sacred Buddhist scroll paintings executed in mineral pigments and gold on cotton, depicting deities, mandalas, and the Wheel of Life.", era: "7th Century", steps: ["A cotton canvas is stretched, sized with glue, and burnished smooth","The deity or mandala composition is sketched following strict iconometric rules","Mineral pigments ground from lapis, malachite, and cinnabar are applied","Gold leaf details and fine black outlines are added last"], funFact: "Every proportion in a thanka painting follows ancient Buddhist texts, and even a minor deviation is considered spiritually incorrect."},
        { name: "Nepalese Metalwork (Paubha)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Ashta-Matrika.jpg/960px-Ashta-Matrika.jpg', state: "Nepal", region: "Patan, Lalitpur", lat: 27.6727, lng: 85.3286, type: "Sculpture", materials: ["Bronze","Copper","Gold"], description: "Lost-wax cast bronze statues of Buddhist and Hindu deities, produced by the Newar people of Patan with skills refined over a millennium.", era: "5th Century", steps: ["A wax model of the deity is sculpted over a clay core","The wax is encased in clay to form a mold","Molten bronze is poured in as the wax melts away","The cast figure is chased, gilded, and sometimes inlaid with gems"], funFact: "Patan is called the \'City of Fine Arts\' and its metalworkers have been casting deities for Tibetan monasteries for over a thousand years."},
        { name: "Nepali Dhaka Fabric", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Dhaka_topi_nepal%27s.jpg/960px-Dhaka_topi_nepal%27s.jpg', state: "Nepal", region: "Palpa", lat: 27.8667, lng: 83.55, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Hand-woven fabric featuring small geometric motifs used to make the iconic Dhaka topi cap, a symbol of Nepali national identity.", era: "Ancient", steps: ["Cotton thread is dyed in multiple colors","Threads are carefully arranged on a hand loom","Small geometric patterns are woven using a supplementary weft technique","The finished fabric is used primarily for topi caps and shawls"], funFact: "The Dhaka topi is so central to Nepali identity that government officials are expected to wear one at all formal occasions."},
        { name: "Lokta Paper Making", image: '', state: "Nepal", region: "Baglung", lat: 28.2719, lng: 83.5908, type: "Home Decor", materials: ["Plant Fiber"], description: "Handmade paper crafted from the bark of the Daphne plant, used for centuries for religious texts, government documents, and artisanal crafts.", era: "Ancient", steps: ["Inner bark of the Daphne bush is stripped and soaked","The bark is boiled into a pulp in large vats","Pulp is spread on muslin-covered frames to form sheets","The sheets are sun-dried on the mountainside"], funFact: "Lokta paper is naturally insect-resistant, which is why ancient Nepali manuscripts written on it have survived for centuries."},
        { name: "Bhutanese Textile Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Rock_picture_of_Padmasambhava%2C_north_of_Thimphu.jpg/960px-Rock_picture_of_Padmasambhava%2C_north_of_Thimphu.jpg', state: "Bhutan", region: "Thimphu", lat: 27.4728, lng: 89.639, type: "Clothing", materials: ["Silk","Cotton","Wool","Natural Dye"], description: "Complex hand-woven textiles in brilliant colors, including the kushuthara and mentsi, used for the national dress and as ceremonial gifts.", era: "Ancient", steps: ["Raw silk, cotton, or yak wool is hand-dyed","Warp threads are set up on a traditional backstrap loom","Supplementary weft patterns are picked up thread by thread","The finished cloth is used for kira or gho garments"], funFact: "In Bhutan, everyone from the king to farmers wears the national dress woven from these traditional textiles at formal occasions."},
        { name: "Bhutanese Wood Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Tashich%C3%B6dzong_Thimphu-2008-01-23.jpg/960px-Tashich%C3%B6dzong_Thimphu-2008-01-23.jpg', state: "Bhutan", region: "Trashiyangtse", lat: 27.6125, lng: 91.4933, type: "Furniture", materials: ["Wood","Natural Dye"], description: "Elaborate architectural and decorative woodcarving adorning dzongs, monasteries, and houses, featuring dragons, lotus flowers, and cloud motifs.", era: "Ancient", steps: ["Timber is selected from local forests and seasoned","Traditional Buddhist motifs are sketched onto the wood surface","Carvers use chisels and gouges to create deep-relief patterns","The finished carving is painted in polychrome or left natural"], funFact: "Bhutan\'s institute of traditional arts, called Zorig Chusum, teaches thirteen traditional crafts including woodcarving as national heritage."},
        { name: "Aboriginal Bark Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Australie_Aborigene_ancetre_totemique_kangourou.jpg/960px-Australie_Aborigene_ancetre_totemique_kangourou.jpg', state: "Australia", region: "Arnhem Land, Northern Territory", lat: -12.2855, lng: 133.3909, type: "Home Decor", materials: ["Wood","Natural Dye"], description: "Paintings on eucalyptus bark using earth pigments, depicting Dreamtime stories, ancestral beings, and the x-ray style unique to Aboriginal art.", era: "Ancient", steps: ["Bark is carefully stripped from a stringybark eucalyptus tree","The bark is flattened under weights and dried","Earth pigments in red, yellow, white, and black are ground and mixed","Images are painted with brushes made from human hair or plant fiber"], funFact: "Aboriginal bark paintings represent the oldest continuous art tradition on Earth, with roots stretching back over 60,000 years."},
        { name: "Aboriginal Dot Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Bradshaw_rock_paintings.jpg/960px-Bradshaw_rock_paintings.jpg', state: "Australia", region: "Papunya, Northern Territory", lat: -23.2167, lng: 131.8833, type: "Home Decor", materials: ["Natural Dye"], description: "Intricate compositions of overlapping dots that encode sacred Dreamtime knowledge, originally painted on the body and ground before transferring to canvas.", era: "Ancient", steps: ["The surface is prepared with a base color ground","Sacred knowledge is encoded into a composition of symbols and paths","Thousands of small dots are applied using sticks or brushes","Layers of dots build up to conceal sacred elements from the uninitiated"], funFact: "Dot painting was partly developed to deliberately obscure sacred knowledge from outsiders while still recording it for initiated viewers."},
        { name: "Māori Tā Moko Carving", image: '', state: "New Zealand", region: "Rotorua", lat: -38.1368, lng: 176.2497, type: "Sculpture", materials: ["Wood","Stone","Bone"], description: "Intricate curvilinear woodcarving of the Māori, featuring spiraling koru, manaia, and tiki forms that adorn meeting houses and canoe prows.", era: "Ancient", steps: ["Totara or kauri timber is selected and prepared","Designs are marked out based on traditional koru spiral patterns","The wood is carved using greenstone or metal chisels","The finished carving is sometimes painted with red ochre"], funFact: "Every carved meeting house (wharenui) represents the body of an ancestor, with the ridgepole as the spine and the rafters as ribs."},
        { name: "Māori Greenstone Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/1/1f/Pounamu_pendant.jpg', state: "New Zealand", region: "Hokitika, West Coast", lat: -42.7164, lng: 170.9679, type: "Jewelry", materials: ["Stone"], description: "Pendants and ornaments carved from pounamu (nephrite jade), treasured as taonga and believed to acquire the mana of each wearer across generations.", era: "Ancient", steps: ["Pounamu boulders are sourced from river beds on the West Coast","The stone is cut into rough blanks using abrasive sand","Forms like the hei-tiki, koru, and mere are shaped by grinding","The surface is polished to a luminous green finish"], funFact: "The South Island of New Zealand is called Te Wai Pounamu, meaning \'the waters of greenstone,\' honoring its jade deposits."},
        { name: "Tongan Ngatu (Tapa Cloth)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Wedding_Tapa_%28Gatu_Vakaviti%29_LACMA_M.2010.160.jpg/960px-Wedding_Tapa_%28Gatu_Vakaviti%29_LACMA_M.2010.160.jpg', state: "Tonga", region: "Nukuʻalofa", lat: -21.2088, lng: -175.1982, type: "Clothing", materials: ["Plant Fiber","Natural Dye"], description: "Bark cloth beaten from the inner bark of the mulberry tree and decorated with geometric designs, used as ceremonial gifts and wrapping.", era: "Ancient", steps: ["Inner bark of the paper mulberry is stripped and soaked","Strips are beaten with a wooden mallet until thin and wide","Pieces are felted together into large sheets","Geometric designs are stamped or painted using natural dyes"], funFact: "A single ngatu can be over 100 meters long and is produced communally by entire villages for royal ceremonies."},
        { name: "Samoan Siapo", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Wedding_Tapa_%28Gatu_Vakaviti%29_LACMA_M.2010.160.jpg/960px-Wedding_Tapa_%28Gatu_Vakaviti%29_LACMA_M.2010.160.jpg', state: "Samoa", region: "Apia", lat: -13.8333, lng: -171.75, type: "Clothing", materials: ["Plant Fiber","Natural Dye"], description: "Samoan bark cloth decorated with bold freehand designs using natural brown and black dyes from candlenut soot and tree bark extracts.", era: "Ancient", steps: ["Mulberry bark is stripped, scraped, and soaked","The bark is beaten flat with a wooden mallet on an anvil log","Sheets are joined and rubbed over a carved tablet to transfer the design","Freehand details are painted using natural brown and black dyes"], funFact: "Siapo making is traditionally women\'s work, and the most skilled makers are honored with the title tufuga."},
        { name: "Fijian Masi Cloth", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Wedding_Tapa_%28Gatu_Vakaviti%29_LACMA_M.2010.160.jpg/960px-Wedding_Tapa_%28Gatu_Vakaviti%29_LACMA_M.2010.160.jpg', state: "Fiji", region: "Suva", lat: -18.1416, lng: 178.4419, type: "Clothing", materials: ["Plant Fiber","Natural Dye"], description: "Bark cloth decorated with bold stenciled and freehand designs in black and rust, used for ceremonial garments, room dividers, and funeral wrappings.", era: "Ancient", steps: ["Paper mulberry bark is stripped and beaten into sheets","Sheets are felted together to create larger pieces","Stencils cut from leaves are used to apply black mangrove dye","Additional designs are painted freehand with red clay and charcoal"], funFact: "In Fijian culture, presenting masi cloth is an essential protocol in ceremonies ranging from weddings to chiefly installations."},
        { name: "Hawaiian Featherwork", image: 'https://upload.wikimedia.org/wikipedia/commons/b/b9/Haalelea%27s_Feather_Cape.png', state: "United States", region: "Honolulu, Hawaii", lat: 21.3069, lng: -157.8583, type: "Clothing", materials: ["Plant Fiber","Natural Dye"], description: "Royal cloaks and helmets covered with thousands of tiny feathers from native birds, creating luminous mantles of red and yellow reserved for Hawaiian chiefs.", era: "Ancient", steps: ["Feathers from native birds are gathered by specialized bird catchers","The tiny feathers are sorted by color and size","Feathers are tied in small bundles and attached to an olonā fiber net","Rows of bundles are layered to create a dense, velvety surface"], funFact: "A single royal feather cloak could require the feathers of up to 80,000 birds and take several generations to complete."},
