        { name: "Nishijin-ori", image: 'https://upload.wikimedia.org/wikipedia/commons/2/22/Fukuro_obi.JPG', state: "Japan", region: "Kyoto", lat: 35.0394, lng: 135.748, type: "Clothing", materials: ["Silk","Gold","Silver"], description: "Luxurious brocade silk woven in the Nishijin district of Kyoto, used for obi sashes and kimono with intricate patterns in gold and silver thread.", era: "5th Century", steps: ["Silk and metallic threads are prepared and wound onto bobbins","A complex pattern is programmed onto a Jacquard loom","The brocade is woven with multiple shuttle passes for each row","The finished fabric is steamed and inspected for quality"], funFact: "Nishijin weavers adopted the Jacquard loom from France but use it to produce patterns far more complex than European brocades."},
        { name: "Arita Ware", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Dish_with_Design_of_River%2C_Weirs%2C_and_Maple_Leaves_LACMA_M.2007.175.jpg/960px-Dish_with_Design_of_River%2C_Weirs%2C_and_Maple_Leaves_LACMA_M.2007.175.jpg', state: "Japan", region: "Arita, Saga", lat: 33.1958, lng: 129.8636, type: "Pottery", materials: ["Clay","Natural Dye","Gold"], description: "The first porcelain produced in Japan, featuring refined blue-and-white underglaze and vibrant overglaze enamel designs that captivated Europe.", era: "17th Century", steps: ["Local porcelain stone is ground and mixed into a fine clay body","Pieces are formed on wheels or in molds","Cobalt blue designs are painted under a transparent glaze","Overglaze enamels in red, green, and gold are applied and re-fired"], funFact: "Korean potter Yi Sam-pyeong discovered the porcelain stone that launched Arita\'s industry after being brought to Japan during Hideyoshi\'s invasions."},
        { name: "Chinese Snuff Bottle Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Snuff_bottle_%28AM_1934.317-6%29.jpg/960px-Snuff_bottle_%28AM_1934.317-6%29.jpg', state: "China", region: "Beijing", lat: 39.9042, lng: 116.4074, type: "Home Decor", materials: ["Glass","Natural Dye"], description: "Miniature reverse-painted glass bottles where artists paint intricate scenes on the inside surface using a tiny curved brush inserted through the narrow neck.", era: "18th Century", steps: ["A glass or crystal bottle is blown or carved into shape","The interior surface is frosted to accept paint","A tiny bent brush is inserted through the neck to paint in reverse","Multiple layers of pigment build up the detailed scene from front to back"], funFact: "Inside-painting masters must paint the image backwards and upside down, working with a brush only millimeters wide."},
        { name: "Chinese Shadow Puppetry", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Ki_Sigit_Ariyanto_Dalang_Wayang_Kulit.jpg/960px-Ki_Sigit_Ariyanto_Dalang_Wayang_Kulit.jpg', state: "China", region: "Xi\'an, Shaanxi", lat: 34.2658, lng: 108.9541, type: "Sculpture", materials: ["Leather","Natural Dye"], description: "Translucent leather puppets intricately carved and painted, manipulated behind a lit screen to perform stories from Chinese opera and folklore.", era: "Han Dynasty", steps: ["Donkey or buffalo hide is scraped thin until translucent","Intricate designs of figures and props are carved with fine knives","The pieces are painted with translucent dyes for color","Jointed limbs are attached with thread and control rods are fitted"], funFact: "Chinese shadow puppetry is believed to have originated when an emperor\'s grief-stricken shaman projected a silhouette to summon a dead concubine\'s spirit."},
        { name: "Korean Onggi Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/4/43/Onggi_in_1781.JPG', state: "South Korea", region: "Ulju, Ulsan", lat: 35.5134, lng: 129.0401, type: "Kitchenware", materials: ["Clay"], description: "Breathable fermentation crocks essential to Korean cuisine, whose micro-porous walls allow kimchi, doenjang, and gochujang to age to perfection.", era: "Ancient", steps: ["Coarse clay is mixed and prepared","Large vessels are built by coiling and paddling","A natural ash glaze is applied by dipping or pouring","The pot is fired in a climbing kiln to develop its porous structure"], funFact: "Onggi\'s micro-porous walls allow just enough air exchange for fermentation, making them irreplaceable in traditional Korean kitchens."},
        { name: "Turkish Calligraphy", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Folios_1b-2a_from_Part_15_of_a_30-part_Qur%E2%80%99an_copied_by_Ya%27qut_al-Musta%27simi_in_Baghdad_1282-1283_AD_%28681_AH%29_%28cropped%29.jpg/960px-Folios_1b-2a_from_Part_15_of_a_30-part_Qur%E2%80%99an_copied_by_Ya%27qut_al-Musta%27simi_in_Baghdad_1282-1283_AD_%28681_AH%29_%28cropped%29.jpg', state: "Turkey", region: "Istanbul", lat: 41.0082, lng: 28.9784, type: "Home Decor", materials: ["Paper","Gold","Natural Dye"], description: "Ottoman Islamic calligraphy executed with a reed pen on handmade paper, transforming Arabic script into a flowing visual art of extraordinary grace.", era: "7th Century", steps: ["A reed pen is carefully cut and shaped to the desired nib width","Handmade paper is burnished smooth to prevent ink bleeding","Carbon-based ink is mixed with gum arabic","The calligrapher executes each letter following strict proportional rules"], funFact: "Ottoman calligraphers measured every letter proportion against the rhomboid dot made by the pen nib, achieving mathematical perfection."},
        { name: "Turkish Copper Craft", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/0_Le_dinandier_Guy_Clabots_-_Leffe_%281%29.JPG/960px-0_Le_dinandier_Guy_Clabots_-_Leffe_%281%29.JPG', state: "Turkey", region: "Gaziantep", lat: 37.0662, lng: 37.3833, type: "Kitchenware", materials: ["Copper"], description: "Hand-hammered copper vessels for cooking and serving, tinned on the interior and often engraved with ornate Ottoman-style decorative patterns.", era: "Ancient", steps: ["Copper sheet is cut and hammered over an anvil into the desired form","The vessel is raised through repeated heating and hammering","Decorative patterns are engraved or chased into the surface","The interior is coated with molten tin for food safety"], funFact: "In Gaziantep\'s copper bazaar, you can still hear the rhythmic hammering of coppersmiths, a sound unchanged for centuries."},
        { name: "Persian Qalamkar (Block Printing)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Ghalamkar3.jpg/960px-Ghalamkar3.jpg', state: "Iran", region: "Isfahan", lat: 32.6546, lng: 51.668, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Hand block-printed cotton textiles featuring intricate paisley and floral designs, traditionally used as tablecloths, curtains, and prayer spreads.", era: "Ancient", steps: ["Cotton fabric is washed, bleached, and mordanted","Carved wooden blocks are dipped in natural dyes","The blocks are carefully pressed onto the fabric in sequence","The printed cloth is washed and sun-dried to fix the colors"], funFact: "European imitations of Isfahan\'s qalamkar prints led to the development of calico printing, revolutionizing the Western textile industry."},
        { name: "Turkmen Carpet Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Afghancarpet1.jpg/960px-Afghancarpet1.jpg', state: "Turkmenistan", region: "Ashgabat", lat: 37.9601, lng: 58.3261, type: "Home Decor", materials: ["Wool","Silk","Natural Dye"], description: "Dense, wine-red hand-knotted rugs featuring tribal gul medallions, so central to Turkmen identity that a carpet pattern appears on the national flag.", era: "Ancient", steps: ["Wool is hand-spun and dyed with madder and other natural dyes","A horizontal ground loom is set up with cotton warp","The asymmetric knot is used to create dense, fine pile","The finished carpet is sheared and washed to set the colors"], funFact: "Turkmenistan is the only country in the world with a carpet pattern on its national flag, reflecting the craft\'s cultural importance."},
        { name: "Kyrgyz Shyrdak Felt Rug", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Shyrdak_on_floor.jpg/960px-Shyrdak_on_floor.jpg', state: "Kyrgyzstan", region: "Naryn", lat: 41.4287, lng: 76.0017, type: "Home Decor", materials: ["Wool","Natural Dye"], description: "Vibrant mosaic felted rugs made by cutting and stitching together contrasting colored felt pieces in interlocking horn and wave patterns.", era: "Ancient", steps: ["Sheep wool is washed, dyed, and wetted for felting","Wool is laid out in layers and rolled in a reed mat","The felt is kneaded and rolled for hours to compress the fibers","Two colors of felt are cut in mirror-image patterns and stitched together"], funFact: "Shyrdak rugs are essential furnishings for Kyrgyz yurts and traditionally made by women as part of a bride\'s dowry."},
        { name: "Kazakh Felt Carpet (Tekmet)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Colored_felt_cloth.jpg/960px-Colored_felt_cloth.jpg', state: "Kazakhstan", region: "Almaty", lat: 43.222, lng: 76.8512, type: "Home Decor", materials: ["Wool","Natural Dye"], description: "Pressed and rolled felt carpets decorated with bold curvilinear ram\'s horn and floral motifs, the foundation of nomadic yurt interiors for millennia.", era: "Ancient", steps: ["Sheep wool is sorted, washed, and dyed in vibrant colors","Dyed wool is laid out in decorative patterns on a reed mat","The layers are wetted, rolled, and kneaded until felted together","The felted carpet is trimmed and sometimes embellished with embroidery"], funFact: "The oldest known felt artifacts come from the Pazyryk tombs of Central Asia, showing that nomadic feltmaking predates weaving."},
        { name: "Kakiemon Porcelain", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Hexagonal_Jar%2C_Imari_ware%2C_Kakiemon_type%2C_Edo_period%2C_17th_century%2C_flowering_plant_and_phoenix_design_in_overglaze_enamel_-_Tokyo_National_Museum_-_DSC05329_%28retouched%29.jpg/960px-thumbnail.jpg', state: "Japan", region: "Arita, Saga", lat: 33.1958, lng: 129.8636, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Elegant porcelain distinguished by its milky-white body and asymmetrical designs of flowers, birds, and figures in delicate overglaze enamels.", era: "17th Century", steps: ["A refined white porcelain body is shaped and bisque-fired","The iconic milky-white nigoshide glaze is applied","Sparse, asymmetrical designs are painted in overglaze enamels","A final firing fixes the enamel decoration to the surface"], funFact: "Kakiemon\'s \'milky white\' nigoshide body was a closely guarded family secret that took European potters a century to imitate."},
        { name: "Kumihimo Braiding", image: 'https://upload.wikimedia.org/wikipedia/commons/5/5f/Kumihimo_5_b.jpg', state: "Japan", region: "Iga, Mie", lat: 34.7667, lng: 136.1286, type: "Clothing", materials: ["Silk","Gold"], description: "Precision silk braiding on a round or square stand, traditionally used to lace samurai armor and tie the obi of formal kimono.", era: "Ancient", steps: ["Silk threads are dyed and wound onto weighted bobbins","Bobbins are arranged on a marudai braiding stand","Threads are moved in a precise sequence to create the braid pattern","The finished cord is pressed flat and cut to length"], funFact: "A single kumihimo braid can use up to 144 individual silk strands, each manipulated in a precise mathematical sequence."},
        { name: "Kyoto Bamboo Craft", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Bamboo_basket%2C_Japanese.jpg/960px-Bamboo_basket%2C_Japanese.jpg', state: "Japan", region: "Kyoto", lat: 35.0116, lng: 135.7681, type: "Home Decor", materials: ["Bamboo"], description: "Refined bamboo weaving and carving for tea ceremony utensils, flower baskets, and architectural screens, exploiting the flexibility and beauty of Japanese bamboo.", era: "Ancient", steps: ["Mature bamboo is harvested and dried for several years","The culm is split into thin strips using specialized knives","Strips are woven, plaited, or bent into the desired form","The surface is treated with lacquer or left natural"], funFact: "Japan has over 600 species of bamboo, and Kyoto craftsmen select specific varieties for different objects based on grain and flexibility."},
        { name: "Chinese Dough Figurine", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/%E5%A4%A9%E6%B4%A5%E5%A4%A9%E9%99%85%E7%BA%BF202511.jpg/960px-%E5%A4%A9%E6%B4%A5%E5%A4%A9%E9%99%85%E7%BA%BF202511.jpg', state: "China", region: "Shandong", lat: 36.6683, lng: 116.9972, type: "Toys", materials: ["Clay","Natural Dye"], description: "Miniature sculptures modeled from colored flour dough, depicting opera characters, mythological figures, and animals with extraordinary liveliness.", era: "Han Dynasty", steps: ["Glutinous rice flour is mixed with pigments to create colored dough","Small pieces are shaped by hand with simple tools","Details like facial features and garments are added","The finished figurine is dried and sometimes sealed"], funFact: "Street vendors in China can sculpt a detailed dough figurine in minutes using just their thumbs and a bamboo tool."},
        { name: "Shan Paper Umbrella", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Myoma_Ward_%28Downtown%29%2C_Myanmar_%28Burma%29_-_panoramio.jpg/960px-Myoma_Ward_%28Downtown%29%2C_Myanmar_%28Burma%29_-_panoramio.jpg', state: "Myanmar", region: "Pindaya, Shan State", lat: 20.9333, lng: 96.6667, type: "Home Decor", materials: ["Paper","Bamboo","Natural Dye"], description: "Hand-painted paper parasols with bamboo frames, used as sunshades and ceremonial objects, each painted with flowers, birds, or traditional motifs.", era: "Ancient", steps: ["A bamboo frame and ribs are cut and assembled","Handmade mulberry paper is glued over the frame","Designs are painted freehand in vivid colors","A protective coating of sesame oil is applied"], funFact: "In Myanmar tradition, a white umbrella is a symbol of royalty and spiritual authority, reserved for monks and kings."},
        { name: "Thai Nielloware (Kruang Tom)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Devotional_Diptych_with_the_Nativity_and_the_Adoration_MET_DP157894_%28cropped%29.jpg/960px-Devotional_Diptych_with_the_Nativity_and_the_Adoration_MET_DP157894_%28cropped%29.jpg', state: "Thailand", region: "Bangkok", lat: 13.7563, lng: 100.5018, type: "Kitchenware", materials: ["Gold","Silver"], description: "Exquisite gold and silver vessels with black niello inlay depicting scenes from Thai mythology and royal court life.", era: "14th Century", steps: ["Gold or silver sheet is hammered into vessel form","Scenes from Thai mythology are engraved into the metal","Niello compound fills the engraved lines","The piece is heated, polished, and buffed to contrasting brilliance"], funFact: "Thai kruang tom was traditionally commissioned by royalty and given as diplomatic gifts to foreign heads of state."},
        { name: "Indonesian Silver Filigree", image: 'https://upload.wikimedia.org/wikipedia/commons/7/75/Portuguese_filigree_intricate_work.jpg', state: "Indonesia", region: "Kotagede, Yogyakarta", lat: -7.825, lng: 110.4, type: "Jewelry", materials: ["Silver"], description: "Delicate ornamental work made from twisted silver wire, shaped into intricate floral and geometric patterns that appear impossibly light and airy.", era: "16th Century", steps: ["Silver is drawn into very fine wire","The wire is twisted and coiled into tiny scrolls and shapes","Elements are soldered together to build up the design","The finished piece is polished or oxidized for contrast"], funFact: "Kotagede was once the capital of the Mataram Sultanate, and its silver tradition dates back to the kingdom\'s founding."},
        { name: "Vietnamese Dong Ho Woodblock Print", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/%C4%90%C3%A1m_c%C6%B0%E1%BB%9Bi_chu%E1%BB%99t.JPG/960px-%C4%90%C3%A1m_c%C6%B0%E1%BB%9Bi_chu%E1%BB%99t.JPG', state: "Vietnam", region: "Dong Ho, Bac Ninh", lat: 21.1264, lng: 106.071, type: "Home Decor", materials: ["Wood","Paper","Natural Dye"], description: "Folk woodblock prints on do paper featuring satirical, festive, and symbolic scenes, traditionally pasted on walls for the Tet New Year celebration.", era: "Ancient", steps: ["Designs are carved into wooden blocks using chisels","Natural dyes from plants and minerals are prepared","Handmade do paper is pressed onto inked blocks by hand","Multiple blocks apply different colors to build the full image"], funFact: "Dong Ho village once had over 100 families making prints, but today only a handful of workshops preserve this tradition."},
        { name: "Iban Pua Kumbu Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Flag_of_Iban.svg/960px-Flag_of_Iban.svg.png', state: "Malaysia", region: "Sarawak, Borneo", lat: 2.2949, lng: 111.855, type: "Clothing", materials: ["Cotton","Natural Dye"], description: "Sacred ritual textiles woven by Iban women using the warp ikat technique, featuring bold anthropomorphic and zoomorphic designs charged with spiritual power.", era: "Ancient", steps: ["Cotton thread is prepared and the warp is tied for ikat resist dyeing","Threads are dipped in natural dye baths of engkudu root","The dyed warp is set up on a backstrap loom","The sacred patterns are woven and the cloth is used in rituals"], funFact: "Weaving a pua kumbu was considered as spiritually dangerous as headhunting, and women who mastered it held equal status to warriors."},
        { name: "Okinawan Bingata", image: 'https://upload.wikimedia.org/wikipedia/commons/0/0a/Bingata.jpg', state: "Japan", region: "Naha, Okinawa", lat: 26.3344, lng: 127.767, type: "Clothing", materials: ["Silk","Cotton","Natural Dye"], description: "Vivid stencil-dyed textiles from the Ryukyu Kingdom, featuring tropical flowers, birds, and water motifs in a palette far bolder than mainland Japanese dyes.", era: "14th Century", steps: ["A design is cut into mulberry paper stencils reinforced with silk thread","The stencil is placed on silk or cotton and rice paste resist is applied","Natural pigments are brushed into the open areas of the stencil","The resist is washed away to reveal crisp, colorful patterns"], funFact: "Bingata reflects Okinawa\'s position between Japan, China, and Southeast Asia, blending influences from all three into a unique textile art."},
        { name: "Washi Paper Making", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Washi%28Sugihara_paper%29.JPG/960px-Washi%28Sugihara_paper%29.JPG', state: "Japan", region: "Echizen, Fukui", lat: 35.9067, lng: 136.1688, type: "Home Decor", materials: ["Plant Fiber"], description: "Handmade paper from kozo, mitsumata, and gampi fibers, so strong and versatile it is used for shoji screens, calligraphy, and even clothing.", era: "7th Century", steps: ["Plant bark is harvested, stripped, and cooked in alkali","The softened fibers are beaten and suspended in water","A bamboo screen is used to scoop and shake the fiber slurry","The wet sheet is pressed and dried on wooden boards"], funFact: "Washi is so durable that 1,000-year-old Buddhist sutras written on it remain legible, outlasting most modern papers."},
        { name: "Venetian Lace", image: 'https://upload.wikimedia.org/wikipedia/commons/e/ec/Verknipte_kantstrook.JPG', state: "Italy", region: "Burano, Venice", lat: 45.4853, lng: 12.4167, type: "Clothing", materials: ["Cotton","Silk"], description: "Needle lace of extraordinary delicacy made on the tiny island of Burano, where each stitch is worked with a single needle and thread.", era: "16th Century", steps: ["A pattern is drawn on parchment and tacked to a fabric base","A single needle and thread are used to build up the design stitch by stitch","The background mesh is worked after the main motifs are complete","The finished lace is carefully detached from the parchment"], funFact: "At its peak, Burano lace was so costly that wearing it was restricted by sumptuary laws across Europe."},
        { name: "Pietra Dura", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Cathedral_Virgin_Mary-7.jpg/960px-Cathedral_Virgin_Mary-7.jpg', state: "Italy", region: "Florence, Tuscany", lat: 43.7696, lng: 11.2558, type: "Home Decor", materials: ["Stone","Gold"], description: "Inlay of precisely cut semiprecious stones—lapis lazuli, malachite, jasper, and agate—fitted together like a jigsaw to create floral and figurative images.", era: "16th Century", steps: ["Thin slabs of semiprecious stone are cut with a bow saw","Each piece is shaped to fit its neighbors with hairline precision","The stone pieces are set into a marble or slate ground","The surface is polished flat to create a seamless image"], funFact: "The Medici grand dukes founded a dedicated workshop for pietra dura in 1588 that still operates in Florence today."},
        { name: "Provençal Santons", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Santon_mara%C3%AEcher.jpg/960px-Santon_mara%C3%AEcher.jpg', state: "France", region: "Marseille, Provence", lat: 43.2965, lng: 5.3698, type: "Sculpture", materials: ["Clay","Natural Dye"], description: "Small painted clay figurines depicting Provençal village characters, originally created for Christmas nativity scenes during the French Revolution.", era: "18th Century", steps: ["Clay is pressed into plaster molds to form the figurine","The molded figure is removed, refined, and air-dried","The figure is kiln-fired to harden the clay","Each santon is hand-painted with acrylic pigments and dressed in fabric"], funFact: "Santons were invented when the Revolution closed churches, so Provence families created their own miniature nativity scenes at home."},
        { name: "Belgian Lace", image: 'https://upload.wikimedia.org/wikipedia/commons/2/26/Mgr_Danneels_Mgr_Vangheluwe.JPG', state: "Belgium", region: "Bruges", lat: 51.2093, lng: 3.2247, type: "Clothing", materials: ["Cotton","Silk"], description: "Fine bobbin lace from Bruges and Brussels, worked on a cushion with dozens of bobbins to produce intricate floral and scroll patterns.", era: "16th Century", steps: ["A pattern on card is pinned to a lace pillow","Dozens of bobbins wound with fine linen thread are arranged","Threads are twisted and crossed around pins to build the pattern","The completed lace is removed from the pillow and finished"], funFact: "At its height, the Flemish lace industry employed more women than any other trade in the Low Countries."},
        { name: "German Cuckoo Clock", image: 'https://upload.wikimedia.org/wikipedia/commons/f/fc/Du200613.png', state: "Germany", region: "Black Forest, Baden-Württemberg", lat: 48.0905, lng: 8.2378, type: "Furniture", materials: ["Wood","Iron","Brass"], description: "Intricately carved wooden clocks with mechanical bird automata, a tradition born in the snow-bound winters of the Black Forest region.", era: "17th Century", steps: ["The clock case is carved from linden wood in traditional chalet style","A mechanical movement with chains and weights is assembled","The cuckoo bird mechanism and bellows are installed","The case is stained, painted, and fitted with carved forest motifs"], funFact: "Black Forest clockmakers invented the cuckoo clock during long winters when heavy snow prevented them from farming."},
        { name: "Erzgebirge Woodcraft", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Nussknacker_Dekorative_Figur_aus_Holz_mit_Bergmann_Vorlage_Berghabit_Bergmannshabit_Cheap_Asian_wooden_nutcracker_puppet_traditional_Saxon_miner%E2%80%99s_outfit.jpg/960px-Nussknacker_Dekorative_Figur_aus_Holz_mit_Bergmann_Vorlage_Berghabit_Bergmannshabit_Cheap_Asian_wooden_nutcracker_puppet_traditional_Saxon_miner%E2%80%99s_outfit.jpg', state: "Germany", region: "Seiffen, Saxony", lat: 50.6431, lng: 13.4547, type: "Toys", materials: ["Wood","Natural Dye"], description: "Miniature carved and turned wooden Christmas decorations, including nutcrackers, smoking men, and pyramid candle carousels from the Ore Mountains.", era: "17th Century", steps: ["Wood is turned on a lathe into rings or basic shapes","Thin slices are cut from turned rings to produce multiple figures at once","Each figure is hand-assembled, carved, and painted","Finished pieces are lacquered and packaged for the Christmas market"], funFact: "Seiffen\'s miniature industry began when tin mines failed, and miners turned their technical precision to woodcraft."},
        { name: "Sicilian Cart Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Carrettino_Siciliano.jpg/960px-Carrettino_Siciliano.jpg', state: "Italy", region: "Palermo, Sicily", lat: 38.1157, lng: 13.3615, type: "Home Decor", materials: ["Wood","Natural Dye","Iron"], description: "Brilliantly painted and carved donkey carts depicting scenes from Charlemagne\'s paladins and Sicilian folk tales, rolling works of art in motion.", era: "18th Century", steps: ["The cart body and wheels are built from hardwood","Iron fittings are forged and decorated with relief carving","Panels are painted with narrative scenes from chivalric romances","The entire cart is varnished for weather protection"], funFact: "Each Sicilian cart is painted with scenes from medieval romances, turning an ordinary vehicle into a traveling storybook."},
        { name: "Scottish Tartan Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Three_tartans.jpg/960px-Three_tartans.jpg', state: "United Kingdom", region: "Edinburgh, Scotland", lat: 55.9533, lng: -3.1883, type: "Clothing", materials: ["Wool","Natural Dye"], description: "The iconic checked textile of Scotland, where each clan\'s registered pattern of intersecting colored stripes serves as a woven badge of identity.", era: "16th Century", steps: ["Wool yarn is dyed in the clan's specific tartan colors","Warp threads are arranged on a loom in the precise color sequence","The same sequence is woven as weft to create the check pattern","The finished cloth is fulled and pressed to set the weave"], funFact: "After the Jacobite uprising of 1745, wearing tartan was banned by the British government for nearly forty years."},
        { name: "Staffordshire Pottery Figures", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Staffordshire_figures_-_Winterthur_Museum_-_DSC01474_%28cropped%29.JPG/960px-Staffordshire_figures_-_Winterthur_Museum_-_DSC01474_%28cropped%29.JPG', state: "United Kingdom", region: "Stoke-on-Trent, Staffordshire", lat: 53.0027, lng: -2.1794, type: "Sculpture", materials: ["Clay","Natural Dye"], description: "Charming flat-backed ceramic figurines depicting royals, celebrities, and pastoral scenes, mass-produced for Victorian mantelpieces across Britain.", era: "18th Century", steps: ["Earthenware clay is pressed into two-part plaster molds","The hollow halves are joined and the flat back is left open","After bisque firing, the figures are painted in bright enamels","A clear overglaze is applied and the piece is fired again"], funFact: "Staffordshire figures were the popular culture merchandise of the Victorian era, depicting everyone from Queen Victoria to infamous criminals."},
        { name: "Blue Willow Pattern", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/A_blue_and_white_plate_with_Willow_pattern.jpg/960px-A_blue_and_white_plate_with_Willow_pattern.jpg', state: "United Kingdom", region: "Stoke-on-Trent, Staffordshire", lat: 53.0027, lng: -2.1794, type: "Pottery", materials: ["Clay","Natural Dye"], description: "The world\'s most produced decorative pattern, a blue chinoiserie scene of pagodas, bridges, and love birds that became synonymous with English pottery.", era: "18th Century", steps: ["A copper engraving of the willow pattern is prepared","The design is transfer-printed onto tissue paper with cobalt blue","The tissue is pressed onto the bisque-fired earthenware","A clear glaze is applied and the piece is glost-fired"], funFact: "Despite its Chinese aesthetic, the Willow Pattern was invented in England, complete with a fabricated Chinese love story to sell it."},
        { name: "Faroese Knitting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Faroese_Shawl.jpg/960px-Faroese_Shawl.jpg', state: "Faroe Islands", region: "Tórshavn", lat: 62.0079, lng: -6.7906, type: "Clothing", materials: ["Wool"], description: "Traditional knitted shawls with a distinctive center-back shaping and lace patterns, worked from the neck down in local sheep wool.", era: "17th Century", steps: ["Local Faroese sheep wool is hand-spun","Knitting begins at the neck with a central back gusset shaping","Lace patterns are worked into the body of the shawl","The shawl is blocked and shaped for wear"], funFact: "The unique center-back gusset construction of Faroese shawls exists nowhere else in the world\'s knitting traditions."},
        { name: "Azulejo Tile", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Azulejos_Parque_Eduardo_VII-2.jpg/960px-Azulejos_Parque_Eduardo_VII-2.jpg', state: "Portugal", region: "Lisbon", lat: 38.7223, lng: -9.1393, type: "Home Decor", materials: ["Clay","Natural Dye"], description: "Painted ceramic tiles covering the facades, churches, and train stations of Portugal in sweeping scenes of blue and white or vibrant polychrome.", era: "15th Century", steps: ["Earthenware tiles are shaped, dried, and bisque-fired","A white tin-oxide glaze provides the painting surface","Designs are hand-painted in cobalt blue or multiple colors","Tiles are glazed and fired, then assembled into panels for installation"], funFact: "Portugal\'s azulejo tradition was inspired by Moorish tilework, but the Portuguese covered entire building facades, a scale unique in the world."},
        { name: "Ukrainian Pysanka", image: 'https://upload.wikimedia.org/wikipedia/commons/2/2b/Unfinished_pysanka.jpg', state: "Ukraine", region: "Ivano-Frankivsk Oblast", lat: 48.9226, lng: 24.7111, type: "Home Decor", materials: ["Wax","Natural Dye"], description: "Wax-resist decorated Easter eggs with intricate symbolic patterns, an ancient practice believed to protect the household and ward off evil.", era: "Ancient", steps: ["A raw egg is cleaned and warmed","Beeswax is applied with a kistka stylus in precise linear patterns","The egg is dipped in successive dye baths from light to dark","Wax is melted off with a candle flame to reveal the multicolored design"], funFact: "An ancient Ukrainian legend holds that as long as pysanky are made each spring, an evil serpent chained to a cliff will remain bound."},
        { name: "Russian Birch Bark Craft", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Betula_pendula_001.jpg/960px-Betula_pendula_001.jpg', state: "Russia", region: "Veliky Ustyug, Vologda Oblast", lat: 60.7552, lng: 46.2658, type: "Kitchenware", materials: ["Wood"], description: "Containers, boxes, and household items fashioned from birch bark, often decorated with elaborate carved and embossed patterns of leaves and berries.", era: "Ancient", steps: ["Birch bark is carefully peeled from trees in early summer","The bark is soaked, cleaned, and cut into pieces","Designs are carved, stamped, or embossed into the bark","Pieces are assembled into boxes and containers without glue or nails"], funFact: "Medieval Russians wrote daily letters and documents on birch bark, hundreds of which have been preserved in the soil of Novgorod."},
        { name: "Georgian Cloisonné Enamel", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Pectoral_and_Necklace_of_Sithathoryunet_with_the_Name_of_Senwosret_II_MET_16.1.3_front_detail.jpg/960px-Pectoral_and_Necklace_of_Sithathoryunet_with_the_Name_of_Senwosret_II_MET_16.1.3_front_detail.jpg', state: "Georgia", region: "Tbilisi", lat: 41.7151, lng: 44.8271, type: "Jewelry", materials: ["Gold","Glass"], description: "Byzantine-tradition cloisonné enamel icons and jewelry from Georgia, where gold wire cells are filled with jewel-toned vitreous enamel.", era: "8th Century", steps: ["Thin gold wire is bent into the outlines of the design","The wire cloisons are soldered onto a gold base plate","Powdered glass enamel is packed into each cell","The piece is fired repeatedly and polished between firings"], funFact: "Georgia\'s medieval cloisonné enamels are considered some of the finest ever produced, rivaling those of Constantinople itself."},
        { name: "Armenian Khachkar Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Khatchkar_at_Goshavank_Monastery_in_Armenia.jpg/960px-Khatchkar_at_Goshavank_Monastery_in_Armenia.jpg', state: "Armenia", region: "Yerevan", lat: 40.1792, lng: 44.4991, type: "Sculpture", materials: ["Stone"], description: "Intricately carved stone cross-slabs featuring lace-like interlace patterns around a central cross, each one unique among the thousands that dot the Armenian landscape.", era: "9th Century", steps: ["A flat stone slab is quarried and rough-shaped","A central cross design with surrounding interlace is sketched","The pattern is carved in shallow relief using chisels","Fine details are incised and the surface is sometimes painted"], funFact: "No two khachkars among the tens of thousands carved over the centuries are exactly alike."},
        { name: "Aleppo Soap", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Savon_d%27Alep.JPG/960px-Savon_d%27Alep.JPG', state: "Syria", region: "Aleppo", lat: 36.2021, lng: 37.1343, type: "Home Decor", materials: ["Plant Fiber"], description: "The world\'s oldest soap, made from olive oil and laurel berry oil using a hot-process method unchanged for thousands of years in the souks of Aleppo.", era: "Ancient", steps: ["Olive oil is cooked with lye in large vats for several days","Laurel berry oil is added in the final stages","The liquid soap is poured onto waxed paper and cut into blocks","The blocks are stacked in towers and aged for six to nine months"], funFact: "Aleppo soap is considered the ancestor of all hard soaps, and Crusaders brought the recipe back to Europe in the 12th century."},
        { name: "Damascus Steel Forging", image: 'https://upload.wikimedia.org/wikipedia/commons/2/2c/Watered_pattern_on_sword_blade1.Iran.JPG', state: "Syria", region: "Damascus", lat: 33.5138, lng: 36.2765, type: "Kitchenware", materials: ["Iron"], description: "Legendary pattern-welded steel blades once forged in Damascus, famous for their distinctive wavy watermark pattern and razor-sharp cutting edge.", era: "Ancient", steps: ["Wootz steel ingots are heated in a forge","The steel is folded and forge-welded multiple times to create layers","The blade is hammered into shape and the edge is ground","An acid etch reveals the characteristic wavy damascus pattern"], funFact: "The original technique for making true Damascus steel was lost around the 18th century and has never been fully recovered."},
        { name: "Mexican Huichol Beadwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Huichol_Trabajando.JPG/960px-Huichol_Trabajando.JPG', state: "Mexico", region: "Sierra Madre Occidental, Nayarit", lat: 22.0867, lng: -104.8943, type: "Sculpture", materials: ["Glass","Wax","Wood"], description: "Psychedelic beaded art by the Wixáritari people, where tiny glass beads are pressed into beeswax-coated wooden forms to depict peyote visions and sacred deer.", era: "Ancient", steps: ["A wooden form is carved into the desired shape","The surface is coated with a layer of beeswax and pine resin","Tiny glass seed beads are pressed into the wax one by one","The entire surface is covered in intricate symbolic patterns"], funFact: "Huichol bead art depicts visions from peyote ceremonies, making each piece a spiritual map of the artist\'s sacred journey."},
        { name: "Peruvian Gourd Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Lagenaria_siceraria_-_Mates_Burilados_Carved_Gourds_-_Cusco%2C_Per%C3%BA.jpg/960px-Lagenaria_siceraria_-_Mates_Burilados_Carved_Gourds_-_Cusco%2C_Per%C3%BA.jpg', state: "Peru", region: "Huancayo, Junín", lat: -12.0651, lng: -75.2049, type: "Home Decor", materials: ["Plant Fiber"], description: "Intricately carved and burned dried gourds depicting scenes of Andean daily life, festivals, and landscapes in extraordinary detail.", era: "Ancient", steps: ["Dried bottle gourds are cleaned and the surface is prepared","Scenes are sketched onto the gourd's surface","Designs are carved and burned using heated tools","Natural dyes are sometimes rubbed into the carved areas for contrast"], funFact: "Carved gourds found at archaeological sites in Peru predate pottery by thousands of years, making them one of the oldest art forms in the Americas."},
        { name: "Ecuadorian Panama Hat", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Panama_hat.jpg/960px-Panama_hat.jpg', state: "Ecuador", region: "Montecristi, Manabí", lat: -1.0447, lng: -80.6619, type: "Clothing", materials: ["Plant Fiber"], description: "The world\'s finest straw hats, woven from toquilla palm fiber so finely that the best specimens can hold water and be rolled to fit through a ring.", era: "17th Century", steps: ["Young toquilla palm shoots are harvested and split into fine fibers","The fibers are boiled, dried, and bleached in sulfur","Weavers work by moonlight or in shade to keep the fibers supple","The finished hat is shaped on a wooden block and trimmed"], funFact: "Despite the name, Panama hats come from Ecuador; they got their misleading name because they were sold in Panama during the Gold Rush."},
        { name: "Spanish Damascene", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Eibar_2.jpg/960px-Eibar_2.jpg', state: "Spain", region: "Eibar, Basque Country", lat: 43.1847, lng: -2.4727, type: "Jewelry", materials: ["Iron","Gold","Silver"], description: "Fine gold and silver inlay on iron, practiced by Basque metalworkers to decorate firearms, jewelry, and decorative objects with scrolling arabesque designs.", era: "16th Century", steps: ["An iron surface is scored with fine crosshatch grooves","Gold or silver wire is tapped into the grooves with a small hammer","The piece is heated and burnished to set the inlay","The iron is blued or blackened for contrast with the precious metal"], funFact: "Eibar was Spain\'s historic arms-making capital, and its damascene artisans originally decorated the finest Spanish firearms."},
        { name: "Chinese Bamboo Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Basket_Weaver_in_Japan_%281915_by_Elstner_Hilton%29.jpg/960px-Basket_Weaver_in_Japan_%281915_by_Elstner_Hilton%29.jpg', state: "China", region: "Chengdu, Sichuan", lat: 30.5728, lng: 104.0668, type: "Home Decor", materials: ["Bamboo"], description: "Ultra-fine bamboo strips woven into baskets, fans, and decorative panels, including the remarkable technique of weaving bamboo over porcelain vessels.", era: "Ancient", steps: ["Bamboo is split into strips as thin as thread","Strips are scraped, polished, and sometimes dyed","The fine strips are woven into intricate patterns over a form","The woven piece is trimmed and sealed with lacquer or oil"], funFact: "Sichuan craftsmen can weave bamboo strips so fine over porcelain that the two materials appear to be one seamless object."},
        { name: "Oaxacan Black Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Barro_Negro_y_normal-San_Bartolo_Coyotepec-Oaxaca-Mexico.jpg/960px-Barro_Negro_y_normal-San_Bartolo_Coyotepec-Oaxaca-Mexico.jpg', state: "Mexico", region: "San Bartolo Coyotepec, Oaxaca", lat: 16.9483, lng: -96.7667, type: "Pottery", materials: ["Clay"], description: "Lustrous jet-black pottery achieved by reduction firing in an underground pit, a technique perfected by Zapotec potters over millennia.", era: "Ancient", steps: ["Local grey clay is hand-shaped on a turntable","The surface is burnished to a mirror-like sheen with a quartz stone","Pieces are fired in a pit kiln sealed to reduce oxygen","The carbon-rich atmosphere turns the clay a gleaming black"], funFact: "Doña Rosa of Coyotepec is credited with rediscovering the ancient reduction technique that gives the pottery its distinctive black sheen."},
        { name: "Haida Argillite Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Flag_of_Haida_Gwaii.svg/960px-Flag_of_Haida_Gwaii.svg.png', state: "Canada", region: "Haida Gwaii, British Columbia", lat: 53.2527, lng: -132.0738, type: "Sculpture", materials: ["Stone"], description: "Intricate carvings in black argillite stone, a material found only on Haida Gwaii and reserved exclusively for Haida artists by tradition and law.", era: "Ancient", steps: ["Black argillite is quarried from Slatechuck Mountain","The soft stone is rough-shaped with files and rasps","Detailed figures and totem designs are carved with precision","The surface is polished to a silky matte or semi-gloss finish"], funFact: "Slatechuck Mountain on Haida Gwaii is the only known source of carving-grade argillite in the world."},
        { name: "Embera-Wounaan Basket", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Flag_of_Panama.svg/960px-Flag_of_Panama.svg.png', state: "Panama", region: "Darién Province", lat: 8.4133, lng: -77.8436, type: "Home Decor", materials: ["Plant Fiber","Natural Dye"], description: "Extraordinarily tight-woven baskets made from chunga palm and nahuala plant fibers, featuring geometric animal designs so precise they appear printed.", era: "Ancient", steps: ["Chunga palm fiber is harvested and split into thin strips","Strips are dyed black, red, and brown using natural plant dyes","The basket is coiled from the center outward in a tight spiral","Geometric animal patterns are woven in as the basket grows"], funFact: "The finest Embera baskets take four to six months to weave and are watertight enough to carry liquids."},
        { name: "Chinese Duan Inkstone", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/East_Asian_calligraphy_scheme_01-en.svg/960px-East_Asian_calligraphy_scheme_01-en.svg.png', state: "China", region: "Zhaoqing, Guangdong", lat: 23.0476, lng: 112.4609, type: "Home Decor", materials: ["Stone"], description: "Carved stone inkstones from Zhaoqing, treasured by Chinese calligraphers for their fine grain that produces a smooth, rich ink with minimal effort.", era: "Ancient", steps: ["Duan stone is quarried from specific mountain caves","The stone is rough-cut into inkstone blanks","Decorative carvings of dragons, clouds, or landscapes are sculpted","A smooth ink-grinding surface is carefully prepared and polished"], funFact: "Duan inkstones were so valued by Chinese scholars that the finest specimens were worth more than the paintings made with their ink."},
        { name: "Aran Knitting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Aran_cardigan.jpg/960px-Aran_cardigan.jpg', state: "Ireland", region: "Aran Islands", lat: 53.1246, lng: -9.7082, type: "Clothing", materials: ["Wool"], description: "Heavily cabled and textured knitting from the windswept Aran Islands, where complex stitch patterns were developed to create thick, water-resistant sweaters.", era: "19th Century", steps: ["Natural cream-colored wool is hand-spun, retaining its lanolin","Complex cable, diamond, and honeycomb stitch patterns are planned","The sweater is knitted on straight needles in separate pieces","The pieces are seamed together and the sweater is lightly blocked"], funFact: "The popular myth that each Aran family had a unique pattern to identify drowned fishermen is romantic fiction, but the sweaters are gloriously real."},
        { name: "Fez Embroidery", image: '', state: "Morocco", region: "Fez", lat: 34.0331, lng: -5.0003, type: "Clothing", materials: ["Cotton","Silk","Natural Dye"], description: "Reversible cross-stitch embroidery from Fez, worked so perfectly that both sides of the cloth are identical and can be displayed interchangeably.", era: "12th Century", steps: ["Fine linen or cotton fabric is stretched on a frame","A geometric design is counted and marked on the fabric","Cross-stitches are worked with such precision that the reverse is identical","The finished cloth is pressed and used as cushion covers or tablecloths"], funFact: "Master embroiderers in Fez can produce work that is perfectly reversible, with no visible knots or carried threads on either side."},
        { name: "Wayuu Chinchorro Hammock", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Panteera_Wayuu_Aumentado.png/960px-Panteera_Wayuu_Aumentado.png', state: "Colombia", region: "La Guajira Peninsula", lat: 11.6, lng: -72.2, type: "Furniture", materials: ["Cotton","Plant Fiber"], description: "Large, elaborately woven hammocks by the Wayuu people, requiring months of work and serving as the primary bed, seat, and social space in desert communities.", era: "Ancient", steps: ["Cotton or maguey fiber is hand-spun and dyed","The hammock body is woven on a large frame using crochet technique","Decorative fringes and tassels are added to the edges","The completed hammock is fitted with hanging cords"], funFact: "A Wayuu chinchorro is so culturally important that it serves as a form of currency for bride price payments."},
        { name: "Shipibo-Conibo Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Distribution_of_Indigenous_Peoples_in_the_Americas.svg/960px-Distribution_of_Indigenous_Peoples_in_the_Americas.svg.png', state: "Peru", region: "Ucayali River, Loreto", lat: -8.3791, lng: -74.554, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Amazonian pottery painted with labyrinthine geometric designs that Shipibo women describe as visual representations of cosmic songs and ayahuasca visions.", era: "Ancient", steps: ["River clay is gathered, cleaned, and hand-coiled into vessel forms","The surface is smoothed and polished with a river stone","Intricate geometric patterns are painted using natural pigments","The pot is fired in an open fire and sealed with tree resin"], funFact: "Shipibo women say their intricate geometric patterns represent the songs of the universe, making each pot a visual form of music."},
        { name: "Lacquerware of Bagan", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/%D0%9C%D1%83%D0%B7%D0%B5%D0%B9_%D0%B0%D0%B7%D1%96%D0%B9%D1%81%D1%8C%D0%BA%D0%BE%D0%B3%D0%BE_%D0%BC%D0%B8%D1%81%D1%82%D0%B5%D1%86%D1%82%D0%B2%D0%B09.jpg/960px-%D0%9C%D1%83%D0%B7%D0%B5%D0%B9_%D0%B0%D0%B7%D1%96%D0%B9%D1%81%D1%8C%D0%BA%D0%BE%D0%B3%D0%BE_%D0%BC%D0%B8%D1%81%D1%82%D0%B5%D1%86%D1%82%D0%B2%D0%B09.jpg', state: "Myanmar", region: "Bagan", lat: 21.1717, lng: 94.8585, type: "Kitchenware", materials: ["Bamboo","Lac","Natural Dye"], description: "Everyday lacquer vessels and betel boxes in Bagan\'s distinctive yun technique, where designs are engraved into the lacquer and filled with contrasting colors.", era: "11th Century", steps: ["A bamboo and horsehair frame is coiled and shaped","Numerous coats of black lacquer are applied and dried between layers","Designs are engraved with a sharp stylus through the lacquer","Colored lacquer is rubbed into the engraved lines and the surface is polished"], funFact: "Bagan artisans produce some pieces so thin and flexible they can be deformed by squeezing and spring back to their original shape."},
        { name: "Philippine Wood Carving (Ifugao)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Ifugao_sculpture_Louvre_70-1999-4-1.jpg/960px-Ifugao_sculpture_Louvre_70-1999-4-1.jpg', state: "Philippines", region: "Ifugao Province, Cordillera", lat: 16.8341, lng: 121.171, type: "Sculpture", materials: ["Wood"], description: "Carved wooden bulul rice guardian figures of the Ifugao people, placed in granaries to ensure bountiful harvests and protect the stored rice.", era: "Ancient", steps: ["A hardwood log is selected from sacred tree species","The seated figure form is roughed out with an adze","Facial features and ritual details are refined with chisels","The figure is consecrated through a ritual ceremony before placement in the granary"], funFact: "Bulul figures are believed to gain spiritual power through repeated anointings with animal blood during harvest ceremonies."},
        { name: "Ghanaian Brass Weights", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Ashanti_goldweights.JPG/960px-Ashanti_goldweights.JPG', state: "Ghana", region: "Kumasi, Ashanti", lat: 6.6885, lng: -1.6244, type: "Sculpture", materials: ["Brass","Bronze"], description: "Miniature brass figurines originally used as counterweights for measuring gold dust, each one a tiny sculptural proverb depicting animals, tools, or scenes of daily life.", era: "14th Century", steps: ["A wax model of the desired form is sculpted","The wax is encased in clay to create a mold","Molten brass is poured in using the lost-wax technique","The cooled weight is cleaned and calibrated for accuracy"], funFact: "Each brass weight illustrates a specific Akan proverb, making a merchant\'s weight collection a library of folk wisdom."},
        { name: "Japanese Tsuba Forging", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/WLA_haa_Sword_by_Kenji_Nobuhide_Kurihara_MOD.jpg/960px-WLA_haa_Sword_by_Kenji_Nobuhide_Kurihara_MOD.jpg', state: "Japan", region: "Kyoto", lat: 35.0116, lng: 135.7681, type: "Sculpture", materials: ["Iron","Gold","Silver","Copper"], description: "Intricately decorated sword guards combining iron forging with precious metal inlay, depicting nature scenes, mythology, and geometric designs.", era: "15th Century", steps: ["An iron disc is forged and shaped to fit a specific sword","The surface is pierced, carved, or hammered into decorative forms","Gold, silver, and copper are inlaid using nunome-zogan technique","The piece is patinated and polished to enhance the contrast"], funFact: "After samurai were forbidden to carry swords in 1876, tsuba makers pivoted to creating elaborate decorative pieces for collectors."},
        { name: "Welsh Lovespoon", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Patrick-damiaens-1323207754.jpg/960px-Patrick-damiaens-1323207754.jpg', state: "United Kingdom", region: "Wales", lat: 52.1307, lng: -3.7837, type: "Furniture", materials: ["Wood"], description: "Elaborately carved single-piece wooden spoons given as tokens of love, where each symbolic element—hearts, chains, wheels—carries a romantic meaning.", era: "17th Century", steps: ["A single block of sycamore or lime wood is selected","The spoon bowl and handle are rough-carved","Decorative symbols like hearts, chains, and keys are carved from the solid piece","The spoon is sanded and oiled to a smooth finish"], funFact: "The oldest known Welsh lovespoon dates to 1667 and is kept in the National Museum of Wales in Cardiff."},
        { name: "Hmong Story Cloth", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Hmong_women_at_Coc_Ly_market%2C_Sapa%2C_Vietnam.jpg/960px-Hmong_women_at_Coc_Ly_market%2C_Sapa%2C_Vietnam.jpg', state: "Laos", region: "Luang Namtha", lat: 20.95, lng: 101.4167, type: "Home Decor", materials: ["Cotton","Silk","Natural Dye"], description: "Embroidered and appliquéd narrative textiles depicting Hmong history, migration stories, and daily village life in vivid pictorial scenes.", era: "Ancient", steps: ["Cotton or hemp fabric is prepared as the base","Scenes from Hmong life and history are sketched in thread","Cross-stitch and appliqué techniques build up the narrative imagery","Borders of traditional geometric patterns frame the central story"], funFact: "Hmong story cloths became a way to preserve oral history after the community was displaced by war in the 1970s."},
        { name: "Tiffany-style Stained Glass", image: '', state: "United States", region: "New York City", lat: 40.7484, lng: -73.9967, type: "Home Decor", materials: ["Glass","Copper","Lead"], description: "Opalescent art glass assembled using copper foil technique rather than traditional lead came, allowing three-dimensional lamp shades and nature-inspired designs.", era: "19th Century", steps: ["Sheets of opalescent art glass are selected for color and texture","Glass pieces are cut to shape using a pattern template","Each piece is wrapped in copper foil tape at its edges","Pieces are soldered together along the foil seams"], funFact: "Louis Comfort Tiffany developed his opalescent glass specifically because he disliked the painted glass of European stained glass windows."},
        { name: "Ndebele House Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Ndebele_Architecture.jpg/960px-Ndebele_Architecture.jpg', state: "South Africa", region: "Mpumalanga", lat: -25.4653, lng: 30.9857, type: "Home Decor", materials: ["Natural Dye","Clay"], description: "Bold geometric murals painted by Ndebele women on the facades of their homes using earth pigments and now commercial paints in vivid primary colors.", era: "18th Century", steps: ["The mud-plastered wall surface is smoothed and prepared","A design of bold geometric shapes is outlined in charcoal","Areas are painted with earth pigments or commercial paints","Black outlines are applied last to define and sharpen the design"], funFact: "Ndebele house painting became an act of cultural resistance during apartheid, asserting ethnic identity through art visible for miles."},
        { name: "Sardinian Textile Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Sea_silk_glove_lo-res.JPG/960px-Sea_silk_glove_lo-res.JPG', state: "Italy", region: "Sarule, Sardinia", lat: 40.2274, lng: 9.1608, type: "Clothing", materials: ["Wool","Cotton","Natural Dye"], description: "Ancient hand-loom weaving traditions producing carpets, blankets, and saddlebags with bold geometric motifs reflecting Sardinia\'s pre-Roman cultural roots.", era: "Ancient", steps: ["Local sheep wool is hand-spun and dyed with plant dyes","A vertical or horizontal loom is warped with cotton or wool","Geometric patterns are woven using supplementary weft techniques","The finished textile is washed and fulled to set the weave"], funFact: "Some Sardinian weaving patterns are nearly identical to Bronze Age designs found on the island\'s nuraghe stone towers."},
        { name: "Uzbek Ceramic Painting", image: '', state: "Uzbekistan", region: "Rishtan, Fergana Valley", lat: 40.3533, lng: 71.2733, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Blue-and-white glazed ceramics from the Fergana Valley featuring swirling floral and geometric ishkor patterns painted with cobalt and turquoise glazes.", era: "Ancient", steps: ["Local clay is shaped on a potter's wheel","A white slip is applied as a painting ground","Cobalt blue designs of pomegranates, flowers, and knives are painted","An ishkor glaze of plant ash is applied and the piece is kiln-fired"], funFact: "Rishtan ceramics use an alkaline glaze made from a specific desert plant ash called ishkor, giving them their distinctive turquoise sheen."},
        { name: "Uzbek Silk Ikat", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Ikat_designed_Uzbek_traditional_silk_fabric.jpg/960px-Ikat_designed_Uzbek_traditional_silk_fabric.jpg', state: "Uzbekistan", region: "Margilan, Fergana Valley", lat: 40.4692, lng: 71.725, type: "Clothing", materials: ["Silk","Natural Dye"], description: "Dazzling warp-ikat silk fabrics with bold, blurred-edge patterns in electric colors, once worn as robes of honor in the courts of Central Asian khans.", era: "Ancient", steps: ["Silk threads are reeled and stretched on a frame","Sections of the warp are tied with wax-coated thread for resist","The bound warp is dipped in multiple dye baths","The dyed warp is woven on a narrow loom to reveal the ikat pattern"], funFact: "In Central Asian courts, silk ikat robes called chapans were given as diplomatic gifts, and owning many was a sign of great prestige."},
        { name: "Ethiopian Shema Cloth", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Knesset_Menorah_Shema_Inscription.jpg/960px-Knesset_Menorah_Shema_Inscription.jpg', state: "Ethiopia", region: "Dorze, Southern Ethiopia", lat: 6.19, lng: 37.5739, type: "Clothing", materials: ["Cotton"], description: "Hand-woven white cotton cloth with colored woven borders, the foundation garment of Ethiopian traditional dress worn as a shawl or wrap.", era: "Ancient", steps: ["Cotton is hand-spun into fine thread on a spindle","A cotton warp is set up on a traditional pit loom","The body is woven in plain white with decorative colored borders","The finished cloth is washed, starched, and folded for use"], funFact: "The Dorze people of southern Ethiopia are renowned master weavers, and nearly every household in their community operates a loom."},
        { name: "Congolese Kuba Cloth", image: 'https://upload.wikimedia.org/wikipedia/commons/6/6c/COLLECTIE_TROPENMUSEUM_Een_Bakuba_vrouw_met_scarificaties_op_haar_buik_borduurt_een_mat_Congo_TMnr_60033932.jpg', state: "Democratic Republic of the Congo", region: "Kasai Province", lat: -4.3333, lng: 21.75, type: "Clothing", materials: ["Plant Fiber","Natural Dye"], description: "Richly textured raffia textiles of the Kuba kingdom, where men weave the base cloth and women embellish it with cut-pile embroidery and appliqué.", era: "17th Century", steps: ["Young raffia palm leaves are stripped and softened","Men weave the base cloth on a single-heddle loom","Women embroider geometric patterns using cut-pile technique","Appliqué patches and dyed sections add further complexity"], funFact: "Kuba textiles so captivated Henri Matisse that he kept a collection in his studio and credited them with influencing his art."},
        { name: "Swazi Candle Making", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Flag_of_Eswatini.svg/960px-Flag_of_Eswatini.svg.png', state: "Eswatini", region: "Malkerns Valley", lat: -26.5667, lng: 31.1667, type: "Home Decor", materials: ["Wax","Natural Dye"], description: "Vibrantly colored paraffin wax candles hand-rolled and sculpted into the shapes of African wildlife, flowers, and geometric patterns.", era: "Ancient", steps: ["Colored paraffin wax is melted and poured into thin sheets","The sheets are hand-cut into decorative shapes","Shapes are rolled and layered around a central wick","Final details are sculpted and the surface is smoothed"], funFact: "Swazi candles grew from a small women\'s cooperative into one of Eswatini\'s most recognized craft exports."},
        { name: "Sámi Duodji", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Kuksa_2006_09_09.JPG/960px-Kuksa_2006_09_09.JPG', state: "Norway", region: "Kautokeino, Troms og Finnmark", lat: 69.01, lng: 23.04, type: "Clothing", materials: ["Leather","Bone","Wool","Silver"], description: "Traditional Sámi handicraft encompassing reindeer leather garments, antler carvings, and pewter thread embroidery, all essential to Arctic nomadic life.", era: "Ancient", steps: ["Reindeer hides are tanned using traditional smoke and fat methods","Leather is cut and sewn into garments using sinew thread","Pewter wire is braided and embroidered onto leather accessories","Antler and bone are carved into knife handles and jewelry"], funFact: "Sámi pewter embroidery uses a technique of braiding thin tin wire on leather that exists nowhere else in the world."},
        { name: "Thai Celadon", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Song_Dynasty_Celadon_Vase.jpg/960px-Song_Dynasty_Celadon_Vase.jpg', state: "Thailand", region: "Chiang Mai", lat: 18.7883, lng: 98.9853, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Crackle-glazed celadon ceramics from northern Thailand, where the distinctive jade-green glaze and its web of fine cracks are prized as decorative features.", era: "13th Century", steps: ["Local clay is shaped into vessels on a potter's wheel","A celadon glaze made from wood ash and feldspar is applied","The piece is fired in a reduction kiln at high temperature","Controlled cooling creates the signature crackle pattern in the glaze"], funFact: "Chiang Mai celadon was originally produced at the Sawankhalok kilns, which exported ceramics across Southeast Asia and to Japan."},
        { name: "Croatian Licitarsko Srce", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Licitar_hearts.jpg/960px-Licitar_hearts.jpg', state: "Croatia", region: "Zagreb", lat: 45.815, lng: 15.9819, type: "Home Decor", materials: ["Clay","Natural Dye"], description: "Bright red heart-shaped gingerbread cookies decorated with white icing and tiny mirrors, given as tokens of love at Croatian fairs for centuries.", era: "16th Century", steps: ["A honey dough is mixed, rolled, and cut into heart shapes","The hearts are baked until firm","Bright red icing is applied as a base coat","White icing decorations and a small mirror are added"], funFact: "The licitar heart is such an iconic Croatian symbol that it was inscribed on UNESCO\'s Intangible Cultural Heritage list."},
        { name: "Tongan Bone Carving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Hey_matey_001.jpg/960px-Hey_matey_001.jpg', state: "Tonga", region: "Nukuʻalofa", lat: -21.2088, lng: -175.1982, type: "Jewelry", materials: ["Bone"], description: "Ornamental carvings fashioned from whale bone and cattle bone, depicting traditional Polynesian motifs like fishhooks, turtles, and ancestral figures.", era: "Ancient", steps: ["Whale bone or cattle bone is cut into workable pieces","The rough form is shaped with files and saws","Fine details are carved with precision tools","The piece is sanded and polished to a smooth, ivory-like finish"], funFact: "The Polynesian bone fishhook pendant symbolizes prosperity and safe ocean passage, and is worn across the Pacific Islands."},
        { name: "Tingatinga Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Punda_Milia_Baba_na_Mama.jpg/960px-Punda_Milia_Baba_na_Mama.jpg', state: "Tanzania", region: "Dar es Salaam", lat: -6.7924, lng: 39.2083, type: "Home Decor", materials: ["Natural Dye","Wood"], description: "Vivid folk paintings of African wildlife in bold, flat colors on recycled hardboard, named after their founder Edward Said Tingatinga.", era: "19th Century", steps: ["A piece of hardboard or canvas is prepared with a base coat","Bold outlines of animals or nature scenes are sketched","Flat areas of vibrant color are filled in with enamel paint","Fine details and patterns are added with small brushes"], funFact: "Tingatinga paintings began when their founder used leftover house paint on ceiling board, creating an entirely new African art genre."},
        { name: "Pakistani Truck Art", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Pakistani_truck.jpg/960px-Pakistani_truck.jpg', state: "Pakistan", region: "Rawalpindi, Punjab", lat: 33.5961, lng: 73.0479, type: "Home Decor", materials: ["Wood","Natural Dye","Iron"], description: "Extravagant hand-painted decorations covering Pakistani trucks from bumper to bumper, featuring floral patterns, calligraphy, and provincial landscapes.", era: "Ancient", steps: ["The truck body is prepared with a metal or wooden surface","Base coats of bright paint are applied","Detailed motifs of flowers, birds, and landscapes are painted freehand","Reflective tape, metal ornaments, and calligraphy complete the decoration"], funFact: "Pakistani truck art has become a globally recognized folk art form, exhibited in galleries from London to New York."},
        { name: "Persian Kilim Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/1/18/Hotamis_Kilim.jpg', state: "Iran", region: "Shiraz, Fars Province", lat: 29.5918, lng: 52.5837, type: "Home Decor", materials: ["Wool","Cotton","Natural Dye"], description: "Flat-woven tapestry rugs without pile, featuring bold tribal geometric designs that are reversible and lighter than knotted carpets.", era: "Ancient", steps: ["Wool is hand-spun and dyed with natural dyes","A cotton warp is set up on a horizontal ground loom","Colored weft threads are interlocked to build the flat-woven design","The finished kilim is cut from the loom and fringed"], funFact: "Persian kilims are fully reversible, with both sides displaying the same pattern—unlike knotted carpets which have a distinct back."},
        { name: "Finnish Puukko Knife", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Damascus_Bowie.jpg/960px-Damascus_Bowie.jpg', state: "Finland", region: "Kauhava, South Ostrobothnia", lat: 63.1, lng: 23.0667, type: "Kitchenware", materials: ["Iron","Wood","Leather","Brass"], description: "The iconic Finnish belt knife with a simple clip-point blade, curly birch handle, and leather sheath, a daily companion in Nordic wilderness life.", era: "Ancient", steps: ["Carbon steel is forged and ground into a clip-point blade","A handle of curly birch is shaped and fitted to the tang","Brass bolsters are added between blade and handle","A leather sheath is stitched and fitted for belt carry"], funFact: "In Finland, a puukko is considered such an essential tool that it was historically given to children as a coming-of-age gift."},
        { name: "Ghanaian Fantasy Coffin", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Kane_Kwei_Carpentry_Workshop.jpg/960px-Kane_Kwei_Carpentry_Workshop.jpg', state: "Ghana", region: "Teshie, Greater Accra", lat: 5.5793, lng: -0.105, type: "Sculpture", materials: ["Wood","Natural Dye"], description: "Elaborate figurative coffins carved in the shape of objects representing the deceased\'s life—an airplane for a traveler, a fish for a fisherman, a cocoa pod for a farmer.", era: "19th Century", steps: ["The desired form is discussed with the family of the deceased","A wooden frame is built and carved into the chosen shape","The form is sanded, sealed, and painted in vivid colors","Interior padding is added for the burial"], funFact: "Fantasy coffins from Teshie have been exhibited at major art museums worldwide, blurring the line between folk art and fine art."},
        { name: "Egyptian Khayamiya (Tentmaker Appliqué)", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Tent_maker_in_Elkhiyamia_street_in_2017%2C_photo_by_Hatem_Moushir_2.jpg/960px-Tent_maker_in_Elkhiyamia_street_in_2017%2C_photo_by_Hatem_Moushir_2.jpg', state: "Egypt", region: "Cairo", lat: 30.0444, lng: 31.2357, type: "Home Decor", materials: ["Cotton","Natural Dye"], description: "Vibrant appliqué textile art created by tentmakers in Cairo\'s Street of the Tentmakers, featuring geometric arabesque and calligraphic designs.", era: "Ancient", steps: ["Colorful cotton fabric is cut into design elements","Pieces are layered and pinned onto a ground fabric","Each piece is sewn down with tiny invisible stitches","The completed panel is pressed and hung as a decorative textile"], funFact: "Cairo\'s Street of the Tentmakers is the last remaining covered medieval market street in the city, entirely dedicated to this craft."},
        { name: "Nepali Singing Bowl", image: 'https://upload.wikimedia.org/wikipedia/commons/1/1d/Chinesezither.jpg', state: "Nepal", region: "Kathmandu Valley", lat: 27.7172, lng: 85.324, type: "Ritual", materials: ["Bronze","Copper","Iron","Silver","Gold"], description: "Hand-hammered metal bowls that produce rich, sustained tones when struck or rubbed with a mallet, used in meditation and healing rituals.", era: "Ancient", steps: ["An alloy of multiple metals is melted and cast into a flat disc","The disc is heated and hammered into a bowl shape by several smiths","The bowl is annealed and refined to tune its resonance","The surface is polished and sometimes engraved with mantras"], funFact: "Traditional singing bowls are said to contain seven metals corresponding to the seven classical planets known in ancient astrology."},
        { name: "Chinese Knotting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Chinese_knot.JPG/960px-Chinese_knot.JPG', state: "China", region: "Beijing", lat: 39.9042, lng: 116.4074, type: "Home Decor", materials: ["Silk"], description: "Symmetrical decorative knots tied from a single cord without cutting, each traditional knot pattern carrying auspicious symbolic meaning.", era: "Ancient", steps: ["A single length of silk cord is selected in an auspicious color","The cord is looped and interlaced following traditional knot patterns","Multiple knots are combined into complex compositions","Tassels and jade pendants are attached as finishing elements"], funFact: "Chinese knots are tied from a single cord with no cutting, symbolizing the continuity of life and eternal connection."},
        { name: "Berber Carpet Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Swatches_of_berber_carpet.jpg/960px-Swatches_of_berber_carpet.jpg', state: "Morocco", region: "High Atlas Mountains", lat: 31.5, lng: -7, type: "Home Decor", materials: ["Wool","Natural Dye"], description: "Hand-knotted and flat-woven rugs by Amazigh women of the Atlas Mountains, where abstract diamond, zigzag, and cross motifs encode feminine fertility symbols.", era: "Ancient", steps: ["Sheep wool is hand-spun and dyed with natural dyes","A vertical loom is set up in the home","The rug is knotted or flat-woven with geometric tribal patterns","The finished rug is cut from the loom and the pile is trimmed"], funFact: "Each Berber tribe has distinctive rug patterns, and experts can identify a rug\'s origin by its specific combination of symbols."},
        { name: "Japanese Katana Forging", image: 'https://upload.wikimedia.org/wikipedia/commons/a/aa/Katana_%28common_shema%29.png', state: "Japan", region: "Seki, Gifu", lat: 35.4834, lng: 136.9178, type: "Sculpture", materials: ["Iron"], description: "The art of forging samurai swords from tamahagane steel, folded thousands of times to create a blade that is simultaneously hard-edged and flexible-bodied.", era: "12th Century", steps: ["Tamahagane steel is smelted from iron sand in a tatara furnace","The steel is repeatedly folded and forge-welded to remove impurities","A harder edge steel and softer spine steel are combined in one blade","The blade is coated with clay, heated, and quenched to create the curved shape and hamon line"], funFact: "A traditional Japanese sword takes a swordsmith several months to forge, but the polisher\'s work can take even longer."},
        { name: "Hmong Silver Jewelry", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Hmongdiaspora.svg/960px-Hmongdiaspora.svg.png', state: "Vietnam", region: "Sapa, Lào Cai", lat: 22.3363, lng: 103.844, type: "Jewelry", materials: ["Silver"], description: "Heavy, ornate silver necklaces, bracelets, and earrings made by Hmong silversmiths, where a family\'s entire wealth may be worn as body adornment.", era: "Ancient", steps: ["Silver coins or ingots are melted in a charcoal forge","The molten silver is hammered into wire, sheet, or cast into forms","Intricate filigree and granulation details are added","The piece is polished and fitted for wear"], funFact: "Hmong women traditionally wore their family\'s entire savings in silver jewelry, serving as both adornment and portable bank vault."},
        { name: "Russian Zhostovo Tray Painting", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/K35A3683.jpg/960px-K35A3683.jpg', state: "Russia", region: "Zhostovo, Moscow Oblast", lat: 56.1072, lng: 37.5089, type: "Home Decor", materials: ["Iron","Natural Dye","Lac"], description: "Lacquered metal trays painted with lush bouquets of flowers floating on a jet-black background, a village tradition passed from master to apprentice.", era: "19th Century", steps: ["A stamped metal tray is primed and lacquered black","A loose floral composition is sketched in light paint","Layers of translucent oil paint build up luminous flower petals","Fine details, highlights, and a gold border are added before final lacquering"], funFact: "Every Zhostovo tray is painted freehand without stencils, making each one a unique original work of folk art."},
        { name: "Mexican Papel Picado", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Papel_picado_by_timlewisnm.jpg/960px-Papel_picado_by_timlewisnm.jpg', state: "Mexico", region: "San Salvador Huixcolotla, Puebla", lat: 18.9, lng: -97.7167, type: "Home Decor", materials: ["Paper"], description: "Festive perforated paper banners cut from stacked tissue paper using chisels, strung across streets and altars during Día de los Muertos and other celebrations.", era: "Ancient", steps: ["Up to fifty sheets of colored tissue paper are stacked","A design template is placed on top of the stack","Small chisels and punches are hammered through all layers at once","The individual cut sheets are strung on thread to create banners"], funFact: "Artisans in Huixcolotla can cut through fifty sheets of tissue paper at once, producing fifty identical banners with a single set of chisel strikes."},
        { name: "Vietnamese Water Puppet", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Thang_Long_Water_Puppet_Theatre2.JPG/960px-Thang_Long_Water_Puppet_Theatre2.JPG', state: "Vietnam", region: "Hanoi", lat: 21.0278, lng: 105.8342, type: "Toys", materials: ["Wood","Natural Dye","Lac"], description: "Lacquered wooden puppets that perform on a flooded stage, controlled by hidden puppeteers standing waist-deep in water behind a bamboo screen.", era: "11th Century", steps: ["Fig wood is carved into puppet figures and props","The wood is sealed with multiple coats of lacquer for waterproofing","Puppets are painted in bright colors with lacquer-based pigments","Underwater bamboo rod mechanisms are attached for control"], funFact: "Water puppetry was born in the flooded rice paddies of the Red River Delta, where farmers performed puppet shows during seasonal floods."},
        { name: "Rajasthani Blue Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Thar_Khuri.jpg/960px-Thar_Khuri.jpg', state: "Pakistan", region: "Hala, Sindh", lat: 25.8212, lng: 68.4219, type: "Pottery", materials: ["Clay","Natural Dye"], description: "Turquoise-glazed pottery made from a unique quartz-based paste rather than clay, decorated with Persian-influenced floral and geometric motifs.", era: "Ancient", steps: ["A paste of quartz stone, glass, and gum is mixed","The paste is shaped on a wheel into tiles and vessels","Cobalt and copper-based designs are painted on the surface","The piece is fired at low temperature to develop its signature glaze"], funFact: "Hala\'s blue pottery tradition arrived via Persian and Central Asian craftsmen who traveled the Silk Road."},
        { name: "Moroccan Caftan Embroidery", image: 'https://upload.wikimedia.org/wikipedia/commons/9/9b/Kurd_Man.png', state: "Morocco", region: "Rabat", lat: 34.0209, lng: -6.8416, type: "Clothing", materials: ["Silk","Gold","Natural Dye"], description: "Sumptuous embroidered silk caftans with gold thread sfifa braiding and aakad knotted buttons, the ceremonial dress of Moroccan celebrations.", era: "12th Century", steps: ["Fine silk or brocade fabric is cut to the caftan pattern","Sfifa gold braid is hand-sewn along the front opening and cuffs","Aakad knotted silk buttons and loops are crafted and attached","The garment is pressed and finished for ceremonial wear"], funFact: "A Moroccan bride traditionally wears seven different caftans during her wedding celebration, each more elaborate than the last."},
        { name: "Chinese Fan Making", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Brise_Fan_LACMA_M.78.108.10.jpg/960px-Brise_Fan_LACMA_M.78.108.10.jpg', state: "China", region: "Hangzhou, Zhejiang", lat: 30.2741, lng: 120.1551, type: "Home Decor", materials: ["Bamboo","Silk","Paper"], description: "Folding fans with bamboo ribs and painted silk or paper leaves, combining calligraphy, painting, and craft into a single elegant handheld object.", era: "Ancient", steps: ["Bamboo sticks are split, shaped, and polished into fan ribs","The ribs are assembled and pinned at the base with a pivot","Silk or paper is glued to the frame and trimmed","The fan leaf is painted with calligraphy, landscapes, or flowers"], funFact: "The folding fan was invented in Japan but perfected in Hangzhou, where the craft of fan-making became an art form unto itself."},
        { name: "Iroquois Wampum Belt", image: 'https://upload.wikimedia.org/wikipedia/commons/8/8e/Wampum_ej_perry.jpg', state: "United States", region: "Haudenosaunee Territory, New York", lat: 42.9538, lng: -76.567, type: "Jewelry", materials: ["Shell"], description: "Woven belts of white and purple shell beads that serve as diplomatic records, treaty documents, and sacred objects for the Haudenosaunee Confederacy.", era: "Ancient", steps: ["Quahog and whelk shells are cut and drilled into cylindrical beads","White and purple beads are sorted for the planned design","Beads are woven onto leather thongs in geometric or pictographic patterns","The finished belt is presented during diplomatic ceremonies"], funFact: "The Two Row Wampum belt records the earliest treaty between Europeans and Native Americans, symbolizing two vessels traveling side by side."},
        { name: "Bogolan Mud Cloth", image: 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Traditional_mud_cloth.jpg', state: "Mali", region: "Africa", lat: 12.65, lng: -8.0, type: "Clothing", materials: ["cotton", "fermented mud", "plant dyes"], description: "A traditional Malian textile made by applying fermented river mud to hand-woven cotton strips, creating bold geometric patterns with deep cultural symbolism among the Bamana people.", era: "12th century", steps: ["Cotton was hand-spun and woven into narrow strips on a traditional loom by male weavers.", "The strips were sewn together and soaked in a bath of crushed leaves from the n\'gallama tree.", "Fermented river mud was carefully applied with sticks or brushes to form symbolic geometric patterns.", "The cloth was sun-dried and the process repeated multiple times to deepen the rich brown-black hues."], funFact: "Each Bogolan pattern carries a specific meaning; some designs were historically reserved for hunters returning from successful expeditions in the Sahel."},
