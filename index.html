        { name: "Jamaican Straw Craft", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Atlas_maritimus%2C_or_A_book_of_charts_-_Describeing_the_sea_coasts_capes_headlands_sands_shoals_rocks_and_dangers_the_bayes_roads_harbors_rivers_and_ports%2C_in_most_of_the_knowne_parts_of_the_world._%2814567014797%29.jpg/960px-thumbnail.jpg', state: "Jamaica", region: "Americas", lat: 18.11, lng: -77.3, type: "Home Decor", materials: ["jipijapa palm", "banana leaf fiber", "thatch palm"], description: "Traditional Jamaican plaited and woven straw goods including hats, baskets, and mats.", era: "Colonial era", steps: ["Young palm fronds were harvested, stripped into thin ribbons, and sun-bleached to a pale golden color.", "The strips were soaked to maintain flexibility and plaited into flat braids of varying widths.", "The braids were coiled and stitched together in spiraling rows to form baskets, hats, or mats."], funFact: "Blends techniques from three continents: African, European, and Taino." },
        { name: "Paraguayan Nanduti Lace", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Nanduti_lace.jpg/960px-Nanduti_lace.jpg", state: "Paraguay", region: "Americas", lat: -25.26, lng: -57.58, type: "Home Decor", materials: ["cotton thread", "silk thread"], description: "A radial needle lace unique to Paraguay, resembling a spider's web.", era: "16th century (Spanish colonial)", steps: ["A circular pattern was drawn on a stiff fabric base and radiating foundation threads were stitched from center to edge like spokes.", "Fine cotton or silk thread was needle-woven in concentric circles around the spokes, creating web-like patterns.", "Multiple circular motifs in different colors were completed and the connecting ground was woven between them."], funFact: "\"Nanduti\" means \"spider web\" in Guarani; legend says a real web inspired the first lace." },
        { name: "Brazilian Rendeira Lace (Renda de Bilro)", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Ursuline_lace_2.jpg/960px-Ursuline_lace_2.jpg", state: "Brazil", region: "Americas", lat: -3.72, lng: -38.53, type: "Home Decor", materials: ["cotton thread", "wooden bobbins"], description: "Bobbin lace produced by the rendeiras (lace makers) of northeastern Brazil, particularly Ceara and Bahia.", era: "Colonial era (17th century)", steps: ["A pattern was pricked onto cardboard and pinned to a cylindrical lace pillow stuffed with straw.", "Dozens of wooden bobbins wound with fine cotton thread were attached to the starting pins.", "The lace maker crossed and twisted pairs of bobbins in rhythmic sequences, building intricate patterns around the pins."], funFact: "Lacemakers work outdoors in groups, clacking bobbins in rhythm together." },
        { name: "Amazonian Featherwork", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Ethnologisches_Museum_Dahlem_Berlin_Mai_2006_008.jpg/960px-Ethnologisches_Museum_Dahlem_Berlin_Mai_2006_008.jpg", state: "Brazil", region: "Americas", lat: -3.12, lng: -60.02, type: "Ritual", materials: ["macaw feathers", "toucan feathers", "harpy eagle feathers", "plant fiber cord"], description: "Sacred ceremonial headdresses and body ornaments crafted by indigenous peoples of the Amazon.", era: "Ancient", steps: ["Feathers of specific colors were carefully collected from macaws, toucans, and other birds kept for this purpose.", "A lightweight frame was constructed from palm fiber strips and cotton cord to fit the wearer's head.", "Individual feathers were sorted by color and size, then bound to the frame using fine plant fiber ties."], funFact: "Artists rubbed frog secretions on parrot feathers to change their color." },
        { name: "Mexican Rebozo", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Dama_con_rebozo%2C_Juan_Rodr%C3%ADguez_Ju%C3%A1rez.jpg/960px-Dama_con_rebozo%2C_Juan_Rodr%C3%ADguez_Ju%C3%A1rez.jpg", state: "Mexico", region: "Americas", lat: 20.59, lng: -100.39, type: "Clothing", materials: ["cotton", "silk", "wool", "natural dyes"], description: "A traditional Mexican shawl of great cultural significance, hand-woven on a backstrap loom with intricate ikat-dyed.", era: "Colonial era (16th century)", steps: ["Cotton or silk warp threads were tied in resist bundles and dip-dyed in indigo or cochineal to create ikat patterns.", "The dyed warp was arranged on a backstrap loom and woven with a plain or twill ground weave.", "After weaving, the long warp fringe at each end was hand-knotted into elaborate macrame-like designs (rapacejo)."], funFact: "The finest fringe knotting (rapacejo) can take longer than the weaving." },
        { name: "Huipil Embroidery", image: "images/huipil-embroidery.jpg", state: "Guatemala", region: "Americas", lat: 14.83, lng: -91.52, type: "Clothing", materials: ["cotton", "silk thread", "wool thread", "natural dyes"], description: "Elaborately embroidered and brocaded blouses worn by indigenous Maya women of Guatemala.", era: "Pre-Columbian", steps: ["Cotton was hand-spun and woven on a backstrap loom into two or three rectangular panels for the garment body.", "Complex brocade patterns of birds, flowers, jaguars, and geometric cosmos symbols were woven in during the weaving process.", "Additional embroidery was worked around the neckline and yoke using silk or acrylic thread in vivid colors."], funFact: "Village, social status, and marital state are all encoded in the stitches." },
        { name: "Panamanian Pollera Embroidery", image: "images/panamanian-pollera-embroidery.jpg", state: "Panama", region: "Americas", lat: 8.95, lng: -79.53, type: "Clothing", materials: ["white cotton", "silk thread", "linen thread", "gold chains"], description: "The national costume of Panama, an elaborately embroidered white two-piece dress with fine needlework depicting flowers.", era: "Colonial era (17th century)", steps: ["Fine white cotton fabric was cut into a layered skirt with multiple ruffled tiers and a gathered off-shoulder blouse.", "Intricate floral embroidery was worked onto the fabric using cross-stitch, drawn-thread, and shadow-work techniques.", "The embroidered pieces were assembled with lace insertions and the skirt layers were gathered into full flounces."], funFact: "A complete Pollera can cost over $5,000 and take more than a year." },
        { name: "Mapuche Textile Weaving", image: "images/mapuche-textile-weaving.jpg", state: "Chile", region: "Americas", lat: -38.74, lng: -72.6, type: "Clothing", materials: ["sheep wool", "natural dyes", "plant dyes"], description: "Traditional woven textiles of the Mapuche people of southern Chile and Argentina, producing ponchos, blankets.", era: "Pre-Columbian", steps: ["Sheep wool was hand-spun on a pushka (drop spindle) and dyed with native plants like maqui berry and quillay bark.", "The dyed yarn was arranged on a vertical staked loom (witral) set up outdoors in the weaver's yard.", "Complex geometric patterns representing the Mapuche cosmos were woven using warp-faced techniques."], funFact: "Weavers encode cosmological beliefs readable only by the Mapuche." },
        { name: "Navajo Silversmithing", image: "images/navajo-silversmithing.jpg", state: "United States", region: "Americas", lat: 36.17, lng: -109.65, type: "Jewelry", materials: ["silver", "turquoise", "coral", "jet"], description: "The iconic jewelry tradition of the Navajo (Dine) people of the American Southwest.", era: "1860s", steps: ["Silver coins or ingots were melted in a crucible and cast into rough forms using tufa stone molds.", "The cast silver was hammered, filed, and shaped into the desired form such as a naja pendant or concho disc.", "Turquoise cabochons were cut, shaped, and set into hand-fabricated silver bezels soldered onto the piece."], funFact: "Navajo learned silverwork from Mexican plateros around 1860, then surpassed their teachers." },
        { name: "Hopi Kachina Doll (Tihu)", image: "images/hopi-kachina-doll-tihu.jpg", state: "United States", region: "Americas", lat: 35.83, lng: -110.54, type: "Toys", materials: ["cottonwood root", "natural pigments", "feathers", "leather"], description: "Carved wooden figures representing kachina spirits of the Hopi people.", era: "Pre-contact era", steps: ["A section of dried cottonwood root was selected for its light weight and fine carving properties.", "The rough form of the kachina was carved with a knife, capturing the distinctive mask, body posture, and regalia.", "The figure was sanded smooth and painted with natural mineral pigments to accurately represent the specific kachina spirit."], funFact: "Over 400 distinct kachina spirits exist, each with a unique doll form." },
        { name: "Seminole Patchwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/Korea-Joseon-Bojagi-01.jpg/960px-Korea-Joseon-Bojagi-01.jpg', state: "United States", region: "Americas", lat: 25.75, lng: -80.94, type: "Clothing", materials: ["cotton fabric", "thread"], description: "A distinctive textile technique of the Seminole people of Florida.", era: "Early 20th century", steps: ["Long strips of contrasting cotton fabrics were cut to precise widths and machine-sewn together into striped panels.", "The striped panels were cut at angles and the resulting pieces were offset and re-sewn to create geometric patterns.", "Multiple patterned bands were assembled with solid fabric separators to build the garment or textile."], funFact: "One of the first Indigenous American arts created with sewing machines." },
        { name: "Northwest Coast Button Blanket", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Button_Blanket_MET_DT261799.jpg/960px-Button_Blanket_MET_DT261799.jpg", state: "Canada", region: "Americas", lat: 54.75, lng: -130, type: "Clothing", materials: ["wool blanket", "mother-of-pearl buttons", "red felt", "thread"], description: "Ceremonial blankets of the Pacific Northwest Coast First Nations.", era: "19th century", steps: ["A dark blue or black Hudson's Bay wool blanket was selected as the base.", "A clan crest design (eagle, raven, bear, or orca) was cut from red wool felt and appliqued onto the center of the blanket.", "Hundreds of mother-of-pearl buttons were hand-sewn along the outline of the crest figure and the blanket border."], funFact: "Mother-of-pearl buttons replaced dentalium shells when traders arrived." },
        { name: "Cree Quillwork", image: "images/cree-quillwork.jpg", state: "Canada", region: "Americas", lat: 53, lng: -89, type: "Clothing", materials: ["porcupine quills", "birch bark", "natural dyes", "sinew"], description: "The ancient art of decorating leather, birch bark, and clothing with dyed porcupine quills among the Cree and other Indigenous peoples.", era: "Ancient", steps: ["Porcupine quills were harvested, sorted by size, and dyed with plant-based pigments in red, yellow, blue, and black.", "The quills were softened by soaking in water and then flattened by pulling between the teeth or a bone tool.", "Flattened quills were folded and sewn onto tanned leather or birch bark in geometric and floral patterns using sinew thread."], funFact: "Only women in sacred quillwork societies were allowed to practice the craft." },
        { name: "Inuit Textile Art (Amauti Parka)", image: "https://upload.wikimedia.org/wikipedia/commons/1/1f/Iglulik_Clothing_3_1999-07-18.jpg", state: "Canada", region: "Americas", lat: 63.75, lng: -68.52, type: "Clothing", materials: ["caribou hide", "seal skin", "sinew thread", "duffle cloth"], description: "Traditional parkas and textile arts of the Inuit peoples of Arctic Canada.", era: "Ancient", steps: ["Caribou or seal skins were scraped, stretched, and softened through a labor-intensive process of chewing and working the hide.", "Pattern pieces were cut using an ulu (women's knife) and fitted together with precision to create the garment shape.", "Pieces were stitched with a waterproof seam using caribou sinew thread, ensuring the seams would not leak in Arctic conditions."], funFact: "The built-in baby pouch keeps an infant at body temperature in minus-50C." },
        { name: "Ecuadorian Panama Hat (Toquilla Straw Hat)", image: "images/ecuadorian-panama-hat-toquilla-straw-hat.jpg", state: "Ecuador", region: "Americas", lat: -1.25, lng: -80.4, type: "Clothing", materials: ["toquilla palm straw"], description: "Finely woven straw hats originating in Ecuador (despite their misleading name).", era: "17th century", steps: ["Young shoots of the toquilla palm were harvested, split into thin strands, and boiled in water to remove chlorophyll.", "The bleached strands were sun-dried and sorted by fineness, with the thinnest fibers reserved for the finest hats.", "Starting from the center crown, the weaver plaited the straw outward in a tight spiral, working in early morning or evening when humidity kept the fibers flexible."], funFact: "The finest \"superfino\" can hold water because the weave is so tight." },
        { name: "Costa Rican Oxcart Painting (Carreta)", image: "images/costa-rican-oxcart-painting-carreta.jpg", state: "Costa Rica", region: "Americas", lat: 10.09, lng: -84.22, type: "Furniture", materials: ["wood", "oil paint", "iron"], description: "The tradition of painting elaborate geometric and floral designs on the wheels and bodies of wooden oxcarts in Costa.", era: "19th century", steps: ["An oxcart was constructed from tropical hardwoods with the large wheels built from multiple wedge-shaped sections.", "The entire cart surface was sanded and primed with a base coat of vibrant paint.", "Intricate mandala-like geometric patterns and floral designs were hand-painted on the wheels, side panels, and yoke."], funFact: "Each region developed its own color scheme, like a painted postal code." },
        { name: "Azerbaijani Carpet Weaving", image: "images/azerbaijani-carpet-weaving.jpg", state: "Azerbaijan", region: "Central/West Asia", lat: 41, lng: 49, type: "Home Decor", materials: ["wool", "silk", "cotton", "natural dyes"], description: "Hand-knotted pile carpets from Azerbaijan distinguished by their bold geometric medallions and rich jewel-toned colors.", era: "Bronze Age", steps: ["Wool from highland sheep was washed, carded, hand-spun, and dyed with madder, indigo, pomegranate, and weld.", "A vertical loom was warped with cotton foundation threads and the carpet design was planned from memory or a small sketch.", "The weaver tied symmetrical Turkish knots in dyed wool, row by row, building up the pattern and compacting with a heavy comb."], funFact: "Azerbaijani carpets appear on the country's postage stamps and banknotes." },
        { name: "Kurdish Kilim", image: "images/kurdish-kilim.jpg", state: "Turkey", region: "Central/West Asia", lat: 38, lng: 43, type: "Home Decor", materials: ["wool", "goat hair", "natural dyes"], description: "Flat-woven tapestry rugs produced by Kurdish tribal weavers across eastern Turkey, northern Iraq, and western Iran.", era: "Ancient", steps: ["Wool and goat hair were hand-spun and dyed with wild plants gathered from the Kurdish mountain highlands.", "The weaver set up a ground loom and planned the design from tribal patterns memorized since childhood.", "Colored weft threads were interlocked or dovetailed in a slit-tapestry technique to build geometric and animal motifs."], funFact: "Weavers memorize every pattern; no written diagrams are ever used." },
        { name: "Yemeni Jambiya Dagger", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Khanjar.jpg/960px-Khanjar.jpg", state: "Yemen", region: "Central/West Asia", lat: 15.35, lng: 44.21, type: "Sculpture", materials: ["steel", "rhinoceros horn (historical)", "wood", "silver", "leather"], description: "The iconic curved dagger worn by Yemeni men as a symbol of manhood and tribal identity.", era: "Ancient", steps: ["A curved J-shaped blade was forged from Damascus or plain steel, hammered and ground to a keen edge.", "The handle was carved from wood or horn into the distinctive flared shape and fitted to the blade tang.", "An ornate scabbard was constructed from wood covered in embossed leather and decorated with silver filigree."], funFact: "Virtually every adult Yemeni man wears one tucked into his belt daily." },
        { name: "Omani Khanjar Dagger", image: "images/omani-khanjar-dagger.jpg", state: "Oman", region: "Central/West Asia", lat: 23.59, lng: 58.54, type: "Sculpture", materials: ["steel", "silver", "gold", "rhinoceros horn (historical)", "sandalwood"], description: "The ceremonial curved dagger of Oman, prominently featured on the national flag and emblem.", era: "Ancient", steps: ["A curved steel blade was forged by a specialist blacksmith and sharpened to a fine edge.", "The handle was shaped from sandalwood or horn, carved with ribbed grip patterns.", "A silver sheath was crafted by hammering, engraving, and sometimes gold-plating intricate floral and geometric designs."], funFact: "So central to identity that it appears on the Omani national flag." },
        { name: "Lebanese Blown Glass", image: "images/lebanese-blown-glass.jpg", state: "Lebanon", region: "Central/West Asia", lat: 34.25, lng: 35.65, type: "Kitchenware", materials: ["recycled glass", "sand", "soda ash"], description: "Hand-blown glass produced in Lebanon continuing the ancient Phoenician tradition, creating vessels, lamps.", era: "Phoenician era (1st century BCE)", steps: ["Recycled glass or raw silica sand was melted in a clay crucible furnace at extremely high temperatures.", "The molten glass was gathered on the end of a long blowpipe and inflated with steady breaths into a bubble.", "The glass was shaped using wooden paddles, metal jacks, and gravity while constantly rotating the blowpipe."], funFact: "Phoenicians in ancient Lebanon invented the glass-blowing pipe itself." },
        { name: "Jordanian Mosaic", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Palmer_%26_Guthe_image_of_the_Medaba_map.jpg/960px-Palmer_%26_Guthe_image_of_the_Medaba_map.jpg", state: "Jordan", region: "Central/West Asia", lat: 31.71, lng: 35.74, type: "Home Decor", materials: ["limestone tesserae", "marble", "glass", "morite"], description: "The ancient art of assembling mosaic floors and wall panels from tiny cut stone tesserae.", era: "Roman-Byzantine era", steps: ["Limestone, marble, and colored glass were cut into tiny square tesserae using a hammer and hardie anvil.", "A full-scale cartoon of the design was drawn on the prepared floor or panel surface.", "Tesserae were pressed into a bed of wet lime mortar, following the cartoon to build up figurative and geometric designs."], funFact: "The Madaba Map mosaic from 560 AD is the oldest map of the Holy Land." },
        { name: "Palestinian Tatreez Embroidery", image: 'images/palestinian-tatreez-embroidery.jpg', state: "Palestine", region: "Central/West Asia", lat: 31.9, lng: 35.2, type: "Clothing", materials: ["linen", "silk thread", "cotton thread"], description: "Traditional cross-stitch embroidery adorning Palestinian women's thobes (dresses).", era: "Canaanite era", steps: ["A linen or cotton thobe was cut and prepared, with the chest panel area designated for the primary embroidery.", "A pattern was planned using village-specific motifs such as cypress trees, stars, moons, and geometric borders.", "Cross-stitch embroidery was worked in silk thread, building up dense fields of color on the chest, sides, and sleeves."], funFact: "Each village had distinct stitches, readable like a visual dialect." },
        { name: "Tajik Suzani Embroidery", image: "images/tajik-suzani-embroidery.jpg", state: "Tajikistan", region: "Central/West Asia", lat: 38.56, lng: 68.77, type: "Home Decor", materials: ["cotton", "silk thread", "natural dyes"], description: "Large embroidered textile panels from Tajikistan featuring bold floral medallions and cosmic sun motifs.", era: "15th century", steps: ["A large cotton ground cloth was prepared and the floral design was sketched lightly in charcoal.", "The cloth was divided into sections and distributed among family members and neighbors for communal stitching.", "Dense chain-stitch and couching embroidery in silk thread built up large floral medallions and vine scrolls."], funFact: "Brides' relatives each stitched a section, then assembled the whole." },
        { name: "Baloch Mirror Embroidery (Shisha)", image: "images/baloch-mirror-embroidery-shisha.png", state: "Pakistan", region: "Central/West Asia", lat: 26.5, lng: 65, type: "Clothing", materials: ["cotton", "silk thread", "mirror glass", "mica"], description: "Intricate embroidery of the Baloch people incorporating small mirrors (shisha) stitched onto fabric with radiating.", era: "17th century", steps: ["Small circles of mirror glass or mica were cut to uniform size and sorted for clarity and reflectivity.", "A holding framework of crossed threads was stitched over each mirror disc to secure it to the base fabric.", "Radiating embroidery stitches (shisha stitch) were worked around each mirror in colorful silk thread, creating petal-like frames."], funFact: "Originally used mica chips before glass mirrors became available." },
        { name: "Iraqi Copper Craft", image: "images/iraqi-copper-craft.jpg", state: "Iraq", region: "Central/West Asia", lat: 33.34, lng: 44.4, type: "Kitchenware", materials: ["copper", "tin", "brass"], description: "The ancient tradition of hand-hammering and engraving copper vessels in the souks of Baghdad, Mosul, and Basra.", era: "Abbasid era (8th century)", steps: ["Flat copper sheets were cut and hammered over wooden or iron forms into vessels and tray shapes.", "The copper surface was planished smooth and prepared for decoration.", "Master engravers incised intricate arabesques, calligraphic inscriptions, and geometric patterns using steel chisels."], funFact: "Baghdad's copper souk was the largest coppersmith market in the Middle East." },
        { name: "Qashqai Weaving", image: "images/qashqai-weaving.jpg", state: "Iran", region: "Central/West Asia", lat: 30, lng: 52, type: "Home Decor", materials: ["wool", "goat hair", "natural dyes"], description: "Vibrant tribal carpets and bags woven by the Qashqai nomadic confederacy of southern Iran.", era: "Ancient", steps: ["Wool from Qashqai flocks was sheared during seasonal migrations, washed, and hand-spun by women on drop spindles.", "The wool was dyed with madder root, pomegranate rind, indigo, and walnut husks gathered from the Zagros Mountain valleys.", "A portable horizontal ground loom was assembled and the weaver knotted asymmetrical Persian knots from memory."], funFact: "Weavers work entirely from memory; no cartoons or patterns are drawn." },
        { name: "Turkmen Jewelry", image: "images/turkmen-jewelry.jpg", state: "Turkmenistan", region: "Central/West Asia", lat: 37.95, lng: 58.38, type: "Jewelry", materials: ["silver", "gilt silver", "carnelian", "turquoise"], description: "Massive gilded silver jewelry worn by Turkmen women, featuring carnelian-studded breast ornaments, forehead pendants.", era: "Ancient", steps: ["Silver was alloyed, melted, and hammered into large flat plates and domed shapes for the jewelry base.", "The silver surface was fire-gilded with mercury-gold amalgam to create the characteristic warm golden tone.", "Large polished carnelian cabochons and turquoise stones were set into raised bezels across the surface."], funFact: "A full bridal set could weigh 20 kilograms of silver and carnelian." },
        { name: "Samarkand Paper Making", image: "https://upload.wikimedia.org/wikipedia/commons/e/e0/Bahrram_Gur_hunting.jpg", state: "Uzbekistan", region: "Central/West Asia", lat: 39.65, lng: 66.96, type: "Home Decor", materials: ["mulberry bark", "water", "cotton fiber"], description: "The ancient art of making paper from mulberry bark in Samarkand.", era: "8th century", steps: ["Inner bark of mulberry branches was stripped, soaked in water for days, and boiled until the fibers separated.", "The softened fibers were beaten with wooden mallets on a stone slab until reduced to a smooth pulp.", "The pulp was suspended in a vat of water and a screen mold was dipped in to collect a thin, even layer of fibers."], funFact: "Chinese prisoners captured in 751 AD revealed papermaking secrets here." },
        { name: "Filipino Pina Cloth", image: "images/filipino-pina-cloth.jpg", state: "Philippines", region: "Southeast Asia & Oceania", lat: 10.72, lng: 122.56, type: "Clothing", materials: ["pineapple leaf fiber", "abaca fiber", "silk"], description: "A luxuriously sheer and stiff textile woven from pineapple leaf fibers in the Philippines.", era: "Pre-colonial era", steps: ["Mature pineapple leaves were scraped with a coconut shell to extract the long, fine fibers from within.", "The fibers were washed, dried, and hand-knotted end to end to create continuous threads of great length.", "The thread was woven on a traditional loom into a sheer, stiff fabric with a natural creamy luster."], funFact: "Fabric for a single formal dress requires 6 months of hand-stripping." },
        { name: "Cambodian Silver Craft", image: "images/cambodian-golden-silk-weaving.jpg", state: "Cambodia", region: "Southeast Asia & Oceania", lat: 11.56, lng: 104.93, type: "Kitchenware", materials: ["silver", "gold leaf"], description: "Traditional Khmer silver smithing producing intricately repousse bowls, betel nut sets.", era: "Angkor era", steps: ["Silver sheets were hammered to uniform thickness on a stone anvil.", "The repousse technique was used, hammering the silver from the reverse side over a pitch-filled form to raise the design.", "Fine details of temple dancers, mythological scenes, and floral motifs were chased from the front surface."], funFact: "Phnom Penh's Silver Pagoda floor has 5,329 solid silver tiles." },
        { name: "Laotian Pottery", image: "images/laotian-pottery.jpg", state: "Laos", region: "Southeast Asia & Oceania", lat: 19.89, lng: 102.13, type: "Pottery", materials: ["clay", "rice husk ash", "natural pigments"], description: "Traditional unglazed pottery from Laos, particularly from villages along the Mekong River, producing water jars.", era: "Ancient", steps: ["River clay was collected, cleaned of debris, and mixed with rice husk ash to improve firing properties.", "The vessel was built up using the coil method, smoothing each layer with a wooden paddle against an interior stone anvil.", "The shaped vessel was sun-dried and decorated with incised or stamped geometric patterns."], funFact: "The mysterious Plain of Jars holds stone vessels up to 3 meters tall." },
        { name: "Burmese Marionette (Yoke The)", image: "images/burmese-marionette-yoke-the.jpg", state: "Myanmar", region: "Southeast Asia & Oceania", lat: 21.97, lng: 96.08, type: "Toys", materials: ["teak wood", "silk fabric", "cotton string", "gold leaf"], description: "Elaborately costumed string puppets used in the traditional Burmese marionette theater (yoke the).", era: "15th century", steps: ["A puppet head and articulated body were carved from teak or other hardwood and jointed with leather hinges.", "The face was painted with traditional Burmese theatrical makeup and the features were lacquered for durability.", "Elaborate court costumes of silk, brocade, and gold-leafed fabric were sewn and fitted to the puppet body."], funFact: "Puppeteers once outranked human actors in the Burmese royal court." },
        { name: "Balinese Silver Craft (Celuk)", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Chinesischer_Maler_des_11._Jahrhunderts_%28I%29_001.jpg/960px-Chinesischer_Maler_des_11._Jahrhunderts_%28I%29_001.jpg", state: "Indonesia", region: "Southeast Asia & Oceania", lat: -8.6, lng: 115.3, type: "Jewelry", materials: ["silver", "gold", "gemstones"], description: "Intricate silver jewelry and filigree work from the village of Celuk in Bali, producing ornate rings, bracelets.", era: "8th century", steps: ["Silver was melted and drawn into fine wire or formed into tiny granulation spheres for decorative detail.", "The wire was twisted, coiled, and shaped into scrollwork patterns following traditional Balinese motifs.", "Filigree and granulation elements were arranged on a silver base and soldered using a blowpipe torch."], funFact: "Every single family in Celuk village works with silver." },
        { name: "Timorese Tais Cloth", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Tais_Cova_Lima_3.jpg/960px-Tais_Cova_Lima_3.jpg", state: "Timor-Leste", region: "Southeast Asia & Oceania", lat: -8.56, lng: 125.57, type: "Clothing", materials: ["cotton", "natural dyes"], description: "Traditional hand-woven textiles of Timor-Leste, central to cultural identity and ceremonies.", era: "Ancient", steps: ["Cotton was hand-ginned, spun on a drop spindle, and prepared for dyeing.", "Warp threads were tied with resist bindings in precise patterns and immersed in natural dye baths of morinda root (red) and indigo (blue).", "The resist-dyed warp was arranged on a backstrap loom and woven with supplementary weft patterns."], funFact: "Resistance fighters wore it as a symbol of defiance during occupation." },
        { name: "Thai Lacquerware", image: "images/thai-lacquerware.jpg", state: "Thailand", region: "Southeast Asia & Oceania", lat: 18.79, lng: 98.98, type: "Kitchenware", materials: ["bamboo", "teak wood", "lacquer", "gold leaf"], description: "Traditional lacquerware from Chiang Mai in northern Thailand, made by coating woven bamboo or turned wood with multiple.", era: "13th century (Lanna Kingdom)", steps: ["A base form was woven from bamboo strips or turned from teak on a lathe.", "Multiple coats of natural lacquer were applied and dried in a humid room, with each layer sanded smooth before the next.", "After building up to a dozen or more lacquer layers, decorative designs were incised through the surface."], funFact: "Must be dried in humid air, not dry air, which is counterintuitive." },
        { name: "Papua New Guinean Bilum Bag", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/WLF_frobas_%283%29.jpg/960px-WLF_frobas_%283%29.jpg", state: "Papua New Guinea", region: "Southeast Asia & Oceania", lat: -5.45, lng: 145.77, type: "Home Decor", materials: ["bush string fiber", "wool", "natural dyes"], description: "Flexible string bags looped by hand by women throughout Papua New Guinea.", era: "Ancient", steps: ["Inner bark fibers from specific bush plants were stripped, rolled on the thigh, and twisted into strong two-ply string.", "The string was dyed with plant-based pigments in reds, yellows, and purples.", "The bilum was constructed from the bottom up using a continuous looping technique (not knitting or crocheting) with a single needle."], funFact: "So iconic the bilum bag appears on PNG's currency and postage stamps." },
        { name: "Vanuatu Sand Drawing", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Sand_drawing%2C_Vanuatu.jpg/960px-Sand_drawing%2C_Vanuatu.jpg", state: "Vanuatu", region: "Southeast Asia & Oceania", lat: -17.73, lng: 168.32, type: "Ritual", materials: ["volcanic sand", "ash", "coral dust"], description: "An ephemeral art tradition from Vanuatu where complex geometric and figurative designs are drawn in sand or ash using a single continuous finger line.", era: "Ancient", steps: ["A flat area of volcanic sand or ash was smoothed and prepared as the drawing surface.", "The artist placed a grid of intersecting lines as a structural framework for the drawing.", "A single continuous line was traced through the grid without lifting the finger, creating complex interlocking patterns."], funFact: "UNESCO recognized these ephemeral drawings as intangible heritage." },
        { name: "Solomon Islands Shell Money", image: 'images/solomon-islands-shell-money.jpg', state: "Solomon Islands", region: "Southeast Asia & Oceania", lat: -9.43, lng: 160.05, type: "Jewelry", materials: ["shell beads", "plant fiber string", "red shell (chama)"], description: "Strings of finely ground and polished shell beads used as traditional currency and ceremonial exchange objects.", era: "Ancient", steps: ["Small fragments of shell (particularly red chama shell or white conus shell) were chipped into rough disc shapes.", "The shell discs were drilled through the center using a hand-spun pump drill with a stone or metal bit.", "The drilled beads were strung on plant fiber cord and ground against a grooved stone to achieve uniform diameter."], funFact: "Red shell discs from Malaita still circulate alongside modern currency." },
        { name: "Aboriginal Boomerang", image: "images/aboriginal-boomerang.jpg", state: "Australia", region: "Southeast Asia & Oceania", lat: -23.7, lng: 133.88, type: "Toys", materials: ["mulga wood", "acacia wood", "natural pigments", "beeswax"], description: "Carved and decorated wooden throwing implements of Indigenous Australians.", era: "10,000+ years old", steps: ["A curved section of mulga or acacia wood with a natural bend was selected and stripped of bark.", "The wood was shaped with stone tools or steel axes into an aerodynamic cross-section with one flat and one convex side.", "The surfaces were smoothed and fire-hardened to increase durability."], funFact: "The oldest known boomerang was found in a Polish cave, not Australia." },
        { name: "Torres Strait Island Mask", image: "images/torres-strait-island-mask.jpg", state: "Australia", region: "Southeast Asia & Oceania", lat: -10.2, lng: 142.2, type: "Ritual", materials: ["turtle shell", "feathers", "seeds", "cane", "beeswax"], description: "Elaborate ceremonial masks crafted by Torres Strait Islander peoples from turtle shell, feathers, and natural materials.", era: "Ancient", steps: ["Hawksbill turtle shell plates were heated over a fire and molded into curved facial forms while still pliable.", "Multiple turtle shell pieces were riveted together to form the mask structure, and features were carved and shaped.", "Feathers, seeds, raffia, and shell ornaments were attached to the mask to represent specific ancestral or spirit beings."], funFact: "Represents a unique Melanesian tradition within Australian borders." },
        { name: "Maldivian Lacquer Craft (Liye Laajehun)", image: 'images/maldivian-lacquer-craft-liye-laajehun.jpg', state: "Maldives", region: "South Asia", lat: 4.17, lng: 73.51, type: "Home Decor", materials: ["wood", "lacquer resin", "natural pigments"], description: "A distinctive lacquerwork tradition of the Maldives where wooden containers and vases are turned on a lathe.", era: "Medieval period", steps: ["A block of local wood was mounted on a pole lathe and turned into a round vessel or container shape.", "Sticks of colored lacquer resin were pressed against the spinning vessel, melting onto the surface in even bands.", "Patterns were incised through the colored lacquer layers using a pointed tool while the vessel spun on the lathe."], funFact: "Lacquered containers were once among the Maldives' top exports." },
        { name: "Nepali Mithila Painting", image: "images/nepali-mithila-painting.jpg", state: "Nepal", region: "South Asia", lat: 26.7, lng: 85.9, type: "Home Decor", materials: ["handmade paper", "natural pigments", "plant dyes", "bamboo pen"], description: "Vibrant folk paintings from the Mithila region of southern Nepal (and neighboring Bihar).", era: "Ancient", steps: ["A smooth surface was prepared on a wall, floor, or handmade paper sheet.", "The outline of figures and motifs was drawn using a bamboo pen dipped in charcoal or rice-paste ink.", "The outlined areas were filled with vivid colors made from turmeric, vermilion, indigo, lamp soot, and flower extracts."], funFact: "Empty space is considered bad luck; every inch must be filled." },
        { name: "Sri Lankan Brass Craft", image: "https://upload.wikimedia.org/wikipedia/commons/4/48/Sword_and_scabbard_%28Sinhalese-_kasthane%29_MET_DP-16375-001.jpg", state: "Sri Lanka", region: "South Asia", lat: 7.29, lng: 80.64, type: "Kitchenware", materials: ["brass", "copper", "tin"], description: "Traditional brasswork from the hill country of Sri Lanka, producing oil lamps, ceremonial vessels.", era: "Anuradhapura period (3rd century BCE)", steps: ["Brass was alloyed from copper and zinc, melted in a crucible, and cast into flat sheets or rough forms.", "The sheets were hammered over wooden forms into lamp, bowl, and vessel shapes.", "Decorative patterns of lotus petals, elephants, and Buddhist symbols were engraved or repousse-worked into the surface."], funFact: "The brass oil lamp is lit before every Buddhist ceremony on the island." },
        { name: "Bhutanese Bamboo Craft", image: "images/bhutanese-bamboo-craft.jpg", state: "Bhutan", region: "South Asia", lat: 27.51, lng: 90.43, type: "Kitchenware", materials: ["bamboo", "cane", "natural dyes"], description: "One of Bhutan's thirteen traditional arts (zorig chusum), producing tightly woven bamboo and cane baskets.", era: "Ancient", steps: ["Bamboo culms were harvested, split into thin strips, and scraped to uniform width with a knife.", "The strips were sun-dried and some were dyed with plant-based pigments in red and black.", "A tight hexagonal or twill weave pattern was built from the base up, shaping the vessel over a wooden form."], funFact: "Bangchung containers are woven so tight they hold liquid without leaking." },
        { name: "Nepali Metalwork (Patan)", image: "images/nepali-metalwork-patan.jpg", state: "Nepal", region: "South Asia", lat: 27.68, lng: 85.32, type: "Sculpture", materials: ["bronze", "copper", "gold", "precious stones"], description: "Exquisite lost-wax bronze casting from Patan (Lalitpur) in Nepal's Kathmandu Valley.", era: "Licchavi period (5th century)", steps: ["A detailed wax model of a deity was sculpted by hand, with every ornament and mudra (hand gesture) precisely rendered.", "The wax model was invested in multiple layers of clay and the wax was melted out in a kiln.", "Molten bronze was poured into the mold cavity and allowed to cool slowly."], funFact: "Newar artisans were summoned to build temples in Beijing and Lhasa." },
        { name: "Sri Lankan Pottery of Dediyagala", image: "images/bangladeshi-shankha-bangle.jpg", state: "Sri Lanka", region: "South Asia", lat: 6.3, lng: 80.2, type: "Pottery", materials: ["clay", "rice husk", "natural slip"], description: "Traditional hand-built pottery from the southern Sri Lankan region around Dediyagala.", era: "Ancient", steps: ["Local clay was dug from riverbank deposits, cleaned of stones, and kneaded with rice husk to improve its working properties.", "The vessel was built up using coils of clay, smoothed with a wooden paddle and anvil stone from inside.", "The surface was smoothed with a wet cloth and sometimes decorated with incised lines or stamped patterns."], funFact: "Techniques are virtually identical to methods used 2,000 years ago." },
        { name: "Bangladeshi Shankha Bangle", image: "images/bangladeshi-shankha-bangle.jpg", state: "Bangladesh", region: "South Asia", lat: 22.33, lng: 91.83, type: "Jewelry", materials: ["conch shell", "lac", "gold leaf"], description: "Sacred white bangles carved from conch shells, worn by married Bengali Hindu women as a symbol of marital status.", era: "Ancient", steps: ["Large conch shells were sourced from the Bay of Bengal and the outer layers were ground away to expose the white inner whorl.", "The shell was cut into bangle-width rings using a hand-turned saw and rough edges were filed smooth.", "Decorative patterns of flowers, paisleys, and geometric designs were carved into the shell surface with small chisels."], funFact: "Bengali Hindu brides must wear a conch-shell bangle or the wedding is void." },
        { name: "Swati Embroidery", image: "images/swati-embroidery.png", state: "Pakistan", region: "South Asia", lat: 35.22, lng: 72.35, type: "Clothing", materials: ["cotton", "silk thread", "wool"], description: "Elaborate geometric embroidery from the Swat Valley of northern Pakistan, featuring densely stitched patterns of stars.", era: "Ancient", steps: ["A cotton or wool ground fabric was prepared and the embroidery area was marked with a grid of basting stitches.", "Dense geometric patterns were worked in counted-thread technique using silk thread in deep reds, greens, and golds.", "Additional decorative elements such as chain stitch borders and mirror-work accents were incorporated."], funFact: "Patterns show surprising similarities to motifs found in Greek antiquity." },
        { name: "Bhutanese Cane and Bamboo Weaving (Tsharzo)", image: "images/bhutanese-cane-and-bamboo-weaving-tsharzo.jpg", state: "Bhutan", region: "South Asia", lat: 27.1, lng: 91.2, type: "Home Decor", materials: ["cane", "bamboo", "natural dyes"], description: "Tsharzo, the Bhutanese art of cane and bamboo weaving, producing a range of utilitarian and ceremonial objects including baskets, containers, and mats.", era: "Ancient", steps: ["Cane was harvested from the subtropical forests of eastern Bhutan, split, and shaved to uniform thickness.", "Selected strips were dyed in geometric patterns using natural pigments derived from plants and minerals.", "The cane was woven in intricate diagonal twill patterns, building the object from a coiled or plaited base."], funFact: "Eastern Bhutan is so linked to this craft that it defines regional identity." },
        { name: "Batik Pekalongan", image: "images/batik-pekalongan.jpg", state: "Indonesia", region: "Southeast Asia", lat: -6.889, lng: 109.675, type: "Clothing", materials: ["cotton", "wax", "natural dye"], description: "A coastal batik tradition from Pekalongan, Central Java, distinguished by its vibrant colors and Chinese, Dutch.", era: "16th century", steps: ["The cotton cloth is washed and treated with rice starch to prepare the surface.", "The intricate coastal-inspired patterns are drawn onto the fabric using a canting tool filled with hot wax.", "The waxed fabric is immersed in vivid dye baths, with the process repeated for each color layer."], funFact: "Known as \"Batik City,\" its coastal style mixes Javanese and Chinese motifs." },
        { name: "Batik Solo", image: "images/batik-solo.jpg", state: "Indonesia", region: "Southeast Asia", lat: -7.575, lng: 110.824, type: "Clothing", materials: ["cotton", "wax", "natural dye"], description: "The refined court batik of Surakarta (Solo), Central Java, known for its subdued earth tones of soga brown and indigo.", era: "17th century", steps: ["The finest cotton is selected and prepared through repeated soaking in plant-based solutions.", "The royal patterns, such as parang and kawung, are carefully applied with hot wax using a canting.", "The cloth is dyed in traditional soga brown made from the bark of the soga tree, mixed with indigo."], funFact: "The Parang Rusak pattern was legally restricted to Javanese royalty only." },
        { name: "Balinese Wood Carving", image: "images/balinese-wood-carving.jpg", state: "Indonesia", region: "Southeast Asia", lat: -8.524, lng: 115.278, type: "Sculpture", materials: ["wood"], description: "The elaborate wood carving tradition of Mas village in Bali, where artisans create intricate sculptures depicting Hindu.", era: "14th century", steps: ["A block of crocodile wood or hibiscus wood is selected and seasoned for several months.", "The rough form of the figure is carved out using chisels and mallets following the natural grain.", "The fine details of facial expressions, flowing garments, and ornamental elements are meticulously carved with small hand tools."], funFact: "The village of Mas has been the carving center since the 14th century." },
        { name: "Balinese Stone Carving", image: "images/balinese-stone-carving.jpg", state: "Indonesia", region: "Southeast Asia", lat: -8.541, lng: 115.306, type: "Sculpture", materials: ["stone"], description: "The ancient stone carving tradition of Batubulan village in Bali.", era: "10th century", steps: ["Blocks of soft grey paras volcanic stone are quarried from local deposits near the village.", "The rough outline of the guardian figure or deity is shaped using heavy chisels and hammers.", "The intricate details of facial features, headdresses, and floral ornaments are carved with fine-pointed tools."], funFact: "\"Batubulan\" literally translates to \"moon stone\" in Balinese." },
        { name: "Javanese Gamelan Making", image: "images/javanese-gamelan-making.jpg", state: "Indonesia", region: "Southeast Asia", lat: -7.571, lng: 110.826, type: "Sculpture", materials: ["bronze", "copper", "iron"], description: "The sacred craft of forging Javanese gamelan instruments, where bronze gongs, metallophones.", era: "9th century", steps: ["A precise alloy of copper and tin is melted in a crucible furnace to create the bronze mixture.", "The molten bronze is poured into sand molds shaped for each specific instrument type.", "The cast bronze pieces are hammered and shaped by a team of smiths working in coordinated rhythmic strikes."], funFact: "Each set is considered sacred and given its own proper name at birth." },
        { name: "Torajan Tau Tau Effigy", image: "https://upload.wikimedia.org/wikipedia/commons/a/a4/COLLECTIE_TROPENMUSEUM_Verschillende_tau-tau_van_een_overleden_vorst_TMnr_20000489.jpg", state: "Indonesia", region: "Southeast Asia", lat: -3.014, lng: 119.854, type: "Ritual", materials: ["wood", "natural dye", "cotton"], description: "The carved wooden funeral effigies of the Toraja people in South Sulawesi.", era: "Pre-colonial era", steps: ["A jackfruit wood log is selected for its durability and carved into a life-sized human figure.", "The face is sculpted to resemble the deceased, with careful attention to their features and expression.", "The effigy is dressed in the clothing and ornaments that the deceased wore in life."], funFact: "Effigies are placed in cliff-face balconies to watch over the living." },
        { name: "Dayak Beadwork", image: "images/dayak-beadwork.jpg", state: "Indonesia", region: "Southeast Asia", lat: 0.026, lng: 109.342, type: "Jewelry", materials: ["beads", "thread", "plant fiber"], description: "The vibrant beadwork tradition of the Dayak peoples of Kalimantan (Borneo), who create elaborate beaded baby carriers.", era: "Pre-colonial era", steps: ["Tiny glass trade beads are sorted by color and size according to the planned design pattern.", "The beads are strung onto strong plant fiber threads following traditional motifs passed down through generations.", "The beaded strands are woven together on a frame or stitched onto a backing of cloth or bark."], funFact: "The aso (dragon-dog) motif appears on nearly every Dayak beaded piece." },
        { name: "Sasak Weaving", image: "images/sasak-weaving.jpg", state: "Indonesia", region: "Southeast Asia", lat: -8.586, lng: 116.095, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The traditional hand-weaving of the Sasak people of Lombok, producing songket and ikat textiles on backstrap looms using handspun cotton and natural dyes.", era: "Pre-colonial era", steps: ["The cotton is hand-spun into thread and wound onto bobbins for the warp and weft.", "The threads are dyed using natural materials such as indigo leaves, turmeric, and morinda root bark.", "The weaver sits on the ground with a backstrap loom tied around her waist and begins interlacing the colored threads."], funFact: "A young woman must weave a complete cloth before she is allowed to marry." },
        { name: "Sumba Ikat Weaving", image: "images/sumba-ikat-weaving.jpg", state: "Indonesia", region: "Southeast Asia", lat: -9.654, lng: 119.425, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The distinctive warp ikat textiles of Sumba island in eastern Indonesia, known for bold figurative designs of horses.", era: "Pre-colonial era", steps: ["The cotton threads are hand-spun and stretched on a frame to form the warp of the cloth.", "Bundles of warp threads are tightly bound with palm leaf strips to resist dye in the planned pattern areas.", "The bound warp is immersed repeatedly in natural indigo and morinda red dye baths over several months."], funFact: "Ikat cloths called hinggi still function as currency for bride payments." },
        { name: "Minangkabau Songket", image: "images/minangkabau-songket.jpg", state: "Indonesia", region: "Southeast Asia", lat: -0.464, lng: 100.379, type: "Clothing", materials: ["silk", "gold thread", "silver"], description: "The luxurious brocade weaving of the Minangkabau people of West Sumatra.", era: "14th century", steps: ["The finest silk threads are prepared as the base fabric and stretched onto the frame loom.", "Thin gold or silver metallic threads are carefully wound onto small shuttles for the supplementary weft.", "The weaver picks up individual warp threads by hand to insert the metallic supplementary weft, creating the raised brocade pattern."], funFact: "The Minangkabau are the world's largest matrilineal society." },
        { name: "Javanese Wayang Golek Puppet", image: "images/javanese-wayang-golek-puppet.jpg", state: "Indonesia", region: "Southeast Asia", lat: -6.914, lng: 107.609, type: "Toys", materials: ["wood", "cotton", "natural dye", "gold thread"], description: "Three-dimensional wooden rod puppets carved and dressed in elaborate costumes.", era: "16th century", steps: ["The puppet's head is carved from lightweight albesia wood and painted with detailed facial features denoting the character's nature.", "The wooden hands are carved separately with articulated fingers and attached to bamboo control rods.", "The body is constructed from a central wooden rod wrapped in padded cloth to form the torso."], funFact: "Puppet features are exaggerated to signal moral character at a glance." },
        { name: "Acehnese Rencong Dagger", image: "images/acehnese-rencong-dagger.jpg", state: "Indonesia", region: "Southeast Asia", lat: 5.548, lng: 95.323, type: "Jewelry", materials: ["iron", "brass", "wood", "gold"], description: "The iconic curved dagger of Aceh province in northern Sumatra.", era: "16th century", steps: ["The iron blade is forged by repeatedly heating and hammering the metal, folding it to create strength and a sharp edge.", "The blade is ground into its characteristic slightly curved shape with a reinforced spine.", "The handle is carved from wood or ivory into the distinctive angular form and may be decorated with gold or brass fittings."], funFact: "The handle shape is believed to spell \"bismillah\" in Arabic script." },
        { name: "Balinese Canang Sari Offering", image: "images/balinese-canang-sari-offering.jpg", state: "Indonesia", region: "Southeast Asia", lat: -8.409, lng: 115.189, type: "Ritual", materials: ["plant fiber", "bamboo"], description: "The daily Hindu offering baskets of Bali, woven from young coconut leaves and filled with flowers, rice, and incense.", era: "Pre-colonial era", steps: ["Young coconut palm leaves are cut into strips and pinned together with bamboo staples to form a small square tray.", "The base is lined with a piece of banana leaf and filled with betel nut, lime, and a few grains of rice.", "Fresh flowers are arranged by color in the four cardinal directions: white for east, red for south, yellow for west, and blue or green for north."], funFact: "Families make 15-25 offerings per day, totaling millions across Bali." },
        { name: "Indonesian Batik Cap", image: "images/batik-solo.jpg", state: "Indonesia", region: "Southeast Asia", lat: -7.005, lng: 110.438, type: "Clothing", materials: ["cotton", "wax", "natural dye", "copper"], description: "Stamped batik produced using copper block stamps called cap, developed in the 19th century to meet growing demand.", era: "19th century", steps: ["A copper stamp is fabricated by soldering thin copper strips into the desired batik pattern on a metal frame with a handle.", "The cap stamp is dipped into a tray of molten wax and pressed firmly onto the prepared cotton cloth.", "The stamping is repeated across the entire fabric surface, with the artisan carefully aligning each impression."], funFact: "A copper stamp can print an entire cloth panel in a single day." },
        { name: "Bugis Silk Weaving", image: "images/bugis-silk-weaving.jpg", state: "Indonesia", region: "Southeast Asia", lat: -3.997, lng: 119.995, type: "Clothing", materials: ["silk", "natural dye", "gold thread"], description: "The prestigious silk weaving tradition of the Bugis people of South Sulawesi.", era: "15th century", steps: ["Raw silk threads are carefully unwound from cocoons and spun into fine yarn on hand spindles.", "The silk is dyed in rich colors using natural pigments and mordanted to fix the hues permanently.", "The weaver sets up the warp on a large floor loom, arranging colors to create the plaid or checked pattern."], funFact: "Cloth colors indicated the wearer's social rank in Bugis hierarchy." },
        { name: "Thai Bronze Casting", image: "images/thai-bronze-casting.jpg", state: "Thailand", region: "Southeast Asia", lat: 14.353, lng: 100.569, type: "Sculpture", materials: ["bronze", "wax", "clay"], description: "The ancient art of casting bronze Buddha images and temple bells in the Ayutthaya tradition.", era: "14th century", steps: ["A detailed wax model of the Buddha figure is sculpted over a clay core by master artisans.", "The wax model is coated in multiple layers of fine clay slip and coarser clay to form a rigid outer mold.", "The mold is heated in a kiln, melting out the wax and leaving a hollow cavity in the exact shape of the sculpture."], funFact: "Ayutthaya bronzes rivaled anything produced in Renaissance Europe." },
        { name: "Thai Fruit Carving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Thai_fruit_carving.jpg/960px-Thai_fruit_carving.jpg", state: "Thailand", region: "Southeast Asia", lat: 13.756, lng: 100.502, type: "Kitchenware", materials: ["wood"], description: "The elegant Thai art of carving fruits, vegetables, and soap into intricate floral and ornamental forms.", era: "14th century", steps: ["The chosen fruit or vegetable is selected for firmness and symmetry, and specialized carving knives are prepared.", "The outer surface is scored with guide marks outlining the planned floral or leaf pattern.", "Precise cuts are made at varying depths to create layered petals, leaves, and ornamental forms using a thin-bladed knife."], funFact: "A royal consort is said to have started it by carving a watermelon." },
        { name: "Thai Yan Lipao Basketry", state: "Thailand", region: "Southeast Asia", lat: 8.432, lng: 99.963, type: "Home Decor", materials: ["plant fiber", "bamboo"], description: "The refined basketry of Nakhon Si Thammarat in southern Thailand.", era: "18th century", steps: ["The thin lipao fern vines are harvested from the forest and split into fine, even strands.", "The strands are coiled tightly around a bamboo or rattan core, with each coil stitched to the one below.", "The weaver builds the form upward, incorporating geometric patterns by alternating natural and dyed strands."], funFact: "Woven so tightly from vine that the baskets can hold water." },
        { name: "Thai Khon Mask", image: "images/thai-khon-mask.png", state: "Thailand", region: "Southeast Asia", lat: 13.751, lng: 100.491, type: "Ritual", materials: ["paper", "lac", "gold thread", "glass"], description: "The ornate papier-mache masks used in Thailand's Khon classical dance-drama.", era: "15th century", steps: ["Layers of khoi tree bark paper are pasted over a clay mold shaped to the character's face.", "Once dried and removed from the mold, the mask surface is smoothed and coated with lacquer.", "The elaborate crown and decorative elements are built up using layers of lacquered paper, gilded with gold leaf."], funFact: "Green means hero; red means demon; white means a monkey warrior." },
        { name: "Vietnamese Silk Lantern", image: "images/vietnamese-silk-lantern.jpg", state: "Vietnam", region: "Southeast Asia", lat: 15.879, lng: 108.335, type: "Home Decor", materials: ["silk", "bamboo", "natural dye"], description: "The colorful silk lanterns of Hoi An, crafted from dyed silk stretched over bamboo frames.", era: "16th century", steps: ["Thin bamboo strips are soaked and bent into circular hoops of graduated sizes.", "The hoops are assembled onto a vertical bamboo spine to form the lantern's spherical or cylindrical frame.", "Brightly dyed silk fabric is carefully stretched and glued over the bamboo skeleton."], funFact: "Hoi An turns off all electric lights every full moon, using only lanterns." },
        { name: "Vietnamese Bronze Drum", image: "images/vietnamese-bronze-drum.jpg", state: "Vietnam", region: "Southeast Asia", lat: 21.028, lng: 105.854, type: "Music", materials: ["bronze", "copper"], description: "The ancient Dong Son bronze drums of Vietnam, among the oldest and most significant bronze artifacts in Southeast Asia.", era: "6th century BCE", steps: ["A clay mold is sculpted with the drum's elaborate decorative patterns in reverse relief.", "A precise alloy of copper, tin, and lead is melted in a large furnace to create the bronze mixture.", "The molten bronze is poured into the assembled mold sections and allowed to cool slowly."], funFact: "The largest Dong Son drums weigh over 70 kg and are 2,000 years old." },
        { name: "Chu Dau Ceramic", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/%E6%B8%85%E5%BA%B7%E7%86%99_%E6%99%AF%E5%BE%B7%E9%8E%AE%E7%AA%AF%E9%9D%92%E8%8A%B1%E4%BA%94%E5%80%AB%E5%9C%96%E7%85%A8%E7%93%B7%E7%93%B6-Vase_with_auspicious_animals_MET_DP-14359-001.jpg/960px-%E6%B8%85%E5%BA%B7%E7%86%99_%E6%99%AF%E5%BE%B7%E9%8E%AE%E7%AA%AF%E9%9D%92%E8%8A%B1%E4%BA%94%E5%80%AB%E5%9C%96%E7%85%A8%E7%93%B7%E7%93%B6-Vase_with_auspicious_animals_MET_DP-14359-001.jpg", state: "Vietnam", region: "Southeast Asia", lat: 20.917, lng: 106.333, type: "Pottery", materials: ["clay", "natural dye"], description: "The refined blue-and-white ceramics of Chu Dau village in northern Vietnam.", era: "14th century", steps: ["The local white clay is prepared by washing, filtering, and aging to achieve a fine, workable consistency.", "The vessel is thrown on a potter's wheel and dried to a leather-hard state.", "Decorative motifs of dragons, phoenixes, and lotus flowers are painted onto the surface using cobalt blue pigment."], funFact: "Pieces have been found in shipwrecks from Japan to the Middle East." },
        { name: "Hang Trong Painting", image: "images/hang-trong-painting.jpg", state: "Vietnam", region: "Southeast Asia", lat: 21.033, lng: 105.85, type: "Home Decor", materials: ["paper", "natural dye"], description: "The refined folk painting tradition of Hanoi's Hang Trong street.", era: "17th century", steps: ["The design is carved in reverse onto a wooden block made from persimmon or thi wood.", "The block is inked and pressed onto traditional do paper to print the black outline.", "The printed image is meticulously hand-colored using natural pigments and watercolors applied with fine brushes."], funFact: "Unlike rustic Dong Ho prints, these were refined art for Hanoi's elite." },
        { name: "Burmese Kalaga Tapestry", image: "images/burmese-kalaga-tapestry.jpg", state: "Myanmar", region: "Southeast Asia", lat: 21.959, lng: 96.089, type: "Home Decor", materials: ["cotton", "gold thread", "beads", "glass"], description: "The heavily embroidered and appliqued textile panels of Myanmar, depicting royal court scenes, mythological creatures.", era: "18th century", steps: ["The background cloth of velvet or heavy cotton is stretched on a frame and the design is sketched out.", "Figures are built up in raised relief by padding cotton wool beneath the fabric and stitching it into three-dimensional forms.", "The padded figures are covered with elaborate embroidery using gold and silver metallic threads."], funFact: "Encrusted with glass, sequins, and gold thread in raised 3D relief." },
        { name: "Burmese Gold Leaf Making", image: "images/burmese-gold-leaf-making.jpg", state: "Myanmar", region: "Southeast Asia", lat: 21.975, lng: 96.084, type: "Ritual", materials: ["gold", "bamboo", "leather"], description: "The ancient craft of beating pure gold into extraordinarily thin leaves in Mandalay.", era: "12th century", steps: ["A small nugget of pure gold is placed between sheets of bamboo paper treated with ash.", "The gold packet is wrapped in deerskin and hammered with heavy mallets by teams of workers for up to five hours.", "The increasingly thin gold is repeatedly divided, re-stacked between fresh paper sheets, and hammered again."], funFact: "Sheets are beaten so thin that 1,000 stacked are thinner than a fingernail." },
        { name: "Inle Lake Lotus Silk Weaving", image: "images/inle-lake-lotus-silk-weaving.jpg", state: "Myanmar", region: "Southeast Asia", lat: 20.535, lng: 96.906, type: "Clothing", materials: ["plant fiber", "silk"], description: "The extraordinarily rare textile art of extracting silk-like fibers from lotus plant stems and weaving them into soft.", era: "19th century", steps: ["Fresh lotus stems are harvested from the lake and snapped by hand, drawing out the fine, sticky filaments from inside.", "The delicate lotus fibers are rolled together on the thigh by hand to form a continuous thread.", "The lotus thread is wound onto bobbins and set up as the weft on a simple frame loom."], funFact: "32,000 lotus stems yield enough fiber for just one scarf." },
        { name: "Khmer Stone Carving", image: "images/khmer-stone-carving.jpg", state: "Cambodia", region: "Southeast Asia", lat: 13.412, lng: 103.867, type: "Sculpture", materials: ["stone"], description: "The monumental stone carving tradition of the Khmer Empire, responsible for the extraordinary bas-reliefs and deity.", era: "9th century", steps: ["Blocks of grey or pink sandstone are quarried from the Kulen mountains and transported to the temple site.", "The stone blocks are set in place in the temple wall, and the design is sketched directly onto the surface.", "Master carvers chisel the sandstone in layers, working from shallow background to deep foreground relief."], funFact: "Angkor Wat's bas-relief gallery stretches over 600 meters nonstop." },
        { name: "Cambodian Krama Weaving", image: "images/cambodian-krama-weaving.jpg", state: "Cambodia", region: "Southeast Asia", lat: 11.556, lng: 104.928, type: "Clothing", materials: ["cotton", "silk", "natural dye"], description: "The weaving of Cambodia's iconic checkered scarf, the krama, a versatile cotton or silk cloth worn as headwrap, belt.", era: "Pre-colonial era", steps: ["Cotton or silk thread is hand-dyed in the traditional red and blue colors using natural plant dyes.", "The warp threads are arranged on a frame loom in alternating colored groups to create the check pattern.", "The weaver passes the weft shuttle through the shed, building the characteristic gingham-like grid."], funFact: "Every Cambodian is said to own at least one krama for daily use." },
        { name: "Cambodian Golden Silk Weaving", image: "images/cambodian-golden-silk-weaving.jpg", state: "Cambodia", region: "Southeast Asia", lat: 11.001, lng: 104.78, type: "Clothing", materials: ["silk", "natural dye"], description: "The production of Cambodia's prized golden silk from the native golden silk moth in Takeo province.", era: "13th century", steps: ["The golden silk moths are raised on mulberry leaves, and their naturally golden-hued cocoons are harvested.", "The cocoons are soaked in warm water and the long silk filaments are carefully unwound onto reels.", "The golden silk thread is prepared and set up on a traditional Khmer floor loom."], funFact: "The silk's golden color comes from the silkworm's diet, not any dye." },
        { name: "Laotian Sa Paper", image: "https://encyclocraftsapr.com/wp-content/uploads/2017/09/Saa-paper-2.jpg", state: "Laos", region: "Southeast Asia", lat: 19.886, lng: 102.135, type: "Home Decor", materials: ["plant fiber", "bamboo"], description: "The traditional handmade paper of Laos, crafted from the bark of the mulberry tree (sa tree).", era: "Pre-colonial era", steps: ["The inner bark of the mulberry tree is stripped, soaked in water, and boiled until the fibers soften and separate.", "The softened bark fibers are beaten with wooden mallets until they form a smooth, uniform pulp.", "The pulp is spread thinly over a mesh screen stretched on a bamboo frame and dried in the sun."], funFact: "Made from mulberry bark and used for temple manuscripts for centuries." },
        { name: "Laotian Hmong Batik", image: "images/laotian-hmong-batik.jpg", state: "Laos", region: "Southeast Asia", lat: 19.454, lng: 103.51, type: "Clothing", materials: ["cotton", "wax", "natural dye"], description: "The indigo-dyed wax-resist textile tradition of the Hmong hill tribes of Laos, featuring bold geometric spirals.", era: "Pre-colonial era", steps: ["Locally grown hemp or cotton cloth is washed and prepared as the base fabric.", "Melted beeswax is applied to the fabric using a small copper drawing tool called a tjanting, following geometric patterns from memory.", "The waxed fabric is immersed in indigo dye vats, with the dyeing process repeated many times to achieve a deep blue-black color."], funFact: "Women learn every geometric pattern entirely from memory, never written." },
        { name: "Laotian Silver Jewelry", image: "images/igorot-weaving.jpg", state: "Laos", region: "Southeast Asia", lat: 19.889, lng: 102.141, type: "Jewelry", materials: ["silver"], description: "The traditional silversmithing of Laos, particularly among highland ethnic groups, producing ornate necklaces.", era: "Pre-colonial era", steps: ["Silver ingots or old coins are melted in a charcoal crucible and cast into workable bars or sheets.", "The silver is hammered into thin sheets or drawn into wire using hand tools and an anvil.", "The pieces are shaped, engraved, and assembled into the jewelry form, with granulation and filigree details added."], funFact: "Soul-lock pendants placed on babies at birth protect them from evil." },
        { name: "Igorot Weaving", image: "images/igorot-weaving.jpg", state: "Philippines", region: "Southeast Asia", lat: 16.411, lng: 120.596, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The backstrap loom weaving of the Igorot peoples of the Cordillera highlands in northern Luzon.", era: "Pre-colonial era", steps: ["Cotton is hand-spun into thread and dyed using natural sources such as tree bark for red and indigo for dark blue.", "The warp threads are measured and arranged on a backstrap loom tied between the weaver's body and a post.", "The weaver creates the distinctive striped and diamond patterns by carefully selecting and lifting warp threads."], funFact: "Kalinga weavers still use backstrap looms identical to pre-colonial ones." },
        { name: "Yakan Weaving", image: "images/yakan-weaving.jpg", state: "Philippines", region: "Southeast Asia", lat: 6.906, lng: 121.965, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The extraordinarily complex geometric weaving of the Yakan people of Basilan island in Mindanao, known for their vibrant.", era: "Pre-colonial era", steps: ["Cotton threads are hand-dyed in vivid primary colors and carefully sorted by hue.", "The warp is set up on a backstrap loom with the colored threads arranged to form the base of the geometric pattern.", "The weaver uses a supplementary weft technique, manually picking up individual threads to create the dense, symmetric designs."], funFact: "The bunga-sama (mixed flower) patterns are unique to Basilan Island." },
        { name: "Filipino Burnay Pottery", image: "images/filipino-burnay-pottery.jpg", state: "Philippines", region: "Southeast Asia", lat: 17.572, lng: 120.387, type: "Pottery", materials: ["clay"], description: "The robust, unglazed earthenware jars of the Ilocos region in northern Luzon, used for centuries to ferment vinegar.", era: "Pre-colonial era", steps: ["The local red clay is dug from riverbanks, cleaned of impurities, and kneaded to a workable consistency.", "The jar is built up by coiling thick ropes of clay and smoothing them with a wooden paddle and stone anvil.", "The surface is burnished with a smooth stone or shell to create a semi-polished finish that reduces porosity."], funFact: "Vigan jars are so durable some households use ones over 200 years old." },
        { name: "Peranakan Beadwork", image: "images/peranakan-beadwork.jpg", state: "Malaysia", region: "Southeast Asia", lat: 5.414, lng: 100.33, type: "Footwear", materials: ["beads", "thread", "leather"], description: "The exquisite beaded slippers and household items of the Peranakan (Straits Chinese) community.", era: "19th century", steps: ["Thousands of tiny glass seed beads, often from Venice or Bohemia, are sorted by color.", "A cotton or linen canvas is stretched on a frame and the intricate floral design is marked out.", "Each bead is individually stitched onto the canvas using a fine needle and thread, following the pattern bead by bead."], funFact: "Beads as small as 1mm are stitched one by one onto slipper faces." },
        { name: "Malaysian Pewtercraft", image: "images/malaysian-pewtercraft.jpg", state: "Malaysia", region: "Southeast Asia", lat: 3.139, lng: 101.687, type: "Kitchenware", materials: ["metal", "copper"], description: "The traditional pewtersmithing of Malaysia, utilizing the country's rich tin deposits to create finely crafted tankards.", era: "19th century", steps: ["An alloy of tin, copper, and antimony is melted and cast into flat sheets or poured into molds.", "The cast piece is turned on a lathe or hammered over a form to achieve the desired vessel shape.", "The surface is hand-filed and polished to a mirror-like finish or satin sheen."], funFact: "Malaysia was once the world's biggest tin producer, fueling this craft." },
        { name: "Malaysian Wau Kite", image: "images/malaysian-wau-kite.jpg", state: "Malaysia", region: "Southeast Asia", lat: 6.121, lng: 102.238, type: "Toys", materials: ["bamboo", "paper", "natural dye"], description: "The ornate traditional kites of the Malaysian east coast, particularly the crescent-shaped Wau Bulan (moon kite).", era: "15th century", steps: ["Bamboo is split into thin, flexible strips and bent into the characteristic crescent wing shape and frame.", "The bamboo skeleton is bound together with cord at the joints to create a sturdy but flexible structure.", "Colorful tissue paper or hand-painted fabric is glued over the frame and cut into elaborate floral motifs."], funFact: "The Wau Bulan kite appears on Malaysia's airline logo and currency." },
        { name: "Palestinian Olive Wood Carving", state: "Palestine", region: "Middle East", lat: 31.705, lng: 35.202, type: "Sculpture", materials: ["wood"], description: "The ancient tradition of carving religious figures, nativity scenes.", era: "4th century", steps: ["Olive wood from pruned or fallen trees is seasoned for at least two years to prevent cracking.", "The rough shape of the figure or scene is cut from the wood block using hand saws and chisels.", "The fine details of faces, hands, and drapery are carved with small gouges and knives."], funFact: "Some olive trees in Bethlehem are over 2,000 years old." },
        { name: "Hebron Glass", image: "images/hebron-glass.jpg", state: "Palestine", region: "Middle East", lat: 31.529, lng: 35.095, type: "Home Decor", materials: ["glass"], description: "The centuries-old tradition of blown glass production in Hebron, where artisans create vivid blue, green.", era: "1st century", steps: ["Recycled glass and raw sand are melted together in a clay furnace heated by wood or olive pits.", "The glassblower gathers a blob of molten glass on the end of a long iron blowpipe.", "The glass is blown, shaped, and tooled into vessels, bracelets, or beads while still hot and malleable."], funFact: "Recycled glass and Negev sand give each piece a distinctive blue-green." },
        { name: "Nablus Soap Making", image: "images/nablus-soap-making.jpg", state: "Palestine", region: "Middle East", lat: 32.222, lng: 35.261, type: "Other", materials: ["plant fiber"], description: "The traditional production of pure olive oil soap in the city of Nablus.", era: "10th century", steps: ["Virgin olive oil is mixed with water and an alkaline solution of barilla plant ash in large copper cauldrons.", "The mixture is cooked over a fire for several days, stirred constantly until it saponifies into a thick paste.", "The hot soap paste is spread onto a flat surface, smoothed, and stamped with the manufacturer's seal before being cut into bars."], funFact: "At its peak, Nablus had over 30 soap factories within its old city walls." },
        { name: "Lebanese Pottery", image: "images/lebanese-pottery.jpg", state: "Lebanon", region: "Middle East", lat: 33.94, lng: 35.635, type: "Pottery", materials: ["clay", "natural dye"], description: "The traditional earthenware pottery of the village of Beit Chabab in Mount Lebanon, known for producing sturdy.", era: "Phoenician era", steps: ["The local iron-rich red clay is dug from hillside deposits and cleaned of stones and impurities.", "The clay is centered on a kick wheel and thrown into the desired form, such as a water jar or cooking pot.", "The leather-hard vessel is decorated with incised patterns or simple painted motifs."], funFact: "A direct continuation of Phoenician ceramic methods from 3,000 years ago." },
        { name: "Lebanese Silk Weaving", image: "images/lebanese-silk-weaving.jpg", state: "Lebanon", region: "Middle East", lat: 33.827, lng: 35.597, type: "Clothing", materials: ["silk", "natural dye"], description: "The historic silk weaving industry of Mount Lebanon, where mulberry groves fed silkworms whose thread was woven.", era: "6th century", steps: ["Silkworms are raised on mulberry leaves in trays within ventilated rooms until they spin their cocoons.", "The cocoons are soaked in hot water to loosen the sericin, and the fine silk filaments are reeled onto bobbins.", "The silk threads are dyed using local plant dyes and set up on floor looms for weaving."], funFact: "Mount Lebanon exported so much silk it rivaled Chinese production in 1860." },
        { name: "Jezzine Cutlery", image: "images/jezzine-cutlery.jpg", state: "Lebanon", region: "Middle East", lat: 33.545, lng: 35.587, type: "Kitchenware", materials: ["iron", "silver", "bone"], description: "The distinctive handcrafted cutlery of Jezzine in southern Lebanon, featuring ornamental handles shaped like birds.", era: "18th century", steps: ["Steel blades are forged and shaped by hand on an anvil, then tempered and sharpened.", "Horn, bone, or metal blanks are carved into the characteristic bird or cedar tree handle shape.", "The handle is fitted onto the blade tang and secured with rivets or resin."], funFact: "Every handle is shaped like a mythical phoenix-like bird." },
        { name: "Damascus Steel", image: "images/damascus-steel.jpg", state: "Syria", region: "Middle East", lat: 33.513, lng: 36.292, type: "Jewelry", materials: ["iron", "metal"], description: "The legendary steel of Damascus, renowned throughout the medieval world for its distinctive watered pattern.", era: "3rd century", steps: ["Wootz steel ingots, imported from India or produced locally, are heated in a charcoal forge until glowing.", "The hot steel is folded, hammered, and welded repeatedly to distribute the carbon microstructures that create the watered pattern.", "The blade is shaped through careful hammering and grinding into its final form with precise edge geometry."], funFact: "The production secret was lost around 1750 and has never been recovered." },
        { name: "Syrian Brocade", image: "images/syrian-brocade.jpg", state: "Syria", region: "Middle East", lat: 33.51, lng: 36.31, type: "Clothing", materials: ["silk", "gold thread", "silver"], description: "The luxurious woven silk brocade of Damascus, known in Europe as 'damask,' featuring elaborate floral and geometric.", era: "12th century", steps: ["The finest silk thread is prepared and dyed, with warp and weft threads often in the same color.", "The complex pattern is set up on a drawloom using a system of heddles that controls the satin and twill weave areas.", "The weaver works the loom while an assistant (the drawboy) pulls the correct pattern cords from above."], funFact: "The word \"damask\" entered European languages directly from Damascus." },
        { name: "Syrian Mosaic Woodwork", image: "images/syrian-mosaic-woodwork.jpg", state: "Syria", region: "Middle East", lat: 33.508, lng: 36.295, type: "Furniture", materials: ["wood", "shell", "bone", "metal"], description: "The intricate geometric inlay woodwork of Damascus, where tiny pieces of different colored woods, bone.", era: "12th century", steps: ["Thin strips of different colored woods such as walnut, lemon, and rose are glued together in precise geometric arrangements.", "The assembled wood bundle is sliced crosswise into thin wafers, each revealing the complete geometric pattern.", "These pattern wafers are glued side by side onto the surface of the wooden object, creating a continuous mosaic field."], funFact: "Boxes use thousands of tiny wood pieces; no two patterns are identical." },
        { name: "Kurdish Carpet Weaving", image: "images/kurdish-carpet-weaving.jpg", state: "Iraq", region: "Middle East", lat: 36.191, lng: 44.009, type: "Home Decor", materials: ["wool", "natural dye", "cotton"], description: "The richly colored pile carpet weaving tradition of the Kurdish people of northern Iraq.", era: "Pre-Islamic era", steps: ["Wool from local sheep is washed, carded, and hand-spun into strong yarn on a drop spindle.", "The yarn is dyed using natural materials: pomegranate rinds for yellow, walnut husks for brown, and indigo for blue.", "The warp is strung on a vertical loom, and the weaver ties individual knots row by row following the pattern from memory."], funFact: "Weavers never use written patterns; every design is held in memory." },
        { name: "Iraqi Mudhif Reed House", image: "images/iraqi-mudhif-reed-house.jpg", state: "Iraq", region: "Middle East", lat: 31.044, lng: 47.023, type: "Furniture", materials: ["grass", "plant fiber"], description: "The monumental reed guest houses of the Marsh Arabs of southern Iraq.", era: "3rd millennium BCE", steps: ["Giant qasab reeds are harvested from the marshes and dried in bundles of increasing thickness.", "Massive reed bundle columns are erected in two parallel rows and bent inward to meet at the top, forming pointed arches.", "Lighter reed bundles are lashed horizontally across the arches to create the ribbed vault of the roof and walls."], funFact: "This arched reed architecture appears in Sumerian carvings from 3000 BC." },
        { name: "Mandaean Silver Craft", image: "images/mandaean-silver-craft.jpg", state: "Iraq", region: "Middle East", lat: 31, lng: 47, type: "Jewelry", materials: ["silver", "gold"], description: "The traditional silverwork of Iraq's Mandaean community, whose artisans are renowned across the Middle East.", era: "1st century", steps: ["Silver is melted and drawn into extremely fine wire or hammered into thin sheets.", "The wire is twisted and coiled into intricate filigree scrolls and rosettes using fine pliers.", "The filigree elements are arranged on a silver base and soldered into place to form the complete design."], funFact: "Mandaean men were required by religion to learn silversmithing." },
