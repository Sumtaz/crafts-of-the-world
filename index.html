        { name: "Nicaraguan Hammock Weaving", image: "", state: "Nicaragua", region: "Masaya", lat: 11.9744, lng: -86.0942, type: "Furniture", materials: ["Cotton", "Natural Dye", "Thread"], description: "The city of Masaya, known as the cradle of Nicaraguan folklore, is celebrated for its brightly colored cotton hammocks. Woven on large upright looms, these hammocks blend indigenous weaving knowledge with Spanish colonial textile traditions to produce sleeping and resting furniture suited to the tropical climate.", era: "Colonial Era", steps: ["Cotton yarn was dyed in vivid colors using both natural and later synthetic dyes, then wound onto bobbins and prepared for warping on the tall wooden loom.", "The warp threads were strung vertically on a standing frame loom, with their arrangement determining the width and color pattern of the finished hammock.", "A weaver passed the shuttle carrying the weft thread back and forth through the warp, building up the dense, flexible body of the hammock row by row.", "The finished woven panel was gathered at each end and the warp threads were braided into thick suspension cords, often finished with decorative crocheted edges and tassels."], funFact: "Masaya's central market, the Mercado de Artesanías, is the largest crafts market in Central America, and hammock vendors there can be seen testing their wares by lying in them between sales to demonstrate their strength."},
        { name: "Ilobasco Miniature Clay Figures", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Ilobasco.svg/960px-Ilobasco.svg.png", state: "El Salvador", region: "Cabañas", lat: 13.8417, lng: -88.85, type: "Sculpture", materials: ["Clay", "Natural Dye", "Wax"], description: "The town of Ilobasco in Cabañas department is famous for its sorpresas—tiny, intricately detailed ceramic figurines hidden inside walnut-sized clay shells. These miniatures depict scenes of daily life, nativity tableaux, and whimsical characters, and are considered among the finest small-scale ceramic art in Latin America.", era: "Colonial Era", steps: ["Fine local clay was cleaned, sieved, and mixed with water to form a smooth, highly plastic paste capable of holding the minute details required for miniature work.", "Using only fingertips and simple pointed tools such as thorns and wire, the artisan sculpted tiny figures sometimes no larger than a fingernail, forming detailed human faces, animals, and domestic scenes.", "The miniatures were air-dried slowly in the shade to prevent cracking, then fired at low temperatures in small kilns to harden them while preserving the delicate features.", "After firing, each figure was painted by hand with fine brushes using vivid pigments, and the sorpresas were placed inside hollow clay egg shells that were sealed shut, to be cracked open as gifts revealing the surprise within."], funFact: "The tradition of hiding figurines inside clay eggs gave rise to the name sorpresas, meaning surprises, and they became popular gifts exchanged during Christmas and Easter celebrations throughout El Salvador."},
        { name: "Salvadoran Indigo Dyeing", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Indigo_cake.jpg/960px-Indigo_cake.jpg", state: "El Salvador", region: "Suchitoto", lat: 13.9381, lng: -89.0281, type: "Clothing", materials: ["Cotton", "Natural Dye", "Plant Fiber"], description: "El Salvador was once the world's leading producer of añil, the indigo dye extracted from the jiquilite plant. In Suchitoto and surrounding towns, the ancient art of indigo cultivation and dyeing has been revived, producing deep blue textiles through a complex fermentation process dating to pre-Columbian times.", era: "Pre-Columbian", steps: ["The leaves and stems of the jiquilite plant were harvested at peak maturity and submerged in large stone or clay vats filled with water, where they were left to ferment and release their blue pigment over the course of several days.", "The fermented liquid was beaten vigorously with wooden paddles to oxygenate it, a process that caused the dissolved indigo to precipitate into solid blue particles that settled to the bottom of the vat.", "The settled indigo sediment was collected, strained through cloth, and formed into cakes or blocks that were dried in the sun and could be stored or traded.", "To dye fabric, the indigo cakes were dissolved in an alkaline bath made with wood ash and water, and cotton textiles were repeatedly dipped and aired to build up layers of the characteristic deep blue color."], funFact: "During the colonial period, Salvadoran indigo was so valuable that it was sometimes called blue gold, and at its peak in the 18th century, El Salvador exported more indigo than any other territory in the Spanish Empire."},
        { name: "Dominican Faceless Dolls", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/IKEA_Shopping_centre_Sweden.jpg/960px-IKEA_Shopping_centre_Sweden.jpg", state: "Dominican Republic", region: "Higüey", lat: 18.6151, lng: -68.7079, type: "Sculpture", materials: ["Clay", "Natural Dye", "Beads"], description: "The muñecas sin rostro, or faceless dolls, of the Dominican Republic are ceramic figurines deliberately crafted without facial features. This artistic choice symbolizes the blended Taíno, African, and Spanish heritage of the Dominican people, representing that no single ethnicity defines the nation's identity.", era: "19th Century", steps: ["Local clay was gathered, cleaned of impurities, and kneaded into a smooth, workable consistency suitable for sculpting the flowing forms of the female figures.", "The artisan hand-modeled the figure, shaping the characteristic wide skirt, arms carrying baskets or flowers, and a smooth, featureless oval head that deliberately omitted eyes, nose, and mouth.", "The shaped figure was left to dry slowly, then fired in a small kiln at moderate temperatures to achieve a strong but porous ceramic body.", "After cooling, the doll was painted in vivid colors using fine brushes, with elaborate floral patterns adorning the wide skirt and headscarf, while the face was left as a blank, polished surface."], funFact: "The faceless dolls have become the most recognizable souvenir of the Dominican Republic, and their deliberate lack of features has been interpreted as a powerful statement that Dominican identity transcends any single racial or ethnic category."},
        { name: "Dominican Larimar Jewelry", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Larimar.jpg/960px-Larimar.jpg", state: "Dominican Republic", region: "Barahona", lat: 18.2089, lng: -71.1003, type: "Jewelry", materials: ["Stone", "Silver", "Copper"], description: "Larimar, a rare blue variety of the mineral pectolite, is found nowhere on Earth except in the mountains of Barahona province in the Dominican Republic. Local jewelers set this ocean-blue stone into silver and copper settings, creating distinctive pieces that have become emblematic of Caribbean craftsmanship.", era: "19th Century", steps: ["Larimar was mined from volcanic rock formations in the Sierra de Bahoruco mountains using hand tools, with miners following narrow veins of the blue pectolite deep into the hillside.", "The rough stone was cut into cabochon shapes using lapidary techniques, with the cutter carefully orienting each piece to display the most vivid blue coloration and characteristic white cloud-like patterns.", "A silver or copper setting was fabricated by the jeweler, who shaped wire and sheet metal into bezels, prongs, or wrapped frames designed to complement the organic contours of each unique stone.", "The polished larimar cabochon was secured into its metal setting, and the completed piece was given a final polish to bring out both the luster of the metal and the translucent blue depth of the stone."], funFact: "Larimar is found only in a single mountainous area of the Dominican Republic and nowhere else on the planet, making it one of the rarest gemstones in the world and earning it the nickname the Caribbean gem."},
        { name: "Trinidadian Carnival Mask", image: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Orange_Carnival_Masqueraders_in_Trinidad.jpg", state: "Trinidad and Tobago", region: "Port of Spain", lat: 10.6596, lng: -61.5086, type: "Ritual", materials: ["Paper", "Wire", "Natural Dye", "Beads", "Thread"], description: "The elaborate masks and headpieces of Trinidad Carnival draw on African masquerade traditions blended with European carnival customs. Master craftsmen build towering wire-frame structures covered in papier-mâché, fabric, and feathers to create fantastical characters for the annual pre-Lenten festival.", era: "18th Century", steps: ["A wire armature was bent and shaped into the basic structure of the mask or headpiece, with the craftsman forming the exaggerated features of traditional carnival characters such as Midnight Robbers, Moko Jumbies, or fancy sailors.", "Strips of newspaper or brown paper were soaked in a flour-and-water paste and layered over the wire frame in the papier-mâché technique, building up smooth, sculptural surfaces that were left to dry and harden.", "The hardened form was sanded, sealed, and painted with bright pigments, then adorned with mirrors, sequins, beads, and feathers to create the dazzling visual impact expected on the road during Carnival.", "Final adjustments were made to ensure the mask could be comfortably worn during hours of dancing and parading, with padding added to contact points and straps secured for stability."], funFact: "Trinidad Carnival's masquerade tradition traces directly to the 18th century when enslaved Africans created their own parallel celebration called Canboulay, which eventually merged with the French Creole pre-Lenten festivities to form the modern festival."},
        { name: "Trinidadian Cocoa Stick Making", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Cocoa_Pods.JPG/960px-Cocoa_Pods.JPG", state: "Trinidad and Tobago", region: "Gran Couva", lat: 10.4167, lng: -61.3833, type: "Kitchenware", materials: ["Wood", "Plant Fiber", "Natural Dye"], description: "In the cocoa-growing hills of Gran Couva, a traditional method of chocolate preparation has survived for centuries. Fermented and roasted cacao beans are ground and rolled into solid cocoa sticks, which are grated into hot water or milk to make rich cocoa tea, a beloved Caribbean breakfast staple.", era: "Colonial Era", steps: ["Ripe cacao pods were harvested from the estate trees, split open with a cutlass, and the wet beans were scooped out and placed in wooden sweat boxes to ferment for five to seven days, developing the complex chocolate flavor.", "The fermented beans were spread on large wooden drying trays called boucans and turned regularly under the tropical sun until fully dried, then roasted over a wood fire in a large iron pot until fragrant and dark.", "The roasted beans were cracked and winnowed to remove the papery husks, and the nibs were ground on a heated stone metate or in a hand-cranked mill until they formed a smooth, oily chocolate paste.", "The warm paste was shaped by hand into cylindrical sticks, sometimes blended with spices such as nutmeg or bay leaf, and wrapped in banana leaves or wax paper to harden and cure for storage."], funFact: "Trinidad's Trinitario cacao variety, a natural hybrid that arose on the island after a devastating hurricane in 1727, is now considered among the finest flavored cacaos in the world and forms the genetic basis of many premium chocolate brands."},
        { name: "Garifuna Drum Making", image: "https://upload.wikimedia.org/wikipedia/commons/8/85/Black_Caribs-family-St.-Vincent_by_Augustino_Brunias.jpg", state: "Belize", region: "Dangriga", lat: 16.9694, lng: -88.2328, type: "Ritual", materials: ["Wood", "Leather", "Plant Fiber", "Cotton"], description: "The Garifuna people of Belize's Caribbean coast craft sacred drums essential to their musical and spiritual traditions. Carved from a single log of mahogany or mayflower wood, these drums—the primera and segunda—provide the rhythmic foundation for punta music and the ancestral dügü ceremony.", era: "18th Century", steps: ["A section of mahogany or mayflower trunk was selected and hollowed out using fire and adze, carefully shaping the interior cavity to produce the desired resonance and tonal quality.", "The exterior of the drum body was carved smooth and shaped into a slight barrel form, with the craftsman sometimes adding carved decorative bands or symbols significant to Garifuna spiritual life.", "A piece of deer, peccary, or shark skin was soaked in water until pliable, then stretched tightly over the open end of the drum and secured with a ring of twisted vine or rope.", "The drumhead was tuned by adjusting the tension of the hide through a system of cords and wooden pegs, and the drum was seasoned near a fire to tighten the skin and achieve its final voice."], funFact: "Garifuna drumming and dance were inscribed by UNESCO as a Masterpiece of the Oral and Intangible Heritage of Humanity in 2001, recognizing the drum as central to a culture that blends Arawak, Carib, and West African traditions."},
        { name: "Belizean Maya Pottery", image: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Sacul_vase.jpg", state: "Belize", region: "Cayo District", lat: 17.15, lng: -88.75, type: "Pottery", materials: ["Clay", "Natural Dye", "Stone"], description: "In Belize's Cayo District, where ancient Maya cities once flourished in the jungle, contemporary Maya potters maintain ceramic traditions with roots stretching back thousands of years. Hand-built vessels are shaped using techniques virtually identical to those employed by their ancestors who built Xunantunich and Caracol.", era: "Pre-Columbian", steps: ["Clay was collected from riverbanks in the Cayo foothills and processed by soaking, straining, and mixing with crusite or volcanic ash temper to improve its firing strength.", "Vessels were constructed using the coil-and-scrape technique, in which coils of clay were stacked and then thinned and shaped using a gourd scraper and wooden paddle, producing smooth, even walls without a potter's wheel.", "The leather-hard vessel was decorated with incised designs or painted with slips made from red and black mineral pigments, featuring traditional motifs such as the rain god Chaak or the feathered serpent.", "The finished pot was fired in an open pit lined with hardwood fuel, reaching temperatures sufficient to vitrify the clay and permanently bond the painted decoration to the vessel's surface."], funFact: "Belize's Cayo District contains more ancient Maya archaeological sites per square mile than almost anywhere else in the Maya world, and modern potters sometimes find ancient ceramic shards in the same clay deposits they use for their own work."},
        { name: "Bahian Bobbin Lace", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Ursuline_lace_2.jpg/960px-Ursuline_lace_2.jpg", state: "Brazil", region: "Salvador, Bahia", lat: -12.97, lng: -38.51, type: "Clothing", materials: ["Cotton", "Thread", "Beads", "Wood"], description: "The renda de bilro, or bobbin lace, of Bahia is an intricate textile art brought to northeastern Brazil by Portuguese colonists and refined over centuries into a distinctly Brazilian tradition. Lacemakers manipulate dozens of thread-wound bobbins on a stuffed pillow, creating delicate openwork patterns used for garments, altar cloths, and decorative edging.", era: "Colonial Era", steps: ["A pattern was pricked into a strip of heavy paper or cardboard using a pin, with each hole marking a point where threads would cross or twist in the finished lace design.", "The pattern was pinned to a firm, cylindrical cushion, and pairs of wooden bobbins wound with fine cotton thread were attached at the starting points of the design.", "The lacemaker crossed and twisted the bobbins in specific sequences, moving them over and under one another while inserting pins at each pattern point to hold the developing lace structure in place.", "As the work progressed down the pillow, completed sections of lace were unpinned and rolled up, and the process continued until the full length of the edging, collar, or panel was finished."], funFact: "In the coastal towns around Salvador, it is still common to see women making bobbin lace on their doorsteps, and the rapid clicking of the wooden bobbins is so distinctive that Brazilians say you can hear a lacemaker before you see her."},
        { name: "Minas Gerais Soapstone Carving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Soapstone_%28Speckstein%29_-_several_colored_samples.jpg/960px-Soapstone_%28Speckstein%29_-_several_colored_samples.jpg", state: "Brazil", region: "Ouro Preto, Minas Gerais", lat: -20.39, lng: -43.5, type: "Sculpture", materials: ["Stone", "Metal", "Natural Dye"], description: "The baroque colonial town of Ouro Preto sits amid abundant deposits of pedra-sabão, or soapstone, which local artisans have carved into functional and decorative objects since the 18th century. From cooking pots and fountains to religious statuary, soapstone carving is inseparable from the cultural identity of Minas Gerais.", era: "Colonial Era", steps: ["Blocks of soapstone were quarried from the hillsides surrounding Ouro Preto using iron chisels and wedges, with the quarryman selecting pieces of uniform color and minimal fracturing.", "The block was rough-shaped with a hammer and point chisel, establishing the basic form of the intended object, whether a cooking pot, religious figure, or architectural ornament.", "Finer details were carved using rasps, rifflers, and small gouges, with the soft stone allowing the artisan to achieve remarkably detailed features, flowing drapery, and delicate relief patterns.", "The finished piece was smoothed with progressively finer abrasives and, in the case of cookware, seasoned over a low fire with oil or animal fat to seal the porous stone and make it suitable for use over direct heat."], funFact: "The master sculptor Aleijadinho, considered the greatest artist of colonial Brazil, carved his famous twelve prophets from Ouro Preto soapstone despite suffering from a degenerative disease that required his tools to be strapped to his hands."},
        { name: "Brazilian Maracatu Costume Craft", image: "https://upload.wikimedia.org/wikipedia/commons/0/01/Bloco_de_maracatu_-_olinda.jpg", state: "Brazil", region: "Recife, Pernambuco", lat: -8.05, lng: -34.87, type: "Clothing", materials: ["Beads", "Thread", "Gold Thread", "Cotton", "Natural Dye", "Metal"], description: "The maracatu nação processions of Recife feature elaborately costumed kings, queens, and courtiers in garments encrusted with beadwork, sequins, and embroidery that can weigh over twenty kilograms. This Afro-Brazilian tradition preserves the memory of African coronation ceremonies through months of painstaking costume construction.", era: "Colonial Era", steps: ["A base garment of heavy cotton or velvet was cut and sewn by hand into the regal shapes of capes, bodices, and wide skirts appropriate to the wearer's role in the maracatu court.", "Thousands of glass beads, sequins, and small mirrors were sewn individually onto the fabric in dense, symmetrical patterns that depicted crowns, stars, moons, and other symbols of African royalty.", "Gold and silver metallic threads were couched onto the garment in elaborate scrollwork and lettering that identified the maracatu nation and honored its spiritual patrons.", "Massive crowns and headdresses were constructed from wire frames covered in velvet and decorated with additional beadwork, rhinestones, and plumes, completing the regal ensemble that transformed the wearer into a ceremonial monarch."], funFact: "Each maracatu nação is led by a calunga, a sacred doll representing an ancestral spirit, and the queen who carries this doll during processions wears a costume so heavy with beadwork that attendants must help support her throughout the ceremony."},
        { name: "Jequitinhonha Valley Ceramics", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Par%C3%B3quia_S%C3%A3o_Miguel_e_Almas_de_Jequitinhonha.jpg/960px-Par%C3%B3quia_S%C3%A3o_Miguel_e_Almas_de_Jequitinhonha.jpg", state: "Brazil", region: "Vale do Jequitinhonha, Minas Gerais", lat: -16.44, lng: -41.01, type: "Pottery", materials: ["Clay", "Natural Dye", "Wood"], description: "In the remote Jequitinhonha Valley of northeastern Minas Gerais, one of Brazil's poorest regions, women artisans create extraordinary ceramic figures and vessels from the local red clay. These expressive pieces—depicting mothers with children, animals, and daily scenes—have transcended their humble origins to be exhibited in major art museums worldwide.", era: "Pre-Columbian", steps: ["Clay was collected from the banks of the Jequitinhonha River and its tributaries, cleaned of stones and roots, and kneaded by hand until it reached a smooth, workable consistency.", "The artisan shaped the clay entirely by hand without a wheel, sculpting large-bodied female figures, animals, or wide-mouthed vessels using techniques passed from grandmother to granddaughter over generations.", "Decorative details were added by incising patterns into the wet clay with sticks or combs and applying small sculpted elements such as flowers, children, or animals to the surface of the figure.", "The pieces were dried in the shade for several days, then fired in the open air using a bonfire of cattle dung and scrub wood, which produced the characteristic warm reddish-brown color of Jequitinhonha ceramics."], funFact: "The Jequitinhonha Valley's ceramic tradition is almost exclusively practiced by women, and the most celebrated artist from the region, Dona Isabel Mendes da Cunha, had her works acquired by the Smithsonian Institution despite never having traveled outside her rural community."},
    ];

    // ─────────────────────────────────────

                const typeConfig = {
        'Clothing':       { icon: '👗', color: '#c0506a', cssClass: 'clothing' },
        'Footwear':       { icon: '👟', color: '#e67e22', cssClass: 'footwear' },
        'Home Decor':     { icon: '🎨', color: '#2e8b7a', cssClass: 'home-decor' },
        'Kitchenware':    { icon: '🍲', color: '#2980b9', cssClass: 'kitchenware' },
        'Sculpture':      { icon: '🗿', color: '#6c5ce7', cssClass: 'sculpture' },
        'Furniture':      { icon: '🪑', color: '#00897b', cssClass: 'furniture' },
        'Jewelry':        { icon: '💎', color: '#d4a017', cssClass: 'jewelry' },
        'Toys':           { icon: '🎭', color: '#e74c3c', cssClass: 'toys' },
        'Pottery':        { icon: '🏺', color: '#b07d56', cssClass: 'pottery' },
        'Ritual':         { icon: '🪔', color: '#8e44ad', cssClass: 'ritual' },
    };

    // ─────────────────────────────────────
    //  INITIALIZE MAP
    // ─────────────────────────────────────
    const map = L.map('map', {
        center: [25, 30],
        zoom: 3,
        minZoom: 3,
        maxZoom: 10,
        maxBounds: [[-60, -180], [75, 180]],
        maxBoundsViscosity: 1.0,
        worldCopyJump: false,
        zoomControl: true,
        attributionControl: false,
    });

    // Layer 1: Terrain base with natural land colors
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Terrain_Base/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13,
    }).addTo(map);

    // Layer 2: Hillshade for depth/shadows
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13,
        opacity: 0.35,
    }).addTo(map);

    // Layer 3: Subtle text labels
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        opacity: 0.5,
    }).addTo(map);

    // ─────────────────────────────────────
    //  IMAGE FETCHING
    // ─────────────────────────────────────
    const imageCache = {};

    // Throttled fetch to avoid Wikimedia rate limits
    const fetchQueue = [];
    let activeFetches = 0;
    let fetchDelay = 300;

    function throttledFetch(url) {
        return new Promise((resolve, reject) => {
            fetchQueue.push({ url, resolve, reject });
            processQueue();
        });
    }

    function processQueue() {
        if (activeFetches >= 2 || fetchQueue.length === 0) return;
        activeFetches++;
        const item = fetchQueue.shift();
        setTimeout(() => doFetch(item), fetchDelay);
    }

    function doFetch(item, retries) {
        retries = retries || 0;
        fetch(item.url).then(r => {
            if (r.status === 429 || !r.ok) {
                if (retries < 3) {
                    fetchDelay = Math.min(fetchDelay * 2, 5000);
                    setTimeout(() => doFetch(item, retries + 1), fetchDelay * (retries + 1));
                    return;
                }
                activeFetches--;
                processQueue();
                item.reject(new Error('Rate limited'));
                return;
            }
            return r.text().then(text => {
                if (text.startsWith('You are making too many')) {
                    if (retries < 3) {
                        fetchDelay = Math.min(fetchDelay * 2, 5000);
                        setTimeout(() => doFetch(item, retries + 1), fetchDelay * (retries + 1));
                        return;
                    }
                    activeFetches--;
                    processQueue();
                    item.reject(new Error('Rate limited'));
                    return;
                }
                try {
                    const data = JSON.parse(text);
                    fetchDelay = Math.max(300, fetchDelay - 50);
                    activeFetches--;
                    processQueue();
                    item.resolve(data);
                } catch(e) {
                    activeFetches--;
                    processQueue();
                    item.reject(e);
                }
            });
        }).catch(err => {
            activeFetches--;
            processQueue();
            item.reject(err);
        });
    }

    function fetchCraftImage(craftName, imgId, marker) {
        if (imageCache[craftName] !== undefined) return;
        imageCache[craftName] = null;
    }

    let markers = [];

    function getImageSource(url) {
        if (!url) return '';
        try {
            const hostname = new URL(url).hostname;
            if (hostname.includes('wikipedia') || hostname.includes('wikimedia')) return 'Wikipedia';
            if (hostname.includes('handicrafts.nic.in')) return 'handicrafts.nic.in';
            if (hostname.includes('gaatha')) return 'gaatha.com';
            if (hostname.includes('asiainch')) return 'asiainch.org';
            return hostname.replace('www.', '');
        } catch(e) { return 'Wikipedia'; }
    }

    function createPopupContent(craft) {
        const tc = typeConfig[craft.type];
        const imgId = 'img-' + craft.name.replace(/[^a-zA-Z0-9]/g, '_');
        const imgSrc = craft.image || imageCache[craft.name] || '';
        const hasImage = !!imgSrc;
        const hideArea = !hasImage && !craft.image;
        const imgSource = getImageSource(imgSrc);
        const stepsHtml = craft.steps && craft.steps.length > 0
            ? `<div class="callout-steps">
                    <div class="callout-steps-title">The Craft Process</div>
                    <ol>${craft.steps.map(s => `<li>${s}</li>`).join('')}</ol>
               </div>`
            : '';
        const factHtml = craft.funFact
            ? `<div class="callout-fact">
                    <div class="callout-fact-title">Fun Fact</div>
                    <div class="callout-fact-content">
                        <span class="fact-icon">✦</span>
                        <span class="fact-text">${craft.funFact}</span>
                    </div>
               </div>`
            : '';
        const sourceUrl = imgSrc ? (imgSrc.includes('wikimedia') || imgSrc.includes('wikipedia')
            ? 'https://commons.wikimedia.org'
            : imgSrc.split('/').slice(0, 3).join('/')) : '';
        const sourceHtml = imgSource
            ? `<div class="callout-source">Image: <a href="${sourceUrl}" target="_blank" rel="noopener">${imgSource}</a></div>`
            : '';
        return `
            <div class="callout">
                <div class="callout-illustration" style="background: linear-gradient(90deg, ${tc.color}, ${tc.color}88, ${tc.color}22);"></div>
                <div class="callout-image" ${hideArea ? 'style="display:none"' : ''}>
                    <span class="img-loading" ${hasImage ? 'style="display:none"' : ''}>Loading image...</span>
                    <img id="${imgId}" src="${imgSrc}" alt="${craft.name}" style="opacity:${hasImage ? '1' : '0'};" onerror="this.parentElement.style.display='none'">
                </div>
                <div class="callout-header">
                    <span class="craft-type-badge" style="background:${tc.color}15; color:${tc.color}; border: 1px solid ${tc.color}30;">
                        ${tc.icon} ${craft.type}
                    </span>
                    <h2>${craft.name}</h2>
                    <div class="craft-origin">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${craft.region}, ${craft.state}
                    </div>
                    ${craft.era ? `<div class="craft-era">⏳ ${craft.era}</div>` : ''}
                </div>
                <div class="callout-body">
                    <p>${craft.description}</p>
                </div>
                ${stepsHtml}
                ${factHtml}
                <div class="callout-footer">
                    ${craft.materials.map(m => `<span class="material-tag">${m}</span>`).join('')}
                </div>
                ${sourceHtml}
            </div>
        `;
    }

    // Side panel elements
    const craftPanel = document.getElementById('craftPanel');
    const craftPanelContent = document.getElementById('craftPanelContent');
    const craftPanelClose = document.getElementById('craftPanelClose');

    let lastClusterCrafts = null; // Track cluster context for back button

    function openCraftPanel(craft, fromCluster) {
        const backBtn = fromCluster
            ? `<button class="craft-panel-back" onclick="window._showLastCluster()">← Back to list</button>`
            : '';
        craftPanelContent.innerHTML = backBtn + createPopupContent(craft);
        craftPanel.classList.add('open');
        craftPanel.scrollTop = 0;
        if (!craft.image) {
            const imgId = 'img-' + craft.name.replace(/[^a-zA-Z0-9]/g, '_');
            fetchCraftImage(craft.name, imgId, null);
        }
    }

    window._showLastCluster = function() {
        if (lastClusterCrafts) showClusterGrid(lastClusterCrafts);
    };

    function closeCraftPanel() {
        craftPanel.classList.remove('open');
        lastClusterCrafts = null;
    }

    function showClusterGrid(clusterCrafts) {
        lastClusterCrafts = clusterCrafts; // Save for back navigation
        // Sort by type then name
        clusterCrafts.sort((a, b) => a.type.localeCompare(b.type) || a.name.localeCompare(b.name));
        const tc = (type) => typeConfig[type] || { icon: '📍', color: '#999' };

        const html = `
            <div class="cluster-grid-header">
                <h3>${clusterCrafts.length} crafts in this area</h3>
            </div>
            <div class="cluster-grid">
                ${clusterCrafts.map(craft => `
                    <div class="cluster-card" data-craft-name="${craft.name.replace(/"/g, '&quot;')}" onclick="window._openCraftByName(this.dataset.craftName)">
                        <div class="cluster-card-img" style="background-image: url('${craft.image || ''}'); background-color: ${tc(craft.type).color}15;">
                            ${!craft.image ? `<span class="cluster-card-emoji">${tc(craft.type).icon}</span>` : ''}
                        </div>
                        <div class="cluster-card-info">
                            <span class="cluster-card-type" style="color: ${tc(craft.type).color}">${tc(craft.type).icon} ${craft.type}</span>
                            <span class="cluster-card-name">${craft.name}</span>
                            <span class="cluster-card-loc">${craft.state}</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;

        craftPanelContent.innerHTML = html;
        craftPanel.classList.add('open');
    }

    // Global handler for cluster card clicks
    window._openCraftByName = function(name) {
        const craft = crafts.find(c => c.name === name);
        if (craft) openCraftPanel(craft, true);
    };

    craftPanelClose.addEventListener('click', closeCraftPanel);
    // Close panel when clicking on the map
    map.on('click', closeCraftPanel);
    // Close on Escape key
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCraftPanel(); });

    // Scale markers based on zoom level
    function updateMarkerScale() {
        const zoom = map.getZoom();
        const sizes = { 4: 26, 5: 32, 6: 38, 7: 46, 8: 54 };
        const fonts = { 4: 13, 5: 16, 6: 19, 7: 22, 8: 26 };
        const size = sizes[zoom] || 32;
        const font = fonts[zoom] || 16;
        document.documentElement.style.setProperty('--marker-size', size + 'px');
        document.documentElement.style.setProperty('--marker-font', font + 'px');
    }
    map.on('zoomend', updateMarkerScale);
    updateMarkerScale();

    function createMarkerIcon(craft) {
        const tc = typeConfig[craft.type];
        return L.divIcon({
            className: '',
            html: `<div class="craft-marker type-${tc.cssClass}">${tc.icon}</div>`,
            iconSize: [34, 34],
            iconAnchor: [17, 17],
        });
    }

    crafts.forEach(craft => {
        const marker = L.marker([craft.lat, craft.lng], {
            icon: createMarkerIcon(craft),
        });
        marker.craftData = craft;
        marker.on('click', () => openCraftPanel(craft));
        markers.push(marker);
    });

    // Cluster color: yellow (low count) → green (high count)
    function clusterColor(count) {
        // Clamp between 2 and 20 for gradient
        const t = Math.min(1, Math.max(0, (count - 2) / 18));
        // Yellow (#c9a832) → Teal-green (#3a8a5c)
        const r = Math.round(201 - t * 143);
        const g = Math.round(168 + t * (138 - 168));
        const b = Math.round(50 + t * (92 - 50));
        return `rgb(${r},${g},${b})`;
    }

    function createClusterIcon(cluster) {
        const count = cluster.getChildCount();
        const color = clusterColor(count);
        const s = count > 30 ? 44 : count > 10 ? 40 : 36;
        return L.divIcon({
            html: '<div style="background:' + color + '">' + count + '</div>',
            className: 'marker-cluster',
            iconSize: L.point(s, s),
        });
    }

    let markerLayer = L.markerClusterGroup({
        maxClusterRadius: 40,
        spiderfyOnMaxZoom: true,
        spiderfyDistanceMultiplier: 2.5,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: false,
        disableClusteringAtZoom: null,
        iconCreateFunction: createClusterIcon,
    });
    // Smart cluster click: spiderfy small clusters, zoom+list for large ones
    markerLayer.on('clusterclick', function(e) {
        var count = e.layer.getChildCount();
        if (count <= 8) {
            e.layer.spiderfy();
        } else {
            // Zoom into the cluster region
            e.layer.zoomToBounds({ padding: [40, 40] });
            // Show grid list of crafts in this cluster
            var childMarkers = e.layer.getAllChildMarkers();
            var clusterCrafts = childMarkers.map(m => m.craftData).filter(Boolean);
            showClusterGrid(clusterCrafts);
        }
    });
    markers.forEach(m => markerLayer.addLayer(m));
    map.addLayer(markerLayer);

    // ─────────────────────────────────────
    //  FILTERS
    // ─────────────────────────────────────
    let activeFilters = { types: new Set(), materials: new Set(), state: '', search: '' };

    const allTypes = [...new Set(crafts.map(c => c.type))].sort();
    const allMaterials = [...new Set(crafts.flatMap(c => c.materials))].sort();
    const allStates = [...new Set(crafts.map(c => c.state))].sort();

    const typeFiltersEl = document.getElementById('typeFilters');
    allTypes.forEach(type => {
        const chip = document.createElement('button');
        chip.className = 'filter-chip';
        chip.textContent = `${typeConfig[type]?.icon || ''} ${type}`;
        chip.dataset.value = type;
        chip.addEventListener('click', () => {
            if (activeFilters.types.has(type)) {
                activeFilters.types.delete(type);
                chip.classList.remove('active');
            } else {
                activeFilters.types.add(type);
                chip.classList.add('active');
            }
            applyFilters();
        });
        typeFiltersEl.appendChild(chip);
    });

    // Material groups for accordion
    const materialGroups = {
        'Fiber': ['Cotton', 'Silk', 'Wool', 'Thread', 'Plant Fiber', 'Grass'],
        'Metals': ['Gold', 'Gold Thread', 'Silver', 'Copper', 'Brass', 'Bronze', 'Iron', 'Metal'],
        'Earth': ['Clay', 'Stone', 'Glass', 'Shell', 'Bone', 'Beads'],
        'Plants': ['Wood', 'Bamboo', 'Lac', 'Wax', 'Paper'],
        'Other': ['Leather', 'Natural Dye'],
    };

    const materialFiltersEl = document.getElementById('materialFilters');
    const allMaterialChips = [];

    Object.entries(materialGroups).forEach(([groupName, groupMats], idx) => {
        // Only include materials that actually exist in the data
        const existingMats = groupMats.filter(m => allMaterials.includes(m));
        if (existingMats.length === 0) return;

        // Count crafts in this group
        const groupCraftCount = crafts.filter(c => c.materials.some(m => existingMats.includes(m))).length;

        // Group header
        const groupEl = document.createElement('div');
        groupEl.className = 'material-group';

        const header = document.createElement('button');
        header.className = 'material-group-header';
        header.innerHTML = `<span class="material-group-arrow">${idx < 2 ? '▾' : '▸'}</span> ${groupName} <span class="material-group-count">${groupCraftCount}</span>`;
        header.addEventListener('click', () => {
            const body = groupEl.querySelector('.material-group-body');
            const arrow = header.querySelector('.material-group-arrow');
            if (body.style.display === 'none') {
                body.style.display = 'flex';
                arrow.textContent = '▾';
            } else {
                body.style.display = 'none';
                arrow.textContent = '▸';
            }
        });
        groupEl.appendChild(header);

        // Group body with chips
        const body = document.createElement('div');
        body.className = 'material-group-body';
        body.style.display = idx < 2 ? 'flex' : 'none'; // First 2 groups expanded

        existingMats.forEach(mat => {
            const chip = document.createElement('button');
            chip.className = 'filter-chip material-chip';
            chip.textContent = mat;
            chip.dataset.value = mat;
            chip.dataset.material = mat;
            chip.addEventListener('click', () => {
                if (activeFilters.materials.has(mat)) {
                    activeFilters.materials.delete(mat);
                    chip.classList.remove('active');
                } else {
                    activeFilters.materials.add(mat);
                    chip.classList.add('active');
                }
                applyFilters();
            });
            body.appendChild(chip);
            allMaterialChips.push(chip);
        });

        groupEl.appendChild(body);
        materialFiltersEl.appendChild(groupEl);
    });

    const stateFilterEl = document.getElementById('stateFilter');
    allStates.forEach(state => {
        const opt = document.createElement('option');
        opt.value = state;
        opt.textContent = state;
        stateFilterEl.appendChild(opt);
    });
    stateFilterEl.addEventListener('change', () => {
        activeFilters.state = stateFilterEl.value;
        applyFilters();
    });

    document.getElementById('searchBox').addEventListener('input', (e) => {
        activeFilters.search = e.target.value.toLowerCase();
        applyFilters();
    });

    document.getElementById('clearAll').addEventListener('click', () => {
        activeFilters.types.clear();
        activeFilters.materials.clear();
        activeFilters.state = '';
        activeFilters.search = '';
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        stateFilterEl.value = '';
        document.getElementById('searchBox').value = '';
        applyFilters();
    });

    function applyFilters() {
        map.removeLayer(markerLayer);
        const filtered = markers.filter(m => {
            const c = m.craftData;
            if (activeFilters.types.size > 0 && !activeFilters.types.has(c.type)) return false;
            if (activeFilters.materials.size > 0 && !c.materials.some(mat => activeFilters.materials.has(mat))) return false;
            if (activeFilters.state && c.state !== activeFilters.state) return false;
            if (activeFilters.search) {
                const q = activeFilters.search;
                const searchable = `${c.name} ${c.state} ${c.region} ${c.type} ${c.materials.join(' ')} ${c.description}`.toLowerCase();
                if (!searchable.includes(q)) return false;
            }
            return true;
        });
        markerLayer = L.markerClusterGroup({
            maxClusterRadius: 40,
            spiderfyOnMaxZoom: true,
            spiderfyDistanceMultiplier: 2.5,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: false,
            disableClusteringAtZoom: null,
            iconCreateFunction: createClusterIcon,
        });
        markerLayer.on('clusterclick', function(e) {
            var count = e.layer.getChildCount();
            if (count <= 8) {
                e.layer.spiderfy();
            } else {
                e.layer.zoomToBounds({ padding: [40, 40] });
                var childMarkers = e.layer.getAllChildMarkers();
                var clusterCrafts = childMarkers.map(m => m.craftData).filter(Boolean);
                showClusterGrid(clusterCrafts);
            }
        });
        filtered.forEach(m => markerLayer.addLayer(m));
        map.addLayer(markerLayer);
        document.getElementById('craftCount').innerHTML =
            `Showing <strong>${filtered.length}</strong> of <strong>${crafts.length}</strong> crafts`;
        // Mute material chips that don't apply to selected craft types
        updateMaterialChipStates(filtered);
    }

    function updateMaterialChipStates(filtered) {
        // If no type filter is active, all materials are active
        const materialChips = document.querySelectorAll('.material-chip');
        if (activeFilters.types.size === 0) {
            materialChips.forEach(chip => {
                chip.classList.remove('muted');
            });
            return;
        }
        // Collect materials present in filtered crafts
        const activeMaterials = new Set();
        filtered.forEach(m => {
            m.craftData.materials.forEach(mat => activeMaterials.add(mat));
        });
        materialChips.forEach(chip => {
            const mat = chip.dataset.material;
            if (activeMaterials.has(mat)) {
                chip.classList.remove('muted');
            } else {
                chip.classList.add('muted');
            }
        });
    }

    // ─────────────────────────────────────
    //  LEGEND
    // ─────────────────────────────────────
    const legendEl = document.getElementById('legendItems');
    allTypes.forEach(type => {
        const tc = typeConfig[type];
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<span class="legend-dot" style="background:${tc.color}"></span>${type}`;
        legendEl.appendChild(item);
    });

    // Initial count
    document.getElementById('craftCount').innerHTML =
        `Showing <strong>${crafts.length}</strong> of <strong>${crafts.length}</strong> crafts`;

    // ─────────────────────────────────────
    //  COLLAPSIBLE FILTER PANEL
    // ─────────────────────────────────────
    const filterToggle = document.getElementById('filterToggle');
    const filterPanel = document.querySelector('.filter-panel');
    filterToggle.addEventListener('click', () => {
        const isOpen = !filterPanel.classList.contains('collapsed');
        if (isOpen) {
            filterPanel.classList.add('collapsed');
            filterToggle.classList.remove('panel-open');
            filterToggle.textContent = '☰';
        } else {
            filterPanel.classList.remove('collapsed');
            filterToggle.classList.add('panel-open');
            filterToggle.textContent = '✕';
        }
    });
    // Start with toggle showing close icon since panel is open
    filterToggle.textContent = '✕';
    </script>
</body>
</html>
