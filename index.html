        { name: "Cambodian Krama Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Krama_-_%E3%81%8A%E5%9C%9F%E7%94%A3%E3%81%AB%E8%B2%B7%E3%81%A3%E3%81%9F%E3%82%AF%E3%83%AD%E3%83%9E%E3%83%BC%EF%BC%88%E3%83%9E%E3%83%95%E3%83%A9%E3%83%BC%EF%BC%89.jpg/960px-Krama_-_%E3%81%8A%E5%9C%9F%E7%94%A3%E3%81%AB%E8%B2%B7%E3%81%A3%E3%81%9F%E3%82%AF%E3%83%AD%E3%83%9E%E3%83%BC%EF%BC%88%E3%83%9E%E3%83%95%E3%83%A9%E3%83%BC%EF%BC%89.jpg', state: "Cambodia", region: "Southeast Asia", lat: 11.556, lng: 104.928, type: "Clothing", materials: ["cotton", "silk", "natural dye"], description: "The weaving of Cambodia\'s iconic checkered scarf, the krama, a versatile cotton or silk cloth worn as headwrap, belt, baby carrier, and towel that serves as a powerful symbol of Khmer identity.", era: "Pre-colonial era", steps: ["Cotton or silk thread is hand-dyed in the traditional red and blue colors using natural plant dyes.", "The warp threads are arranged on a frame loom in alternating colored groups to create the check pattern.", "The weaver passes the weft shuttle through the shed, building the characteristic gingham-like grid.", "The finished cloth is cut to size and the edges are finished with a simple fringe or hem."], funFact: "The krama is so central to Cambodian identity that it is said every Cambodian owns at least one, and during the Khmer Rouge era, the checkered scarf was mandated as part of the uniform."},
        { name: "Cambodian Golden Silk Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Bayonmarket01.JPG/960px-Bayonmarket01.JPG', state: "Cambodia", region: "Southeast Asia", lat: 11.001, lng: 104.78, type: "Clothing", materials: ["silk", "natural dye"], description: "The production of Cambodia\'s prized golden silk from the native golden silk moth in Takeo province, woven into luxurious sampot fabrics with an inherent natural shimmer unique to the region.", era: "13th century", steps: ["The golden silk moths are raised on mulberry leaves, and their naturally golden-hued cocoons are harvested.", "The cocoons are soaked in warm water and the long silk filaments are carefully unwound onto reels.", "The golden silk thread is prepared and set up on a traditional Khmer floor loom.", "The weaver creates elaborate hol (ikat) or twill patterns, producing cloth with a distinctive warm golden sheen."], funFact: "Cambodian golden silk gets its natural color from the diet and genetics of the native silk moth species, and this unique golden hue cannot be replicated by any other silk-producing region."},
        { name: "Laotian Sa Paper", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Tray_with_food_in_Laos.jpg/960px-Tray_with_food_in_Laos.jpg', state: "Laos", region: "Southeast Asia", lat: 19.886, lng: 102.135, type: "Home Decor", materials: ["plant fiber", "bamboo"], description: "The traditional handmade paper of Laos, crafted from the bark of the mulberry tree (sa tree), used for temple manuscripts, festive decorations, and the iconic umbrellas and fans of Luang Prabang.", era: "Pre-colonial era", steps: ["The inner bark of the mulberry tree is stripped, soaked in water, and boiled until the fibers soften and separate.", "The softened bark fibers are beaten with wooden mallets until they form a smooth, uniform pulp.", "The pulp is spread thinly over a mesh screen stretched on a bamboo frame and dried in the sun.", "The dried paper sheets are peeled from the screens and may be decorated with pressed flowers, leaves, or natural dyes."], funFact: "Sa paper was traditionally used to make temple manuscript books and ceremonial flags, and sheets embedded with marigold petals and fern fronds have become a signature Luang Prabang craft product."},
        { name: "Laotian Hmong Batik", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Hmong_women_at_Coc_Ly_market%2C_Sapa%2C_Vietnam.jpg/960px-Hmong_women_at_Coc_Ly_market%2C_Sapa%2C_Vietnam.jpg', state: "Laos", region: "Southeast Asia", lat: 19.454, lng: 103.51, type: "Clothing", materials: ["cotton", "wax", "natural dye"], description: "The indigo-dyed wax-resist textile tradition of the Hmong hill tribes of Laos, featuring bold geometric spirals, maze-like patterns, and symbols drawn freehand with beeswax using a small copper tool.", era: "Pre-colonial era", steps: ["Locally grown hemp or cotton cloth is washed and prepared as the base fabric.", "Melted beeswax is applied to the fabric using a small copper drawing tool called a tjanting, following geometric patterns from memory.", "The waxed fabric is immersed in indigo dye vats, with the dyeing process repeated many times to achieve a deep blue-black color.", "The wax is melted away in boiling water, revealing crisp white patterns against the dark indigo ground."], funFact: "Hmong women learn the complex geometric batik patterns entirely by memory, passing them from mother to daughter, and the spiral motifs are believed to represent snail shells symbolizing growth and continuity."},
        { name: "Laotian Silver Jewelry", image: '', state: "Laos", region: "Southeast Asia", lat: 19.889, lng: 102.141, type: "Jewelry", materials: ["silver"], description: "The traditional silversmithing of Laos, particularly among highland ethnic groups, producing ornate necklaces, soul-lock pendants, and spirit-calling bracelets believed to protect the wearer\'s life essence.", era: "Pre-colonial era", steps: ["Silver ingots or old coins are melted in a charcoal crucible and cast into workable bars or sheets.", "The silver is hammered into thin sheets or drawn into wire using hand tools and an anvil.", "The pieces are shaped, engraved, and assembled into the jewelry form, with granulation and filigree details added.", "The completed piece is polished and may be given a ritual blessing by a village elder before being worn."], funFact: "Hmong and Mien soul-lock pendants are placed on babies at birth to literally \'lock\' their soul into their body, protecting them from spirits that might steal a vulnerable infant\'s life force."},
        { name: "Igorot Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Ifugao_Beat.jpg/960px-Ifugao_Beat.jpg', state: "Philippines", region: "Southeast Asia", lat: 16.411, lng: 120.596, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The backstrap loom weaving of the Igorot peoples of the Cordillera highlands in northern Luzon, producing bold striped and geometric textiles in red, black, and white that denote tribal affiliation and social rank.", era: "Pre-colonial era", steps: ["Cotton is hand-spun into thread and dyed using natural sources such as tree bark for red and indigo for dark blue.", "The warp threads are measured and arranged on a backstrap loom tied between the weaver\'s body and a post.", "The weaver creates the distinctive striped and diamond patterns by carefully selecting and lifting warp threads.", "The completed cloth is cut and sewn into traditional garments such as the tapis skirt or g-string loincloth."], funFact: "Among the Kalinga people of the Cordillera, the last traditional tattoo artist, Whang-Od, uses a thorn and charcoal technique that mirrors the geometric patterns found in Igorot woven textiles."},
        { name: "Yakan Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Basilan_students.JPG/960px-Basilan_students.JPG', state: "Philippines", region: "Southeast Asia", lat: 6.906, lng: 121.965, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The extraordinarily complex geometric weaving of the Yakan people of Basilan island in Mindanao, known for their vibrant, densely patterned textiles that create optical illusions through precise color arrangements.", era: "Pre-colonial era", steps: ["Cotton threads are hand-dyed in vivid primary colors and carefully sorted by hue.", "The warp is set up on a backstrap loom with the colored threads arranged to form the base of the geometric pattern.", "The weaver uses a supplementary weft technique, manually picking up individual threads to create the dense, symmetric designs.", "The finished textile is used to create the seputangan headcloth or the kandit waist sash worn during festivals."], funFact: "Yakan weavers are known for creating bunga-sama (mixed flower) patterns so geometrically complex that they appear to vibrate optically, an effect that has drawn comparisons to modern op-art."},
        { name: "Filipino Burnay Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Northern_Philippines_%28Luzon%29.jpg/960px-Northern_Philippines_%28Luzon%29.jpg', state: "Philippines", region: "Southeast Asia", lat: 17.572, lng: 120.387, type: "Pottery", materials: ["clay"], description: "The robust, unglazed earthenware jars of the Ilocos region in northern Luzon, used for centuries to ferment vinegar, fish sauce, and rice wine, shaped by hand without a potter\'s wheel.", era: "Pre-colonial era", steps: ["The local red clay is dug from riverbanks, cleaned of impurities, and kneaded to a workable consistency.", "The jar is built up by coiling thick ropes of clay and smoothing them with a wooden paddle and stone anvil.", "The surface is burnished with a smooth stone or shell to create a semi-polished finish that reduces porosity.", "The jars are fired in an open bonfire or simple kiln for several hours until they reach a durable hardness."], funFact: "Burnay jars from Vigan are so durable that many households in the Ilocos region still use jars that are over a hundred years old for fermenting their traditional sugarcane vinegar."},
        { name: "Peranakan Beadwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Munka_kasot%2C_Peranakan%2C_early_20th_century_beaded_uppers_for_pair_of_slippers%2C_Intan.JPG/960px-Munka_kasot%2C_Peranakan%2C_early_20th_century_beaded_uppers_for_pair_of_slippers%2C_Intan.JPG', state: "Malaysia", region: "Southeast Asia", lat: 5.414, lng: 100.33, type: "Footwear", materials: ["beads", "thread", "leather"], description: "The exquisite beaded slippers and household items of the Peranakan (Straits Chinese) community, featuring tiny glass seed beads stitched into elaborate floral and figurative motifs in a distinctive fusion style.", era: "19th century", steps: ["Thousands of tiny glass seed beads, often from Venice or Bohemia, are sorted by color.", "A cotton or linen canvas is stretched on a frame and the intricate floral design is marked out.", "Each bead is individually stitched onto the canvas using a fine needle and thread, following the pattern bead by bead.", "The completed beaded face is attached to a wooden shoe last and leather sole to form the kasut manek beaded slipper."], funFact: "Peranakan beaded slippers use beads as small as one millimeter in diameter, and a single pair can contain over 50,000 individually sewn beads, taking months to complete."},
        { name: "Malaysian Pewtercraft", image: '', state: "Malaysia", region: "Southeast Asia", lat: 3.139, lng: 101.687, type: "Kitchenware", materials: ["metal", "copper"], description: "The traditional pewtersmithing of Malaysia, utilizing the country\'s rich tin deposits to create finely crafted tankards, tea sets, and decorative vessels from a polished silver-grey tin alloy.", era: "19th century", steps: ["An alloy of tin, copper, and antimony is melted and cast into flat sheets or poured into molds.", "The cast piece is turned on a lathe or hammered over a form to achieve the desired vessel shape.", "The surface is hand-filed and polished to a mirror-like finish or satin sheen.", "Decorative patterns are engraved or hammered into the surface using specialized chasing and punching tools."], funFact: "Malaysia was once the world\'s largest tin producer, and its pewter industry grew directly from the vast tin mining operations of the 19th century Malay Peninsula."},
        { name: "Malaysian Wau Kite", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Malaysia_Airlines%2C_Airbus_A350-900_9M-MAF_NRT_%2842887513761%29.jpg/960px-Malaysia_Airlines%2C_Airbus_A350-900_9M-MAF_NRT_%2842887513761%29.jpg', state: "Malaysia", region: "Southeast Asia", lat: 6.121, lng: 102.238, type: "Toys", materials: ["bamboo", "paper", "natural dye"], description: "The ornate traditional kites of the Malaysian east coast, particularly the crescent-shaped Wau Bulan (moon kite), crafted from split bamboo and decorated with intricate cut-paper and painted floral designs.", era: "15th century", steps: ["Bamboo is split into thin, flexible strips and bent into the characteristic crescent wing shape and frame.", "The bamboo skeleton is bound together with cord at the joints to create a sturdy but flexible structure.", "Colorful tissue paper or hand-painted fabric is glued over the frame and cut into elaborate floral motifs.", "A hummer (dengung) made from a taut ribbon is attached to the kite\'s bow, producing a distinctive humming sound in flight."], funFact: "The Wau Bulan is featured on the Malaysian one-ringgit coin and as the logo of Malaysia Airlines, reflecting its status as a treasured symbol of Malaysian cultural heritage."},
        { name: "Palestinian Olive Wood Carving", image: '', state: "Palestine", region: "Middle East", lat: 31.705, lng: 35.202, type: "Sculpture", materials: ["wood"], description: "The ancient tradition of carving religious figures, nativity scenes, and decorative objects from olive wood in Bethlehem and the surrounding villages, a craft deeply intertwined with the region\'s Christian heritage.", era: "4th century", steps: ["Olive wood from pruned or fallen trees is seasoned for at least two years to prevent cracking.", "The rough shape of the figure or scene is cut from the wood block using hand saws and chisels.", "The fine details of faces, hands, and drapery are carved with small gouges and knives.", "The finished piece is sanded smooth and polished with natural oils to enhance the wood\'s distinctive golden-brown grain."], funFact: "Bethlehem\'s olive wood carving tradition is said to have begun when Franciscan monks taught local craftsmen in the 14th century, though olive trees have been sacred in the region for thousands of years."},
        { name: "Hebron Glass", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Hebron_glass_display.jpg/960px-Hebron_glass_display.jpg', state: "Palestine", region: "Middle East", lat: 31.529, lng: 35.095, type: "Home Decor", materials: ["glass"], description: "The centuries-old tradition of blown glass production in Hebron, where artisans create vivid blue, green, and turquoise vessels, beads, and bangles from recycled glass using techniques dating to Phoenician times.", era: "1st century", steps: ["Recycled glass and raw sand are melted together in a clay furnace heated by wood or olive pits.", "The glassblower gathers a blob of molten glass on the end of a long iron blowpipe.", "The glass is blown, shaped, and tooled into vessels, bracelets, or beads while still hot and malleable.", "The finished pieces are placed in an annealing oven to cool slowly, preventing cracks from thermal stress."], funFact: "Hebron\'s glass industry is one of the oldest continuously operating in the world, and the city\'s characteristic deep blue glass gets its color from cobalt minerals found in the local sand."},
        { name: "Nablus Soap Making", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Nabulsi_soap_IMG_5357.JPG/960px-Nabulsi_soap_IMG_5357.JPG', state: "Palestine", region: "Middle East", lat: 32.222, lng: 35.261, type: "Kitchenware", materials: ["plant fiber"], description: "The traditional production of pure olive oil soap in the city of Nablus, a renowned craft dating back over a thousand years, producing hard white bars prized for their purity and gentle cleansing properties.", era: "10th century", steps: ["Virgin olive oil is mixed with water and an alkaline solution of barilla plant ash in large copper cauldrons.", "The mixture is cooked over a fire for several days, stirred constantly until it saponifies into a thick paste.", "The hot soap paste is spread onto a flat surface, smoothed, and stamped with the manufacturer\'s seal before being cut into bars.", "The bars are stacked into tall, circular tower formations for several months to cure and harden fully."], funFact: "At its peak, Nablus had over 30 soap factories operating within the old city, and its olive oil soap was exported across the entire Ottoman Empire as a luxury cleansing product."},
        { name: "Lebanese Pottery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Lebanon_2002_CIA_map.jpg/960px-Lebanon_2002_CIA_map.jpg', state: "Lebanon", region: "Middle East", lat: 33.94, lng: 35.635, type: "Pottery", materials: ["clay", "natural dye"], description: "The traditional earthenware pottery of the village of Beit Chabab in Mount Lebanon, known for producing sturdy, utilitarian vessels including the iconic Lebanese jar and cooking pots using locally dug red clay.", era: "Phoenician era", steps: ["The local iron-rich red clay is dug from hillside deposits and cleaned of stones and impurities.", "The clay is centered on a kick wheel and thrown into the desired form, such as a water jar or cooking pot.", "The leather-hard vessel is decorated with incised patterns or simple painted motifs.", "The pottery is fired in a wood-burning kiln at moderate temperatures, producing the characteristic warm terracotta color."], funFact: "Lebanon\'s pottery tradition is a direct continuation of Phoenician ceramic arts, and archaeological digs have found identical vessel shapes being produced in the same villages for over 3,000 years."},
        { name: "Lebanese Silk Weaving", image: '', state: "Lebanon", region: "Middle East", lat: 33.827, lng: 35.597, type: "Clothing", materials: ["silk", "natural dye"], description: "The historic silk weaving industry of Mount Lebanon, where mulberry groves fed silkworms whose thread was woven into fine fabrics that formed the backbone of the Lebanese mountain economy for centuries.", era: "6th century", steps: ["Silkworms are raised on mulberry leaves in trays within ventilated rooms until they spin their cocoons.", "The cocoons are soaked in hot water to loosen the sericin, and the fine silk filaments are reeled onto bobbins.", "The silk threads are dyed using local plant dyes and set up on floor looms for weaving.", "The weaver creates fine taffeta or brocade silk cloth used for garments and furnishing textiles."], funFact: "Mount Lebanon\'s silk industry was so significant in the 19th century that the region\'s mulberry trees and silk factories became the primary source of wealth that built many of the grand stone mansions still standing today."},
        { name: "Jezzine Cutlery", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/View_of_Jezzine.jpg/960px-View_of_Jezzine.jpg', state: "Lebanon", region: "Middle East", lat: 33.545, lng: 35.587, type: "Kitchenware", materials: ["iron", "silver", "bone"], description: "The distinctive handcrafted cutlery of Jezzine in southern Lebanon, featuring ornamental handles shaped like birds, cedar trees, and other Lebanese national symbols, crafted from horn, bone, and silver.", era: "18th century", steps: ["Steel blades are forged and shaped by hand on an anvil, then tempered and sharpened.", "Horn, bone, or metal blanks are carved into the characteristic bird or cedar tree handle shape.", "The handle is fitted onto the blade tang and secured with rivets or resin.", "The handle is detailed with silver inlay or engraving and polished to a high sheen."], funFact: "Jezzine cutlery handles traditionally take the shape of a phoenix-like bird, a symbol said to represent the Lebanese spirit of rising from adversity, and sets are given as wedding gifts across Lebanon."},
        { name: "Damascus Steel", image: 'https://upload.wikimedia.org/wikipedia/commons/2/2c/Watered_pattern_on_sword_blade1.Iran.JPG', state: "Syria", region: "Middle East", lat: 33.513, lng: 36.292, type: "Jewelry", materials: ["iron", "metal"], description: "The legendary steel of Damascus, renowned throughout the medieval world for its distinctive watered pattern and exceptional sharpness, forged into swords and blades that became symbols of Near Eastern metallurgical mastery.", era: "3rd century", steps: ["Wootz steel ingots, imported from India or produced locally, are heated in a charcoal forge until glowing.", "The hot steel is folded, hammered, and welded repeatedly to distribute the carbon microstructures that create the watered pattern.", "The blade is shaped through careful hammering and grinding into its final form with precise edge geometry.", "The finished blade is etched with acid to reveal the characteristic swirling, wavy pattern of light and dark bands in the steel."], funFact: "The original technique for producing true Damascus steel was lost around the 18th century, and despite modern scientific analysis, the exact method remains one of metallurgy\'s most celebrated unsolved mysteries."},
        { name: "Syrian Brocade", image: 'https://upload.wikimedia.org/wikipedia/commons/1/1f/ItalianSilkDamask.jpg', state: "Syria", region: "Middle East", lat: 33.51, lng: 36.31, type: "Clothing", materials: ["silk", "gold thread", "silver"], description: "The luxurious woven silk brocade of Damascus, known in Europe as \'damask,\' featuring elaborate floral and geometric patterns created by contrasting matte and lustrous weave structures in a single-color cloth.", era: "12th century", steps: ["The finest silk thread is prepared and dyed, with warp and weft threads often in the same color.", "The complex pattern is set up on a drawloom using a system of heddles that controls the satin and twill weave areas.", "The weaver works the loom while an assistant (the drawboy) pulls the correct pattern cords from above.", "The finished damask fabric reveals its pattern through the interplay of light reflecting differently off the satin and matte weave areas."], funFact: "The word \'damask\' entered European languages directly from Damascus, and the fabric became so fashionable in medieval Europe that it transformed dining culture through the introduction of damask tablecloths and napkins."},
        { name: "Syrian Mosaic Woodwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Andr%C3%A9-charles_boulle%2C_cofanetto_con_tartaruga%2C_1700-20_ca.jpg/960px-Andr%C3%A9-charles_boulle%2C_cofanetto_con_tartaruga%2C_1700-20_ca.jpg', state: "Syria", region: "Middle East", lat: 33.508, lng: 36.295, type: "Furniture", materials: ["wood", "shell", "bone", "metal"], description: "The intricate geometric inlay woodwork of Damascus, where tiny pieces of different colored woods, bone, and mother-of-pearl are assembled into mesmerizing star and polygon patterns on boxes, tables, and game boards.", era: "12th century", steps: ["Thin strips of different colored woods such as walnut, lemon, and rose are glued together in precise geometric arrangements.", "The assembled wood bundle is sliced crosswise into thin wafers, each revealing the complete geometric pattern.", "These pattern wafers are glued side by side onto the surface of the wooden object, creating a continuous mosaic field.", "Mother-of-pearl and bone inlay pieces are added as accent elements, and the entire surface is sanded and lacquered smooth."], funFact: "Damascus mosaic woodwork boxes and backgammon boards were among the most sought-after souvenirs for European travelers on the Grand Tour, and the craft quarter still operates in the old city\'s Straight Street."},
        { name: "Kurdish Carpet Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Mantes_carpet_Louvre_OA6610_detail1.jpg/960px-Mantes_carpet_Louvre_OA6610_detail1.jpg', state: "Iraq", region: "Middle East", lat: 36.191, lng: 44.009, type: "Home Decor", materials: ["wool", "natural dye", "cotton"], description: "The richly colored pile carpet weaving tradition of the Kurdish people of northern Iraq, featuring bold geometric medallions, tribal motifs, and vibrant natural dyes in patterns unique to each clan and village.", era: "Pre-Islamic era", steps: ["Wool from local sheep is washed, carded, and hand-spun into strong yarn on a drop spindle.", "The yarn is dyed using natural materials: pomegranate rinds for yellow, walnut husks for brown, and indigo for blue.", "The warp is strung on a vertical loom, and the weaver ties individual knots row by row following the pattern from memory.", "Each row of knots is beaten down with a heavy metal comb, and the pile is trimmed to an even height with shears."], funFact: "Kurdish weavers traditionally work without written patterns, memorizing hundreds of complex designs and passing them verbally from mother to daughter, making each carpet a unique expression of tribal memory."},
        { name: "Iraqi Mudhif Reed House", image: 'https://upload.wikimedia.org/wikipedia/commons/9/9e/Modhif_neserya_1.jpg', state: "Iraq", region: "Middle East", lat: 31.044, lng: 47.023, type: "Furniture", materials: ["grass", "plant fiber"], description: "The monumental reed guest houses of the Marsh Arabs of southern Iraq, constructed entirely from bundled giant reeds without any nails or wood, forming elegant pointed arches that have remained unchanged for five millennia.", era: "3rd millennium BCE", steps: ["Giant qasab reeds are harvested from the marshes and dried in bundles of increasing thickness.", "Massive reed bundle columns are erected in two parallel rows and bent inward to meet at the top, forming pointed arches.", "Lighter reed bundles are lashed horizontally across the arches to create the ribbed vault of the roof and walls.", "The entire structure is covered with woven reed mats tied to the framework, creating a cool, ventilated interior."], funFact: "The arched reed architecture of the Marsh Arab mudhif is depicted on Sumerian cylinder seals from 5,000 years ago, making it one of the longest continuously practiced architectural traditions on Earth."},
        { name: "Mandaean Silver Craft", image: 'https://upload.wikimedia.org/wikipedia/commons/5/54/Celebration_of_Mandaean_New_Year_in_Khuzestan%2C_Iran.jpg', state: "Iraq", region: "Middle East", lat: 31.0, lng: 47.0, type: "Jewelry", materials: ["silver", "gold"], description: "The traditional silverwork of Iraq\'s Mandaean community, whose artisans are renowned across the Middle East for producing exquisite filigree jewelry, ritual objects, and ceremonial daggers with extraordinary fine detail.", era: "1st century", steps: ["Silver is melted and drawn into extremely fine wire or hammered into thin sheets.", "The wire is twisted and coiled into intricate filigree scrolls and rosettes using fine pliers.", "The filigree elements are arranged on a silver base and soldered into place to form the complete design.", "The piece is cleaned in an acid bath, polished, and may have gold accents applied through gilding."], funFact: "The Mandaeans are a Gnostic religious community whose men traditionally all practiced silversmithing as their hereditary occupation, and the Arabic word for silversmith (subbi) became synonymous with Mandaean."},
        { name: "Yemeni Silver Jewelry", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/A_YEMENITE_FAMILY_READING_FROM_THE_PSALMS_ON_SHABBAT_AFTER_LUNCH.D827-012.jpg/960px-A_YEMENITE_FAMILY_READING_FROM_THE_PSALMS_ON_SHABBAT_AFTER_LUNCH.D827-012.jpg', state: "Yemen", region: "Middle East", lat: 15.348, lng: 44.206, type: "Jewelry", materials: ["silver", "gold", "beads"], description: "The magnificent silver jewelry tradition of Sana\'a, historically crafted by Yemen\'s Jewish silversmiths, producing elaborate bridal sets, amulet containers, and granulated ornaments of extraordinary refinement.", era: "Pre-Islamic era", steps: ["Silver coins or ingots are melted and cast into workable bars or drawn into fine wire.", "The silver is hammered into shape and decorated with applied granulation, tiny silver balls soldered onto the surface.", "Filigree wirework, engraving, and applied gold wash (tila) are added as decorative elements.", "Stones, glass, or coral beads are set into bezels, and the completed piece is assembled with chains and pendants."], funFact: "Yemen\'s Jewish community produced virtually all of the country\'s silver jewelry for centuries, and when they emigrated to Israel in 1949-1950, the tradition of Yemeni silverwork nearly disappeared from the country."},
        { name: "Yemeni Takhrim Window Lattice", image: '', state: "Yemen", region: "Middle East", lat: 15.354, lng: 44.208, type: "Home Decor", materials: ["stone", "glass"], description: "The ornate stained glass and plaster window screens of traditional Sana\'a tower houses, where geometric patterns cut into gypsum plaster are filled with colored glass, creating jewel-like illumination inside.", era: "10th century", steps: ["A thick slab of wet gypsum plaster is prepared and set into a wooden frame the size of the window opening.", "The intricate geometric design is carved through the plaster using sharp knives and chisels while still slightly damp.", "Pieces of colored glass in red, blue, green, and amber are cut to fit each opening in the lattice pattern.", "The glass pieces are set into the plaster openings from behind and secured with additional plaster to create the translucent screen."], funFact: "The fan-shaped takhrim windows above the doors of Sana\'a\'s tower houses are called qamariyyah (moon windows), and they transform ordinary sunlight into a kaleidoscope of color across the interior walls."},
        { name: "Yemeni Dallah Coffee Pot", image: 'https://upload.wikimedia.org/wikipedia/commons/4/49/A_dallah_a_traditional_Arabic_coffee_pot_with_cups_and_coffee_beans.jpg', state: "Yemen", region: "Middle East", lat: 15.34, lng: 44.2, type: "Kitchenware", materials: ["brass", "copper"], description: "The traditional long-spouted coffee pot of Yemen, hand-forged from brass or copper, an essential vessel for brewing and serving the strong, cardamom-spiced coffee central to Yemeni hospitality culture.", era: "15th century", steps: ["A sheet of brass or copper is cut and hammered over a stake into the pot\'s distinctive pear-shaped body.", "The long, curved spout is formed separately by shaping a cone of metal and attaching it to the body with brazing.", "The hinged lid, handle, and finial are forged and assembled, with the handle often wrapped in leather or cord for heat protection.", "The exterior is engraved with geometric or floral patterns and polished to a bright finish."], funFact: "Yemen is the birthplace of coffee cultivation and the coffee trade, and the dallah pot became such an important symbol of Arabian hospitality that it appears on the coinage and stamps of multiple Gulf states."},
        { name: "Omani Silver Jewelry", image: '', state: "Oman", region: "Middle East", lat: 22.934, lng: 57.53, type: "Jewelry", materials: ["silver", "gold"], description: "The heavy, ornate silver jewelry of Nizwa and the Omani interior, including massive bridal necklaces, anklets, and hirz amulet cases, traditionally crafted by the silver market artisans of the ancient capital.", era: "Pre-Islamic era", steps: ["Maria Theresa silver thalers are melted down and cast into ingots for working.", "The silver is hammered into thick sheets and shaped into the desired form: bangles, pendants, or amulet cases.", "Surface decoration is applied through chasing, repoussé, applied granulation, and filigree wirework.", "The piece is assembled with chains, bells, and dangles, and the surface is given a patinated or polished finish."], funFact: "Omani bridal jewelry sets could weigh several kilograms and represented the bride\'s financial security, as the silver belonged entirely to her and could be melted down in times of need."},
        { name: "Omani Dhow Boat Building", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Dhow_znz.jpg/960px-Dhow_znz.jpg', state: "Oman", region: "Middle East", lat: 23.616, lng: 58.592, type: "Furniture", materials: ["wood", "plant fiber", "cotton"], description: "The ancient craft of building wooden sailing vessels in Oman\'s coastal shipyards, where master builders construct ocean-going dhows using techniques that enabled centuries of Indian Ocean trade and navigation.", era: "3rd millennium BCE", steps: ["The keel timber of teak or other hardwood is laid down, and the stem and stern posts are erected and shaped.", "The hull planks are hewn from imported Indian teak and fitted edge-to-edge, traditionally stitched together with coir rope through drilled holes.", "The internal ribs and frames are fitted after the hull shell is complete, a technique opposite to European shipbuilding.", "The hull is caulked with a mixture of lime, animal fat, and cotton fiber, and coated with fish oil or shark oil for waterproofing."], funFact: "Omani dhows were traditionally built without any iron nails, relying entirely on coconut fiber stitching and wooden pegs, because ancient sailors believed that magnetic sea mountains would pull nailed ships apart."},
        { name: "Omani Halwa Pot Making", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Sholakia_Eidgah_Maidan_03.jpg/960px-Sholakia_Eidgah_Maidan_03.jpg', state: "Oman", region: "Middle East", lat: 23.588, lng: 58.382, type: "Kitchenware", materials: ["copper", "brass"], description: "The craft of making large copper cooking vessels specifically designed for preparing Omani halwa, the national sweet confection, with thick walls and wide bases suited to the long, labor-intensive stirring process.", era: "Pre-modern era", steps: ["A thick sheet of copper is cut and hammered over a large stake to form the wide, shallow cooking vessel shape.", "The copper body is reinforced with a rolled rim and heavy base to withstand prolonged heating.", "Brass or copper handles are riveted to the sides for lifting the heavy pot when full.", "The interior is tinned with a coating of molten tin to prevent copper from reacting with the acidic ingredients."], funFact: "Omani halwa requires continuous stirring over a fire for up to two hours, and the large copper pots are so valued that they are often passed down through generations of halwa-making families in Nizwa."},
        { name: "Jordanian Sand Bottle Art", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Sand_art_of_Ratha_Yatra_by_Sudarsan_Pattnaik.jpg/960px-Sand_art_of_Ratha_Yatra_by_Sudarsan_Pattnaik.jpg', state: "Jordan", region: "Middle East", lat: 30.328, lng: 35.442, type: "Home Decor", materials: ["glass", "stone"], description: "The folk art of creating layered colored sand pictures inside glass bottles, practiced in Petra and Aqaba, where naturally tinted desert sands are poured and sculpted into images of camels, landscapes, and geometric patterns.", era: "20th century", steps: ["Natural sandstones of different colors are gathered from the desert landscape around Petra and ground into fine sand.", "The colored sands are sorted by hue and placed in small containers for easy access during the filling process.", "The sand is poured into the glass bottle layer by layer, with the artist using thin metal tools to push and shape the sand into pictorial designs.", "The bottle is sealed tightly to preserve the sand arrangement permanently inside."], funFact: "The multicolored sands used in Jordanian sand art come from the naturally pigmented sandstone of Petra and Wadi Rum, where iron and manganese oxides create vivid reds, oranges, purples, and yellows."},
        { name: "Jordanian Bedouin Weaving", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Three_bedouins_sheikhs%2C_c_1867-1876_%28cropped%29.jpg/960px-Three_bedouins_sheikhs%2C_c_1867-1876_%28cropped%29.jpg', state: "Jordan", region: "Middle East", lat: 30.834, lng: 36.345, type: "Home Decor", materials: ["wool", "cotton", "natural dye"], description: "The ground-loom weaving tradition of Jordan\'s Bedouin women, producing rugs, tent dividers, and saddlebags in bold geometric patterns using wool from their own flocks, an essential craft of nomadic desert life.", era: "Pre-Islamic era", steps: ["Wool is shorn from sheep and goats, washed, and hand-spun into yarn on a drop spindle.", "The yarn is dyed using desert plants: pomegranate for yellow, madder root for red, and indigo for blue.", "A ground loom is staked out on the earth, and the warp threads are stretched between two beams.", "The weaver sits on the ground and interweaves the colored weft threads, beating each row tight with a gazelle horn or wooden beater."], funFact: "The black goat-hair tent panels woven by Bedouin women are called beit al-sha\'r (house of hair), and the fabric actually swells when wet, becoming waterproof during desert rainstorms."},
        { name: "Egyptian Copper Tray", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/%D8%AE%D8%A7%D9%86_%D8%A7%D9%84%D8%AE%D9%84%D9%8A%D9%84%D9%8A_1.jpg/960px-%D8%AE%D8%A7%D9%86_%D8%A7%D9%84%D8%AE%D9%84%D9%8A%D9%84%D9%8A_1.jpg', state: "Egypt", region: "Middle East", lat: 30.048, lng: 31.262, type: "Kitchenware", materials: ["copper", "silver"], description: "The hand-hammered and engraved copper trays of Cairo\'s Khan el-Khalili bazaar, large circular serving trays decorated with intricate arabesques, calligraphy, and geometric patterns that serve as both functional tableware and wall art.", era: "14th century", steps: ["A flat sheet of copper is cut into a large circle and hammered into a shallow tray form with a raised rim.", "The surface is marked out with geometric guidelines using a compass and straight edge.", "The intricate arabesque and calligraphic patterns are engraved into the copper using steel chisels and a small hammer.", "Silver or brass wire may be inlaid into the engraved lines, and the tray is polished to a warm glow."], funFact: "Khan el-Khalili, where Cairo\'s coppersmiths have worked since the 14th century, was originally founded as a caravanserai and the rhythmic sound of hammering on copper trays remains the bazaar\'s signature soundtrack."},
        { name: "Egyptian Mashrabiya Woodwork", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Moucharabier_-_panoramio.jpg/960px-Moucharabier_-_panoramio.jpg', state: "Egypt", region: "Middle East", lat: 30.045, lng: 31.258, type: "Home Decor", materials: ["wood"], description: "The iconic carved wooden lattice screens of Cairo\'s Islamic architecture, composed of thousands of individually turned wooden spindles assembled without nails or glue into intricate geometric grilles that filter light and provide privacy.", era: "12th century", steps: ["Small cylinders of hard wood are individually turned on a lathe into spindles with bulbous, spherical, and cylindrical sections.", "The turned spindles are assembled by inserting them into precisely drilled holes in horizontal rails, creating geometric patterns.", "Additional decorative elements such as flat carved panels and arabesque inserts are fitted between the turned sections.", "The assembled screen is fitted into the projecting wooden bay window frame that overhangs the street."], funFact: "Mashrabiya screens work as natural air conditioners: the lattice cools incoming breezes through evaporation from porous clay water jars placed behind them, which is the origin of the name (from \'drinking place\')."},
        { name: "Egyptian Muski Glass", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/The_spell_of_Egypt_%28IA_spellofegypt01bell%29.pdf/page1-808px-The_spell_of_Egypt_%28IA_spellofegypt01bell%29.pdf.jpg', state: "Egypt", region: "Middle East", lat: 30.047, lng: 31.264, type: "Home Decor", materials: ["glass"], description: "The hand-blown recycled glass art of Cairo\'s Muski quarter, where artisans transform discarded bottles into colorful vases, lanterns, and drinking glasses using free-blowing techniques in small workshop furnaces.", era: "Medieval era", steps: ["Discarded glass bottles are sorted by color, cleaned, and broken into chunks for melting.", "The glass chunks are melted in a small clay furnace fueled by gas or wood.", "The glassblower gathers the molten glass on a blowpipe and shapes it through blowing and manipulation with hand tools.", "The finished vessel is placed in an annealing oven to cool gradually, then its rim is fire-polished smooth."], funFact: "Egypt\'s tradition of glassmaking dates back to the Pharaonic period, and modern Muski glass artisans work in tiny workshops along the same medieval streets where Islamic-era glassblowers once produced famous gilded mosque lamps."},
        { name: "Persian Gabbeh Rug", image: 'https://upload.wikimedia.org/wikipedia/commons/5/52/TapisGabbeh.png', state: "Iran", region: "Middle East", lat: 30.668, lng: 51.68, type: "Home Decor", materials: ["wool", "natural dye"], description: "The thick, shaggy pile rugs woven by Qashqai nomadic women in the Zagros Mountains of southern Iran, featuring bold, minimalist designs with open fields of color and simple animal or geometric figures.", era: "Pre-Islamic era", steps: ["Wool from the nomads\' own sheep is washed in mountain streams and hand-spun into thick, soft yarn.", "The yarn is dyed using natural materials found along the migration route: madder, walnut, pomegranate, and indigo.", "The weaver sets up a horizontal ground loom at the camp and ties Turkish knots in a coarse, loose weave.", "The completed rug is sheared to a long pile height, giving it the characteristically thick, cushioned texture."], funFact: "Gabbeh rugs were traditionally considered too coarse for sale and were used only as sleeping mats by the nomads themselves, until art collectors in the 1980s recognized their bold abstract designs as modern art."},
        { name: "Persian Kilim", image: 'https://upload.wikimedia.org/wikipedia/commons/1/18/Hotamis_Kilim.jpg', state: "Iran", region: "Middle East", lat: 32.654, lng: 51.677, type: "Home Decor", materials: ["wool", "cotton", "natural dye"], description: "The flat-woven tapestry rugs produced across Iran\'s tribal and village communities, featuring geometric patterns created through interlocking colored weft threads without any pile, making a lightweight, reversible textile.", era: "Pre-Islamic era", steps: ["Wool is hand-spun and dyed with natural pigments, with each tribal region having its own characteristic color palette.", "The cotton warp is strung on a ground loom or vertical frame loom staked into the earth.", "The weaver interlocks colored weft threads around the warp to build the geometric design, using a slit-weave or dovetail technique.", "The completed kilim is cut from the loom and the warp ends are knotted into fringes."], funFact: "Iranian kilim patterns are a visual language: each tribal motif has a specific meaning, with ram\'s horns representing power, the tree of life symbolizing immortality, and scorpions warding off evil."},
        { name: "Iranian Turquoise Setting", image: 'https://upload.wikimedia.org/wikipedia/en/b/bb/Khatam-bandi.jpg', state: "Iran", region: "Middle East", lat: 36.31, lng: 59.6, type: "Jewelry", materials: ["silver", "copper", "stone"], description: "The craft of setting Iranian turquoise stones into copper and silver objects, known as Firuzeh Kubi, where small pieces of turquoise are inlaid to completely cover surfaces of vases, bowls, and jewelry boxes in brilliant blue mosaic.", era: "Pre-Islamic era", steps: ["A copper or silver vessel is prepared with a textured surface to help the stones adhere.", "Small, irregularly shaped pieces of Nishapur turquoise are sorted by color and size.", "The turquoise fragments are set one by one into a bed of black adhesive paste covering the metal surface.", "The gaps between stones are filled with the dark paste, and the surface is ground smooth and polished to create a seamless turquoise mosaic."], funFact: "The Nishapur turquoise mines in northeastern Iran have been producing the world\'s finest turquoise for over 2,000 years, and the English word \'turquoise\' itself derives from the French for \'Turkish stone,\' as it reached Europe via Turkey."},
        { name: "Turkish Calligraphy Tools", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Folios_1b-2a_from_Part_15_of_a_30-part_Qur%E2%80%99an_copied_by_Ya%27qut_al-Musta%27simi_in_Baghdad_1282-1283_AD_%28681_AH%29_%28cropped%29.jpg/960px-Folios_1b-2a_from_Part_15_of_a_30-part_Qur%E2%80%99an_copied_by_Ya%27qut_al-Musta%27simi_in_Baghdad_1282-1283_AD_%28681_AH%29_%28cropped%29.jpg', state: "Turkey", region: "Middle East", lat: 41.008, lng: 28.978, type: "Kitchenware", materials: ["bamboo", "leather", "metal"], description: "The specialized craft of making Islamic calligraphy instruments in Istanbul, including the cutting and preparation of reed pens (kalem), ink preparation, and the crafting of burnished paper, essential to Ottoman scribal arts.", era: "15th century", steps: ["A dried reed is selected for straightness and hardness, and the tip is shaped with an oblique cut using a special knife.", "The nib is split precisely down the center and trimmed to the desired width for the calligraphic script style.", "The paper is prepared by coating with a starch and egg mixture, then burnished with a smooth agate stone to create a glassy surface.", "The ink is prepared by mixing lampblack soot with gum arabic and rose water, then aged in a ceramic inkwell."], funFact: "Ottoman calligraphers considered their reed pen almost sacred, and a master calligrapher\'s kalem-tiras (pen knife) was among his most valued possessions, often beautifully decorated with silver and mother-of-pearl."},
        { name: "Turkish Coppersmith", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/0_Le_dinandier_Guy_Clabots_-_Leffe_%281%29.JPG/960px-0_Le_dinandier_Guy_Clabots_-_Leffe_%281%29.JPG', state: "Turkey", region: "Middle East", lat: 37.059, lng: 37.383, type: "Kitchenware", materials: ["copper", "silver"], description: "The traditional coppersmithing of Gaziantep in southeastern Turkey, where artisans hand-hammer and engrave copper vessels including trays, ewers, and coffee pots used in daily Turkish domestic life.", era: "Pre-Ottoman era", steps: ["A sheet of copper is cut to size and hammered over an anvil into the desired vessel shape through repeated heating and beating.", "The vessel is planished with a flat-faced hammer to smooth the surface and achieve a uniform thickness.", "Decorative patterns of arabesques, tulips, and calligraphy are engraved or chased into the surface.", "The interior is tinned by coating with molten tin for food safety, and the exterior is polished or left with a hammered texture."], funFact: "Gaziantep\'s coppersmith bazaar has operated continuously for over 500 years, and the distinctive ring of hammers on copper is so integral to the city\'s identity that it was recognized as part of the local cultural heritage."},
        { name: "Turkish Felt Making", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Colored_felt_cloth.jpg/960px-Colored_felt_cloth.jpg', state: "Turkey", region: "Middle East", lat: 38.735, lng: 32.493, type: "Clothing", materials: ["wool"], description: "The ancient Central Asian tradition of felt making preserved in Turkey, particularly in Konya, where sheep\'s wool is compressed through moisture, heat, and pressure into dense non-woven fabric for rugs, cloaks, and hats.", era: "Pre-Islamic era", steps: ["Raw sheep\'s wool is washed, teased apart, and laid out in even layers on a reed mat in the desired thickness.", "Hot soapy water is sprinkled over the wool layers, and the mat is rolled up tightly around a pole.", "The rolled bundle is kicked, beaten, and rolled back and forth for several hours to entangle the wool fibers.", "The felt is unrolled, reshaped, and dried, producing a dense, waterproof fabric that can be cut and sewn without fraying."], funFact: "The whirling dervishes of Konya wear tall conical felt hats called sikke, believed to represent tombstones of the ego, and these hats are still made by traditional felt makers in the city of Rumi\'s shrine."},
        { name: "Turkish Karagöz Shadow Puppet", image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Turchia%2C_marionette_karagoz%2C_xx_secolo%2C_karag%C3%B6z_e_hacivat_%28protagonista_e_antagonista%29_02.jpg/960px-Turchia%2C_marionette_karagoz%2C_xx_secolo%2C_karag%C3%B6z_e_hacivat_%28protagonista_e_antagonista%29_02.jpg', state: "Turkey", region: "Middle East", lat: 40.184, lng: 29.061, type: "Toys", materials: ["leather", "natural dye"], description: "The traditional shadow puppets of Turkish Karagöz theater, crafted from translucent camel or cattle hide and brightly painted, used to project colorful shadow plays that have entertained audiences since Ottoman times.", era: "16th century", steps: ["Cattle or camel hide is scraped, stretched, and treated until it becomes translucent and parchment-like.", "The puppet figure is drawn on the hide and cut out with sharp knives, with joints articulated at the shoulders, elbows, and knees.", "The translucent hide pieces are painted with vibrant, transparent dyes that project color when backlit.", "The jointed body parts are connected with knotted thread hinges and fitted with horizontal control rods for manipulation behind the screen."], funFact: "Karagöz and his companion Hacivat are based on two real construction workers from 14th-century Bursa whose comic banter so entertained fellow workers that the Sultan had them executed for delaying the building of a mosque."},
        { name: 'Al-Sadu Weaving', image: '', state: 'Saudi Arabia', region: 'Najd', lat: 24.7136, lng: 46.6753, type: 'Clothing', materials: ['Wool', 'Natural Dye', 'Cotton'], description: 'Traditional Bedouin flat-weave textile art practiced by women of the Arabian Peninsula, producing tent dividers, camel trappings, and floor coverings with bold geometric patterns in black, white, and red.', era: 'Ancient', steps: ['Sheep or camel wool is sheared, cleaned, and hand-spun into strong yarn', 'The yarn is dyed using natural pigments — pomegranate for red, indigo for black', 'Threads are stretched on a ground-level loom staked into desert sand', 'Bold geometric patterns are woven using a continuous supplementary weft technique'], funFact: 'Al-Sadu was inscribed on the UNESCO Intangible Cultural Heritage list in 2020, recognizing the Bedouin women who have preserved this desert art for millennia.'},
        { name: 'Al-Qatt Al-Asiri Painting', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Al-Qatt_Al-Asiri_Wall_Art.jpg/960px-Al-Qatt_Al-Asiri_Wall_Art.jpg', state: 'Saudi Arabia', region: 'Asir, Abha', lat: 18.2164, lng: 42.5053, type: 'Home Decor', materials: ['Natural Dye', 'Clay', 'Plant Fiber'], description: 'Vibrant interior wall painting tradition of Asir province, where women decorate homes with bold geometric and floral patterns in vivid colors, a practice recognized by UNESCO.', era: 'Ancient', steps: ['Interior mud-plastered walls are smoothed and prepared as a canvas', 'Natural pigments from plants, stones, and minerals are ground and mixed', 'Bold geometric bands, zigzags, and floral motifs are painted freehand by women', 'Colors are layered and the designs are renewed seasonally or for celebrations'], funFact: 'This is exclusively a women\'s art form — the painting knowledge is passed from mother to daughter and men traditionally have no role in it.'},
        { name: 'Saudi Dallah Coffee Pot', image: 'https://upload.wikimedia.org/wikipedia/commons/4/49/A_dallah_a_traditional_Arabic_coffee_pot_with_cups_and_coffee_beans.jpg', state: 'Saudi Arabia', region: 'Hail', lat: 27.5114, lng: 41.7208, type: 'Kitchenware', materials: ['Brass', 'Copper'], description: 'The iconic long-spouted Arabic coffee pot handcrafted from brass or copper, central to Saudi hospitality culture and featured on the Saudi riyal currency.', era: 'Pre-Islamic', steps: ['Brass or copper sheet is cut and hammered into the distinctive pot body shape', 'The long curved spout is formed separately and brazed onto the body', 'Decorative bands and geometric engravings are chiseled around the belly', 'A hinged lid with a pointed finial is fitted and the surface is polished'], funFact: 'The dallah is so central to Saudi identity that it appears on the one-riyal coin and is the symbol of Arab hospitality across the Gulf.'},
        { name: 'Saudi Silver Jewelry (Bedouin)', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Rashaida_im_Sudan.jpg/960px-Rashaida_im_Sudan.jpg', state: 'Saudi Arabia', region: 'Najran', lat: 17.4933, lng: 44.1277, type: 'Jewelry', materials: ['Silver', 'Stone', 'Coral'], description: 'Traditional Bedouin silver jewelry of the Arabian Peninsula including heavy necklaces, amulet cases, and head ornaments, once serving as portable wealth for nomadic families.', era: 'Ancient', steps: ['Silver coins or ingots are melted and cast into rough forms', 'The silversmith hammers and shapes pieces into pendants, bangles, and chains', 'Granulation, filigree, and stone settings are added as decoration', 'Pieces are assembled into elaborate multi-strand necklaces or head chains'], funFact: 'Bedouin brides traditionally received their weight in silver jewelry as dowry, which they owned outright and could sell independently.'},
        { name: 'Jeddah Coral Stone Building', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Sura90.pdf/page1-960px-Sura90.pdf.jpg', state: 'Saudi Arabia', region: 'Jeddah', lat: 21.4858, lng: 39.1925, type: 'Furniture', materials: ['Coral', 'Stone', 'Wood'], description: 'The traditional architectural craft of old Jeddah using coral stone blocks harvested from the Red Sea, carved into building facades with distinctive wooden lattice balconies called Rawasheen.', era: '7th Century', steps: ['Coral limestone blocks are quarried from the Red Sea reef and left to dry and harden', 'Blocks are cut to size and stacked using mud mortar to form thick insulating walls', 'Intricately carved wooden Rawasheen lattice screens are fitted over windows and balconies', 'Exteriors are plastered with lime and the wooden elements are painted in earth tones'], funFact: 'The coral stone walls of old Jeddah are naturally cool — the porous coral acts as an ancient air conditioning system in the desert heat.'},
        { name: 'Saudi Bisht Cloak Weaving', image: 'https://upload.wikimedia.org/wikipedia/commons/5/56/His_Highness_Sheikh_Chassib.jpg', state: 'Saudi Arabia', region: 'Al-Ahsa', lat: 25.3548, lng: 49.5855, type: 'Clothing', materials: ['Wool', 'Gold Thread', 'Silk'], description: 'The weaving of the bisht, a flowing ceremonial cloak worn by Saudi men on formal occasions, traditionally handwoven with gold or silver thread edging in Al-Ahsa oasis.', era: 'Pre-Islamic', steps: ['Fine camel or sheep wool is hand-spun and dyed in black, brown, or cream', 'The fabric is woven on a traditional horizontal loom in a plain weave', 'Gold or silver metallic thread is hand-embroidered along the edges and collar', 'The finished cloak is pressed and shaped to achieve its signature flowing drape'], funFact: 'Al-Ahsa has been the center of bisht weaving for centuries because the oasis provided the water needed for wool processing in the otherwise arid region.'},
        { name: 'Ural Stone Cutting', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Topaze%2C_quartz_fum%C3%A9_1.jpg/960px-Topaze%2C_quartz_fum%C3%A9_1.jpg', state: 'Russia', region: 'Ural Mountains', lat: 56.8389, lng: 60.6057, type: 'Sculpture', materials: ['Stone', 'Metal'], description: 'The Ural Mountains have been renowned since the 18th century for their deposits of malachite, jasper, and other semiprecious stones. Master stone cutters in Yekaterinburg developed extraordinary techniques for shaping and polishing these minerals into vases, jewelry boxes, and decorative inlays that adorned palaces across Russia.', era: '18th century', steps: ['Raw semiprecious stone was extracted from Ural mountain deposits and sorted by color and quality', 'The stone was rough-cut into slabs or blanks using hand-powered saws with abrasive sand', 'Detailed shaping was performed with chisels and grinding wheels to achieve the desired form', 'Progressive polishing with finer abrasives brought out the natural luster and patterns of the stone'], funFact: 'The malachite columns of Saint Isaac\'s Cathedral in St. Petersburg were crafted using a Russian mosaic technique invented by Ural stone cutters, where thin slabs are fitted together so seamlessly they appear to be solid stone.', wikipediaTitle: 'Yekaterinburg_lapidary_factory' },
        { name: 'Tula Samovar Making', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Fomin_samovar.jpg/960px-Fomin_samovar.jpg', state: 'Russia', region: 'Central Russia', lat: 54.1961, lng: 37.6182, type: 'Kitchenware', materials: ['Copper', 'Brass', 'Metal'], description: 'The city of Tula became the center of samovar production in the late 18th century, producing the iconic heated water vessels essential to Russian tea culture. Tula craftsmen developed distinctive techniques for shaping, joining, and ornamenting samovars in copper and brass, with each workshop maintaining its own signature styles.', era: '18th century', steps: ['Sheets of copper or brass were cut and hammered over wooden forms to shape the body of the samovar', 'The internal fire tube and grate assembly were forged separately and fitted into the body', 'Handles, spigots, and decorative elements were cast in molds and soldered into place', 'The assembled samovar was polished to a mirror finish and stamped with the maker\'s mark'], funFact: 'Tula was already famous for its metalworking before samovars, having supplied arms to the Russian military for centuries. The same smithing skills that forged weapons were redirected to create the beloved tea urns that became symbols of Russian hospitality.', wikipediaTitle: 'Samovar' },
        { name: 'Mongolian Deel Embroidery', image: 'https://upload.wikimedia.org/wikipedia/commons/c/c3/Mongols_clothes_man_and_woman.jpg', state: 'Mongolia', region: 'Central Mongolia', lat: 47.9185, lng: 106.9177, type: 'Clothing', materials: ['Silk', 'Thread', 'Cotton', 'Gold Thread'], description: 'The deel is the traditional Mongolian robe worn across the steppe for centuries, and its embroidered decoration reflects the wearer\'s ethnic group, social status, and regional identity. Intricate stitching along collars, cuffs, and hems features geometric and nature-inspired motifs passed down through generations of nomadic families.', era: '13th century', steps: ['Silk or cotton fabric was cut into the wide-sleeved, wrap-front pattern traditional to the wearer\'s ethnic group', 'Embroidery patterns were traced onto collar bands and cuffs using charcoal or chalk guidelines', 'Silk and gold threads were stitched in layered satin and couching techniques to build up ornamental motifs', 'The completed panels were assembled with the main garment and fastened with handmade toggle buttons'], funFact: 'A Mongolian deel\'s color and embroidery style can indicate which of Mongolia\'s many ethnic groups the wearer belongs to, with the Khalkha, Buryat, and Kazakh communities each maintaining distinct decorative traditions.', wikipediaTitle: 'Deel_(clothing)' },
        { name: 'Mongolian Ger (Yurt) Felt Making', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/SK_yurt_camp_%281_of_1%29-8.jpg/960px-SK_yurt_camp_%281_of_1%29-8.jpg', state: 'Mongolia', region: 'Central Mongolia', lat: 47.2, lng: 104.0, type: 'Home Decor', materials: ['Wool', 'Grass', 'Plant Fiber'], description: 'The Mongolian ger, or yurt, relies on thick layers of handmade felt for insulation against the extreme temperatures of the steppe. Felt making is a communal activity where families roll and compress sheep wool into dense sheets, a technique virtually unchanged since the time of the Xiongnu nomads over two thousand years ago.', era: '3rd century BCE', steps: ['Freshly shorn sheep wool was washed, beaten, and spread evenly across a reed mat in thick layers', 'The wool was moistened with water and the mat was tightly rolled around a pole, then dragged behind horses across the steppe', 'The rolling and compression process was repeated multiple times until the fibers matted into a dense, uniform sheet', 'The finished felt was trimmed to size and layered over the ger\'s lattice frame, secured with horsehair ropes'], funFact: 'Mongolian nomads traditionally begin felt making as a community event in autumn, with neighboring families gathering to help roll the enormous sheets needed to cover a single ger, which can require up to eight large felt panels.', wikipediaTitle: 'Yurt' },
        { name: 'Morin Khuur (Horse-Head Fiddle) Making', image: 'https://upload.wikimedia.org/wikipedia/commons/9/95/Morin_Khuur%2C_Today%27s_North_Mongolian_Style.jpg', state: 'Mongolia', region: 'Central Mongolia', lat: 48.005, lng: 106.9, type: 'Home Decor', materials: ['Wood', 'Leather', 'Bone'], description: 'The morin khuur, or horse-head fiddle, is Mongolia\'s most iconic musical instrument, recognized by UNESCO as a masterpiece of intangible heritage. Crafted from wood with a distinctive carved horse head on the scroll, the instrument uses horsehair for both its two strings and its bow, connecting the instrument intimately to nomadic equestrian culture.', era: '13th century', steps: ['A single block of seasoned birch or cedar was carved into the trapezoidal sound box and long neck of the instrument', 'The scroll was meticulously carved into the form of a horse head, with details varying by regional tradition', 'Goat or snake skin was stretched over the front of the sound box and secured with hide glue to form the resonating membrane', 'Horsehair was twisted into two strings and strung from tuning pegs, with a separate bundle of horsehair fitted to a curved wooden bow'], funFact: 'According to Mongolian legend, the first morin khuur was carved by a herder to memorialize his beloved winged horse, and the instrument\'s sound is said to evoke the galloping of horses across the open steppe.', wikipediaTitle: 'Morin_khuur' },
        { name: 'Mongolian Silver Jewelry', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Bayundur.svg/960px-Bayundur.svg.png', state: 'Mongolia', region: 'Western Mongolia', lat: 48.0042, lng: 91.637, type: 'Jewelry', materials: ['Silver', 'Stone', 'Coral'], description: 'Mongolian nomadic communities, particularly the Kazakh and Torguud peoples of western Mongolia, have a rich tradition of silver jewelry making. Elaborate headdresses, rings, earrings, and belt ornaments served as portable wealth and markers of marital status, often inlaid with coral and turquoise sourced through Central Asian trade routes.', era: '15th century', steps: ['Silver was melted in clay crucibles and cast into ingots or rough blanks for further working', 'The silver was hammered and shaped into the desired form, whether a ring, pendant, or large headdress ornament', 'Decorative patterns were engraved or stamped using fine punches, and bezels were soldered to hold gemstones', 'Coral and turquoise stones were set into the prepared bezels and the finished piece was polished to a bright luster'], funFact: 'In Mongolian Kazakh culture, a bride\'s silver headdress can weigh several kilograms and may incorporate dozens of coral and turquoise stones, representing her family\'s accumulated wealth across generations.', wikipediaTitle: 'Mongolian_jewelry' },
        { name: 'Gorodets Painting', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gorodetskaya_rospis_02.jpg/960px-Gorodetskaya_rospis_02.jpg', state: 'Russia', region: 'Volga Region', lat: 56.648, lng: 43.471, type: 'Home Decor', materials: ['Wood', 'Natural Dye'], description: 'Gorodets painting originated in villages along the Volga River in the mid-19th century, growing from the decoration of spinning distaffs into a distinctive folk art tradition. Characterized by bold floral compositions, prancing horses, and festive genre scenes, the bright tempera paintings on wood became one of Russia\'s most recognizable decorative arts.', era: '19th century', steps: ['Seasoned linden wood panels were planed smooth and primed with a thin layer of chalk-based ground', 'Large color spots were laid down in broad brushstrokes to establish the composition of flowers, horses, or figures', 'Detailed line work in white and dark paint was applied over the base colors to define petals, manes, and facial features', 'The completed painting was sealed with several coats of natural oil varnish to protect the bright pigments'], funFact: 'Gorodets painting was originally created exclusively on the flat boards of spinning distaffs, which young men would give to young women as courtship gifts in Volga River villages.', wikipediaTitle: 'Gorodets_painting' },
        { name: 'Dymkovo Toy', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Moscow_July_2011-4a.jpg/960px-Moscow_July_2011-4a.jpg', state: 'Russia', region: 'Kirov Oblast', lat: 58.6036, lng: 49.668, type: 'Toys', materials: ['Clay', 'Natural Dye'], description: 'Dymkovo toys are brightly painted clay figurines originating from the Dymkovo settlement near Kirov, dating back over four hundred years. Ladies in elaborate gowns, roosters, horses, and carnival scenes are molded by hand and decorated in vivid geometric patterns, making them among the most beloved examples of Russian folk art.', era: '15th century', steps: ['Local red clay was mixed with fine river sand and kneaded into a smooth, workable consistency', 'Figures were shaped entirely by hand without molds, with details like ruffles and hats added as small clay pieces', 'The dried figures were fired in a kiln, then coated in a white chalk-and-milk wash to create a bright base', 'Vivid geometric patterns in red, blue, green, and gold were painted on using tempera pigments and finished with gold leaf accents'], funFact: 'Dymkovo toys were traditionally made for the annual Vyatka spring festival called Svistunya, or the Whistling Festival, where townspeople would buy clay whistles and fill the streets with their sound to welcome the season.', wikipediaTitle: 'Dymkovo_toy' },
        { name: 'Siberian Birch Bark Craft', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Peeling_birch.jpg/960px-Peeling_birch.jpg', state: 'Russia', region: 'Yakutia (Sakha Republic)', lat: 62.0355, lng: 129.6755, type: 'Kitchenware', materials: ['Wood', 'Plant Fiber'], description: 'The indigenous Yakut and other Siberian peoples have worked birch bark for thousands of years, creating containers, boxes, and vessels essential to life in the boreal forest. The waterproof, flexible bark was harvested in summer and shaped into everything from baby cradles to grain storage, often decorated with carved or stamped geometric patterns.', era: 'Ancient', steps: ['Birch bark was carefully peeled from living trees in early summer when the sap was flowing and the bark separated most easily', 'The bark sheets were softened in warm water or over a fire, then cut and folded into the desired vessel shape', 'Seams were stitched with thin strips of root or sinew and sealed with pine resin to make the vessel watertight', 'Decorative patterns were incised or stamped into the surface using bone tools, with traditional geometric motifs specific to each community'], funFact: 'Birch bark vessels were so important to Siberian peoples that archaeologists have found birch bark containers in graves dating back thousands of years, placed alongside the deceased as essential provisions for the afterlife.', wikipediaTitle: 'Birch_bark' },
        { name: 'Tatar Leather Craft', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Flag_of_Tatarstan.svg/960px-Flag_of_Tatarstan.svg.png', state: 'Russia', region: 'Tatarstan', lat: 55.7887, lng: 49.1221, type: 'Footwear', materials: ['Leather', 'Natural Dye', 'Thread'], description: 'Kazan Tatars developed a highly distinctive tradition of ornamental leather work, particularly the creation of ichigi—soft mosaic leather boots assembled from precisely cut pieces of colored leather. This technique, which may date to the Volga Bulgar period, produced footwear and accessories admired across the Islamic world and traded along Silk Road routes.', era: '10th century', steps: ['Goatskin and calfskin were tanned and dyed in vivid colors using plant-based dyes, particularly saffron yellow, madder red, and indigo blue', 'The dyed leather was cut into intricate floral and geometric shapes with sharp knives following traditional pattern templates', 'The multicolored leather pieces were assembled into mosaic compositions and stitched together with fine silk thread using a distinctive couched seam', 'The completed leather panels were shaped into boots or slippers on wooden lasts and finished with turned-down tops and soft leather soles'], funFact: 'Tatar leather mosaic boots were so prized across the Russian Empire that they were among the gifts presented to visiting foreign dignitaries, and the technique influenced decorative leather traditions as far away as Central Asia.', wikipediaTitle: 'Ichigi' },
        { name: 'Sudanese Leather Craft', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Leather_working_tools_%28DSC08329%29.jpg/960px-Leather_working_tools_%28DSC08329%29.jpg', state: 'Sudan', region: 'Central Sudan', lat: 15.5007, lng: 32.5599, type: 'Home Decor', materials: ['Leather', 'Natural Dye', 'Thread'], description: 'Sudanese leather workers have produced finely tooled and dyed leather goods for centuries, drawing on traditions that link the Nile Valley to the broader Saharan and Sahelian leather trade. Bags, cushions, saddles, and amulet cases are decorated with geometric tooling and colored with natural dyes, continuing techniques once central to trans-Saharan commerce.', era: 'Medieval', steps: ['Goat or camel hides were tanned using acacia bark and other local plant extracts in earthen pits', 'The tanned leather was dyed in rich reds and browns using henna, pomegranate, and other botanical pigments', 'Geometric and arabesque patterns were tooled into the leather surface using heated metal stamps and pointed awls', 'Pieces were cut to shape and stitched with leather thong or waxed thread into bags, cushions, or other finished goods'], funFact: 'Sudanese leather was historically so valued in North African trade that the Arabic term for a specific type of fine leather, \'marroquin,\' referenced the high-quality hides that traveled north from the Sahel through Khartoum\'s markets.', wikipediaTitle: 'Leather_crafting' },
        { name: 'Nubian Gold Jewelry', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Rulers_of_Kush%2C_Kerma_Museum.jpg/960px-Rulers_of_Kush%2C_Kerma_Museum.jpg', state: 'Sudan', region: 'Northern Sudan', lat: 18.5, lng: 31.8333, type: 'Jewelry', materials: ['Gold', 'Stone', 'Beads'], description: 'The Nubian kingdoms of Kush and Meroe were among the ancient world\'s great gold-producing civilizations, and the tradition of elaborate gold jewelry making in northern Sudan stretches back over three thousand years. Necklaces, earrings, bracelets, and amulets crafted along the Nile reflect a fusion of Egyptian, African, and Hellenistic influences unique to Nubian culture.', era: '8th century BCE', steps: ['Alluvial gold was collected from Nile tributaries and smelted in clay crucibles over charcoal fires', 'The refined gold was hammered into thin sheets or drawn into wire using stone and bronze tools', 'Intricate designs featuring rams, cobras, and lotus motifs were achieved through repoussé, granulation, and filigree techniques', 'Semiprecious stones and glass beads were set into the gold work to complete elaborate pectoral collars and earrings'], funFact: 'The Nubian queens known as Kandakes were buried with such quantities of gold jewelry that when archaeologists excavated the royal pyramids at Meroe, they found pieces rivaling the treasures of Tutankhamun\'s tomb.', wikipediaTitle: 'Nubia' },
        { name: 'Chadian Leather Tooling', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Building_of_National_Assembly_DJAMENA.jpg/960px-Building_of_National_Assembly_DJAMENA.jpg', state: 'Chad', region: 'Central Chad', lat: 12.1348, lng: 15.0557, type: 'Home Decor', materials: ['Leather', 'Natural Dye'], description: 'The leather workers of Chad, particularly among the Kanuri and Arab communities around N\'Djamena and the Lake Chad basin, produce elaborately tooled leather goods including prayer mats, book covers, and saddle bags. These crafts connect to the wider Sahelian leather tradition that flourished along trans-Saharan trade routes for centuries.', era: 'Medieval', steps: ['Cattle or goat hides were soaked and dehaired, then tanned using leaves and bark from local acacia and balanites trees', 'The leather was stretched, dried, and dyed using indigo, henna, and mineral pigments to achieve rich blues and reds', 'Geometric and interlacing patterns were impressed into the leather using carved wooden stamps and metal punches', 'The decorated leather was cut and assembled into bags, cushion covers, or other items using hand-stitched seams'], funFact: 'Chadian leather artisans traditionally organized into hereditary guilds, with specialized families controlling different stages of production from tanning to tooling, maintaining trade secrets passed from parent to child.', wikipediaTitle: 'N\'Djamena' },
        { name: 'Eritrean Basket Weaving', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Original_Harar_Mesob_tables.jpg/960px-Original_Harar_Mesob_tables.jpg', state: 'Eritrea', region: 'Central Eritrea', lat: 15.3229, lng: 38.9251, type: 'Home Decor', materials: ['Grass', 'Plant Fiber', 'Natural Dye'], description: 'Eritrean women, particularly among the Tigrinya and Kunama communities, weave tightly coiled baskets that serve as both functional household items and vibrant decorative art. The mesob, a large hooded basket used as a communal dining table for serving injera, is among the most elaborate examples, featuring complex geometric patterns in brilliant colors.', era: 'Ancient', steps: ['Grasses and palm fibers were harvested, dried, and split into fine, uniform strands for weaving', 'Selected strands were dyed in vivid colors using plant-based pigments and modern dyes to create the desired palette', 'Coiled basket construction began at the center, with each row of grass wrapped and stitched to the previous one using a binding fiber', 'Colored strands were introduced according to memorized geometric patterns, building up the design as the basket grew outward and upward'], funFact: 'The Eritrean mesob basket is large enough to serve as a table for an entire family, and its domed lid is lifted to reveal a communal platter of injera beneath, making the basket itself a centerpiece of social dining culture.', wikipediaTitle: 'Mesob' },
        { name: 'Eritrean Gold Jewelry', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Flag_of_Eritrea.svg/960px-Flag_of_Eritrea.svg.png', state: 'Eritrea', region: 'Western Eritrea', lat: 15.339, lng: 38.931, type: 'Jewelry', materials: ['Gold', 'Silver', 'Beads'], description: 'Eritrean gold jewelry traditions, particularly among the Tigrinya and Tigre peoples, encompass elaborate bridal sets including necklaces, headpieces, earrings, and nose rings. These pieces draw on ancient Aksumite metalworking heritage and reflect centuries of cultural exchange across the Red Sea with the Arabian Peninsula and the broader Indian Ocean trade network.', era: '1st century CE', steps: ['Gold was melted in small clay crucibles and refined to remove impurities before being prepared for working', 'The molten gold was cast into simple forms or hammered into thin sheets and wire for further shaping', 'Filigree and granulation techniques were employed to create the delicate lacework patterns characteristic of Eritrean bridal jewelry', 'Individual components were soldered together and polished to assemble complete necklaces, headpieces, and earring sets'], funFact: 'An Eritrean bride traditionally receives a complete set of gold jewelry from the groom\'s family before the wedding, and these pieces remain her personal property throughout the marriage, serving as both adornment and financial security.', wikipediaTitle: 'Eritrea' },
        { name: 'Central African Butterfly Wing Art', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Flag_of_the_Central_African_Republic.svg/960px-Flag_of_the_Central_African_Republic.svg.png', state: 'Central African Republic', region: 'Central African Republic', lat: 4.3947, lng: 18.5582, type: 'Home Decor', materials: ['Glass', 'Plant Fiber'], description: 'Artisans in the Central African Republic developed a unique craft of arranging the iridescent wings of tropical butterflies into elaborate mosaic pictures. Using wings collected after the insects\' natural death in the dense equatorial forests, artists compose landscapes, portraits, and wildlife scenes that shimmer with the natural structural colors of the wing scales.', era: '20th century', steps: ['Wings of naturally deceased butterflies were carefully collected from the forest floor and sorted by color and iridescence', 'The wings were dried and pressed flat, then trimmed with fine scissors into shapes needed for the composition', 'Wing fragments were arranged on a backing board according to the artist\'s design, layering colors to create depth and form', 'The completed mosaic was sealed under glass in a frame to preserve the delicate wings and their shimmering structural colors'], funFact: 'The brilliant blues and greens in Central African butterfly wing art are not caused by pigments but by the microscopic structure of the wing scales, which refract light like tiny prisms and never fade over time.', wikipediaTitle: 'Central_African_Republic' },
