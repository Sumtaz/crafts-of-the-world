        { name: "Cambodian Golden Silk Weaving", image: "", state: "Cambodia", region: "Southeast Asia", lat: 11.001, lng: 104.78, type: "Clothing", materials: ["silk", "natural dye"], description: "The production of Cambodia's prized golden silk from the native golden silk moth in Takeo province.", era: "13th century", steps: ["The golden silk moths are raised on mulberry leaves, and their naturally golden-hued cocoons are harvested.", "The cocoons are soaked in warm water and the long silk filaments are carefully unwound onto reels.", "The golden silk thread is prepared and set up on a traditional Khmer floor loom."], funFact: "Cambodian golden silk gets its natural color from the diet and genetics of." },
        { name: "Laotian Sa Paper", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Tray_with_food_in_Laos.jpg/960px-Tray_with_food_in_Laos.jpg", state: "Laos", region: "Southeast Asia", lat: 19.886, lng: 102.135, type: "Home Decor", materials: ["plant fiber", "bamboo"], description: "The traditional handmade paper of Laos, crafted from the bark of the mulberry tree (sa tree).", era: "Pre-colonial era", steps: ["The inner bark of the mulberry tree is stripped, soaked in water, and boiled until the fibers soften and separate.", "The softened bark fibers are beaten with wooden mallets until they form a smooth, uniform pulp.", "The pulp is spread thinly over a mesh screen stretched on a bamboo frame and dried in the sun."], funFact: "Sa paper was traditionally used to make temple manuscript books and." },
        { name: "Laotian Hmong Batik", image: "", state: "Laos", region: "Southeast Asia", lat: 19.454, lng: 103.51, type: "Clothing", materials: ["cotton", "wax", "natural dye"], description: "The indigo-dyed wax-resist textile tradition of the Hmong hill tribes of Laos, featuring bold geometric spirals.", era: "Pre-colonial era", steps: ["Locally grown hemp or cotton cloth is washed and prepared as the base fabric.", "Melted beeswax is applied to the fabric using a small copper drawing tool called a tjanting, following geometric patterns from memory.", "The waxed fabric is immersed in indigo dye vats, with the dyeing process repeated many times to achieve a deep blue-black color."], funFact: "Hmong women learn the complex geometric batik patterns entirely by memory." },
        { name: "Laotian Silver Jewelry", state: "Laos", region: "Southeast Asia", lat: 19.889, lng: 102.141, type: "Jewelry", materials: ["silver"], description: "The traditional silversmithing of Laos, particularly among highland ethnic groups, producing ornate necklaces.", era: "Pre-colonial era", steps: ["Silver ingots or old coins are melted in a charcoal crucible and cast into workable bars or sheets.", "The silver is hammered into thin sheets or drawn into wire using hand tools and an anvil.", "The pieces are shaped, engraved, and assembled into the jewelry form, with granulation and filigree details added."], funFact: "Hmong and Mien soul-lock pendants are placed on babies at birth to." },
        { name: "Igorot Weaving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Ifugao_Beat.jpg/960px-Ifugao_Beat.jpg", state: "Philippines", region: "Southeast Asia", lat: 16.411, lng: 120.596, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The backstrap loom weaving of the Igorot peoples of the Cordillera highlands in northern Luzon.", era: "Pre-colonial era", steps: ["Cotton is hand-spun into thread and dyed using natural sources such as tree bark for red and indigo for dark blue.", "The warp threads are measured and arranged on a backstrap loom tied between the weaver's body and a post.", "The weaver creates the distinctive striped and diamond patterns by carefully selecting and lifting warp threads."], funFact: "Among the Kalinga people of the Cordillera." },
        { name: "Yakan Weaving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Basilan_students.JPG/960px-Basilan_students.JPG", state: "Philippines", region: "Southeast Asia", lat: 6.906, lng: 121.965, type: "Clothing", materials: ["cotton", "natural dye", "thread"], description: "The extraordinarily complex geometric weaving of the Yakan people of Basilan island in Mindanao, known for their vibrant.", era: "Pre-colonial era", steps: ["Cotton threads are hand-dyed in vivid primary colors and carefully sorted by hue.", "The warp is set up on a backstrap loom with the colored threads arranged to form the base of the geometric pattern.", "The weaver uses a supplementary weft technique, manually picking up individual threads to create the dense, symmetric designs."], funFact: "Yakan weavers are known for creating bunga-sama (mixed flower) patterns so." },
        { name: "Filipino Burnay Pottery", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Northern_Philippines_%28Luzon%29.jpg/960px-Northern_Philippines_%28Luzon%29.jpg", state: "Philippines", region: "Southeast Asia", lat: 17.572, lng: 120.387, type: "Pottery", materials: ["clay"], description: "The robust, unglazed earthenware jars of the Ilocos region in northern Luzon, used for centuries to ferment vinegar.", era: "Pre-colonial era", steps: ["The local red clay is dug from riverbanks, cleaned of impurities, and kneaded to a workable consistency.", "The jar is built up by coiling thick ropes of clay and smoothing them with a wooden paddle and stone anvil.", "The surface is burnished with a smooth stone or shell to create a semi-polished finish that reduces porosity."], funFact: "Burnay jars from Vigan are so durable that many households in the Ilocos." },
        { name: "Peranakan Beadwork", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Munka_kasot%2C_Peranakan%2C_early_20th_century_beaded_uppers_for_pair_of_slippers%2C_Intan.JPG/960px-Munka_kasot%2C_Peranakan%2C_early_20th_century_beaded_uppers_for_pair_of_slippers%2C_Intan.JPG", state: "Malaysia", region: "Southeast Asia", lat: 5.414, lng: 100.33, type: "Footwear", materials: ["beads", "thread", "leather"], description: "The exquisite beaded slippers and household items of the Peranakan (Straits Chinese) community.", era: "19th century", steps: ["Thousands of tiny glass seed beads, often from Venice or Bohemia, are sorted by color.", "A cotton or linen canvas is stretched on a frame and the intricate floral design is marked out.", "Each bead is individually stitched onto the canvas using a fine needle and thread, following the pattern bead by bead."], funFact: "Peranakan beaded slippers use beads as small as one millimeter in diameter." },
        { name: "Malaysian Pewtercraft", state: "Malaysia", region: "Southeast Asia", lat: 3.139, lng: 101.687, type: "Kitchenware", materials: ["metal", "copper"], description: "The traditional pewtersmithing of Malaysia, utilizing the country's rich tin deposits to create finely crafted tankards.", era: "19th century", steps: ["An alloy of tin, copper, and antimony is melted and cast into flat sheets or poured into molds.", "The cast piece is turned on a lathe or hammered over a form to achieve the desired vessel shape.", "The surface is hand-filed and polished to a mirror-like finish or satin sheen."], funFact: "Malaysia was once the world's largest tin producer." },
        { name: "Malaysian Wau Kite", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Malaysia_Airlines%2C_Airbus_A350-900_9M-MAF_NRT_%2842887513761%29.jpg/960px-Malaysia_Airlines%2C_Airbus_A350-900_9M-MAF_NRT_%2842887513761%29.jpg", state: "Malaysia", region: "Southeast Asia", lat: 6.121, lng: 102.238, type: "Toys", materials: ["bamboo", "paper", "natural dye"], description: "The ornate traditional kites of the Malaysian east coast, particularly the crescent-shaped Wau Bulan (moon kite).", era: "15th century", steps: ["Bamboo is split into thin, flexible strips and bent into the characteristic crescent wing shape and frame.", "The bamboo skeleton is bound together with cord at the joints to create a sturdy but flexible structure.", "Colorful tissue paper or hand-painted fabric is glued over the frame and cut into elaborate floral motifs."], funFact: "The Wau Bulan is featured on the Malaysian one-ringgit coin and as the logo." },
        { name: "Palestinian Olive Wood Carving", state: "Palestine", region: "Middle East", lat: 31.705, lng: 35.202, type: "Sculpture", materials: ["wood"], description: "The ancient tradition of carving religious figures, nativity scenes.", era: "4th century", steps: ["Olive wood from pruned or fallen trees is seasoned for at least two years to prevent cracking.", "The rough shape of the figure or scene is cut from the wood block using hand saws and chisels.", "The fine details of faces, hands, and drapery are carved with small gouges and knives."], funFact: "Bethlehem's olive wood carving tradition is said to have begun when." },
        { name: "Hebron Glass", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Hebron_glass_display.jpg/960px-Hebron_glass_display.jpg", state: "Palestine", region: "Middle East", lat: 31.529, lng: 35.095, type: "Home Decor", materials: ["glass"], description: "The centuries-old tradition of blown glass production in Hebron, where artisans create vivid blue, green.", era: "1st century", steps: ["Recycled glass and raw sand are melted together in a clay furnace heated by wood or olive pits.", "The glassblower gathers a blob of molten glass on the end of a long iron blowpipe.", "The glass is blown, shaped, and tooled into vessels, bracelets, or beads while still hot and malleable."], funFact: "Hebron's glass industry is one of the oldest continuously operating in the." },
        { name: "Nablus Soap Making", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Nabulsi_soap_IMG_5357.JPG/960px-Nabulsi_soap_IMG_5357.JPG", state: "Palestine", region: "Middle East", lat: 32.222, lng: 35.261, type: "Kitchenware", materials: ["plant fiber"], description: "The traditional production of pure olive oil soap in the city of Nablus.", era: "10th century", steps: ["Virgin olive oil is mixed with water and an alkaline solution of barilla plant ash in large copper cauldrons.", "The mixture is cooked over a fire for several days, stirred constantly until it saponifies into a thick paste.", "The hot soap paste is spread onto a flat surface, smoothed, and stamped with the manufacturer's seal before being cut into bars."], funFact: "At its peak, Nablus had over 30 soap factories operating within the old." },
        { name: "Lebanese Pottery", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Lebanon_2002_CIA_map.jpg/960px-Lebanon_2002_CIA_map.jpg", state: "Lebanon", region: "Middle East", lat: 33.94, lng: 35.635, type: "Pottery", materials: ["clay", "natural dye"], description: "The traditional earthenware pottery of the village of Beit Chabab in Mount Lebanon, known for producing sturdy.", era: "Phoenician era", steps: ["The local iron-rich red clay is dug from hillside deposits and cleaned of stones and impurities.", "The clay is centered on a kick wheel and thrown into the desired form, such as a water jar or cooking pot.", "The leather-hard vessel is decorated with incised patterns or simple painted motifs."], funFact: "Lebanon's pottery tradition is a direct continuation of Phoenician ceramic." },
        { name: "Lebanese Silk Weaving", state: "Lebanon", region: "Middle East", lat: 33.827, lng: 35.597, type: "Clothing", materials: ["silk", "natural dye"], description: "The historic silk weaving industry of Mount Lebanon, where mulberry groves fed silkworms whose thread was woven into.", era: "6th century", steps: ["Silkworms are raised on mulberry leaves in trays within ventilated rooms until they spin their cocoons.", "The cocoons are soaked in hot water to loosen the sericin, and the fine silk filaments are reeled onto bobbins.", "The silk threads are dyed using local plant dyes and set up on floor looms for weaving."], funFact: "Mount Lebanon's silk industry was so significant in the 19th century that." },
        { name: "Jezzine Cutlery", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/View_of_Jezzine.jpg/960px-View_of_Jezzine.jpg", state: "Lebanon", region: "Middle East", lat: 33.545, lng: 35.587, type: "Kitchenware", materials: ["iron", "silver", "bone"], description: "The distinctive handcrafted cutlery of Jezzine in southern Lebanon, featuring ornamental handles shaped like birds.", era: "18th century", steps: ["Steel blades are forged and shaped by hand on an anvil, then tempered and sharpened.", "Horn, bone, or metal blanks are carved into the characteristic bird or cedar tree handle shape.", "The handle is fitted onto the blade tang and secured with rivets or resin."], funFact: "Jezzine cutlery handles traditionally take the shape of a phoenix-like bird." },
        { name: "Damascus Steel", image: "", state: "Syria", region: "Middle East", lat: 33.513, lng: 36.292, type: "Jewelry", materials: ["iron", "metal"], description: "The legendary steel of Damascus, renowned throughout the medieval world for its distinctive watered pattern and.", era: "3rd century", steps: ["Wootz steel ingots, imported from India or produced locally, are heated in a charcoal forge until glowing.", "The hot steel is folded, hammered, and welded repeatedly to distribute the carbon microstructures that create the watered pattern.", "The blade is shaped through careful hammering and grinding into its final form with precise edge geometry."], funFact: "The original technique for producing true Damascus steel was lost around." },
        { name: "Syrian Brocade", image: "https://upload.wikimedia.org/wikipedia/commons/1/1f/ItalianSilkDamask.jpg", state: "Syria", region: "Middle East", lat: 33.51, lng: 36.31, type: "Clothing", materials: ["silk", "gold thread", "silver"], description: "The luxurious woven silk brocade of Damascus, known in Europe as 'damask,' featuring elaborate floral and geometric.", era: "12th century", steps: ["The finest silk thread is prepared and dyed, with warp and weft threads often in the same color.", "The complex pattern is set up on a drawloom using a system of heddles that controls the satin and twill weave areas.", "The weaver works the loom while an assistant (the drawboy) pulls the correct pattern cords from above."], funFact: "The word 'damask' entered European languages directly from Damascus." },
        { name: "Syrian Mosaic Woodwork", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Andr%C3%A9-charles_boulle%2C_cofanetto_con_tartaruga%2C_1700-20_ca.jpg/960px-Andr%C3%A9-charles_boulle%2C_cofanetto_con_tartaruga%2C_1700-20_ca.jpg", state: "Syria", region: "Middle East", lat: 33.508, lng: 36.295, type: "Furniture", materials: ["wood", "shell", "bone", "metal"], description: "The intricate geometric inlay woodwork of Damascus, where tiny pieces of different colored woods, bone.", era: "12th century", steps: ["Thin strips of different colored woods such as walnut, lemon, and rose are glued together in precise geometric arrangements.", "The assembled wood bundle is sliced crosswise into thin wafers, each revealing the complete geometric pattern.", "These pattern wafers are glued side by side onto the surface of the wooden object, creating a continuous mosaic field."], funFact: "Damascus mosaic woodwork boxes and backgammon boards were among the most." },
        { name: "Kurdish Carpet Weaving", image: "", state: "Iraq", region: "Middle East", lat: 36.191, lng: 44.009, type: "Home Decor", materials: ["wool", "natural dye", "cotton"], description: "The richly colored pile carpet weaving tradition of the Kurdish people of northern Iraq.", era: "Pre-Islamic era", steps: ["Wool from local sheep is washed, carded, and hand-spun into strong yarn on a drop spindle.", "The yarn is dyed using natural materials: pomegranate rinds for yellow, walnut husks for brown, and indigo for blue.", "The warp is strung on a vertical loom, and the weaver ties individual knots row by row following the pattern from memory."], funFact: "Kurdish weavers traditionally work without written patterns." },
        { name: "Iraqi Mudhif Reed House", image: "https://upload.wikimedia.org/wikipedia/commons/9/9e/Modhif_neserya_1.jpg", state: "Iraq", region: "Middle East", lat: 31.044, lng: 47.023, type: "Furniture", materials: ["grass", "plant fiber"], description: "The monumental reed guest houses of the Marsh Arabs of southern Iraq.", era: "3rd millennium BCE", steps: ["Giant qasab reeds are harvested from the marshes and dried in bundles of increasing thickness.", "Massive reed bundle columns are erected in two parallel rows and bent inward to meet at the top, forming pointed arches.", "Lighter reed bundles are lashed horizontally across the arches to create the ribbed vault of the roof and walls."], funFact: "The arched reed architecture of the Marsh Arab mudhif is depicted on." },
        { name: "Mandaean Silver Craft", image: "https://upload.wikimedia.org/wikipedia/commons/5/54/Celebration_of_Mandaean_New_Year_in_Khuzestan%2C_Iran.jpg", state: "Iraq", region: "Middle East", lat: 31, lng: 47, type: "Jewelry", materials: ["silver", "gold"], description: "The traditional silverwork of Iraq's Mandaean community, whose artisans are renowned across the Middle East for.", era: "1st century", steps: ["Silver is melted and drawn into extremely fine wire or hammered into thin sheets.", "The wire is twisted and coiled into intricate filigree scrolls and rosettes using fine pliers.", "The filigree elements are arranged on a silver base and soldered into place to form the complete design."], funFact: "The Mandaeans are a Gnostic religious community whose men traditionally all." },
        { name: "Yemeni Silver Jewelry", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/A_YEMENITE_FAMILY_READING_FROM_THE_PSALMS_ON_SHABBAT_AFTER_LUNCH.D827-012.jpg/960px-A_YEMENITE_FAMILY_READING_FROM_THE_PSALMS_ON_SHABBAT_AFTER_LUNCH.D827-012.jpg", state: "Yemen", region: "Middle East", lat: 15.348, lng: 44.206, type: "Jewelry", materials: ["silver", "gold", "beads"], description: "The magnificent silver jewelry tradition of Sana'a, historically crafted by Yemen's Jewish silversmiths.", era: "Pre-Islamic era", steps: ["Silver coins or ingots are melted and cast into workable bars or drawn into fine wire.", "The silver is hammered into shape and decorated with applied granulation, tiny silver balls soldered onto the surface.", "Filigree wirework, engraving, and applied gold wash (tila) are added as decorative elements."], funFact: "Yemen's Jewish community produced virtually all of the country's silver." },
        { name: "Yemeni Takhrim Window Lattice", state: "Yemen", region: "Middle East", lat: 15.354, lng: 44.208, type: "Home Decor", materials: ["stone", "glass"], description: "The ornate stained glass and plaster window screens of traditional Sana'a tower houses.", era: "10th century", steps: ["A thick slab of wet gypsum plaster is prepared and set into a wooden frame the size of the window opening.", "The intricate geometric design is carved through the plaster using sharp knives and chisels while still slightly damp.", "Pieces of colored glass in red, blue, green, and amber are cut to fit each opening in the lattice pattern."], funFact: "The fan-shaped takhrim windows above the doors of Sana'a's tower houses are." },
        { name: "Yemeni Dallah Coffee Pot", image: "https://upload.wikimedia.org/wikipedia/commons/4/49/A_dallah_a_traditional_Arabic_coffee_pot_with_cups_and_coffee_beans.jpg", state: "Yemen", region: "Middle East", lat: 15.34, lng: 44.2, type: "Kitchenware", materials: ["brass", "copper"], description: "The traditional long-spouted coffee pot of Yemen, hand-forged from brass or copper.", era: "15th century", steps: ["A sheet of brass or copper is cut and hammered over a stake into the pot's distinctive pear-shaped body.", "The long, curved spout is formed separately by shaping a cone of metal and attaching it to the body with brazing.", "The hinged lid, handle, and finial are forged and assembled, with the handle often wrapped in leather or cord for heat protection."], funFact: "Yemen is the birthplace of coffee cultivation and the coffee trade." },
        { name: "Omani Silver Jewelry", state: "Oman", region: "Middle East", lat: 22.934, lng: 57.53, type: "Jewelry", materials: ["silver", "gold"], description: "The heavy, ornate silver jewelry of Nizwa and the Omani interior, including massive bridal necklaces, anklets.", era: "Pre-Islamic era", steps: ["Maria Theresa silver thalers are melted down and cast into ingots for working.", "The silver is hammered into thick sheets and shaped into the desired form: bangles, pendants, or amulet cases.", "Surface decoration is applied through chasing, repoussé, applied granulation, and filigree wirework."], funFact: "Omani bridal jewelry sets could weigh several kilograms and represented the." },
        { name: "Omani Dhow Boat Building", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Dhow_znz.jpg/960px-Dhow_znz.jpg", state: "Oman", region: "Middle East", lat: 23.616, lng: 58.592, type: "Furniture", materials: ["wood", "plant fiber", "cotton"], description: "The ancient craft of building wooden sailing vessels in Oman's coastal shipyards.", era: "3rd millennium BCE", steps: ["The keel timber of teak or other hardwood is laid down, and the stem and stern posts are erected and shaped.", "The hull planks are hewn from imported Indian teak and fitted edge-to-edge, traditionally stitched together with coir rope through drilled holes.", "The internal ribs and frames are fitted after the hull shell is complete, a technique opposite to European shipbuilding."], funFact: "Omani dhows were traditionally built without any iron nails." },
        { name: "Omani Halwa Pot Making", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Sholakia_Eidgah_Maidan_03.jpg/960px-Sholakia_Eidgah_Maidan_03.jpg", state: "Oman", region: "Middle East", lat: 23.588, lng: 58.382, type: "Kitchenware", materials: ["copper", "brass"], description: "The craft of making large copper cooking vessels specifically designed for preparing Omani halwa.", era: "Pre-modern era", steps: ["A thick sheet of copper is cut and hammered over a large stake to form the wide, shallow cooking vessel shape.", "The copper body is reinforced with a rolled rim and heavy base to withstand prolonged heating.", "Brass or copper handles are riveted to the sides for lifting the heavy pot when full."], funFact: "Omani halwa requires continuous stirring over a fire for up to two hours." },
        { name: "Jordanian Sand Bottle Art", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Sand_art_of_Ratha_Yatra_by_Sudarsan_Pattnaik.jpg/960px-Sand_art_of_Ratha_Yatra_by_Sudarsan_Pattnaik.jpg", state: "Jordan", region: "Middle East", lat: 30.328, lng: 35.442, type: "Home Decor", materials: ["glass", "stone"], description: "The folk art of creating layered colored sand pictures inside glass bottles, practiced in Petra and Aqaba.", era: "20th century", steps: ["Natural sandstones of different colors are gathered from the desert landscape around Petra and ground into fine sand.", "The colored sands are sorted by hue and placed in small containers for easy access during the filling process.", "The sand is poured into the glass bottle layer by layer, with the artist using thin metal tools to push and shape the sand into pictorial designs."], funFact: "The multicolored sands used in Jordanian sand art come from the naturally." },
        { name: "Jordanian Bedouin Weaving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Three_bedouins_sheikhs%2C_c_1867-1876_%28cropped%29.jpg/960px-Three_bedouins_sheikhs%2C_c_1867-1876_%28cropped%29.jpg", state: "Jordan", region: "Middle East", lat: 30.834, lng: 36.345, type: "Home Decor", materials: ["wool", "cotton", "natural dye"], description: "The ground-loom weaving tradition of Jordan's Bedouin women, producing rugs, tent dividers.", era: "Pre-Islamic era", steps: ["Wool is shorn from sheep and goats, washed, and hand-spun into yarn on a drop spindle.", "The yarn is dyed using desert plants: pomegranate for yellow, madder root for red, and indigo for blue.", "A ground loom is staked out on the earth, and the warp threads are stretched between two beams."], funFact: "The black goat-hair tent panels woven by Bedouin women are called beit." },
        { name: "Egyptian Copper Tray", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/%D8%AE%D8%A7%D9%86_%D8%A7%D9%84%D8%AE%D9%84%D9%8A%D9%84%D9%8A_1.jpg/960px-%D8%AE%D8%A7%D9%86_%D8%A7%D9%84%D8%AE%D9%84%D9%8A%D9%84%D9%8A_1.jpg", state: "Egypt", region: "Middle East", lat: 30.048, lng: 31.262, type: "Kitchenware", materials: ["copper", "silver"], description: "The hand-hammered and engraved copper trays of Cairo's Khan el-Khalili bazaar.", era: "14th century", steps: ["A flat sheet of copper is cut into a large circle and hammered into a shallow tray form with a raised rim.", "The surface is marked out with geometric guidelines using a compass and straight edge.", "The intricate arabesque and calligraphic patterns are engraved into the copper using steel chisels and a small hammer."], funFact: "Khan el-Khalili, where Cairo's coppersmiths have worked since the 14th." },
        { name: "Egyptian Mashrabiya Woodwork", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Moucharabier_-_panoramio.jpg/960px-Moucharabier_-_panoramio.jpg", state: "Egypt", region: "Middle East", lat: 30.045, lng: 31.258, type: "Home Decor", materials: ["wood"], description: "The iconic carved wooden lattice screens of Cairo's Islamic architecture.", era: "12th century", steps: ["Small cylinders of hard wood are individually turned on a lathe into spindles with bulbous, spherical, and cylindrical sections.", "The turned spindles are assembled by inserting them into precisely drilled holes in horizontal rails, creating geometric patterns.", "Additional decorative elements such as flat carved panels and arabesque inserts are fitted between the turned sections."], funFact: "Mashrabiya screens work as natural air conditioners: the lattice cools." },
        { name: "Egyptian Muski Glass", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/The_spell_of_Egypt_%28IA_spellofegypt01bell%29.pdf/page1-808px-The_spell_of_Egypt_%28IA_spellofegypt01bell%29.pdf.jpg", state: "Egypt", region: "Middle East", lat: 30.047, lng: 31.264, type: "Home Decor", materials: ["glass"], description: "The hand-blown recycled glass art of Cairo's Muski quarter, where artisans transform discarded bottles into colorful.", era: "Medieval era", steps: ["Discarded glass bottles are sorted by color, cleaned, and broken into chunks for melting.", "The glass chunks are melted in a small clay furnace fueled by gas or wood.", "The glassblower gathers the molten glass on a blowpipe and shapes it through blowing and manipulation with hand tools."], funFact: "Egypt's tradition of glassmaking dates back to the Pharaonic period." },
        { name: "Persian Gabbeh Rug", image: "https://upload.wikimedia.org/wikipedia/commons/5/52/TapisGabbeh.png", state: "Iran", region: "Middle East", lat: 30.668, lng: 51.68, type: "Home Decor", materials: ["wool", "natural dye"], description: "The thick, shaggy pile rugs woven by Qashqai nomadic women in the Zagros Mountains of southern Iran, featuring bold.", era: "Pre-Islamic era", steps: ["Wool from the nomads' own sheep is washed in mountain streams and hand-spun into thick, soft yarn.", "The yarn is dyed using natural materials found along the migration route: madder, walnut, pomegranate, and indigo.", "The weaver sets up a horizontal ground loom at the camp and ties Turkish knots in a coarse, loose weave."], funFact: "Gabbeh rugs were traditionally considered too coarse for sale and were used." },
        { name: "Persian Kilim", image: "", state: "Iran", region: "Middle East", lat: 32.654, lng: 51.677, type: "Home Decor", materials: ["wool", "cotton", "natural dye"], description: "The flat-woven tapestry rugs produced across Iran's tribal and village communities.", era: "Pre-Islamic era", steps: ["Wool is hand-spun and dyed with natural pigments, with each tribal region having its own characteristic color palette.", "The cotton warp is strung on a ground loom or vertical frame loom staked into the earth.", "The weaver interlocks colored weft threads around the warp to build the geometric design, using a slit-weave or dovetail technique."], funFact: "Iranian kilim patterns are a visual language: each tribal motif has a." },

        { name: "Turkish Felt Making", image: "", state: "Turkey", region: "Middle East", lat: 38.735, lng: 32.493, type: "Clothing", materials: ["wool"], description: "The ancient Central Asian tradition of felt making preserved in Turkey, particularly in Konya.", era: "Pre-Islamic era", steps: ["Raw sheep's wool is washed, teased apart, and laid out in even layers on a reed mat in the desired thickness.", "Hot soapy water is sprinkled over the wool layers, and the mat is rolled up tightly around a pole.", "The rolled bundle is kicked, beaten, and rolled back and forth for several hours to entangle the wool fibers."], funFact: "The whirling dervishes of Konya wear tall conical felt hats called sikke." },

        { name: "Al-Sadu Weaving", state: "Saudi Arabia", region: "Najd", lat: 24.7136, lng: 46.6753, type: "Clothing", materials: ["Wool", "Natural Dye", "Cotton"], description: "Traditional Bedouin flat-weave textile art practiced by women of the Arabian Peninsula, producing tent dividers.", era: "Ancient", steps: ["Sheep or camel wool is sheared, cleaned, and hand-spun into strong yarn", "The yarn is dyed using natural pigments — pomegranate for red, indigo for black", "Threads are stretched on a ground-level loom staked into desert sand"], funFact: "Al-Sadu was inscribed on the UNESCO Intangible Cultural Heritage list in." },

        { name: "Gorodets Painting", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gorodetskaya_rospis_02.jpg/960px-Gorodetskaya_rospis_02.jpg", state: "Russia", region: "Volga Region", lat: 56.648, lng: 43.471, type: "Home Decor", materials: ["Wood", "Natural Dye"], description: "Gorodets painting originated in villages along the Volga River in the mid-19th century.", era: "19th century", steps: ["Seasoned linden wood panels were planed smooth and primed with a thin layer of chalk-based ground", "Large color spots were laid down in broad brushstrokes to establish the composition of flowers, horses, or figures", "Detailed line work in white and dark paint was applied over the base colors to define petals, manes, and facial features"], funFact: "Gorodets painting was originally created exclusively on the flat boards of." },
        { name: "Dymkovo Toy", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Moscow_July_2011-4a.jpg/960px-Moscow_July_2011-4a.jpg", state: "Russia", region: "Kirov Oblast", lat: 58.6036, lng: 49.668, type: "Toys", materials: ["Clay", "Natural Dye"], description: "Dymkovo toys are brightly painted clay figurines originating from the Dymkovo settlement near Kirov.", era: "15th century", steps: ["Local red clay was mixed with fine river sand and kneaded into a smooth, workable consistency", "Figures were shaped entirely by hand without molds, with details like ruffles and hats added as small clay pieces", "The dried figures were fired in a kiln, then coated in a white chalk-and-milk wash to create a bright base"], funFact: "Dymkovo toys were traditionally made for the annual Vyatka spring festival." },
        { name: "Siberian Birch Bark Craft", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Peeling_birch.jpg/960px-Peeling_birch.jpg", state: "Russia", region: "Yakutia (Sakha Republic)", lat: 62.0355, lng: 129.6755, type: "Kitchenware", materials: ["Wood", "Plant Fiber"], description: "The indigenous Yakut and other Siberian peoples have worked birch bark for thousands of years, creating containers.", era: "Ancient", steps: ["Birch bark was carefully peeled from living trees in early summer when the sap was flowing and the bark separated most easily", "The bark sheets were softened in warm water or over a fire, then cut and folded into the desired vessel shape", "Seams were stitched with thin strips of root or sinew and sealed with pine resin to make the vessel watertight"], funFact: "Birch bark vessels were so important to Siberian peoples that." },
        { name: "Tatar Leather Craft", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Flag_of_Tatarstan.svg/960px-Flag_of_Tatarstan.svg.png", state: "Russia", region: "Tatarstan", lat: 55.7887, lng: 49.1221, type: "Footwear", materials: ["Leather", "Natural Dye", "Thread"], description: "Kazan Tatars developed a highly distinctive tradition of ornamental leather work.", era: "10th century", steps: ["Goatskin and calfskin were tanned and dyed in vivid colors using plant-based dyes, particularly saffron yellow, madder red, and indigo blue", "The dyed leather was cut into intricate floral and geometric shapes with sharp knives following traditional pattern templates", "The multicolored leather pieces were assembled into mosaic compositions and stitched together with fine silk thread using a distinctive couched seam"], funFact: "Tatar leather mosaic boots were so prized across the Russian Empire that." },

        { name: "Nubian Gold Jewelry", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Rulers_of_Kush%2C_Kerma_Museum.jpg/960px-Rulers_of_Kush%2C_Kerma_Museum.jpg", state: "Sudan", region: "Northern Sudan", lat: 18.5, lng: 31.8333, type: "Jewelry", materials: ["Gold", "Stone", "Beads"], description: "The Nubian kingdoms of Kush and Meroe were among the ancient world's great gold-producing civilizations.", era: "8th century BCE", steps: ["Alluvial gold was collected from Nile tributaries and smelted in clay crucibles over charcoal fires", "The refined gold was hammered into thin sheets or drawn into wire using stone and bronze tools", "Intricate designs featuring rams, cobras, and lotus motifs were achieved through repoussé, granulation, and filigree techniques"], funFact: "The Nubian queens known as Kandakes were buried with such quantities of." },

        { name: "Eritrean Basket Weaving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Original_Harar_Mesob_tables.jpg/960px-Original_Harar_Mesob_tables.jpg", state: "Eritrea", region: "Central Eritrea", lat: 15.3229, lng: 38.9251, type: "Home Decor", materials: ["Grass", "Plant Fiber", "Natural Dye"], description: "Eritrean women, particularly among the Tigrinya and Kunama communities.", era: "Ancient", steps: ["Grasses and palm fibers were harvested, dried, and split into fine, uniform strands for weaving", "Selected strands were dyed in vivid colors using plant-based pigments and modern dyes to create the desired palette", "Coiled basket construction began at the center, with each row of grass wrapped and stitched to the previous one using a binding fiber"], funFact: "The Eritrean mesob basket is large enough to serve as a table for an entire." },

        { name: "Buryat Thangka Painting", image: "", state: "Russia", region: "Buryatia, Lake Baikal", lat: 51.83, lng: 107.59, type: "Ritual", materials: ["Cotton", "Natural Dye", "Gold", "Stone"], description: "Buryat Buddhist monks and trained artists near Lake Baikal produced sacred scroll paintings called thangkas depicting.", era: "18th Century", steps: ["A cotton canvas was stretched on a wooden frame and prepared with a ground of chalk and animal glue", "The surface was burnished smooth with a polished stone until it achieved a subtle sheen", "The deity's proportions were laid out using a grid system prescribed by Buddhist canonical texts"], funFact: "The Ivolginsky Datsan near Ulan-Ude, Russia's center of Buddhist learning." },
        { name: "Tuvan Musical Instrument Craft", state: "Russia", region: "Tuva Republic, Southern Siberia", lat: 51.72, lng: 94.45, type: "Home Decor", materials: ["Wood", "Leather", "Bone", "Metal"], description: "Tuvan craftsmen built the igil, a two-stringed horsehead fiddle central to the practice of khoomei throat singing.", era: "Pre-10th Century", steps: ["A straight-grained section of Siberian larch was selected, split, and rough-hewn with an adze", "The resonating body was hollowed out from the front and covered with stretched goat or horse hide", "The long neck was shaped and a carved horse head was fashioned at the scroll end"], funFact: "The igil is always crowned with a carved horse head because Tuvan legend." },
        { name: "Altai Felt Craft", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Pazyryk_burial_from_Baga_Turgen_Gol_site%2C_Bayan-%C3%96lgiy_province%2C_Western_Mongolia.jpg/960px-Pazyryk_burial_from_Baga_Turgen_Gol_site%2C_Bayan-%C3%96lgiy_province%2C_Western_Mongolia.jpg", state: "Russia", region: "Altai Republic, Southern Siberia", lat: 51.96, lng: 85.97, type: "Home Decor", materials: ["Wool", "Natural Dye", "Grass", "Thread"], description: "The semi-nomadic peoples of the Altai Mountains produced richly decorated felt textiles for yurt furnishings.", era: "Pre-10th Century", steps: ["Wool was shorn from Altai mountain sheep and sorted into white, brown, and black batches", "Loose wool was laid out in layers on a wetted reed mat, with dyed wool arranged for colored patterns", "The mat was rolled around a pole, bound with leather thongs, and dragged behind a horse across the steppe"], funFact: "The Pazyryk frozen tombs in the Altai Mountains preserved felt artifacts." },
        { name: "Chukchi Walrus Ivory Carving", image: "https://upload.wikimedia.org/wikipedia/commons/6/6b/Chukchi_family_old.jpg", state: "Russia", region: "Chukotka, Russian Far East", lat: 64.73, lng: 177.51, type: "Sculpture", materials: ["Ivory", "Bone", "Natural Dye"], description: "The Chukchi and Yupik peoples of Russia's extreme northeastern coast carved walrus tusks into miniature sculptures.", era: "Pre-10th Century", steps: ["Walrus tusks were harvested during seasonal hunts and cleaned of soft tissue with stone scrapers", "The dense ivory was left to dry slowly in underground caches to prevent splitting in the extreme cold", "Rough forms were shaped using bow drills and small adzes made from traded iron or ground stone"], funFact: "Chukchi ivory engravings often depict entire seasonal cycles in continuous." },
        { name: "Khanty Birch Bark Craft", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Larix_decidua_Aletschwald.jpg/960px-Larix_decidua_Aletschwald.jpg", state: "Russia", region: "Khanty-Mansi, Western Siberia", lat: 61, lng: 69, type: "Kitchenware", materials: ["Wood", "Plant Fiber", "Natural Dye"], description: "The Khanty people of the Ob River basin fashioned birch bark into an extraordinary range of vessels, containers.", era: "Pre-10th Century", steps: ["Large sheets of birch bark were carefully peeled from living trees during the brief summer sap season", "The bark was flattened under weighted boards and stored in cool shade to maintain its flexibility", "Patterns were scored and embossed into the inner surface using carved bone or antler stamps"], funFact: "Khanty birch bark containers were so perfectly waterproof that they could." },
        { name: "Evenki Reindeer Hide Craft", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Sami_flag.svg/960px-Sami_flag.svg.png", state: "Russia", region: "Krasnoyarsk Krai, Central Siberia", lat: 56.01, lng: 92.87, type: "Clothing", materials: ["Leather", "Bone", "Thread", "Natural Dye"], description: "The Evenki, one of Siberia's largest indigenous groups, developed sophisticated techniques for transforming reindeer.", era: "Pre-10th Century", steps: ["Reindeer hides were scraped clean of fat and tissue using a curved bone blade immediately after slaughter", "The scraped hides were soaked in a solution of rotted fish brains and liver to soften the fibers", "Softened hides were stretched on wooden frames and worked repeatedly by hand until supple"], funFact: "Evenki winter parkas were engineered with such precision that they remained." },
        { name: "Nivkh Fish Skin Craft", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Nivkh_People.JPG/960px-Nivkh_People.JPG", state: "Russia", region: "Sakhalin Island, Russian Far East", lat: 46.96, lng: 142.73, type: "Clothing", materials: ["Leather", "Thread", "Natural Dye", "Plant Fiber"], description: "The Nivkh people of Sakhalin Island and the Amur River estuary developed the rare craft of transforming salmon skin into.", era: "Pre-10th Century", steps: ["Large salmon skins were carefully removed in whole pieces during the autumn spawning runs", "The skins were scraped free of fat and residual flesh using clamshell or stone tools", "Cleaned skins were worked by hand — crumpled, stretched, and rubbed repeatedly — to achieve a leather-like softness"], funFact: "Nivkh fish-skin robes were so waterproof and durable that Russian explorers." },
        { name: "Itelmen Bone and Wood Carving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Itelmeni_3.JPG/960px-Itelmeni_3.JPG", state: "Russia", region: "Kamchatka Peninsula, Russian Far East", lat: 53, lng: 158.6, type: "Sculpture", materials: ["Bone", "Wood", "Stone", "Leather"], description: "The Itelmen, the oldest indigenous inhabitants of the Kamchatka Peninsula, carved whale bone, driftwood.", era: "Pre-10th Century", steps: ["Whale bones were collected from beach-cast carcasses and driftwood was gathered from volcanic shorelines", "Raw materials were dried in semi-subterranean earth lodges heated by geothermal vents", "Rough forms were shaped with adzes made from ground volcanic basalt and obsidian flakes"], funFact: "Kamchatka has more active volcanoes than almost anywhere on Earth." },
        { name: "Primorye Maritime Woodcraft", image: "https://upload.wikimedia.org/wikipedia/commons/4/45/Udege_Family.jpg", state: "Russia", region: "Primorsky Krai, Russian Far East", lat: 43.12, lng: 131.87, type: "Kitchenware", materials: ["Wood", "Leather", "Plant Fiber", "Bone"], description: "The Udege and Nanai peoples of the Primorsky coastal forests near present-day Vladivostok crafted elaborately carved.", era: "Pre-10th Century", steps: ["Manchurian walnut, ash, or birch logs were selected and split along the grain with bone wedges", "Bowl and vessel forms were roughed out using small adzes and curved gouges", "Surfaces were carved with interlocking spiral patterns and stylized tiger and fish motifs using fine iron blades"], funFact: "The spiral motifs carved by Amur River peoples are so distinctive that when." },
        { name: "Uruguayan Mate Gourd Craft", image: "https://upload.wikimedia.org/wikipedia/commons/a/a6/Mate_en_calabaza.jpg", state: "Uruguay", region: "Montevideo", lat: -34.9011, lng: -56.1645, type: "Kitchenware", materials: ["Plant Fiber", "Silver", "Natural Dye", "Leather"], description: "Decorated calabash gourds crafted for the ritual of drinking mate, Uruguay's national beverage.", era: "Colonial Era", steps: ["A mature calabash gourd was harvested and its soft interior flesh was carefully scraped out using a metal spoon or carved stick.", "The hollowed gourd was cured by packing it with used mate leaves and hot water for several days, a process that hardened the walls and sealed the porous surface.", "The exterior surface was smoothed and decorative patterns were burned into the shell using heated metal tools in a technique known as pyrography."], funFact: "In Uruguayan culture, offering someone mate from your personal gourd is." },
        { name: "Uruguayan Gaucho Silverwork", image: "", state: "Uruguay", region: "Tacuarembó", lat: -31.7333, lng: -55.9833, type: "Jewelry", materials: ["Silver", "Leather", "Iron", "Gold"], description: "The silversmiths of Tacuarembó forged ornate belt buckles, knife handles.", era: "18th Century", steps: ["Silver ingots were melted in a crucible over a charcoal forge and cast into flat sheets or rough blanks using stone or iron molds.", "The cooled silver was hammered and shaped on an anvil, with the artisan planishing the surface to achieve an even thickness for buckles or handle plates.", "Intricate patterns of scrollwork, flowers, or gaucho symbols were chased and engraved into the silver surface using fine steel chisels and punches."], funFact: "Tacuarembó hosts an annual Gaucho Festival that is one of the largest in." },
        { name: "Wai-Wai Basket Weaving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Joenia-Tarso.jpg/960px-Joenia-Tarso.jpg", state: "Guyana", region: "Rupununi", lat: 2, lng: -59, type: "Home Decor", materials: ["Plant Fiber", "Natural Dye", "Cotton"], description: "The Wai-Wai people of Guyana's deep interior rainforest weave remarkably intricate baskets from ite palm fibers.", era: "Pre-Columbian", steps: ["Young shoots of the ite palm were harvested from the rainforest and split into thin, flexible strips that were left to dry in the sun for several days.", "Selected strips were dyed using natural pigments extracted from plants such as kaladuri root for red and charcoal for black, creating the contrasting fibers needed for geometric patterns.", "The weaver began at the base of the basket, interlocking dyed and undyed strips in a tight twill weave, carefully counting each strand to maintain the symmetry of the geometric design."], funFact: "The Wai-Wai live in one of the most remote regions of South America." },
        { name: "Guyanese Hammock Weaving", image: "", state: "Guyana", region: "Berbice", lat: 6.25, lng: -57.5, type: "Furniture", materials: ["Cotton", "Plant Fiber", "Natural Dye"], description: "Cotton hammocks woven in Guyana's Berbice region reflect an Amerindian tradition that predates European contact.", era: "Pre-Columbian", steps: ["Raw cotton was harvested from local cotton plants, cleaned of seeds by hand, and spun into strong yarn using a drop spindle weighted with a clay whorl.", "A simple rectangular frame loom was constructed from wooden poles, and the cotton warp threads were strung tautly across its length to establish the hammock's dimensions.", "The weaver passed the weft yarn back and forth through the warp using a flat wooden shuttle, beating each row tightly with a carved beater to create a dense, supportive fabric."], funFact: "When Christopher Columbus first encountered hammocks in the Caribbean." },
        { name: "Maroon Wood Carving", state: "Suriname", region: "Saramacca", lat: 5.7833, lng: -55.5833, type: "Sculpture", materials: ["Wood", "Natural Dye", "Wax"], description: "The Maroon communities of Suriname's interior rivers developed a distinctive wood carving tradition blending West.", era: "18th Century", steps: ["A suitable hardwood log, often from the purple heart or cedar tree, was selected and rough-hewn into the basic form of a stool, comb, or tray using a machete and adze.", "The carver refined the shape with smaller knives, sculpting the flowing curves and interlocking forms characteristic of tembé art, a visual language with roots in West African decorative traditions.", "Surface patterns were incised with fine chisels and gouges, creating geometric and organic motifs that were traditionally understood to convey specific messages between the carver and the recipient."], funFact: "Maroon tembé carvings are considered a form of visual language." },
        { name: "Surinamese Calabash Carving", image: "", state: "Suriname", region: "Paramaribo", lat: 5.852, lng: -55.2038, type: "Kitchenware", materials: ["Plant Fiber", "Natural Dye", "Wax"], description: "Artisans in Suriname transform the hard shells of calabash gourds into decorated bowls, cups.", era: "Pre-Columbian", steps: ["A mature calabash fruit was harvested from the tree and cut in half or opened at the top, after which the soft pulp and seeds were scooped out and the shell was left to dry and harden in the sun.", "The outer skin of the dried gourd was scraped away to reveal the smooth, pale surface beneath, which provided a clean canvas for decoration.", "Designs were carved into the shell using a sharp knife or heated metal point, with patterns ranging from geometric Amerindian motifs to the curvilinear tembé style favored by Maroon artisans."], funFact: "The calabash tree that provides these gourds grows its fruit directly from." },
        { name: "Lenca Pottery", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Ballet_Folkl%C3%B3rico_de_Honduras_Oro_Lenca_bailando_en_El_N%C3%ADspero.jpg/960px-Ballet_Folkl%C3%B3rico_de_Honduras_Oro_Lenca_bailando_en_El_N%C3%ADspero.jpg", state: "Honduras", region: "Gracias, Lempira", lat: 14.5883, lng: -88.5833, type: "Pottery", materials: ["Clay", "Natural Dye", "Stone"], description: "The Lenca people of western Honduras maintain a pottery tradition stretching back to pre-Columbian times.", era: "Pre-Columbian", steps: ["Local clay was gathered from riverbanks near Gracias and prepared by kneading it with fine sand or crusite temper to prevent cracking during firing.", "Vessels were shaped entirely by hand using the coil method, in which long ropes of clay were spiraled upward and smoothed together, as the potter's wheel was unknown in pre-Columbian Mesoamerica.", "After partial drying, a red iron-oxide slip was applied to the surface and burnished to a shine with a smooth river stone, creating the characteristic red background."], funFact: "The Lenca are the largest indigenous group in Honduras and their pottery." },
        { name: "Honduran Junco Mat Weaving", image: "https://upload.wikimedia.org/wikipedia/commons/1/10/Petate.gif", state: "Honduras", region: "Santa Bárbara", lat: 14.9167, lng: -88.2333, type: "Home Decor", materials: ["Plant Fiber", "Natural Dye", "Grass"], description: "In the highlands of Santa Bárbara, artisans weave petates—flat sleeping mats and floor coverings—from the fibers of the.", era: "Pre-Columbian", steps: ["Junco palm leaves were harvested from the highland forests and split into long, uniform strips, which were then laid out in the sun to bleach and dry for several days.", "Selected strips were soaked in water infused with natural dyes from local plants, producing colors of green, purple, and gold that would form patterns in the finished mat.", "The weaver laid out parallel strips as a foundation and interwove perpendicular strips in an over-under pattern, carefully alternating dyed and natural fibers to create geometric designs."], funFact: "The department of Santa Bárbara is sometimes called the cradle of Honduran." },
        { name: "San Juan de Oriente Pottery", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Flag_of_Andaluc%C3%ADa.svg/960px-Flag_of_Andaluc%C3%ADa.svg.png", state: "Nicaragua", region: "Masaya", lat: 11.9083, lng: -86.075, type: "Pottery", materials: ["Clay", "Natural Dye", "Stone"], description: "The village of San Juan de Oriente near Masaya has been a center of ceramic arts since before the Spanish conquest.", era: "Pre-Columbian", steps: ["Clay was dug from deposits near the village and aged for weeks, then kneaded and wedged by hand to remove air bubbles and achieve a uniform, workable consistency.", "The potter formed the vessel on a simple hand-turned platform, building the walls using a combination of coiling and paddling techniques inherited from the Chorotega civilization.", "Once leather-hard, the surface was coated with colored slips made from local mineral earths and burnished to a smooth sheen using a polished seed or river stone."], funFact: "San Juan de Oriente is so devoted to ceramics that nearly every household." },
        { name: "Nicaraguan Hammock Weaving", state: "Nicaragua", region: "Masaya", lat: 11.9744, lng: -86.0942, type: "Furniture", materials: ["Cotton", "Natural Dye", "Thread"], description: "The city of Masaya, known as the cradle of Nicaraguan folklore, is celebrated for its brightly colored cotton hammocks.", era: "Colonial Era", steps: ["Cotton yarn was dyed in vivid colors using both natural and later synthetic dyes, then wound onto bobbins and prepared for warping on the tall wooden loom.", "The warp threads were strung vertically on a standing frame loom, with their arrangement determining the width and color pattern of the finished hammock.", "A weaver passed the shuttle carrying the weft thread back and forth through the warp, building up the dense, flexible body of the hammock row by row."], funFact: "Masaya's central market, the Mercado de Artesanías." },
        { name: "Ilobasco Miniature Clay Figures", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Ilobasco.svg/960px-Ilobasco.svg.png", state: "El Salvador", region: "Cabañas", lat: 13.8417, lng: -88.85, type: "Sculpture", materials: ["Clay", "Natural Dye", "Wax"], description: "The town of Ilobasco in Cabañas department is famous for its sorpresas—tiny.", era: "Colonial Era", steps: ["Fine local clay was cleaned, sieved, and mixed with water to form a smooth, highly plastic paste capable of holding the minute details required for miniature work.", "Using only fingertips and simple pointed tools such as thorns and wire, the artisan sculpted tiny figures sometimes no larger than a fingernail, forming detailed human faces, animals, and domestic scenes.", "The miniatures were air-dried slowly in the shade to prevent cracking, then fired at low temperatures in small kilns to harden them while preserving the delicate features."], funFact: "The tradition of hiding figurines inside clay eggs gave rise to the name." },
        { name: "Salvadoran Indigo Dyeing", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Indigo_cake.jpg/960px-Indigo_cake.jpg", state: "El Salvador", region: "Suchitoto", lat: 13.9381, lng: -89.0281, type: "Clothing", materials: ["Cotton", "Natural Dye", "Plant Fiber"], description: "El Salvador was once the world's leading producer of añil, the indigo dye extracted from the jiquilite plant.", era: "Pre-Columbian", steps: ["The leaves and stems of the jiquilite plant were harvested at peak maturity and submerged in large stone or clay vats filled with water, where they were left to ferment and release their blue pigment over the course of several days.", "The fermented liquid was beaten vigorously with wooden paddles to oxygenate it, a process that caused the dissolved indigo to precipitate into solid blue particles that settled to the bottom of the vat.", "The settled indigo sediment was collected, strained through cloth, and formed into cakes or blocks that were dried in the sun and could be stored or traded."], funFact: "During the colonial period, Salvadoran indigo was so valuable that it was." },
        { name: "Dominican Faceless Dolls", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/IKEA_Shopping_centre_Sweden.jpg/960px-IKEA_Shopping_centre_Sweden.jpg", state: "Dominican Republic", region: "Higüey", lat: 18.6151, lng: -68.7079, type: "Sculpture", materials: ["Clay", "Natural Dye", "Beads"], description: "The muñecas sin rostro, or faceless dolls, of the Dominican Republic are ceramic figurines deliberately crafted without.", era: "19th Century", steps: ["Local clay was gathered, cleaned of impurities, and kneaded into a smooth, workable consistency suitable for sculpting the flowing forms of the female figures.", "The artisan hand-modeled the figure, shaping the characteristic wide skirt, arms carrying baskets or flowers, and a smooth, featureless oval head that deliberately omitted eyes, nose, and mouth.", "The shaped figure was left to dry slowly, then fired in a small kiln at moderate temperatures to achieve a strong but porous ceramic body."], funFact: "The faceless dolls have become the most recognizable souvenir of the." },
        { name: "Dominican Larimar Jewelry", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Larimar.jpg/960px-Larimar.jpg", state: "Dominican Republic", region: "Barahona", lat: 18.2089, lng: -71.1003, type: "Jewelry", materials: ["Stone", "Silver", "Copper"], description: "Larimar, a rare blue variety of the mineral pectolite, is found nowhere on Earth except in the mountains of Barahona.", era: "19th Century", steps: ["Larimar was mined from volcanic rock formations in the Sierra de Bahoruco mountains using hand tools, with miners following narrow veins of the blue pectolite deep into the hillside.", "The rough stone was cut into cabochon shapes using lapidary techniques, with the cutter carefully orienting each piece to display the most vivid blue coloration and characteristic white cloud-like patterns.", "A silver or copper setting was fabricated by the jeweler, who shaped wire and sheet metal into bezels, prongs, or wrapped frames designed to complement the organic contours of each unique stone."], funFact: "Larimar is found only in a single mountainous area of the Dominican." },
        { name: "Trinidadian Carnival Mask", image: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Orange_Carnival_Masqueraders_in_Trinidad.jpg", state: "Trinidad and Tobago", region: "Port of Spain", lat: 10.6596, lng: -61.5086, type: "Ritual", materials: ["Paper", "Wire", "Natural Dye", "Beads", "Thread"], description: "The elaborate masks and headpieces of Trinidad Carnival draw on African masquerade traditions blended with European.", era: "18th Century", steps: ["A wire armature was bent and shaped into the basic structure of the mask or headpiece, with the craftsman forming the exaggerated features of traditional carnival characters such as Midnight Robbers, Moko Jumbies, or fancy sailors.", "Strips of newspaper or brown paper were soaked in a flour-and-water paste and layered over the wire frame in the papier-mâché technique, building up smooth, sculptural surfaces that were left to dry and harden.", "The hardened form was sanded, sealed, and painted with bright pigments, then adorned with mirrors, sequins, beads, and feathers to create the dazzling visual impact expected on the road during Carnival."], funFact: "Trinidad Carnival's masquerade tradition traces directly to the 18th." },
        { name: "Trinidadian Cocoa Stick Making", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Cocoa_Pods.JPG/960px-Cocoa_Pods.JPG", state: "Trinidad and Tobago", region: "Gran Couva", lat: 10.4167, lng: -61.3833, type: "Kitchenware", materials: ["Wood", "Plant Fiber", "Natural Dye"], description: "In the cocoa-growing hills of Gran Couva, a traditional method of chocolate preparation has survived for centuries.", era: "Colonial Era", steps: ["Ripe cacao pods were harvested from the estate trees, split open with a cutlass, and the wet beans were scooped out and placed in wooden sweat boxes to ferment for five to seven days, developing the complex chocolate flavor.", "The fermented beans were spread on large wooden drying trays called boucans and turned regularly under the tropical sun until fully dried, then roasted over a wood fire in a large iron pot until fragrant and dark.", "The roasted beans were cracked and winnowed to remove the papery husks, and the nibs were ground on a heated stone metate or in a hand-cranked mill until they formed a smooth, oily chocolate paste."], funFact: "Trinidad's Trinitario cacao variety, a natural hybrid that arose on the." },
        { name: "Garifuna Drum Making", image: "https://upload.wikimedia.org/wikipedia/commons/8/85/Black_Caribs-family-St.-Vincent_by_Augustino_Brunias.jpg", state: "Belize", region: "Dangriga", lat: 16.9694, lng: -88.2328, type: "Ritual", materials: ["Wood", "Leather", "Plant Fiber", "Cotton"], description: "The Garifuna people of Belize's Caribbean coast craft sacred drums essential to their musical and spiritual traditions.", era: "18th Century", steps: ["A section of mahogany or mayflower trunk was selected and hollowed out using fire and adze, carefully shaping the interior cavity to produce the desired resonance and tonal quality.", "The exterior of the drum body was carved smooth and shaped into a slight barrel form, with the craftsman sometimes adding carved decorative bands or symbols significant to Garifuna spiritual life.", "A piece of deer, peccary, or shark skin was soaked in water until pliable, then stretched tightly over the open end of the drum and secured with a ring of twisted vine or rope."], funFact: "Garifuna drumming and dance were inscribed by UNESCO as a Masterpiece of." },
        { name: "Belizean Maya Pottery", image: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Sacul_vase.jpg", state: "Belize", region: "Cayo District", lat: 17.15, lng: -88.75, type: "Pottery", materials: ["Clay", "Natural Dye", "Stone"], description: "In Belize's Cayo District, where ancient Maya cities once flourished in the jungle.", era: "Pre-Columbian", steps: ["Clay was collected from riverbanks in the Cayo foothills and processed by soaking, straining, and mixing with crusite or volcanic ash temper to improve its firing strength.", "Vessels were constructed using the coil-and-scrape technique, in which coils of clay were stacked and then thinned and shaped using a gourd scraper and wooden paddle, producing smooth, even walls without a potter's wheel.", "The leather-hard vessel was decorated with incised designs or painted with slips made from red and black mineral pigments, featuring traditional motifs such as the rain god Chaak or the feathered serpent."], funFact: "Belize's Cayo District contains more ancient Maya archaeological sites per." },
        { name: "Bahian Bobbin Lace", image: "", state: "Brazil", region: "Salvador, Bahia", lat: -12.97, lng: -38.51, type: "Clothing", materials: ["Cotton", "Thread", "Beads", "Wood"], description: "The renda de bilro, or bobbin lace, of Bahia is an intricate textile art brought to northeastern Brazil by Portuguese.", era: "Colonial Era", steps: ["A pattern was pricked into a strip of heavy paper or cardboard using a pin, with each hole marking a point where threads would cross or twist in the finished lace design.", "The pattern was pinned to a firm, cylindrical cushion, and pairs of wooden bobbins wound with fine cotton thread were attached at the starting points of the design.", "The lacemaker crossed and twisted the bobbins in specific sequences, moving them over and under one another while inserting pins at each pattern point to hold the developing lace structure in place."], funFact: "In the coastal towns around Salvador, it is still common to see women." },
        { name: "Minas Gerais Soapstone Carving", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Soapstone_%28Speckstein%29_-_several_colored_samples.jpg/960px-Soapstone_%28Speckstein%29_-_several_colored_samples.jpg", state: "Brazil", region: "Ouro Preto, Minas Gerais", lat: -20.39, lng: -43.5, type: "Sculpture", materials: ["Stone", "Metal", "Natural Dye"], description: "The baroque colonial town of Ouro Preto sits amid abundant deposits of pedra-sabão, or soapstone.", era: "Colonial Era", steps: ["Blocks of soapstone were quarried from the hillsides surrounding Ouro Preto using iron chisels and wedges, with the quarryman selecting pieces of uniform color and minimal fracturing.", "The block was rough-shaped with a hammer and point chisel, establishing the basic form of the intended object, whether a cooking pot, religious figure, or architectural ornament.", "Finer details were carved using rasps, rifflers, and small gouges, with the soft stone allowing the artisan to achieve remarkably detailed features, flowing drapery, and delicate relief patterns."], funFact: "The master sculptor Aleijadinho, considered the greatest artist of colonial." },
        { name: "Brazilian Maracatu Costume Craft", image: "https://upload.wikimedia.org/wikipedia/commons/0/01/Bloco_de_maracatu_-_olinda.jpg", state: "Brazil", region: "Recife, Pernambuco", lat: -8.05, lng: -34.87, type: "Clothing", materials: ["Beads", "Thread", "Gold Thread", "Cotton", "Natural Dye", "Metal"], description: "The maracatu nação processions of Recife feature elaborately costumed kings, queens.", era: "Colonial Era", steps: ["A base garment of heavy cotton or velvet was cut and sewn by hand into the regal shapes of capes, bodices, and wide skirts appropriate to the wearer's role in the maracatu court.", "Thousands of glass beads, sequins, and small mirrors were sewn individually onto the fabric in dense, symmetrical patterns that depicted crowns, stars, moons, and other symbols of African royalty.", "Gold and silver metallic threads were couched onto the garment in elaborate scrollwork and lettering that identified the maracatu nation and honored its spiritual patrons."], funFact: "Each maracatu nação is led by a calunga." },

    const imageCache = {};

    // Throttled fetch to avoid Wikimedia rate limits
    const fetchQueue = [];
    let activeFetches = 0;
    let fetchDelay = 300;

    function throttledFetch(url) {
        return new Promise((resolve, reject) => {
            fetchQueue.push({ url, resolve, reject });
            processQueue();
        });
    }

    function processQueue() {
        if (activeFetches >= 2 || fetchQueue.length === 0) return;
        activeFetches++;
        const item = fetchQueue.shift();
        setTimeout(() => doFetch(item), fetchDelay);
    }

    function doFetch(item, retries) {
        retries = retries || 0;
        fetch(item.url).then(r => {
            if (r.status === 429 || !r.ok) {
                if (retries < 3) {
                    fetchDelay = Math.min(fetchDelay * 2, 5000);
                    setTimeout(() => doFetch(item, retries + 1), fetchDelay * (retries + 1));
                    return;
                }
                activeFetches--;
                processQueue();
                item.reject(new Error('Rate limited'));
                return;
            }
            return r.text().then(text => {
                if (text.startsWith('You are making too many')) {
                    if (retries < 3) {
                        fetchDelay = Math.min(fetchDelay * 2, 5000);
                        setTimeout(() => doFetch(item, retries + 1), fetchDelay * (retries + 1));
                        return;
                    }
                    activeFetches--;
                    processQueue();
                    item.reject(new Error('Rate limited'));
                    return;
                }
                try {
                    const data = JSON.parse(text);
                    fetchDelay = Math.max(300, fetchDelay - 50);
                    activeFetches--;
                    processQueue();
                    item.resolve(data);
                } catch(e) {
                    activeFetches--;
                    processQueue();
                    item.reject(e);
                }
            });
        }).catch(err => {
            activeFetches--;
            processQueue();
            item.reject(err);
        });
    }

    function fetchCraftImage(craftName, imgId, marker) {
        if (imageCache[craftName] !== undefined) return;
        imageCache[craftName] = null;
    }

    let markers = [];

    function getImageSource(url) {
        if (!url) return '';
        try {
            const hostname = new URL(url).hostname;
            if (hostname.includes('wikipedia') || hostname.includes('wikimedia')) return 'Wikipedia';
            if (hostname.includes('handicrafts.nic.in')) return 'handicrafts.nic.in';
            if (hostname.includes('gaatha')) return 'gaatha.com';
            if (hostname.includes('asiainch')) return 'asiainch.org';
            return hostname.replace('www.', '');
        } catch(e) { return 'Wikipedia'; }
    }

    function createPopupContent(craft) {
        const tc = typeConfig[craft.type];
        const imgId = 'img-' + craft.name.replace(/[^a-zA-Z0-9]/g, '_');
        const imgSrc = craft.image || imageCache[craft.name] || '';
        const hasImage = !!imgSrc;
        const hideArea = !hasImage && !craft.image;
        const imgSource = getImageSource(imgSrc);
        const stepsHtml = craft.steps && craft.steps.length > 0
            ? `<div class="callout-steps">
                    <div class="callout-steps-title">The Craft Process</div>
                    <ol>${craft.steps.map(s => `<li>${s}</li>`).join('')}</ol>
               </div>`
            : '';
        const factHtml = craft.funFact
            ? `<div class="callout-fact">
                    <div class="callout-fact-title">Fun Fact</div>
                    <div class="callout-fact-content">
                        <span class="fact-icon">✦</span>
                        <span class="fact-text">${craft.funFact}</span>
                    </div>
               </div>`
            : '';
        const sourceUrl = imgSrc ? (imgSrc.includes('wikimedia') || imgSrc.includes('wikipedia')
            ? 'https://commons.wikimedia.org'
            : imgSrc.split('/').slice(0, 3).join('/')) : '';
        const sourceHtml = imgSource
            ? `<div class="callout-source">Image: <a href="${sourceUrl}" target="_blank" rel="noopener">${imgSource}</a></div>`
            : '';
        return `
            <div class="callout">
                <div class="callout-illustration" style="background: linear-gradient(90deg, ${tc.color}, ${tc.color}88, ${tc.color}22);"></div>
                <div class="callout-image" ${hideArea ? 'style="display:none"' : ''}>
                    <span class="img-loading" ${hasImage ? 'style="display:none"' : ''}>Loading image...</span>
                    <img id="${imgId}" src="${imgSrc}" alt="${craft.name}" style="opacity:${hasImage ? '1' : '0'};" onerror="this.parentElement.style.display='none'">
                </div>
                <div class="callout-header">
                    <span class="craft-type-badge" style="background:${tc.color}15; color:${tc.color}; border: 1px solid ${tc.color}30;">
                        ${tc.icon} ${craft.type}
                    </span>
                    <h2>${craft.name}</h2>
                    <div class="craft-origin">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${craft.region}, ${craft.state}
                    </div>
                    ${craft.era ? `<div class="craft-era">⏳ ${craft.era}</div>` : ''}
                </div>
                <div class="callout-body">
                    <p>${craft.description}</p>
                </div>
                ${stepsHtml}
                ${factHtml}
                <div class="callout-footer">
                    ${craft.materials.map(m => `<span class="material-tag">${m}</span>`).join('')}
                </div>
                ${sourceHtml}
            </div>
        `;

    // Side panel elements

    const craftPanelContent = document.getElementById('craftPanelContent');
    const craftPanelClose = document.getElementById('craftPanelClose');

    let lastClusterCrafts = null; // Track cluster context for back button

    function openCraftPanel(craft, fromCluster) {
        const backBtn = fromCluster
            ? `<button class="craft-panel-back" onclick="window._showLastCluster()">← Back to list</button>`
            : '';
        craftPanelContent.innerHTML = backBtn + createPopupContent(craft);
        craftPanel.classList.add('open');
        craftPanel.scrollTop = 0;
        if (!craft.image) {
            const imgId = 'img-' + craft.name.replace(/[^a-zA-Z0-9]/g, '_');
            fetchCraftImage(craft.name, imgId, null);
        }
    }

    window._showLastCluster = function() {
        if (lastClusterCrafts) showClusterGrid(lastClusterCrafts);
    };

    function closeCraftPanel() {
        craftPanel.classList.remove('open');
        lastClusterCrafts = null;
    }

    function showClusterGrid(clusterCrafts) {
        lastClusterCrafts = clusterCrafts; // Save for back navigation
        // Sort by type then name
        clusterCrafts.sort((a, b) => a.type.localeCompare(b.type) || a.name.localeCompare(b.name));
        const tc = (type) => typeConfig[type] || { icon: '📍', color: '#999' };

        const html = `
            <div class="cluster-grid-header">

            <div class="cluster-grid">

    // Scale markers based on zoom level

        const zoom = map.getZoom();
        const sizes = { 4: 26, 5: 32, 6: 38, 7: 46, 8: 54 };
        const fonts = { 4: 13, 5: 16, 6: 19, 7: 22, 8: 26 };
        const size = sizes[zoom] || 32;
        const font = fonts[zoom] || 16;
        document.documentElement.style.setProperty('--marker-size', size + 'px');
        document.documentElement.style.setProperty('--marker-font', font + 'px');

    function createMarkerIcon(craft) {

    crafts.forEach(craft => {

        marker.on('click', () => openCraftPanel(craft));
        markers.push(marker);

    // Cluster color: yellow (low count) → green (high count)
    function clusterColor(count) {
        // Clamp between 2 and 20 for gradient
        const t = Math.min(1, Math.max(0, (count - 2) / 18));
        // Yellow (#c9a832) → Teal-green (#3a8a5c)
        const r = Math.round(201 - t * 143);
        const g = Math.round(168 + t * (138 - 168));
        const b = Math.round(50 + t * (92 - 50));
        return `rgb(${r},${g},${b})`;
    }

    function createClusterIcon(cluster) {
        const count = cluster.getChildCount();
        const color = clusterColor(count);
        const s = count > 30 ? 44 : count > 10 ? 40 : 36;
        return L.divIcon({
            html: '<div style="background:' + color + '">' + count + '</div>',
            className: 'marker-cluster',
            iconSize: L.point(s, s),
        });
    }

    let markerLayer = L.markerClusterGroup({
        maxClusterRadius: 40,
        spiderfyOnMaxZoom: true,
        spiderfyDistanceMultiplier: 2.5,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: false,
        disableClusteringAtZoom: null,
        iconCreateFunction: createClusterIcon,
    });
    // Smart cluster click: spiderfy small clusters, zoom+list for large ones
    markerLayer.on('clusterclick', function(e) {
        var count = e.layer.getChildCount();
        if (count <= 8) {
            e.layer.spiderfy();
        } else {
            // Zoom into the cluster region
            e.layer.zoomToBounds({ padding: [40, 40] });
            // Show grid list of crafts in this cluster
            var childMarkers = e.layer.getAllChildMarkers();
            var clusterCrafts = childMarkers.map(m => m.craftData).filter(Boolean);
            showClusterGrid(clusterCrafts);
